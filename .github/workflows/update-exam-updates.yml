name: Update Exam Updates Daily

on:
  schedule:
    # 08:15 IST = 02:45 UTC daily
    - cron: '45 2 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-exam-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch exam notifications / jobs / results from RSS feeds
        run: python scripts/update_exam_updates.py

      - name: Commit exam_updates_data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exam_updates_data.json
          if git diff --cached --quiet; then
            echo "No new updates — skipping commit"
          else
            git commit -m "chore: auto-update exam notifications/jobs/results $(date -u +%Y-%m-%d)"
            git push
          fi
