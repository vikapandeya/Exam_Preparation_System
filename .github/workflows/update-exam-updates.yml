name: Update Exam Updates Every 6 Hours

on:
  schedule:
    # Every 6 hours (~05:45, 11:45, 17:45, 23:45 IST) — notifications/jobs/
    # results drop at unpredictable times, so this refreshes faster than the
    # daily Current Affairs sync.
    - cron: '45 */6 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-exam-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch exam notifications / jobs / results from RSS feeds
        run: python scripts/update_exam_updates.py

      - name: Commit exam_updates_data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exam_updates_data.json
          if git diff --cached --quiet; then
            echo "No new updates — skipping commit"
          else
            git commit -m "chore: auto-update exam notifications/jobs/results $(date -u +%Y-%m-%d\ %H:%M) UTC"
            git push
          fi
