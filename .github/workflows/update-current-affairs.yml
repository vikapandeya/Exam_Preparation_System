name: Update Current Affairs Daily

on:
  schedule:
    # 08:00 IST = 02:30 UTC daily
    - cron: '30 2 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-ca:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch current affairs from RSS feeds
        run: python scripts/update_ca.py

      - name: Commit ca_data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ca_data.json
          if git diff --cached --quiet; then
            echo "No new articles — skipping commit"
          else
            git commit -m "chore: auto-update current affairs $(date -u +%Y-%m-%d)"
            git push
          fi
