<head>

<title>Exam Syllabus Hub – Complete Indian Competitive Exam Syllabi</title>
<meta name="description" content="Complete syllabi, paper patterns and question counts for all major Indian competitive exams — UPSC, SSC, Banking, Railway, Bihar Specific, Defence and State PSC.">

<style>
/* ── TOKENS ── */
:root{
  --primary:#2563eb;--secondary:#7c3aed;--accent:#f59e0b;
  --bg:#f0f4ff;--surface:#ffffff;--surface2:#f8fafc;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --hdr:56px;--subnav:44px;
  --r:10px;--rsm:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 20px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#0f172a;--surface:#1e293b;--surface2:#0f172a;
  --border:#334155;--text:#f1f5f9;--muted:#94a3b8;
  --sh:0 1px 3px rgba(0,0,0,.4);--sh-md:0 4px 20px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;transition:background .25s,color .25s}
a{text-decoration:none;color:inherit}

/* ── HEADER ── */
#topbar{
  position:sticky;top:0;z-index:1000;height:var(--hdr);
  background:var(--surface);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;padding:0 1.25rem;gap:1rem;
  box-shadow:var(--sh);
}
.brand{display:flex;align-items:center;gap:.5rem;font-weight:800;font-size:.95rem;white-space:nowrap;color:var(--primary)}
.brand-icon{font-size:1.35rem;line-height:1}
.topbar-right{margin-left:auto;display:flex;align-items:center}
#theme-btn{background:none;border:1.5px solid var(--border);border-radius:999px;padding:.3rem .75rem;cursor:pointer;font-size:.82rem;color:var(--text);transition:.2s;font-family:inherit;display:flex;align-items:center;gap:.3rem}
#theme-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ── SUB-NAV ── */
#sub-nav{
  position:sticky;top:var(--hdr);z-index:999;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 1.25rem;display:flex;align-items:center;
}
.page-links{display:flex;flex-wrap:nowrap;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none;}
.page-links::-webkit-scrollbar{display:none;}
.page-links a{font-size:.7rem;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:4px 10px;transition:all .2s;font-weight:500;white-space:nowrap;}
.page-links a:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.page-links a.current{background:var(--primary);color:#fff!important;border-color:var(--primary);font-weight:700;pointer-events:none;box-shadow:0 2px 8px rgba(37,99,235,.35);}

/* ── HERO ── */
.hero{
  background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 30%,#2563eb 65%,#7c3aed 100%);
  padding:4rem 1.5rem 3.5rem;text-align:center;color:#fff;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")
}
.hero-inner{position:relative;z-index:1;max-width:760px;margin:0 auto}
.hero h1{font-size:clamp(1.75rem,4.5vw,3rem);font-weight:800;line-height:1.15;margin-bottom:.85rem;letter-spacing:-.025em}
.hero-sub{font-size:1rem;opacity:.82;margin-bottom:2rem;max-width:560px;margin-left:auto;margin-right:auto}
.hero-pills{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center}
.hero-pill{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);padding:.35rem 1rem;border-radius:999px;font-size:.82rem;font-weight:600;color:#fff}
.hero-pill span{color:#fbbf24}

/* ── CATEGORY FILTER ── */
.cat-bar{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-inner{display:flex;padding:0 1.25rem;max-width:1440px;margin:0 auto;}
.cat-tab{padding:10px 16px;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:.15s;text-transform:uppercase;letter-spacing:.5px;}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{color:var(--primary);border-color:var(--primary);font-weight:700}

/* ── MAIN LAYOUT ── */
.layout{display:flex;gap:0;max-width:1400px;margin:0 auto;min-height:calc(100vh - var(--hdr) - var(--subnav) - 44px)}

/* ── LEFT PANEL ── */
#left-panel{
  width:300px;flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--surface);
  position:sticky;top:calc(var(--hdr) + var(--subnav));
  height:calc(100vh - var(--hdr) - var(--subnav) - 44px);
  overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
  display:flex;flex-direction:column;
}
#left-panel::-webkit-scrollbar{width:5px;}
#left-panel::-webkit-scrollbar-track{background:transparent;}
#left-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.left-search{padding:.75rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.left-search input{
  width:100%;padding:.45rem .75rem .45rem 2rem;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-size:.82rem;
  outline:none;font-family:inherit;transition:.2s;
}
.left-search input:focus{border-color:var(--primary)}
.search-wrap{position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.75rem;pointer-events:none}
.exam-list{flex:1;overflow-y:auto;scrollbar-width:none;}
.exam-list::-webkit-scrollbar{display:none;}
.exam-item{
  display:flex;align-items:center;gap:.6rem;
  padding:.65rem .85rem;cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.exam-item:hover{background:var(--bg)}
.exam-item.active{background:rgba(37,99,235,.08);border-left:3px solid var(--primary)}
.exam-item.active .exam-name{color:var(--primary);font-weight:700}
.exam-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.exam-name{font-size:.82rem;font-weight:600;line-height:1.3}
.exam-body-name{font-size:.68rem;color:var(--muted)}
.cat-badge{font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;margin-left:auto}
.badge-upsc{background:rgba(37,99,235,.15);color:#2563eb}
.badge-ssc{background:rgba(16,185,129,.15);color:#059669}
.badge-banking{background:rgba(245,158,11,.15);color:#d97706}
.badge-railway{background:rgba(239,68,68,.15);color:#dc2626}
.badge-bihar{background:rgba(124,58,237,.15);color:#7c3aed}
.badge-defence{background:rgba(15,118,110,.15);color:#0f766e}
.badge-statepsc{background:rgba(234,88,12,.15);color:#ea580c}

/* ── MOBILE TOGGLE ── */
#mobile-exam-btn{
  display:none;margin:1rem;padding:.65rem 1.2rem;
  background:var(--primary);color:#fff;border:none;border-radius:var(--r);
  font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;
  width:calc(100% - 2rem);
}
#mobile-exam-btn:active{opacity:.85}
#exam-modal-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
#exam-modal{
  position:fixed;bottom:0;left:0;right:0;z-index:2001;
  background:var(--surface);border-radius:16px 16px 0 0;
  padding:1rem;max-height:80vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s;
}
#exam-modal.open{transform:translateY(0)}
#exam-modal-overlay.open{display:block}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto .75rem}
.modal-search-wrap{position:relative;margin-bottom:.75rem}
.modal-search-wrap::before{content:'🔍';position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.75rem;pointer-events:none}
.modal-search-wrap input{
  width:100%;padding:.45rem .75rem .45rem 2rem;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-size:.85rem;
  outline:none;font-family:inherit;
}
.modal-exam-list{overflow-y:auto;flex:1;}
.modal-exam-item{
  display:flex;align-items:center;gap:.65rem;
  padding:.65rem .5rem;border-bottom:1px solid var(--border);cursor:pointer;
}
.modal-exam-item:hover{background:var(--bg)}

/* ── RIGHT PANEL ── */
#right-panel{flex:1;min-width:0;padding:1.5rem;overflow-y:auto;}

/* ── EXAM DETAIL ── */
.exam-detail-header{
  background:linear-gradient(135deg,#1e1b4b,#2563eb);
  color:#fff;border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem;
}
.exam-detail-header h2{font-size:1.4rem;font-weight:800;margin-bottom:.3rem}
.exam-meta-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}
.exam-meta-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:.25rem .75rem;font-size:.72rem;font-weight:600}

/* ── TABS ── */
.tabs{display:flex;gap:.35rem;margin-bottom:1.25rem;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab-btn{padding:.55rem 1.1rem;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:.15s;}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── OVERVIEW ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem;margin-bottom:1.25rem}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;box-shadow:var(--sh)}
.ov-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.3rem}
.ov-value{font-size:.9rem;font-weight:700;color:var(--text)}
.overview-desc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;box-shadow:var(--sh);margin-bottom:1rem}
.overview-desc h3{font-size:.9rem;font-weight:700;margin-bottom:.5rem;color:var(--primary)}
.overview-desc p{font-size:.85rem;color:var(--muted);line-height:1.7}
.stages-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem;align-items:center}
.stage-chip{background:var(--primary);color:#fff;border-radius:999px;padding:.25rem .8rem;font-size:.72rem;font-weight:700}
.stage-arrow{color:var(--muted);font-weight:700;font-size:.85rem}

/* ── PATTERN TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
.pattern-table{width:100%;border-collapse:collapse;font-size:.8rem;background:var(--surface)}
.pattern-table th{background:var(--primary);color:#fff;padding:.65rem .85rem;text-align:left;font-weight:700;white-space:nowrap;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px}
.pattern-table td{padding:.6rem .85rem;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text);line-height:1.5}
.pattern-table tr:last-child td{border-bottom:none}
.pattern-table tr:nth-child(even) td{background:var(--surface2)}
.total-row td{font-weight:700;background:rgba(37,99,235,.07)!important;color:var(--primary)}
.neg-mark{display:inline-flex;align-items:center;gap:.25rem;font-size:.72rem;background:rgba(239,68,68,.1);color:#dc2626;padding:2px 6px;border-radius:4px;font-weight:700}
.note-cell{font-size:.72rem;color:var(--muted);font-style:italic}

/* ── SYLLABUS ACCORDION ── */
.accordion{display:flex;flex-direction:column;gap:.5rem}
.acc-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.acc-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;cursor:pointer;
  background:var(--surface);transition:background .15s;
  -webkit-user-select:none;user-select:none;
}
.acc-header:hover{background:var(--surface2)}
.acc-header.open{background:rgba(37,99,235,.06);border-bottom:1px solid var(--border)}
.acc-title{font-size:.85rem;font-weight:700;color:var(--text)}
.acc-chevron{font-size:.75rem;color:var(--muted);transition:transform .25s;flex-shrink:0}
.acc-header.open .acc-chevron{transform:rotate(180deg)}
.acc-body{display:none;padding:.85rem 1rem;border-top:1px solid var(--border)}
.acc-body.open{display:block}
.acc-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.acc-tag{background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:.2rem .65rem;font-size:.72rem;color:var(--text)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .icon{font-size:3rem;margin-bottom:.75rem}
.empty-state p{font-size:.9rem}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  #left-panel{display:none}
  #mobile-exam-btn{display:block}
  .hero{padding:2.5rem 1rem 2rem}
  .hero h1{font-size:1.65rem}
  #right-panel{padding:0 .85rem 1.5rem}
  .overview-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .hero-pills{gap:.4rem}
  .hero-pill{font-size:.72rem;padding:.3rem .75rem}
  .tab-btn{padding:.45rem .75rem;font-size:.75rem}
  .overview-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

══════════════════════════════════════════════════════════ */
function catClass(cat) {
  const m = { 'UPSC':'badge-upsc','SSC':'badge-ssc','Banking':'badge-banking','Railway':'badge-railway','Bihar Specific':'badge-bihar','Defence':'badge-defence','State PSC':'badge-statepsc' };
  return m[cat] || 'badge-upsc';
}

function filteredExams() {
  return EXAMS.filter(e => {
    const matchCat = currentCat === 'all' || e.category === currentCat;
    const matchQ = !searchQuery || e.name.toLowerCase().includes(searchQuery) || e.shortName.toLowerCase().includes(searchQuery) || e.body.toLowerCase().includes(searchQuery);
    return matchCat && matchQ;
  });
}

function renderList(containerId, examData, isMobile) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!examData.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No exams found</p></div>';
    return;
  }
  el.innerHTML = examData.map(e => `
    <div class="exam-item${isMobile ? ' modal-exam-item' : ''}${e.id === currentExam.id ? ' active' : ''}" data-id="${e.id}">
      <div class="exam-icon" style="background:${iconBg(e.category)}">${e.icon}</div>
      <div style="min-width:0;flex:1">
        <div class="exam-name">${e.shortName}</div>
        <div class="exam-body-name">${e.body}</div>
      </div>
      <span class="cat-badge ${catClass(e.category)}">${e.category}</span>
    </div>
  `).join('');

  el.querySelectorAll('.exam-item, .modal-exam-item').forEach(item => {
    item.addEventListener('click', () => {
      const exam = EXAMS.find(x => x.id === item.dataset.id);
      if (exam) {
        currentExam = exam;
        currentTab = 'overview';
        renderAll();
        if (isMobile) closeModal();
        document.getElementById('right-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
}

function iconBg(cat) {
  const m = { 'UPSC':'rgba(37,99,235,.1)','SSC':'rgba(16,185,129,.1)','Banking':'rgba(245,158,11,.1)','Railway':'rgba(239,68,68,.1)','Bihar Specific':'rgba(124,58,237,.1)','Defence':'rgba(15,118,110,.1)','State PSC':'rgba(234,88,12,.1)' };
  return m[cat] || 'rgba(37,99,235,.1)';
}

/* ══════════════════════════════════════════════════════════
   RENDER EXAM DETAIL
══════════════════════════════════════════════════════════ */
function renderDetail() {
  const e = currentExam;
  const stagesHtml = e.stages.map((s, i) => `<span class="stage-chip">${s}</span>${i < e.stages.length - 1 ? '<span class="stage-arrow">→</span>' : ''}`).join('');

  const tabs = ['overview','pattern','syllabus'];
  const tabLabels = { overview:'Overview', pattern:'Paper Pattern', syllabus:'Syllabus' };

  let tabContent = '';
  if (currentTab === 'overview') {
    tabContent = `
      <div class="overview-grid">
        <div class="ov-card"><div class="ov-label">Conducting Body</div><div class="ov-value">${e.body}</div></div>
        <div class="ov-card"><div class="ov-label">Level</div><div class="ov-value">${e.level}</div></div>
        <div class="ov-card"><div class="ov-label">Category</div><div class="ov-value">${e.category}</div></div>
        <div class="ov-card"><div class="ov-label">Eligibility</div><div class="ov-value">${e.eligibility}</div></div>
      </div>
      <div class="overview-desc">
        <h3>About this Exam</h3>
        <p>${e.overview}</p>
        <div class="stages-row">${stagesHtml}</div>
      </div>
    `;
  } else if (currentTab === 'pattern') {
    const rows = e.pattern.map(p => `
      <tr${p.isTotal ? ' class="total-row"' : ''}>
        <td>${p.stage}</td>
        <td>${p.paper}</td>
        <td>${p.qs}</td>
        <td>${p.marks}</td>
        <td>${p.duration}</td>
        <td>${p.neg === 'None' ? '<span style="color:var(--muted);font-size:.75rem">None</span>' : p.neg === '—' ? '—' : `<span class="neg-mark">⚠ ${p.neg}</span>`}</td>
        <td class="note-cell">${p.notes}</td>
      </tr>
    `).join('');
    tabContent = `
      <div class="table-wrap">
        <table class="pattern-table">
          <thead><tr><th>Stage</th><th>Paper / Subject</th><th>Questions</th><th>Marks</th><th>Duration</th><th>Negative Marking</th><th>Notes</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  } else if (currentTab === 'syllabus') {
    const items = e.syllabus.map((s, i) => `
      <div class="acc-item">
        <div class="acc-header${i === 0 ? ' open' : ''}" data-idx="${i}">
          <span class="acc-title">${s.subject}</span>
          <span class="acc-chevron">${i === 0 ? '▲' : '▼'}</span>
        </div>
        <div class="acc-body${i === 0 ? ' open' : ''}">
          <div class="acc-tags">${s.topics.map(t => `<span class="acc-tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    `).join('');
    tabContent = `<div class="accordion">${items}</div>`;
  }

  const tabBtns = tabs.map(t => `<button class="tab-btn${currentTab === t ? ' active' : ''}" data-tab="${t}">${tabLabels[t]}</button>`).join('');

  document.getElementById('exam-detail').innerHTML = `
    <div class="exam-detail-header">
      <h2>${e.icon} ${e.name}</h2>
      <div class="exam-meta-row">
        <span class="exam-meta-pill">${e.body}</span>
        <span class="exam-meta-pill">${e.level}</span>
        <span class="exam-meta-pill">${e.eligibility}</span>
      </div>
    </div>
    <div class="tabs">${tabBtns}</div>
    <div id="tab-content">${tabContent}</div>
  `;

  // Tab click
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      renderDetail();
    });
  });

  // Accordion
  document.querySelectorAll('.acc-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const body = hdr.nextElementSibling;
      const isOpen = body.classList.contains('open');
      // close all
      document.querySelectorAll('.acc-header').forEach(h => { h.classList.remove('open'); h.querySelector('.acc-chevron').textContent = '▼'; });
      document.querySelectorAll('.acc-body').forEach(b => b.classList.remove('open'));
      if (!isOpen) {
        hdr.classList.add('open');
        hdr.querySelector('.acc-chevron').textContent = '▲';
        body.classList.add('open');
      }
    });
  });
}

/* ══════════════════════════════════════════════════════════
   RENDER ALL
══════════════════════════════════════════════════════════ */
function renderAll() {
  const exams = filteredExams();
  renderList('exam-list', exams, false);
  renderList('modal-exam-list', exams, true);
  renderDetail();
}

/* ══════════════════════════════════════════════════════════
   CATEGORY FILTER
══════════════════════════════════════════════════════════ */
document.getElementById('cat-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.cat-tab');
  if (!btn) return;
  currentCat = btn.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const exams = filteredExams();
  renderList('exam-list', exams, false);
  renderList('modal-exam-list', exams, true);
});

/* ══════════════════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════════════════ */
document.getElementById('exam-search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderList('exam-list', filteredExams(), false);
});
document.getElementById('modal-search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderList('modal-exam-list', filteredExams(), true);
});

/* ══════════════════════════════════════════════════════════
   MOBILE MODAL
══════════════════════════════════════════════════════════ */
function openModal() {
  document.getElementById('exam-modal').classList.add('open');
  document.getElementById('exam-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('exam-modal').classList.remove('open');
  document.getElementById('exam-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('mobile-exam-btn').addEventListener('click', openModal);
document.getElementById('exam-modal-overlay').addEventListener('click', closeModal);

/* ══════════════════════════════════════════════════════════
   THEME TOGGLE
══════════════════════════════════════════════════════════ */
const themeBtn = document.getElementById('theme-btn');
const saved = localStorage.getItem('eps-theme') || 'light';
document.documentElement.setAttribute('data-theme', saved);
themeBtn.textContent = saved === 'dark' ? '☀️ Light' : '🌙 Dark';

themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  themeBtn.textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
  localStorage.setItem('eps-theme', next);
});

/* ══════════════════════════════════════════════════════════
   ACTIVE NAV HIGHLIGHT
══════════════════════════════════════════════════════════ */
(function(){
  var p = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.page-links a').forEach(function(a){
    if(a.getAttribute('href') === p) a.classList.add('current');
  });
})();

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
