  {q:"What is CLR? What are its main responsibilities?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p><strong>CLR (Common Language Runtime)</strong> is the core execution engine of the .NET Framework. It provides a managed runtime environment for all .NET applications, regardless of source language (C#, VB.NET, F#).</p><p><strong>Key responsibilities:</strong></p><ul><li><strong>JIT Compilation:</strong> Translates MSIL (Microsoft Intermediate Language) produced by all .NET compilers into native CPU instructions at runtime. Enables cross-language interoperability.</li><li><strong>Garbage Collection:</strong> Automatically allocates and reclaims heap memory through a generational collector (Gen 0, 1, 2). Developers never manually free memory, eliminating dangling pointers and memory leaks.</li><li><strong>Type Safety:</strong> Verifies IL code before execution to prevent illegal memory access and invalid type casts.</li><li><strong>Exception Handling:</strong> Provides uniform try-catch-finally semantics across all .NET languages with consistent call-stack unwinding.</li><li><strong>Thread Management:</strong> Maintains the ThreadPool, provides synchronization primitives, and manages thread lifecycles.</li><li><strong>Code Access Security:</strong> Controls what operations partially trusted code (from network or internet zone) may perform.</li><li><strong>COM Interop &amp; P/Invoke:</strong> Allows managed .NET code to call unmanaged Win32 and native libraries.</li></ul><p><strong>Execution flow:</strong> Source Code → .NET Compiler → MSIL → CLR JIT Compiler → Native Machine Code → CPU. Modern .NET 6/8 uses CoreCLR — an open-source, cross-platform CLR running on Windows, Linux, and macOS.</p>`},
  {q:"What is the difference between value types and reference types in C#?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>This distinction controls memory storage, copying behaviour, and garbage collection in C# programs.</p><p><strong>Value Types</strong> store data directly in the variable. For local variables they reside on the <em>stack</em>; inside objects, they live inline on the heap. Types: int, double, float, bool, char, decimal, struct, enum. <em>Assignment copies the entire data</em> — each variable holds an independent copy, so modifying one does not affect the other.</p><p><strong>Reference Types</strong> store a <em>pointer</em> (memory address) to an object allocated on the managed heap. Types: class, interface, string, array, delegate, object. <em>Assignment copies the reference</em> — both variables point to the same object, so a change through one variable is visible through the other.</p><p><strong>Critical differences:</strong></p><ul><li><strong>Null:</strong> Reference types can be null (NullReferenceException if dereferenced); value types cannot — use <code>int?</code> / <code>Nullable&lt;T&gt;</code> for nullable value types.</li><li><strong>Performance:</strong> Value types avoid heap allocation and GC pressure; reference types involve allocation overhead.</li><li><strong>Boxing:</strong> Storing a value type in an object variable wraps it on the heap (boxing). Use generics List&lt;int&gt; to avoid boxing overhead.</li><li><strong>Equality:</strong> Value types compare by content; reference types compare by address unless .Equals() is overridden.</li></ul><p>String is a special immutable reference type — == compares content, not address, because Microsoft overrides the == operator for strings.</p>`},
  {q:"What is NuGet? Why is it used in .NET projects?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p><strong>NuGet</strong> is the official package manager for the .NET ecosystem. It provides a standardised way to add, update, remove, and share reusable libraries (packages) in .NET projects.</p><p><strong>How it works:</strong> Packages are .nupkg files (ZIP archives) containing compiled assemblies (.dll), metadata, and optional source files. The central public repository is <em>nuget.org</em>, hosting over 300,000 packages. Private feeds (Azure Artifacts, GitHub Packages, Nexus) host internal organisation packages.</p><p><strong>Usage methods:</strong></p><ul><li><strong>Visual Studio GUI:</strong> Right-click project → Manage NuGet Packages → Browse/Install.</li><li><strong>Package Manager Console:</strong> <code>Install-Package Newtonsoft.Json -Version 13.0.3</code></li><li><strong>dotnet CLI:</strong> <code>dotnet add package Serilog</code></li><li><strong>Direct .csproj edit:</strong> <code>&lt;PackageReference Include="AutoMapper" Version="12.0.1"/&gt;</code></li></ul><p><strong>Key benefits:</strong></p><ul><li>Automatic dependency resolution — NuGet installs a package's own dependencies recursively.</li><li>Version pinning — ensures all team members use the same library versions via packages.lock.json.</li><li>Centralised version management — Directory.Packages.props manages all versions across the solution from one file.</li><li>Offline restore — packages cached locally after first download.</li></ul><p>Popular packages: Newtonsoft.Json, Entity Framework Core, Serilog, AutoMapper, Dapper, xUnit, Moq, FluentValidation.</p>`},
  {q:"What is a delegate in C#? Give a simple example.",u:"Unit 04",a:`<span class="utag">Unit 04</span><p>A <strong>delegate</strong> is a type-safe function pointer in C# — a first-class type that holds a reference to a method (or chain of methods) with a specific signature. Delegates enable passing methods as arguments, callbacks, and event handling.</p><p><strong>Declaration and use:</strong></p><div class="code">delegate int MathOperation(int x, int y);  // declare delegate type

int Add(int a, int b) =&gt; a + b;
int Multiply(int a, int b) =&gt; a * b;

MathOperation op = Add;
Console.WriteLine(op(3, 4));   // 7 — calls Add

op = Multiply;
Console.WriteLine(op(3, 4));   // 12 — calls Multiply</div><p><strong>Multicast delegates</strong> hold multiple method references using +=. All methods are called on invocation:</p><div class="code">Action&lt;string&gt; logger = Console.WriteLine;
logger += msg =&gt; File.AppendAllText("log.txt", msg);
logger("Event fired");  // both Console.WriteLine and File.AppendAllText called</div><p><strong>Built-in generic delegate types</strong> eliminate custom delegate declarations:</p><ul><li><strong>Action&lt;T&gt;:</strong> void return — <code>Action&lt;string&gt; print = Console.WriteLine;</code></li><li><strong>Func&lt;T, TResult&gt;:</strong> with return value — <code>Func&lt;int,int,int&gt; add = (a,b) =&gt; a+b;</code></li><li><strong>Predicate&lt;T&gt;:</strong> returns bool — <code>Predicate&lt;int&gt; isEven = n =&gt; n%2==0;</code></li></ul><p><strong>Events</strong> are delegates with the event keyword — restricts invocation to the declaring class, enforcing publisher-subscriber pattern. All .NET event handlers use EventHandler&lt;TEventArgs&gt;, which is a specialised delegate type.</p>`},
  {q:"What are lambda expressions? When are they used?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>A <strong>lambda expression</strong> is a concise anonymous function written inline using the <code>=&gt;</code> ("goes to") operator. Introduced in C# 3.0, they eliminate separate named method declarations for short, single-use logic.</p><p><strong>Syntax forms:</strong></p><div class="code">// Expression lambda — single expression, implicit return
x =&gt; x * 2
(x, y) =&gt; x + y

// Statement lambda — block body
(int x) =&gt; { Console.WriteLine(x); return x * 2; }

// Zero parameters
() =&gt; Console.WriteLine("Hello")</div><p><strong>Common use cases:</strong></p><ul><li><strong>LINQ queries:</strong> <code>numbers.Where(n =&gt; n &gt; 10).Select(n =&gt; n * n)</code></li><li><strong>Event handlers:</strong> <code>button.Click += (s, e) =&gt; MessageBox.Show("Clicked!");</code></li><li><strong>Func/Action/Predicate:</strong> <code>Func&lt;int,bool&gt; isEven = n =&gt; n % 2 == 0;</code></li><li><strong>Task.Run for async work:</strong> <code>Task.Run(() =&gt; DoHeavyWork());</code></li><li><strong>Sorting:</strong> <code>list.Sort((a, b) =&gt; a.Name.CompareTo(b.Name));</code></li></ul><p><strong>Closures:</strong> Lambdas capture variables from the enclosing scope:</p><div class="code">int threshold = 10;
var filtered = numbers.Where(n =&gt; n &gt; threshold);
// threshold is captured — changing it affects future evaluations</div><p>Lambda expressions compile to either delegate instances or Expression trees (for IQueryable/LINQ-to-SQL translation). They are the foundation of modern functional-style C# programming and the LINQ ecosystem.</p>`},
  {q:"What is LINQ? Name 5 common LINQ operators.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>LINQ (Language Integrated Query)</strong> integrates query capabilities directly into C# syntax, enabling type-safe, IntelliSense-supported queries against in-memory collections (LINQ to Objects), databases (Entity Framework), XML (LINQ to XML), and more.</p><p><strong>Two syntax styles:</strong></p><div class="code">// Query syntax (SQL-like)
var adults = from p in people
             where p.Age &gt;= 18
             orderby p.Name
             select new { p.Name, p.Age };

// Method syntax (fluent, more flexible)
var adults = people.Where(p =&gt; p.Age &gt;= 18)
                   .OrderBy(p =&gt; p.Name)
                   .Select(p =&gt; new { p.Name, p.Age });</div><p><strong>10 essential LINQ operators:</strong></p><ul><li><strong>Where(predicate):</strong> Filter — keeps matching elements.</li><li><strong>Select(transform):</strong> Project/map each element to a new form.</li><li><strong>OrderBy / OrderByDescending:</strong> Sort ascending or descending.</li><li><strong>GroupBy(key):</strong> Groups elements into IGrouping collections by key.</li><li><strong>Join:</strong> Inner join two sequences on matching keys.</li><li><strong>First / FirstOrDefault:</strong> Returns first match or default(T) if none.</li><li><strong>Count / Sum / Average / Min / Max:</strong> Aggregate calculations.</li><li><strong>Skip(n) / Take(n):</strong> Pagination — skip first n, return next n.</li><li><strong>Distinct:</strong> Remove duplicate elements.</li><li><strong>Any / All:</strong> Return bool — any or all elements satisfy condition.</li></ul><p><strong>Deferred execution:</strong> LINQ queries execute only when iterated (foreach) or forced (.ToList(), .Count()). This allows composing queries before fetching data, enabling efficient database query building with Entity Framework.</p>`},
  {q:"What is ADO.NET? Name its four core objects.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>ADO.NET (ActiveX Data Objects .NET)</strong> is Microsoft's low-level data access technology for connecting .NET applications to relational databases (SQL Server, MySQL, PostgreSQL, Oracle). It provides both connected and disconnected data access models.</p><p><strong>Four Core Objects:</strong></p><ul><li><strong>Connection (SqlConnection):</strong> Establishes the physical connection to the database using a connection string (server, database name, credentials). Must be opened explicitly (Open()) and closed (Close()). Best managed with a using statement to ensure disposal. Uses connection pooling by default for performance.</li><li><strong>Command (SqlCommand):</strong> Executes SQL statements or stored procedures. Three execute methods: ExecuteNonQuery() returns rows affected (INSERT/UPDATE/DELETE), ExecuteScalar() returns a single value (COUNT, MAX), ExecuteReader() returns a DataReader for SELECT queries. Supports parameterized queries to prevent SQL injection.</li><li><strong>DataReader (SqlDataReader):</strong> Fast, forward-only, read-only cursor over a query result set. Keeps connection open during reading. Most efficient for large data — does not load everything into memory at once. Access columns by name or index.</li><li><strong>DataAdapter (SqlDataAdapter):</strong> Bridges in-memory DataSet and the database. Fill() loads query results into DataSet tables; Update() pushes DataSet changes back to the database.</li></ul><p><strong>DataSet</strong> is a disconnected in-memory relational database with DataTable objects and DataRelations. Entity Framework and Dapper are built on top of ADO.NET and simplify data access significantly.</p>`},
  {q:"What is Entity Framework? What is Code First approach?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>Entity Framework (EF)</strong> is Microsoft's official ORM (Object-Relational Mapper) that maps database tables to C# classes, allowing developers to work with data as strongly-typed objects without writing raw SQL.</p><p><strong>Three development approaches:</strong></p><ul><li><strong>Database First:</strong> Start from an existing database — EF scaffolds C# entity classes automatically. Best for legacy databases.</li><li><strong>Model First:</strong> Design an EDMX diagram visually; EF generates both database and classes. Largely superseded.</li><li><strong>Code First (most popular):</strong> Define C# POCO classes; EF generates and manages the database schema via Migrations.</li></ul><p><strong>Code First workflow:</strong></p><div class="code">// 1. Define entity
public class Student { public int Id { get; set; } public string Name { get; set; } }

// 2. DbContext
public class AppDb : DbContext { public DbSet&lt;Student&gt; Students { get; set; } }

// 3. Migration
// dotnet ef migrations add InitialCreate
// dotnet ef database update

// 4. CRUD — no SQL needed
using var db = new AppDb();
db.Students.Add(new Student { Name = "Alice" });
db.SaveChanges();
var list = db.Students.Where(s =&gt; s.Name != null).ToList();</div><p><strong>EF Core features:</strong> Change tracking, lazy/eager/explicit loading, LINQ-to-SQL translation, database migrations, seeding, transactions, and raw SQL fallback (FromSqlRaw). Supports SQL Server, MySQL, PostgreSQL, SQLite, Oracle.</p>`},
  {q:"Difference between Cookies and Session state in ASP.NET?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>Both Cookies and Session state maintain user data across stateless HTTP, but differ fundamentally in storage location and security.</p><p><strong>Cookies:</strong></p><ul><li><strong>Storage:</strong> Client-side — stored in the user's browser (max 4KB per cookie).</li><li><strong>Persistence:</strong> Session cookies expire when browser closes; persistent cookies have an explicit Expires date and survive restarts.</li><li><strong>Transmission:</strong> Sent automatically with every HTTP request to the same domain — can add overhead with large cookies.</li><li><strong>Security:</strong> Readable by users unless HttpOnly flag set. Vulnerable to XSS if not protected. Never store passwords or sensitive data in cookies.</li><li><strong>Use cases:</strong> Remember-me login, theme/language preference, non-sensitive shopping cart.</li></ul><p><strong>Session State:</strong></p><ul><li><strong>Storage:</strong> Server-side — data stored in server memory (InProc), StateServer, SQL Server, or distributed cache (Redis).</li><li><strong>Identification:</strong> Browser holds only a small Session ID cookie; actual data never reaches the client.</li><li><strong>Expiration:</strong> Default 20-minute sliding timeout, resets on each request.</li><li><strong>Security:</strong> More secure — users cannot access or tamper with server-side data contents.</li><li><strong>Use cases:</strong> Logged-in user identity, shopping cart contents, multi-step form wizard state.</li></ul><p><strong>Comparison:</strong> Cookies scale better (stateless — no server memory needed). Sessions are more secure but consume server RAM and complicate load balancing (need sticky sessions or shared StateServer/Redis for web farms).</p>`},
  {q:"What is ViewState in ASP.NET Web Forms?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p><strong>ViewState</strong> is ASP.NET Web Forms' mechanism for preserving the state of server controls between HTTP postbacks. Since HTTP is stateless, without ViewState a TextBox would lose its value after every form submission.</p><p><strong>How it works:</strong> Before rendering the HTML response, ASP.NET serialises all control states (TextBox.Text, CheckBox.Checked, DropDownList.SelectedValue, etc.) into a Base64-encoded, HMAC-protected string and embeds it as a hidden form field:</p><div class="code">&lt;input type="hidden" name="__VIEWSTATE" value="dDwtMTI4MDU5OTY5O3Q8..." /&gt;</div><p>On the next postback, ASP.NET reads this hidden field and restores all control values before Page_Load fires — making controls appear to retain their state across roundtrips.</p><p><strong>Configuration and optimisation:</strong></p><ul><li>Disable per control: <code>&lt;asp:TextBox EnableViewState="false" /&gt;</code></li><li>Disable per page: <code>&lt;%@ Page EnableViewState="false" %&gt;</code></li><li>Enable MAC validation: <code>ViewStateUserKey = Session.SessionID</code> — prevents CSRF attacks.</li><li>Store ViewState in Session to reduce page size for very heavy pages.</li><li>Use ViewStateMode="Disabled" at page level; re-enable selectively per control.</li></ul><p><strong>Drawbacks:</strong> Increases page size significantly — grids and complex forms can have 50–200KB of hidden ViewState, slowing page load. ViewState does NOT survive navigation to a different page. Modern ASP.NET MVC/Razor Pages eliminated ViewState entirely by embracing stateless REST principles.</p>`},
  {q:"What is ASP.NET MVC? What are Models, Views, Controllers?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>ASP.NET MVC</strong> is a web framework implementing the Model-View-Controller pattern, providing clean separation of concerns for building testable and maintainable web applications.</p><p><strong>Three Components:</strong></p><ul><li><strong>Model:</strong> Plain C# classes representing data and business logic. Decorated with validation attributes ([Required], [StringLength], [Range]). Connected to database via Entity Framework. Completely independent of UI — unit testable without a browser or HTTP context.</li><li><strong>View:</strong> Razor (.cshtml) templates combining HTML with embedded C# using @ syntax. Receives data from controller via strongly-typed @model, ViewBag (dynamic), or ViewData (dictionary). Should contain zero business logic — display only.</li><li><strong>Controller:</strong> C# class inheriting Controller. Each public method is an Action handling a specific URL + HTTP verb. Validates input, calls services/models, then returns an ActionResult: View(), Json(), Redirect(), File(), Content().</li></ul><p><strong>Request lifecycle:</strong> Browser GET /Products/Details/5 → Router matches {controller}/{action}/{id} pattern → ProductsController.Details(5) executes → fetches product from database → returns View("Details", product) → Razor renders HTML → HTTP response sent.</p><p><strong>Advantages over Web Forms:</strong> No ViewState (lightweight pages), full HTML/CSS control (no server control abstractions), testable controllers (plain C# with Moq), clean URLs, RESTful routing, works naturally with React/Angular/Vue front-ends. ASP.NET Core MVC adds dependency injection, middleware pipeline, and cross-platform support.</p>`},
  {q:"What is inheritance in C#? How does method overriding work?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>Inheritance</strong> allows a class (derived/child) to acquire all members of another class (base/parent), promoting code reuse and establishing an "is-a" relationship. C# supports single class inheritance but multiple interface implementation.</p><p><strong>Syntax and overriding keywords:</strong></p><div class="code">class Animal {
    public string Name { get; set; }
    public virtual void Speak() =&gt;           // virtual = overridable
        Console.WriteLine($"{Name} makes a sound.");
}

class Dog : Animal {                          // : Animal = inherits from
    public override void Speak() =&gt;           // override replaces base
        Console.WriteLine($"{Name} barks!");
}

class GoldenRetriever : Dog {
    public override void Speak() {
        base.Speak();                         // calls Dog.Speak()
        Console.WriteLine("...enthusiastically!");
    }
}</div><p><strong>Key keywords:</strong></p><ul><li><strong>virtual:</strong> Marks a method as overridable in derived classes.</li><li><strong>override:</strong> Replaces the base class virtual method with a new implementation.</li><li><strong>abstract:</strong> No implementation in base — derived class MUST provide override. Class must also be abstract.</li><li><strong>sealed:</strong> On a class — prevents further inheritance. On a method — prevents further overriding in sub-subclasses.</li><li><strong>new:</strong> Hides (not overrides) the base method — breaks polymorphism, use rarely.</li></ul><p><strong>Polymorphism:</strong> Animal a = new Dog(); a.Speak(); calls Dog's override, not Animal's. Runtime dispatch based on actual object type is the power of inheritance-based polymorphism.</p>`},
  {q:"What is the difference between interface and abstract class in C#?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p>Both define contracts that classes must fulfil, but serve different design purposes.</p><p><strong>Interface:</strong></p><ul><li>Defines a pure contract — what a type must do, not how.</li><li>C# 7 and earlier: zero implementation. C# 8+ allows default interface methods (but rarely recommended).</li><li>A class can implement <em>multiple</em> interfaces — solves C#'s single-inheritance limitation.</li><li>All members implicitly public; no instance fields; no constructors.</li><li>Best for: unrelated types sharing a behaviour (Dog and Temperature can both be IComparable).</li></ul><div class="code">interface IShape {
    double Area();   // contract only — no body
    void Draw();
}</div><p><strong>Abstract Class:</strong></p><ul><li>Can mix abstract members (no body — must be overridden) with concrete members (with body — inherited as-is).</li><li>Can have constructors, instance fields, protected members, any access modifier.</li><li>A class can inherit only <em>one</em> abstract class.</li><li>Best for: related types sharing common implementation (all Shapes share a Color property and a basic Validate() method).</li></ul><div class="code">abstract class Shape {
    public string Color { get; set; }       // concrete — inherited
    public abstract double Area();          // abstract — must override
    public virtual void Draw() =&gt;           // virtual — can override
        Console.WriteLine($"Drawing {Color} shape");
}</div><p><strong>Decision rule:</strong> "Can be used as" behaviour across unrelated types → interface. "Is a specialised kind of" with shared implementation → abstract class. Modern design: prefer interfaces for flexibility (allows mocking, multiple types); use abstract class when the shared implementation is substantial.</p>`},
  {q:"What is async/await in C#? When do you use it?",u:"Unit 12",a:`<span class="utag">Unit 12</span><p><strong>async/await</strong> (C# 5.0) is the language mechanism for writing asynchronous, non-blocking code that reads like synchronous code. It prevents threads from blocking while waiting for slow I/O operations.</p><p><strong>How it works:</strong> <code>async</code> marks a method as asynchronous. <code>await</code> suspends the method execution, <em>releases the thread back to the thread pool</em>, and resumes the method automatically when the awaited Task completes. The thread is free to handle other requests during the wait.</p><div class="code">// Synchronous — BLOCKS thread for entire file read duration
string data = File.ReadAllText("large.txt");

// Async — thread is free while file read happens in OS
async Task&lt;string&gt; ReadFileAsync() {
    string data = await File.ReadAllTextAsync("large.txt");
    return data.ToUpper();
}

// Run multiple I/O operations concurrently
async Task Main() {
    var t1 = httpClient.GetStringAsync("https://api1.com/data");
    var t2 = httpClient.GetStringAsync("https://api2.com/data");
    string[] results = await Task.WhenAll(t1, t2);  // both run simultaneously
}</div><p><strong>When to use:</strong></p><ul><li><strong>I/O-bound operations:</strong> File reads/writes, HTTP calls (HttpClient), database queries (EF Core async), network sockets — time spent waiting for external systems.</li><li><strong>ASP.NET Core controllers:</strong> async action methods free threads to handle other HTTP requests during DB waits — dramatically improves server throughput.</li><li><strong>UI applications:</strong> Prevents UI thread freezing — keeps interfaces responsive.</li></ul><p><strong>Return types:</strong> Task (no return), Task&lt;T&gt; (with return value), ValueTask&lt;T&gt; (performance optimised). Avoid async void except for event handlers.</p>`},
  {q:"What is the Task Parallel Library (TPL)?",u:"Unit 12",a:`<span class="utag">Unit 12</span><p><strong>TPL (Task Parallel Library)</strong>, in System.Threading.Tasks, is a high-level .NET API for parallel and asynchronous programming. It abstracts raw thread management, making concurrent code easier to write and more efficient.</p><p><strong>Core components:</strong></p><ul><li><strong>Task / Task&lt;T&gt;:</strong> Represents a unit of asynchronous work. Task.Run(() =&gt; DoWork()) schedules work on the ThreadPool. Composable via await, ContinueWith(), Task.WhenAll(), Task.WhenAny().</li><li><strong>Parallel.For / Parallel.ForEach:</strong> Splits loop iterations across multiple CPU cores automatically. Ideal for CPU-bound data processing:</li></ul><div class="code">Parallel.ForEach(imageFiles, file =&gt; ProcessImage(file));</div><ul><li><strong>Task.WhenAll(t1, t2, t3):</strong> Awaits multiple tasks concurrently — resumes when all complete. Essential for parallelising multiple I/O calls.</li><li><strong>Task.WhenAny(t1, t2):</strong> Resumes when the first task completes — useful for timeout patterns.</li><li><strong>CancellationToken:</strong> Cooperative cancellation — tasks check the token and exit cleanly when cancellation is requested.</li></ul><div class="code">// Parallel CPU-bound processing
var results = new ConcurrentBag&lt;Result&gt;();
Parallel.For(0, 1000, i =&gt; results.Add(HeavyCompute(i)));

// Concurrent async I/O
var tasks = urls.Select(url =&gt; httpClient.GetStringAsync(url));
string[] pages = await Task.WhenAll(tasks);</div><p><strong>PLINQ:</strong> Adds .AsParallel() to LINQ queries: <code>numbers.AsParallel().Where(n =&gt; IsPrime(n)).ToList();</code></p><p><strong>TPL vs async/await:</strong> Use TPL (Task.Run, Parallel) for CPU-bound work needing background threads. Use async/await for I/O-bound work without blocking threads.</p>`},
  {q:"What is thread synchronization? What is a lock?",u:"Unit 11",a:`<span class="utag">Unit 11</span><p><strong>Thread synchronisation</strong> coordinates multiple threads accessing shared resources to prevent race conditions — situations where correctness depends on the unpredictable order of thread execution.</p><p><strong>Classic race condition:</strong> Thread A and Thread B both read counter=5, both increment to 6, both write 6 — the expected result 7 is lost. This lost-update pattern is a common concurrency bug.</p><p><strong>lock statement</strong> — most common synchronisation primitive:</p><div class="code">private static readonly object _sync = new object();
private static int _counter = 0;

void Increment() {
    lock (_sync) {       // Monitor.Enter — only one thread enters
        _counter++;      // critical section — safe
    }                    // Monitor.Exit — next waiting thread enters
}</div><p>lock(obj) compiles to Monitor.Enter(obj) / Monitor.Exit(obj) in a try-finally block. The lock object must be: private, readonly, and dedicated. Never lock on <code>this</code>, <code>typeof(T)</code>, or string literals (shared references risk deadlocks).</p><p><strong>Other synchronisation primitives:</strong></p><ul><li><strong>Monitor:</strong> TryEnter(timeout) avoids deadlocks; Pulse/Wait for producer-consumer patterns.</li><li><strong>Mutex:</strong> Cross-process synchronisation. More expensive than lock.</li><li><strong>SemaphoreSlim:</strong> Limits concurrent access count (e.g., max 3 threads simultaneously).</li><li><strong>Interlocked:</strong> Lock-free atomic operations — Interlocked.Increment(ref counter) is fastest for simple integer increments.</li><li><strong>ReaderWriterLockSlim:</strong> Multiple concurrent readers OR one exclusive writer — better than lock for read-heavy shared data.</li></ul><p>Use ConcurrentDictionary, ConcurrentQueue, ConcurrentBag for thread-safe collections without manual locking.</p>`},
  {q:"What is exception filtering in C# 6.0+?",u:"Unit 10",a:`<span class="utag">Unit 10</span><p><strong>Exception filters</strong> (C# 6.0) add a <code>when</code> condition to catch blocks — the handler executes only if the exception type matches AND the condition evaluates to true:</p><div class="code">try {
    await SendRequestAsync(url);
}
catch (HttpRequestException ex) when ((int)ex.StatusCode == 404) {
    Console.WriteLine("Resource not found");
}
catch (HttpRequestException ex) when ((int)ex.StatusCode == 401) {
    Console.WriteLine("Authentication required");
}
catch (HttpRequestException ex) {
    Console.WriteLine($"Other HTTP error: {ex.StatusCode}");
}

// Logging pattern — filter returns false so exception is NOT caught
// but the logging side-effect still executes
catch (Exception ex) when (LogException(ex)) { }</div><p><strong>Critical behaviour:</strong> If the when condition returns <em>false</em>, the exception is NOT caught — the runtime searches up the call stack without unwinding the current frame. This preserves the complete original stack trace, which is invaluable for debugging production issues.</p><p><strong>Advantages over traditional catch-and-rethrow:</strong></p><ul><li>Traditional <code>catch { throw; }</code> still partially unwinds the stack before the rethrow.</li><li>With filters, if the condition is false, no unwinding occurs at all — debuggers see the exception exactly at its origin point.</li><li>Multiple catch blocks for the same exception type (differentiated by condition) — impossible before C# 6.</li><li>Conditional logging without swallowing exceptions — return false from the logging method to let the exception propagate.</li></ul><p>Exception filters are especially valuable in production diagnostics and centralised exception handling middleware.</p>`},
  {q:"What is Dapper? How does it differ from Entity Framework?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>Dapper</strong> is a lightweight open-source micro-ORM created by the Stack Overflow team. It extends IDbConnection with convenient extension methods (Query&lt;T&gt;, Execute, QuerySingle) that map SQL query results directly to C# objects with minimal overhead.</p><div class="code">using Dapper;

// Query with Dapper
string sql = "SELECT * FROM Students WHERE Age &gt; @minAge";
var students = conn.Query&lt;Student&gt;(sql, new { minAge = 18 }).ToList();

// Insert
conn.Execute("INSERT INTO Students (Name, Age) VALUES (@Name, @Age)",
             new { Name = "Alice", Age = 21 });</div><p><strong>Dapper vs Entity Framework — comparison:</strong></p><ul><li><strong>Performance:</strong> Dapper is ~5–10x faster than EF for simple queries. Executes raw SQL and maps results — no change tracking, no expression tree compilation. Stack Overflow runs Dapper on billions of queries daily with minimal overhead.</li><li><strong>SQL control:</strong> Dapper uses SQL you write — full control over every query, CTEs, index hints, window functions. EF generates SQL automatically (usually good, occasionally suboptimal).</li><li><strong>Features:</strong> EF provides migrations, change tracking (automatic UPDATE detection), lazy/eager loading, relationship management, database-agnostic LINQ. Dapper has none of these.</li><li><strong>Learning curve:</strong> Dapper requires SQL knowledge. EF hides SQL — more accessible to developers without deep SQL expertise.</li><li><strong>Maintenance:</strong> EF migrations track schema changes in code. Dapper requires manual SQL scripts for schema changes.</li></ul><p><strong>Real-world usage:</strong> Many teams use both — EF Core for CRUD operations with complex object relationships, Dapper for high-performance reporting queries and legacy schemas with non-standard naming conventions.</p>`},
  {q:"What is file handling in ASP.NET? Name key File I/O classes.",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>File handling in .NET uses the <strong>System.IO</strong> namespace, providing comprehensive classes for reading, writing, and managing files and directories.</p><p><strong>Static utility classes:</strong></p><ul><li><strong>File:</strong> One-call static methods. File.ReadAllText(path), File.WriteAllText(path, text), File.ReadAllLines(path) returns string[], File.AppendAllText(path, text), File.Exists(path), File.Delete(path), File.Copy(src, dst), File.Move(src, dst).</li><li><strong>Directory:</strong> Folder operations. Directory.CreateDirectory(path), Directory.GetFiles(path, "*.log"), Directory.GetDirectories(path), Directory.Delete(path, recursive:true), Directory.Exists(path).</li><li><strong>Path:</strong> Path string utilities. Path.Combine("C:\\data", "file.txt"), Path.GetFileName(p), Path.GetExtension(p), Path.GetDirectoryName(p), Path.GetTempPath().</li></ul><p><strong>Stream-based classes for large files:</strong></p><ul><li><strong>FileStream:</strong> Low-level byte access with FileMode (Create, Open, Append) and FileAccess (Read, Write, ReadWrite) control.</li><li><strong>StreamReader / StreamWriter:</strong> Text streams wrapping FileStream. ReadLine(), ReadToEnd(), ReadLineAsync(), WriteLine(), Flush().</li><li><strong>BinaryReader / BinaryWriter:</strong> Read/write primitive types as binary (ReadInt32, WriteDouble, etc.).</li><li><strong>FileInfo / DirectoryInfo:</strong> Instance-based alternatives for multiple operations on the same path.</li></ul><div class="code">// Async file reading (preferred in ASP.NET Core)
string json = await File.ReadAllTextAsync("data.json");

// Line-by-line for large files
await using var reader = new StreamReader("large.log");
while (!reader.EndOfStream) {
    string line = await reader.ReadLineAsync();
}</div>`},
  {q:"What is a using statement in C#? Why is it important?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>The <strong>using statement</strong> ensures objects implementing <strong>IDisposable</strong> are properly cleaned up (Dispose() called) when leaving scope — even when exceptions are thrown. It prevents resource leaks for unmanaged resources like database connections, file handles, streams, and GDI graphics objects.</p><p><strong>Traditional using block:</strong></p><div class="code">using (var conn = new SqlConnection(connectionString)) {
    conn.Open();
    var cmd = new SqlCommand("SELECT COUNT(*) FROM Orders", conn);
    int count = (int)cmd.ExecuteScalar();
}   // conn.Dispose() called automatically — even if exception thrown</div><p><strong>Equivalent compiled output (try-finally):</strong></p><div class="code">var conn = new SqlConnection(connectionString);
try { conn.Open(); /* ... */ }
finally { conn?.Dispose(); }   // always executes</div><p><strong>C# 8.0+ simplified using declaration:</strong></p><div class="code">using var conn = new SqlConnection(connectionString);
conn.Open();
// ... use conn
// conn.Dispose() called at end of enclosing block/method — no extra braces needed</div><p><strong>Why critical for database connections:</strong> SQL Server connection pools are limited (default max 100 per pool). If connections are not disposed after use, the pool exhausts under load, causing "Timeout expired — pool is full" errors. The using statement guarantees return to pool.</p><p><strong>Important for:</strong></p><ul><li>Database connections (SqlConnection, NpgsqlConnection)</li><li>File streams (FileStream, StreamReader, StreamWriter)</li><li>HTTP clients in certain patterns (but prefer IHttpClientFactory for HttpClient)</li><li>All System.IO stream objects</li><li>Graphics/GDI objects in Windows Forms (Pen, Brush, Graphics)</li></ul>`},
  {q:"What is boxing and unboxing in C#?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Boxing</strong> is the implicit conversion of a value type (int, bool, struct) to the object reference type — the value is wrapped in a heap-allocated object. <strong>Unboxing</strong> is the explicit extraction of the value type back from the boxed object.</p><div class="code">// Boxing: int (stack value) becomes object (heap reference)
int i = 42;
object boxed = i;              // BOXING — heap allocation + copy
Console.WriteLine(boxed.GetType());  // System.Int32

// Unboxing: object back to int — explicit cast required
int unboxed = (int)boxed;      // UNBOXING — type check + copy

// InvalidCastException if wrong type:
// double wrong = (double)boxed;   // throws! boxed contains Int32

// Interface boxing — also allocates heap object
IComparable c = 42;            // boxing — int implements IComparable</div><p><strong>Performance impact:</strong></p><ul><li>Boxing allocates a new heap object and copies the value — involves GC pressure.</li><li>Unboxing requires a runtime type check plus memory copy.</li><li>In a tight loop boxing 1 million integers: ~100ms vs ~2ms using List&lt;int&gt;.</li></ul><p><strong>Where boxing occurs (common pitfalls):</strong></p><ul><li>Non-generic collections: <code>ArrayList list = new(); list.Add(42);</code> — every Add() boxes the int.</li><li>String.Format: <code>string.Format("{0}", 42)</code> boxes the int. Use <code>$"{42}"</code> (interpolation) instead — no boxing.</li><li>Passing value types to params object[] parameters.</li></ul><p><strong>Prevention:</strong> Use generic collections (List&lt;int&gt;, Dictionary&lt;string,int&gt;) and generic methods — these store value types directly without boxing. Generics were introduced in C# 2.0 specifically to eliminate boxing overhead in collections.</p>`},
  {q:"What is the difference between String and StringBuilder?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>The choice between String and StringBuilder directly impacts performance in string-heavy operations.</p><p><strong>String (System.String):</strong> Immutable — once created, the value can never be modified. Every "modification" (concatenation, Replace, ToUpper) creates a <em>new String object</em> on the heap, leaving the original as garbage:</p><div class="code">string s = "Hello";
s += " World";      // allocates NEW string "Hello World"
s += "!";           // allocates ANOTHER new string "Hello World!"
// "Hello" and "Hello World" are now unreachable garbage</div><p>In a loop concatenating 1000 strings, this creates 1000 heap allocations — O(n²) total memory. The GC must collect all discarded intermediate strings.</p><p><strong>StringBuilder (System.Text.StringBuilder):</strong> Mutable — internally manages a resizable char[] buffer. Append(), Insert(), Replace() modify the buffer in-place without creating new objects:</p><div class="code">var sb = new StringBuilder(capacity: 256);   // initial buffer size hint
for (int i = 0; i &lt; 1000; i++) {
    sb.Append("item").Append(i).Append(", ");
}
string result = sb.ToString();   // ONE allocation — converts buffer to string</div><p><strong>Performance guideline:</strong></p><ul><li>≤5 simple concatenations: use string + or $"" interpolation — clean and fast enough.</li><li>Loop building or 10+ concatenations: use StringBuilder — dramatically faster.</li><li>Building HTML/JSON/CSV: use StringBuilder or string.Join().</li></ul><p><strong>StringBuilder API:</strong> Append(), AppendLine(), AppendFormat(), Insert(index, value), Remove(start, len), Replace(old, new), Clear(), Length, [index] accessor. Not thread-safe — use lock for concurrent access.</p>`},
  {q:"What is IEnumerable vs IQueryable in C#?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p>This distinction is critical for writing efficient LINQ queries against databases.</p><p><strong>IEnumerable&lt;T&gt;:</strong> Represents an in-memory, forward-only sequence. LINQ operators (Where, Select, OrderBy) operate entirely in C# RAM — the complete dataset must already be loaded into memory before filtering begins. Defined in System.Collections.Generic.</p><div class="code">// IEnumerable — loads ENTIRE table into memory, then filters in C#
List&lt;Student&gt; all = GetAllStudentsFromDB();   // 1 million rows loaded!
var adults = all.Where(s =&gt; s.Age &gt;= 18);       // C# filter on all rows</div><p><strong>IQueryable&lt;T&gt;:</strong> Represents a query that has NOT yet been executed. LINQ operators build an expression tree that the provider (e.g., Entity Framework) translates into SQL. The WHERE clause runs on the database — only matching rows are transferred over the network.</p><div class="code">// IQueryable — translates to SQL: SELECT * FROM Students WHERE Age &gt;= 18
IQueryable&lt;Student&gt; query = db.Students;       // DbSet implements IQueryable
var adults = query.Where(s =&gt; s.Age &gt;= 18);    // builds expression tree, NO execution yet
var list = adults.ToList();  // NOW executes: SELECT ... WHERE Age &gt;= 18 on DB server</div><p><strong>Key differences:</strong></p><ul><li><strong>Execution location:</strong> IEnumerable filters in C# memory; IQueryable filters on the database.</li><li><strong>Performance:</strong> IQueryable is far more efficient for large tables — avoids loading unnecessary rows.</li><li><strong>Expression type:</strong> IQueryable uses Expression&lt;Func&lt;T,bool&gt;&gt; (inspectable tree); IEnumerable uses compiled Func&lt;T,bool&gt; (opaque delegate).</li><li><strong>AsEnumerable():</strong> Forces switch from IQueryable to IEnumerable — subsequent LINQ runs in C# memory. Useful when SQL cannot translate complex C# expressions.</li></ul>`},
  {q:"What are extension methods in C#?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Extension methods</strong> add new methods to existing types — including sealed classes, interfaces, and third-party types — without modifying source code or using inheritance.</p><p><strong>Declaration rules:</strong></p><ul><li>Must be in a <em>static class</em>.</li><li>Method must be <em>static</em>.</li><li>First parameter uses the <em>this</em> keyword to specify the type being extended.</li></ul><div class="code">public static class StringExtensions {
    public static bool IsValidEmail(this string s) =&gt;
        s.Contains('@') &amp;&amp; s.Contains('.');

    public static string Truncate(this string s, int maxLen) =&gt;
        s.Length &lt;= maxLen ? s : s[..maxLen] + "...";

    public static string ToPascalCase(this string s) =&gt;
        string.IsNullOrEmpty(s) ? s :
        char.ToUpper(s[0]) + s[1..].ToLower();
}

// Usage — called as instance methods on string
"hello@example.com".IsValidEmail()   // true
"Hello World".Truncate(5)             // "Hello..."
"hello".ToPascalCase()                // "Hello"</div><p><strong>Extending interfaces:</strong></p><div class="code">public static class CollectionExtensions {
    public static bool IsNullOrEmpty&lt;T&gt;(this IEnumerable&lt;T&gt;? source) =&gt;
        source == null || !source.Any();
}

// Works on any type implementing IEnumerable&lt;T&gt;
myList.IsNullOrEmpty()   // true if null or has no elements</div><p><strong>The entire LINQ library</strong> is extension methods on IEnumerable&lt;T&gt; and IQueryable&lt;T&gt; in System.Linq namespace. Where, Select, GroupBy, OrderBy — all are extension methods. They appear in IntelliSense with a distinctive arrow icon and are available when their namespace is imported (using System.Linq). Instance methods always take priority over extension methods of the same name.</p>`},
  {q:"What is the null-conditional (?.) and null-coalescing (??) operator?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>These C# 6.0 operators dramatically reduce null-checking boilerplate and prevent NullReferenceException — one of the most common runtime errors in C# code.</p><p><strong>Null-conditional operator (?.) — "safe navigation":</strong> Evaluates left side; if null, returns null immediately instead of throwing NullReferenceException:</p><div class="code">// Without ?. — verbose and error-prone
string city = null;
if (customer != null &amp;&amp; customer.Address != null)
    city = customer.Address.City;

// With ?. — concise and safe
string city = customer?.Address?.City;
// Returns null if customer OR Address is null — no exception

int? len = customer?.Name?.Length;        // null if customer or Name is null
customer?.Orders?.Clear();                // only calls Clear() if both non-null</div><p><strong>Null-coalescing operator (??) — "default fallback":</strong> Returns left operand if non-null; otherwise returns right operand:</p><div class="code">string name = customer?.Name ?? "Anonymous";
int count = list?.Count ?? 0;
string display = order?.Customer?.Address?.City ?? "City unknown";</div><p><strong>Null-coalescing assignment (??=) — C# 8.0+:</strong> Assigns the right value only if the left side is currently null:</p><div class="code">customer.Name ??= "Unknown";   // sets Name only if it is null
_cache ??= new Dictionary&lt;string, object&gt;();   // lazy initialisation</div><p><strong>Null-safe event invocation:</strong></p><div class="code">OnDataChanged?.Invoke(this, EventArgs.Empty);   // safe — no NullReferenceException</div><p>These operators are short-circuit null-safe evaluators — they fully replace traditional null-guard if-statements for property access and method invocation in complex object graphs.</p>`},
  {q:"What is a partial class in C#?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>A <strong>partial class</strong> (partial keyword) splits a single class definition across multiple .cs files. All parts are merged into one class by the compiler at build time. All parts must exist in the same namespace and assembly.</p><p><strong>Syntax:</strong></p><div class="code">// Customer.cs — developer business logic
public partial class Customer {
    public void PlaceOrder(Order order) { /* logic */ }
    public decimal CalculateDiscount() { /* logic */ }
}

// Customer.Generated.cs — auto-generated by ORM scaffold tool
public partial class Customer {
    public int Id { get; set; }
    public string Name { get; set; }
    public string Email { get; set; }
    public List&lt;Order&gt; Orders { get; set; }
}</div><p><strong>Primary use cases:</strong></p><ul><li><strong>Windows Forms / WPF Designer:</strong> Visual Studio separates auto-generated designer code (Form1.Designer.cs — control layout, event hookup) from developer logic (Form1.cs). Regenerating the designer never overwrites business code.</li><li><strong>Code generation:</strong> Entity Framework scaffolding, T4 templates, and Roslyn Source Generators output partial classes — developers extend the generated class without modifying the generated file (which is overwritten on regeneration).</li><li><strong>Large class organisation:</strong> Split a large class by responsibility across multiple files without architectural restructuring.</li><li><strong>Partial methods:</strong> Declared in one part (no body), optionally implemented in another. If no implementation provided, the compiler removes all calls — zero runtime overhead.</li></ul><p>Partial also works for struct and interface. Partial classes cannot be split across different assemblies or namespaces. All parts must have the same access modifier.</p>`},
  {q:"Difference between struct and class in C#?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>struct and class are both custom type definitions in C#, but with fundamentally different memory semantics.</p><p><strong>struct (value type):</strong></p><ul><li>Stored on the stack for local variables; inline within containing objects on heap.</li><li>Assignment copies the entire value — independent copies, no aliasing.</li><li>No inheritance from another struct or class (implicitly sealed).</li><li>Cannot be null (use <code>Nullable&lt;T&gt;</code> for optional struct).</li><li>Can implement interfaces. Default constructor zeroes all fields.</li></ul><div class="code">struct Point { public int X, Y; }
Point p1 = new Point { X = 3, Y = 4 };
Point p2 = p1;       // FULL COPY — p2 is independent
p2.X = 10;           // p1.X is still 3</div><p><strong>class (reference type):</strong></p><ul><li>Always allocated on the managed heap.</li><li>Assignment copies the reference — both variables alias the same object.</li><li>Full inheritance hierarchy support.</li><li>Can be null. Has optional finalizer (~ClassName()).</li><li>Slight overhead: heap allocation, GC tracking, reference indirection.</li></ul><div class="code">class Point { public int X, Y; }
Point p1 = new Point { X = 3, Y = 4 };
Point p2 = p1;       // REFERENCE COPY — same object
p2.X = 10;           // p1.X is now 10!</div><p><strong>When to use struct:</strong> Small (typically &lt;= 16 bytes), immutable, value-semantics data — Point, Color, DateTime, Money, Vector2D. Avoid structs with reference fields, complex methods, or frequent boxing. The .NET runtime uses structs extensively for performance: Span&lt;T&gt;, ValueTask&lt;T&gt;, Memory&lt;T&gt;.</p>`},
  {q:"What are Attributes in C#? Give examples.",u:"Unit 10",a:`<span class="utag">Unit 10</span><p><strong>Attributes</strong> are declarative metadata annotations applied to code elements (classes, methods, properties, parameters, assemblies) using square bracket syntax. They are inspected at runtime via Reflection and drive framework behaviour without changing the code's logic.</p><p><strong>Built-in .NET attributes:</strong></p><div class="code">[Serializable]                          // enable binary serialisation
[Obsolete("Use NewMethod()", error: false)]  // compiler warning/error
[DllImport("user32.dll")]               // P/Invoke — call Win32 API
[Conditional("DEBUG")]                  // method stripped in Release build
[ThreadStatic]                          // unique value per thread</div><p><strong>ASP.NET Core attributes:</strong></p><div class="code">[HttpGet("api/students/{id}")]          // HTTP GET route binding
[Authorize(Roles = "Admin,Manager")]    // require authentication
[FromBody]                              // deserialise JSON body
[ResponseCache(Duration = 300)]         // set Cache-Control header</div><p><strong>Data annotation validation:</strong></p><div class="code">public class RegisterDto {
    [Required(ErrorMessage = "Name is required")]
    [StringLength(100, MinimumLength = 2)]
    public string Name { get; set; }

    [Range(18, 120, ErrorMessage = "Must be 18-120")]
    public int Age { get; set; }

    [EmailAddress]
    public string Email { get; set; }
}</div><p><strong>Custom attribute:</strong></p><div class="code">[AttributeUsage(AttributeTargets.Method, AllowMultiple = false)]
public class AuditAttribute : Attribute {
    public string Action { get; }
    public AuditAttribute(string action) { Action = action; }
}

[Audit("PlaceOrder")]
public void PlaceOrder(Order o) { /* ... */ }

// Read at runtime
var attr = method.GetCustomAttribute&lt;AuditAttribute&gt;();
if (attr != null) AuditLog.Write(attr.Action);</div>`},
  {q:"What are the three GC generations in .NET?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>The .NET <strong>Garbage Collector</strong> uses a generational heap model based on the empirical observation that most objects die young. Collecting only the youngest generation frequently is far cheaper than scanning the entire heap every time.</p><p><strong>Three Generations:</strong></p><ul><li><strong>Generation 0 (Gen 0):</strong> Newly allocated, small, short-lived objects. Collected most frequently (often multiple times per second under load). Most objects die here — temporary strings, loop variables, DTO instances created per-request. Collection is very fast (&lt;1ms typically) because Gen 0 is small (~256KB default). Objects surviving a Gen 0 collection are promoted to Gen 1.</li><li><strong>Generation 1 (Gen 1):</strong> Objects that survived at least one Gen 0 collection. Acts as a buffer between transient Gen 0 and long-lived Gen 2. Collected less frequently. Surviving objects promoted to Gen 2.</li><li><strong>Generation 2 (Gen 2):</strong> Long-lived objects — application caches, static data, singleton instances, DbContext. Collected rarely (a "full GC"). Most expensive — scans the entire managed heap. A Gen 2 collection that blocks all managed threads ("stop-the-world") causes visible latency spikes in servers.</li></ul><p><strong>Large Object Heap (LOH):</strong> Objects &gt;= 85,000 bytes (large arrays, DataSet tables, large strings) are allocated directly on the LOH, associated with Gen 2. Not compacted by default — can cause fragmentation.</p><p><strong>Monitoring:</strong> GC.CollectionCount(generation) returns collection count per generation. Frequent Gen 2 collections indicate memory pressure or retention bugs (objects kept alive accidentally by static references or event handler subscriptions).</p>`},
  {q:"What is the difference between == and .Equals() in C#?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>Both test equality but behave differently for value types vs reference types, and can be independently overridden.</p><p><strong>Default behaviour:</strong></p><ul><li><strong>Value types (int, struct):</strong> Both == and .Equals() compare values. Identical behaviour. int a=5; int b=5; a==b is true, a.Equals(b) is true.</li><li><strong>Reference types (class):</strong> By default, == compares <em>references</em> (same memory address = same object), and .Equals() also compares references (inherited from Object). Two objects with identical content are NOT equal unless overridden.</li><li><strong>String (special case):</strong> Microsoft overrides both == and .Equals() on string to compare <em>content</em>, not address. "hello" == new string("hello".ToCharArray()) is true.</li></ul><div class="code">// Reference type — default behaviour
var p1 = new Person { Name = "Alice" };
var p2 = new Person { Name = "Alice" };
Console.WriteLine(p1 == p2);       // FALSE — different heap objects
Console.WriteLine(p1.Equals(p2));  // FALSE — same default from Object

// After overriding both, they compare by Name
// Console.WriteLine(p1 == p2);    // TRUE</div><p><strong>Best practice — overriding equality in custom types:</strong></p><div class="code">public class Money {
    public decimal Amount { get; }
    public string Currency { get; }
    public override bool Equals(object? obj) =&gt;
        obj is Money m &amp;&amp; Amount == m.Amount &amp;&amp; Currency == m.Currency;
    public override int GetHashCode() =&gt;
        HashCode.Combine(Amount, Currency);   // ALWAYS pair with Equals
    public static bool operator ==(Money? a, Money? b) =&gt; a?.Equals(b) ?? b is null;
    public static bool operator !=(Money? a, Money? b) =&gt; !(a == b);
}</div><p>Always override GetHashCode() when you override Equals() — objects that are equal must have the same hash code (required contract for Dictionary and HashSet keys). Object.ReferenceEquals(a, b) provides explicit identity check regardless of any overrides.</p>`},
