 short:[
  {q:"What is cloud computing? What are the 5 NIST characteristics?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p><strong>Cloud computing</strong> (defined by NIST SP 800-145) is a model for enabling ubiquitous, convenient, on-demand network access to a shared pool of configurable computing resources (networks, servers, storage, applications, and services) that can be rapidly provisioned and released with minimal management effort or service provider interaction.</p><p><strong>5 Essential Characteristics (NIST):</strong></p><ul><li><strong>1. On-demand self-service:</strong> Consumers can provision computing capabilities (server time, storage) automatically without human interaction with the provider. Example: spin up a VM on AWS in 2 minutes via console.</li><li><strong>2. Broad network access:</strong> Capabilities available over the network and accessible through standard mechanisms (internet browsers, APIs, mobile apps) from any device — laptop, smartphone, tablet.</li><li><strong>3. Resource pooling:</strong> Provider's computing resources pooled to serve multiple consumers (multi-tenant model) using virtualisation. Physical/virtual resources dynamically assigned and reassigned based on demand. Consumers generally don't know exact physical location of resources.</li><li><strong>4. Rapid elasticity:</strong> Capabilities can be elastically provisioned and released — to scale outward (scale-out) quickly to match demand, appearing unlimited to the consumer. Auto-scaling policies trigger resource provisioning automatically.</li><li><strong>5. Measured service:</strong> Resource usage is metered and monitored — consumers pay for what they use (CPU hours, GB-months of storage, data transfer). Enables transparent billing and cost optimisation.</li></ul><p>Cloud computing transforms IT from a capital expense (CapEx — buy servers) to an operational expense (OpEx — pay-as-you-go service), enabling organisations to focus on innovation rather than infrastructure management.</p>`},
  {q:"What is IaaS? Give two examples.",u:"Unit 02",a:`<span class="utag">Unit 02</span><p><strong>IaaS (Infrastructure as a Service)</strong> is the most fundamental cloud service model, providing virtualised computing infrastructure — virtual machines, storage, networks, and load balancers — over the internet. The cloud provider manages the underlying physical hardware (servers, networking, cooling, power), while the consumer manages everything above: operating system, middleware, applications, data, and runtime.</p><p><strong>IaaS characteristics:</strong></p><ul><li>Consumer gets a "blank" virtual machine with raw compute, storage, and network resources.</li><li>Consumer has maximum control — can install any OS (Windows, Linux distributions, FreeBSD), any application stack.</li><li>Responsibility model: Provider secures physical infrastructure. Consumer secures the OS, applications, and data (shared responsibility model).</li><li>Pricing: Pay-per-hour for VM instances, per-GB for storage, per-GB for data egress.</li></ul><p><strong>IaaS use cases:</strong></p><ul><li>Running custom applications requiring specific OS configurations or legacy software.</li><li>Development/test environments — spin up and tear down VMs on demand.</li><li>High-performance computing (HPC), big data processing.</li><li>Disaster recovery — replicate on-premises workloads to cloud IaaS.</li></ul><p><strong>Two examples:</strong></p><ul><li><strong>Amazon Web Services (AWS) EC2 (Elastic Compute Cloud):</strong> Virtual server instances (t3, m5, c5 families) — choose from hundreds of instance types. Pay per second (Linux) or hour (Windows). Globally available across 30+ regions.</li><li><strong>Microsoft Azure Virtual Machines:</strong> Windows/Linux VMs in Azure. Integrates with Azure networking (Virtual Network, ExpressRoute), storage (Managed Disks), and monitoring (Azure Monitor).</li></ul><p>Other IaaS providers: Google Compute Engine, IBM Cloud, DigitalOcean (developer-focused), Linode/Akamai, Vultr.</p>`},
  {q:"What is PaaS? When would you choose it?",u:"Unit 02",a:`<span class="utag">Unit 02</span><p><strong>PaaS (Platform as a Service)</strong> provides a complete development and deployment environment in the cloud — including runtime, OS, middleware, databases, developer tools, and auto-scaling infrastructure — managed by the provider. Developers focus entirely on writing application code and managing data; the cloud provider handles all infrastructure concerns.</p><p><strong>What the provider manages in PaaS:</strong> Physical servers, networking, OS, runtime patches, server configuration, auto-scaling, load balancing, high availability infrastructure.</p><p><strong>What the consumer manages:</strong> Application code, data, configuration of the platform services.</p><p><strong>PaaS offerings by major providers:</strong></p><ul><li>AWS: Elastic Beanstalk (web apps), AWS Lambda (serverless), AWS RDS (managed database)</li><li>Azure: Azure App Service (web apps), Azure SQL Database, Azure Functions</li><li>Google Cloud: Google App Engine, Cloud Functions, Cloud Run</li><li>Heroku: developer-friendly PaaS for rapid deployment</li></ul><p><strong>When to choose PaaS:</strong></p><ul><li><strong>Focus on development speed:</strong> Deploy a web application without configuring servers, load balancers, or databases — push code and the platform handles the rest.</li><li><strong>No ops team:</strong> Startups and small teams without dedicated DevOps/infrastructure engineers benefit most — zero server management.</li><li><strong>Managed databases:</strong> Use RDS/Azure SQL instead of self-managing PostgreSQL/MySQL on IaaS — automatic backups, patches, and replication handled.</li><li><strong>Avoid vendor lock-in risk is acceptable:</strong> PaaS often ties you to specific platform APIs. Acceptable if speed and simplicity are the priority.</li><li><strong>Auto-scaling needed:</strong> Elastic Beanstalk/App Engine auto-scale web tiers without manual configuration.</li></ul>`},
  {q:"What is SaaS? Give two examples.",u:"Unit 02",a:`<span class="utag">Unit 02</span><p><strong>SaaS (Software as a Service)</strong> is the most fully managed cloud service model where the cloud provider delivers a complete, ready-to-use application over the internet. Consumers access the application through a web browser or thin client — no installation, maintenance, or infrastructure management required. The provider manages everything: hardware, OS, middleware, application code, patches, updates, and data backups.</p><p><strong>Consumer responsibilities in SaaS:</strong> Only user account management, data input, and configuration settings within the application. Nothing else.</p><p><strong>SaaS characteristics:</strong></p><ul><li>Accessed via web browser — no local installation required.</li><li>Multi-tenant: single application instance serves multiple organisations with logical data isolation.</li><li>Automatic updates: provider pushes updates — users always have the latest version.</li><li>Subscription pricing: monthly/annual per-user or per-organisation fee.</li><li>Accessible from any device with an internet connection.</li></ul><p><strong>Two prominent examples:</strong></p><ul><li><strong>Microsoft 365 (formerly Office 365):</strong> Cloud-hosted suite including Word, Excel, PowerPoint, Outlook email, Teams collaboration, SharePoint document management, and OneDrive cloud storage. ~345 million paid seats globally. Replaces on-premises Exchange and Office license management entirely. Per-user monthly subscription.</li><li><strong>Salesforce CRM:</strong> The pioneering SaaS company (founded 1999) — cloud-based Customer Relationship Management. Sales teams manage leads, opportunities, accounts, and forecasts entirely in a browser. Integrates with 4,000+ third-party apps. No on-premises software to install or maintain.</li></ul><p>Other examples: Google Workspace (Gmail, Docs, Drive), Zoom, Slack, Dropbox, ServiceNow, SAP S/4HANA Cloud, GitHub, Jira.</p>`},
  {q:"What is Public vs Private cloud?",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>The cloud deployment model determines who owns, manages, and uses the cloud infrastructure.</p><p><strong>Public Cloud:</strong> Cloud infrastructure is owned and operated by a third-party cloud provider (AWS, Azure, Google Cloud) and shared among multiple organisations (multi-tenant). Consumers rent resources on demand over the internet.</p><ul><li><strong>Advantages:</strong> No capital expenditure — no servers to buy. Infinite scalability on demand. Global geographic reach (data centres worldwide). Pay only for what you use. No maintenance burden — provider manages all infrastructure.</li><li><strong>Disadvantages:</strong> Less control over underlying infrastructure. Shared environment raises security/compliance concerns for regulated industries. Data sovereignty risks — data may be stored in foreign countries. Internet latency for latency-sensitive workloads.</li><li><strong>Best for:</strong> Web applications, SaaS delivery, development/test environments, startups, workloads with variable demand.</li></ul><p><strong>Private Cloud:</strong> Cloud infrastructure dedicated exclusively to one organisation — either operated on-premises or by a third party on the organisation's behalf. No sharing with other organisations.</p><ul><li><strong>Advantages:</strong> Full control over hardware, security policies, and data location. Customisable to specific compliance requirements (PCI DSS, HIPAA, government regulations). Consistent performance — no "noisy neighbour" effect. Data never leaves organisation's custody.</li><li><strong>Disadvantages:</strong> High capital expenditure (buy/maintain servers). Capacity must be provisioned in advance — over/under provisioning risk. Limited geographic reach. Full operational responsibility (patches, failures, scaling).</li><li><strong>Best for:</strong> Banks, hospitals, government agencies, defence — regulated industries with strict data residency and compliance requirements.</li><li><strong>Technologies:</strong> VMware vSphere, OpenStack, Microsoft Azure Stack, Red Hat OpenShift.</li></ul>`},
  {q:"What is a hybrid cloud? Give a use case.",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>A <strong>hybrid cloud</strong> combines private cloud (or on-premises data centre) with one or more public clouds, connected by technology that allows data and applications to be shared between them. Organisations can leverage the benefits of both models simultaneously.</p><p><strong>Key hybrid cloud characteristics:</strong></p><ul><li>Orchestration layer manages workload placement across both environments.</li><li>Secure connectivity between private and public cloud (VPN, dedicated link — AWS Direct Connect, Azure ExpressRoute).</li><li>Consistent management tools across both (Azure Arc, AWS Outposts, Google Anthos).</li><li>Applications may span both environments (e.g., database on-premises, web tier in public cloud).</li></ul><p><strong>Advantages:</strong></p><ul><li>Flexibility: Run sensitive workloads on-premises; burst overflow to public cloud during peaks.</li><li>Cost optimisation: Baseline capacity on-premises (cheaper per unit); peak demand on pay-per-use public cloud.</li><li>Compliance: Regulated data stays on-premises; non-sensitive processing in public cloud.</li><li>Gradual migration: Move workloads to cloud incrementally rather than all at once.</li></ul><p><strong>Real use case — Cloud Bursting for E-Commerce:</strong> An online retailer like Myntra runs its core e-commerce infrastructure on a private cloud in its own data centres during normal periods (baseline ~200 servers). During Diwali sale or Big Billion Day, traffic spikes 10-50x beyond normal. Instead of buying 2,000 permanent servers (massive CapEx for 3 days of peak), they "cloud burst" — automatically provisioning hundreds of additional AWS EC2 instances only for the sale period, then releasing them. Private cloud handles baseline traffic; public cloud handles peak — optimal cost and performance.</p><p>Technologies: Azure Hybrid Benefit, AWS Outposts, Google Anthos, VMware Cloud on AWS.</p>`},
  {q:"What is an SLA in cloud computing?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p>A <strong>SLA (Service Level Agreement)</strong> is a formal, legally binding contract between a cloud service provider and a customer that defines the expected level of service — including performance metrics, availability guarantees, support response times, and remedies if commitments are not met.</p><p><strong>Key SLA components:</strong></p><ul><li><strong>Uptime/Availability:</strong> The most critical metric — percentage of time the service is operational. Expressed as a percentage of a month. "Five 9s" = 99.999% = 5.26 minutes downtime/year. Typical cloud SLAs:</li></ul><div class="code">99.9%  = 8.77 hours/year downtime   (Three 9s)
99.95% = 4.38 hours/year downtime
99.99% = 52.6 minutes/year downtime  (Four 9s)
99.999% = 5.26 minutes/year downtime (Five 9s)</div><ul><li><strong>Performance targets:</strong> Response time guarantees, throughput minimums (API latency SLA), storage IOPS.</li><li><strong>Support response time:</strong> P1 (Critical) issues responded within 15 minutes; P2 within 2 hours; P3 within 1 business day.</li><li><strong>Remedies/Credits:</strong> If SLA is breached, provider issues service credits (e.g., 10% monthly credit for each hour below 99.9% SLA). Credits are typically capped and automatic — not cash refunds.</li><li><strong>Exclusions:</strong> Planned maintenance windows, events outside provider's control (Acts of God, customer-caused issues, third-party failures).</li></ul><p><strong>SLA measurement:</strong> Uptime calculated excluding scheduled maintenance. Third-party monitoring services provide independent verification. Customers must file claims within defined windows (typically 30 days).</p><p><strong>Composing SLAs:</strong> If application uses multiple services (compute + database + storage), the <em>composite SLA</em> is the product: 99.99% × 99.99% = 99.98%. Adding redundancy (active-active across regions) improves composite SLA toward the weakest component.</p><p>SLA negotiation is possible for enterprise contracts — smaller customers accept standard published SLAs.</p>`},
  {q:"What is virtualisation? What is a hypervisor?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Virtualisation</strong> is the technology that creates software-based (virtual) representations of physical resources — servers, storage, networks, desktops — allowing multiple virtual instances to share and efficiently utilise underlying physical hardware. It is the foundational technology enabling cloud computing.</p><p><strong>Types of virtualisation:</strong></p><ul><li><strong>Server virtualisation:</strong> Multiple Virtual Machines (VMs) run on one physical server, each with its own OS, applications, and virtual hardware.</li><li><strong>Storage virtualisation:</strong> Multiple physical storage devices appear as one logical storage pool.</li><li><strong>Network virtualisation:</strong> Physical network resources abstracted into virtual networks (VLAN, SDN, NFV).</li><li><strong>Desktop virtualisation (VDI):</strong> Desktop environments hosted on central servers, accessed remotely (Citrix, VMware Horizon).</li></ul><p><strong>Benefits:</strong> Better hardware utilisation (one physical server runs 20-40 VMs vs. idle at 5-10% utilisation), isolation between VMs (a crash in one VM does not affect others), rapid provisioning (clone a VM in minutes), live migration (move running VMs between physical hosts with zero downtime).</p><p><strong>Hypervisor:</strong> The software layer that creates and manages Virtual Machines. It abstracts physical hardware and presents virtual hardware to each VM.</p><ul><li><strong>Type 1 Hypervisor (Bare-metal):</strong> Runs directly on physical hardware — no host OS. Highest performance and security. Examples: VMware ESXi/vSphere, Microsoft Hyper-V, KVM (Linux), Xen. Used in data centres and cloud providers (AWS uses Xen/Nitro, Azure uses Hyper-V/Hyper-V based custom).</li><li><strong>Type 2 Hypervisor (Hosted):</strong> Runs as an application on a host OS. Easier setup for development/testing. Examples: VMware Workstation, VirtualBox, Parallels. Less efficient — host OS overhead between hypervisor and hardware.</li></ul>`},
  {q:"What is IAM in cloud computing?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>IAM (Identity and Access Management)</strong> is a cloud framework of policies, technologies, and services that ensure the right individuals and services have the right access to the right cloud resources at the right time — and that this access is auditable and enforceable.</p><p><strong>Core IAM concepts:</strong></p><ul><li><strong>Identities:</strong> Users (human), Groups (collections of users), Roles (identities assumed by services, applications, or users temporarily), Service Accounts (non-human identities for applications).</li><li><strong>Authentication:</strong> Verifying "who are you?" — passwords, MFA, certificate-based auth, SSO (SAML/OIDC federation with corporate identity providers like Azure AD, Okta).</li><li><strong>Authorisation:</strong> Defining "what can you do?" — Policies that allow/deny specific actions on specific resources.</li><li><strong>Audit:</strong> Logging all access and API calls for compliance (AWS CloudTrail, Azure Activity Log, GCP Cloud Audit Logs).</li></ul><p><strong>IAM in AWS example:</strong></p><ul><li>User "Alice" is in group "Developers" which has policy allowing: EC2 read/write, S3 full access on specific buckets.</li><li>EC2 instance has IAM Role "AppRole" with policy allowing: DynamoDB read/write, SQS send/receive.</li><li>Temporary credentials automatically rotated — no hardcoded secrets in application code.</li></ul><p><strong>IAM best practices (Principle of Least Privilege):</strong></p><ul><li>Never use root account for daily operations — create IAM users.</li><li>Enable MFA on all user accounts, especially privileged ones.</li><li>Use IAM roles for service-to-service access — never use long-lived access keys hardcoded in code.</li><li>Regular access reviews — remove unused users and permissions.</li><li>Use permission boundaries to limit maximum permissions even for administrators.</li></ul><p>IAM is the first line of defence in cloud security — 80% of breaches involve compromised credentials.</p>`},
  {q:"What is data sovereignty in cloud?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>Data sovereignty in cloud</strong> refers to the legal principle that data stored in a cloud region is subject to the laws and regulations of the country where it physically resides — and the obligation of organisations to ensure their data storage and processing complies with applicable national laws.</p><p><strong>Key challenges:</strong></p><ul><li><strong>Multi-region cloud architecture:</strong> Cloud providers replicate data across multiple geographic regions for resilience. Without explicit configuration, customer data may be stored in countries with conflicting laws.</li><li><strong>Foreign government access:</strong> The US CLOUD Act (2018) requires US cloud providers (AWS, Azure, Google) to provide US law enforcement access to data regardless of where it is stored — even in foreign data centres — without notifying the foreign government.</li><li><strong>Regulatory requirements:</strong> EU GDPR restricts personal data transfer outside the EU/EEA. India's DPDPA 2023 restricts cross-border transfers of personal data. Russia's Federal Law 242-FZ mandates personal data of Russian citizens be processed on Russian soil.</li></ul><p><strong>How cloud providers address it:</strong></p><ul><li>Geographic data residency commitments — customers specify data must stay within a region (e.g., "India South" region only).</li><li>Sovereign cloud offerings: Microsoft Azure for Sovereign Clouds, AWS GovCloud (US-only, ITAR/FedRAMP compliant), Google Workspace for Government.</li><li>Customer-managed encryption keys — customers hold keys, provider cannot read data even under government order.</li></ul><p><strong>Practical implications for Indian organisations:</strong> RBI guidelines require payment data to be stored only in India. SEBI mandates Indian securities data remain in India. Healthcare data under DPDPA must be stored domestically. This drives demand for AWS Mumbai, Azure India, and Google Cloud India regions.</p>`},
  {q:"What is containerisation? How does Docker work?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>Containerisation</strong> is a lightweight virtualisation method that packages an application with all its dependencies (code, runtime, libraries, configuration) into a self-contained, portable unit called a <em>container</em>. Containers share the host OS kernel — unlike VMs which each have their own OS — making them much more lightweight and faster to start.</p><p><strong>Containers vs VMs:</strong></p><ul><li>VM: Full OS per VM (1-2 GB), minutes to start, heavy isolation (separate kernel).</li><li>Container: Shared OS kernel, typically 10-100 MB image, seconds to start, process-level isolation.</li></ul><p><strong>How Docker works:</strong></p><ul><li><strong>Dockerfile:</strong> Text file defining how to build the container image. FROM specifies base image; RUN executes commands; COPY adds files; EXPOSE declares port; CMD defines start command.</li></ul><div class="code">FROM node:18-alpine
WORKDIR /app
COPY package*.json ./
RUN npm install
COPY . .
EXPOSE 3000
CMD ["node", "server.js"]</div><ul><li><strong>Docker image:</strong> Built from Dockerfile using <code>docker build</code>. Immutable, layered filesystem — each instruction creates a layer. Layers are cached and shared between images for efficiency.</li><li><strong>Docker container:</strong> A running instance of an image — <code>docker run -p 3000:3000 myapp</code>. Isolated process(es) with their own filesystem view (using union mounts), network namespace, and process namespace.</li><li><strong>Docker Hub/Registry:</strong> Repository for sharing images. docker pull nginx fetches the official Nginx image from Docker Hub.</li><li><strong>Docker Engine:</strong> Client-server architecture — Docker CLI (client) communicates with Docker daemon (server) via REST API to manage containers, images, volumes, and networks.</li></ul><p><strong>Key benefits:</strong> "Build once, run anywhere" — same container runs identically in development, staging, and production regardless of host OS. Eliminates "works on my machine" syndrome. Enables microservices deployment and CI/CD pipelines.</p>`},
  {q:"What is Kubernetes (K8s)?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>Kubernetes (K8s)</strong> is an open-source container orchestration system originally developed by Google (inspired by their internal Borg system) and donated to CNCF (Cloud Native Computing Foundation) in 2014. It automates deployment, scaling, load balancing, health monitoring, and management of containerised applications across clusters of machines.</p><p><strong>Core Kubernetes concepts:</strong></p><ul><li><strong>Cluster:</strong> One or more Master (Control Plane) nodes + multiple Worker nodes.</li><li><strong>Pod:</strong> Smallest deployable unit — one or more containers sharing network and storage. Each Pod gets a unique IP within the cluster.</li><li><strong>Deployment:</strong> Manages a set of replica Pods, handles rolling updates and rollbacks. Declares desired state ("run 3 replicas of this container").</li><li><strong>Service:</strong> Stable network endpoint (virtual IP + DNS name) that load-balances traffic across Pods of a Deployment. Pods come and go; Service provides stable access.</li><li><strong>Namespace:</strong> Logical cluster partition — isolates resources by team/environment.</li><li><strong>ConfigMap / Secret:</strong> Externalise configuration and sensitive data from container images.</li></ul><p><strong>How K8s auto-heals:</strong> Deployment controller continuously reconciles actual state to desired state. If a Pod crashes, K8s automatically restarts it. If a node fails, Pods are rescheduled on healthy nodes.</p><p><strong>Auto-scaling:</strong> HPA (Horizontal Pod Autoscaler) scales Pod count based on CPU/memory metrics. Cluster Autoscaler adds/removes nodes based on resource pressure.</p><p><strong>Managed K8s services:</strong> AWS EKS, Azure AKS, Google GKE — eliminate the need to manage the control plane yourself.</p><p>K8s has become the de facto standard for container orchestration in cloud-native applications. "K8s" = K + 8 letters + s.</p>`},
  {q:"What is serverless computing?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p><strong>Serverless computing</strong> is a cloud execution model where the cloud provider dynamically manages server provisioning, scaling, and maintenance. Developers write and deploy code as individual functions; the provider runs them on demand — developers never provision, configure, or manage servers. The "serverless" name is a misnomer — servers exist, but developers don't see or manage them.</p><p><strong>Key characteristics:</strong></p><ul><li><strong>Event-driven:</strong> Functions execute in response to triggers — HTTP requests, database changes, message queue events, scheduled timers, storage events.</li><li><strong>Auto-scaling:</strong> Platform scales from 0 to thousands of concurrent instances automatically — no pre-provisioning. Scales to zero when idle (paying $0 when no requests).</li><li><strong>Pay-per-execution:</strong> Billed per function invocation and execution duration (milliseconds). No cost when idle. AWS Lambda pricing: $0.0000002 per request + $0.0000166667 per GB-second.</li><li><strong>Stateless:</strong> Each function invocation is independent — no state persists between invocations (use external storage — DynamoDB, S3 — for state).</li></ul><p><strong>Serverless platforms:</strong></p><ul><li>AWS Lambda (the original — 2014)</li><li>Azure Functions</li><li>Google Cloud Functions / Cloud Run</li><li>Vercel Functions (frontend-focused)</li><li>Cloudflare Workers (edge computing)</li></ul><p><strong>Ideal use cases:</strong> REST API backends, event processing pipelines, scheduled jobs (cron), file processing on upload, real-time data transformation, IoT event handling, chatbot backends.</p><p><strong>Limitations:</strong> Cold starts (first invocation after idle period has latency), maximum execution time (15 minutes for Lambda), stateless design required, vendor lock-in, limited local testing. Not suitable for long-running processes, high-frequency compute (databases, gaming servers).</p>`},
  {q:"What is cloud compliance? Name 3 standards.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>Cloud compliance</strong> refers to the process of ensuring cloud computing environments meet legal, regulatory, contractual, and industry standards governing data protection, security controls, privacy, and operational practices. Organisations must demonstrate that their use of cloud services satisfies applicable requirements — to regulators, auditors, customers, and partners.</p><p><strong>Why cloud compliance is challenging:</strong></p><ul><li>Shared responsibility: Compliance in the cloud is split between provider (infrastructure compliance) and customer (application/data compliance).</li><li>Data residency: Regulations may require data to stay within specific borders — customers must ensure cloud region selection aligns.</li><li>Multi-cloud: Using multiple providers means managing compliance across different environments.</li><li>Continuous audit: Unlike annual on-premises audits, cloud environments change daily — continuous compliance monitoring needed.</li></ul><p><strong>Three key compliance standards:</strong></p><ul><li><strong>ISO/IEC 27001:</strong> International standard for Information Security Management Systems (ISMS). Specifies requirements for establishing, implementing, maintaining, and continually improving information security. AWS, Azure, and GCP are all ISO 27001 certified — organisations can leverage provider certifications (cloud provider's infrastructure portion is covered). Organisations still need their own ISMS certification for their application layer.</li><li><strong>PCI DSS (Payment Card Industry Data Security Standard):</strong> Mandatory for any organisation that stores, processes, or transmits credit/debit card data. 12 security requirements covering network security, data protection, access control, monitoring, and vulnerability management. AWS/Azure/GCP are PCI DSS Level 1 certified service providers. Merchants using cloud for payment processing must ensure their application meets PCI DSS requirements.</li><li><strong>SOC 2 (Service Organization Control 2):</strong> American auditing standard (AICPA) for service organisations. Evaluates security, availability, processing integrity, confidentiality, and privacy controls based on Trust Service Criteria. Type I = controls designed correctly. Type II = controls operating effectively over time (6-12 months). SaaS companies typically obtain SOC 2 Type II to demonstrate security to enterprise customers.</li></ul>`},
  {q:"What is a microservices architecture?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>Microservices architecture</strong> structures an application as a collection of small, independently deployable services, each running its own process and communicating via lightweight APIs (typically REST or message queues). Each service is responsible for a specific business capability and can be developed, deployed, scaled, and maintained independently.</p><p><strong>Contrast with monolithic architecture:</strong> A monolith packages all functionality into one large application — one codebase, one deployable unit. To update the checkout feature, you redeploy the entire monolith. Microservices allows updating only the checkout service without touching payments, inventory, or user services.</p><p><strong>Key microservices characteristics:</strong></p><ul><li><strong>Single Responsibility:</strong> Each service owns one business domain (User Service, Order Service, Payment Service, Notification Service).</li><li><strong>Independent deployment:</strong> Teams deploy services without coordinating with other teams — enabling high deployment frequency (Netflix deploys thousands of times per day).</li><li><strong>Technology heterogeneity:</strong> Different services can use different languages, databases, and frameworks. Payment service uses Java + Oracle; Recommendation service uses Python + MongoDB.</li><li><strong>Decentralised data:</strong> Each service owns its own database — no shared database. Services communicate via API or events (Kafka, RabbitMQ).</li><li><strong>Fault isolation:</strong> A failure in Recommendation service doesn't crash the checkout flow.</li></ul><p><strong>Challenges:</strong> Network latency between services, distributed transactions, service discovery, API versioning, observability (distributed tracing — Jaeger, Zipkin), operational complexity (many services to deploy and monitor).</p><p>Netflix, Amazon, Uber, Airbnb, and Spotify pioneered microservices architecture for scalability.</p>`},
  {q:"What is cloud federation?",u:"Unit 04",a:`<span class="utag">Unit 05</span><p><strong>Cloud federation</strong> (or federated cloud / inter-cloud) is a model where multiple cloud providers or cloud environments interconnect and interoperate — sharing resources, services, and workloads across organisational or provider boundaries. Federated clouds allow resources to flow between clouds based on demand, cost, performance, or policy without requiring users to manage each cloud separately.</p><p><strong>Key concepts:</strong></p><ul><li><strong>Resource federation:</strong> A cloud broker aggregates resources from multiple providers and presents them as a unified pool. Customers request resources; broker automatically provisions them from the optimal provider (cheapest, least loaded, in the right geography).</li><li><strong>Identity federation:</strong> Users authenticate once and access resources across multiple cloud providers (SSO — Single Sign-On). SAML/OIDC protocols enable federated identity. Example: log into Azure AD once; access AWS, Google Cloud, and Salesforce without re-authenticating.</li><li><strong>Data federation:</strong> Unified query access to data distributed across multiple clouds and on-premises systems.</li></ul><p><strong>Cloud federation models:</strong></p><ul><li><strong>Peer-to-peer:</strong> Two cloud providers agree to share resources reciprocally — during peaks, Provider A uses Provider B's idle capacity and vice versa.</li><li><strong>Hierarchical:</strong> A broker/aggregator at the top manages resources from multiple providers below.</li><li><strong>Marketplace federation:</strong> Open exchanges where providers list available resources and consumers bid/select (AWS Spot Instances partially resembles this).</li></ul><p><strong>Benefits:</strong> Avoid vendor lock-in, optimise cost (use cheapest provider dynamically), improve availability (failover between providers), regulatory compliance (route data to compliant region).</p><p>Standards: OCCI (Open Cloud Computing Interface), TOSCA (Topology and Orchestration Specification for Cloud Applications) aim to enable portability across federated clouds.</p>`},
  {q:"What is a service mesh?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p>A <strong>service mesh</strong> is a dedicated infrastructure layer for handling service-to-service communication in microservices architectures. It manages network communication (traffic routing, load balancing, security, observability) transparently — without requiring changes to application code.</p><p><strong>The problem it solves:</strong> In a microservices system with 100+ services, each service-to-service call needs retry logic, timeout handling, circuit breaking (fail fast when a service is down), mutual TLS encryption, and distributed tracing. Implementing this in every service creates duplicated cross-cutting concerns and inconsistency. A service mesh extracts these concerns into a separate infrastructure layer.</p><p><strong>Architecture — Sidecar proxy pattern:</strong> A lightweight proxy (sidecar) container is deployed alongside every service Pod in Kubernetes. All inbound and outbound traffic is transparently intercepted by the sidecar. The sidecar handles communication features; the application code focuses on business logic.</p><p><strong>Service mesh capabilities:</strong></p><ul><li><strong>Traffic management:</strong> Intelligent routing — canary deployments (route 5% of traffic to new version), A/B testing, traffic mirroring, weighted load balancing.</li><li><strong>Security:</strong> Automatic mutual TLS (mTLS) between all services — all inter-service communication encrypted and authenticated. Service identity via SPIFFE/SPIRE certificates.</li><li><strong>Observability:</strong> Automatic distributed tracing (Jaeger/Zipkin integration), metrics (latency, error rate, throughput per service), and access logs — without code changes.</li><li><strong>Resilience:</strong> Automatic retries, timeouts, circuit breakers, bulkheads — prevent cascading failures.</li></ul><p><strong>Popular service meshes:</strong> Istio (most widely used, Google/IBM/Lyft), Linkerd (lightweight, Rust-based), AWS App Mesh, Consul Connect (HashiCorp).</p>`},
  {q:"What is cloud ROI?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>Cloud ROI (Return on Investment)</strong> measures the financial return and business value generated from cloud computing investments relative to their cost. For cloud adoption decisions, ROI analysis compares the total cost and benefits of cloud vs. on-premises infrastructure.</p><p><strong>Cloud ROI calculation:</strong></p><div class="code">ROI = (Net Benefits / Total Cost of Cloud) x 100%
Net Benefits = (On-premises cost - Cloud cost) + Value of agility benefits
Total Cost of Cloud = Migration cost + Monthly/annual cloud spend + Operational costs</div><p><strong>Cost components of on-premises (CapEx):</strong> Server hardware purchase, data centre facility (rent, power, cooling), networking equipment, UPS/generators, hardware refresh every 3-5 years, IT staff for maintenance, software licenses (OS, virtualisation, monitoring).</p><p><strong>Cloud cost components (OpEx):</strong> Compute (EC2/VM instances), storage, data egress, managed services (RDS, load balancers), support plan, migration costs, staff training.</p><p><strong>Quantifiable cloud benefits:</strong></p><ul><li><strong>Reduced CapEx:</strong> No server purchase — convert large upfront costs to predictable monthly expenses.</li><li><strong>Right-sizing:</strong> Pay only for actual usage — no idle hardware. On-premises servers average 10-15% utilisation; cloud resources scale to exact demand.</li><li><strong>Faster time-to-market:</strong> Developers provision environments in minutes vs. weeks for on-premises procurement. Speed = competitive advantage with measurable revenue impact.</li><li><strong>Reduced operational staff:</strong> Provider manages patching, hardware replacement, data centre operations.</li><li><strong>Business continuity savings:</strong> Cloud DR is cheaper than a secondary on-premises data centre.</li></ul><p><strong>Cloud ROI tools:</strong> AWS Pricing Calculator, Azure Cost Calculator, AWS TCO (Total Cost of Ownership) Calculator, Gartner Cloud TCO analysis. Most organisations report 30-40% cost savings with full cloud migration. Forrester Research estimates 212% ROI from Microsoft Azure over 3 years in enterprise deployments.</p>`},
  {q:"What is Cloud Mashup?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>A <strong>Cloud Mashup</strong> (also called Web Mashup or Cloud Service Mashup) is an application or service created by combining data or functionality from two or more cloud-based APIs, services, or data sources into a new, unified application that delivers value greater than its individual parts. Mashups are built on top of existing cloud APIs without requiring access to the underlying source systems.</p><p><strong>Origin:</strong> The concept emerged from Web 2.0 culture — early mashups combined Google Maps API with Craigslist real estate listings to create HousingMaps.com (2005), one of the most famous early mashups.</p><p><strong>Types of mashups:</strong></p><ul><li><strong>Data mashup:</strong> Combines data from multiple sources into one interface. Example: Dashboard combining Google Analytics + Salesforce CRM + QuickBooks financial data to show marketing ROI from a single screen.</li><li><strong>Consumer mashup:</strong> End-user applications combining APIs for convenience. Example: A travel app combining Flights API (Amadeus) + Hotels API (Booking.com) + Google Maps + Weather API + Currency Exchange API into one travel planning tool.</li><li><strong>Business mashup:</strong> Enterprise integration combining SaaS tools. Example: Customer service app combining Zendesk (ticketing) + Salesforce (CRM) + Twilio (SMS/voice) + SendGrid (email) to give agents a 360-degree customer view.</li></ul><p><strong>Technologies enabling mashups:</strong> REST APIs, GraphQL, OAuth (secure cross-service authorisation), Webhooks (push notifications between services), API aggregation platforms (MuleSoft, Zapier, Make/Integromat, AWS AppFlow).</p><p>Mashups represent the "composable enterprise" principle — build new capabilities by composing existing cloud services rather than building from scratch, dramatically reducing development time.</p>`},
  {q:"What is VM live migration?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>VM live migration</strong> (also called live VM migration or hot migration) is the process of moving a running virtual machine — with its memory state, storage state, and network connections — from one physical host server to another with zero (or near-zero) downtime and no perceptible interruption to the VM's running workloads or user sessions.</p><p><strong>Why live migration is critical:</strong></p><ul><li>Physical host maintenance: Patch the hypervisor or replace hardware without rebooting VMs or scheduling downtime.</li><li>Load balancing: Move VMs from overloaded hosts to underloaded hosts to optimise resource utilisation.</li><li>Energy optimisation: Consolidate VMs onto fewer hosts during low-demand periods; power off empty hosts.</li><li>Disaster avoidance: Move VMs away from a failing hardware component before it crashes.</li></ul><p><strong>Live migration process (memory pre-copy method — VMware vMotion, Hyper-V Live Migration):</strong></p><ol><li><strong>Pre-copy phase:</strong> While VM continues running on source host, its memory is iteratively copied to destination host. Pages modified during copying are tracked (dirty pages) and re-copied in the next iteration.</li><li><strong>Stop-and-copy phase:</strong> When the dirty page set becomes small enough (typically &lt;10ms of data), VM is briefly paused (milliseconds), final dirty pages copied, CPU/device state transferred.</li><li><strong>Activation:</strong> VM resumes on destination host. Network packets rerouted (RARP/gratuitous ARP updates MAC table on switches). VM runs on new host — users notice no interruption.</li></ol><p><strong>Storage migration:</strong> If VM disk is not on shared storage, disks must also migrate — significantly slower. Shared storage (SAN/NAS) or shared nothing migration handles disk separately from memory.</p><p>VMware vMotion (2003) pioneered live migration; Microsoft Hyper-V Live Migration and KVM's live_migrate() command provide equivalent capabilities.</p>`},
  {q:"What is auto-scaling? Types of scaling in cloud?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Auto-scaling</strong> is a cloud capability that automatically adjusts the amount of compute resources allocated to an application based on real-time demand — scaling out (adding resources) during high load and scaling in (removing resources) during low load — maintaining performance while minimising cost.</p><p><strong>Two fundamental types of scaling:</strong></p><ul><li><strong>Vertical Scaling (Scale Up/Down):</strong> Increasing or decreasing the size (CPU/RAM) of an existing instance. Example: Upgrading a database server from a 4-core/16GB VM to an 8-core/32GB VM. Simple to implement — same IP, same storage. <em>Disadvantages:</em> Requires downtime (in most cases), has a hardware ceiling, doesn't improve availability (still a single point of failure).</li><li><strong>Horizontal Scaling (Scale Out/In):</strong> Adding or removing additional instances of the same size behind a load balancer. Example: Auto-scaling group adds 3 more web server instances when CPU average exceeds 70%. <em>Advantages:</em> True elasticity, no downtime, virtually unlimited capacity, improved fault tolerance (multiple instances). <em>Disadvantages:</em> Requires stateless application design (session state in external cache — Redis), more complex load balancing and service discovery.</li></ul><p><strong>Auto-scaling policies:</strong></p><ul><li><strong>Target tracking:</strong> Maintain a target metric value (e.g., keep average CPU at 60%). System automatically adds/removes instances to hit the target.</li><li><strong>Step scaling:</strong> Different scaling actions at different threshold levels (add 2 instances at 60% CPU, add 5 instances at 80% CPU).</li><li><strong>Scheduled scaling:</strong> Pre-emptively scale at known demand peaks (add instances every weekday at 9 AM for business hours; scale down at 8 PM).</li><li><strong>Predictive scaling (AWS):</strong> Machine learning analyses historical patterns to forecast demand and proactively scale.</li></ul><p>AWS Auto Scaling Groups, Azure Scale Sets, and Google Cloud Managed Instance Groups implement horizontal auto-scaling. Kubernetes HPA implements pod-level horizontal auto-scaling.</p>`},
  {q:"What is a CDN? Give an example.",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>A <strong>CDN (Content Delivery Network)</strong> is a globally distributed network of servers (Points of Presence — PoPs) that caches and delivers web content (static files, images, videos, scripts) from servers geographically close to the end user — reducing latency, improving page load times, and reducing load on the origin server.</p><p><strong>How a CDN works:</strong></p><ol><li>User in Mumbai requests an image from a US-based website.</li><li>DNS routes the request to the nearest CDN PoP (Mumbai CDN edge server).</li><li>If the CDN has the image cached (cache hit) → served immediately from Mumbai edge. Latency: ~5ms vs. ~250ms to US origin.</li><li>If not cached (cache miss) → CDN fetches from origin server, caches it locally, serves to user. Subsequent users in Mumbai get it from cache.</li></ol><p><strong>What CDNs deliver:</strong></p><ul><li>Static assets: JavaScript bundles, CSS stylesheets, images (JPEG, PNG, WebP), web fonts.</li><li>Video streaming: Adaptive bitrate video segments (YouTube, Netflix, Hotstar).</li><li>Dynamic acceleration: Route API requests through CDN's optimised backbone network (TCP connection reuse, route optimisation).</li><li>Security: DDoS protection, WAF (Web Application Firewall), bot mitigation at the edge.</li></ul><p><strong>CDN benefits:</strong> 50-80% faster page loads (from reduced RTT), reduced origin server bandwidth and compute costs (CDN absorbs 60-90% of requests), improved availability (origin can go down while CDN serves cached content), global scalability without multi-region origin deployment.</p><p><strong>Example — Cloudflare:</strong> The world's largest CDN with 300+ PoPs in 100+ countries. Provides CDN, DDoS protection, WAF, DNS, Zero Trust security, and serverless computing (Cloudflare Workers). Handles 45+ million HTTP requests per second globally. Free tier available. Other CDNs: AWS CloudFront, Akamai, Fastly, Azure CDN.</p>`},
  {q:"What is object storage? How does it differ from block storage?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>Cloud storage comes in three fundamental types — object, block, and file. Understanding their differences is critical for architecture decisions.</p><p><strong>Object Storage:</strong> Stores data as discrete objects, each consisting of the data itself + user-defined metadata + a unique identifier (key). Objects are stored in flat namespaces (buckets) — no directory hierarchy (though keys can use / to simulate folders). Accessed via HTTP-based APIs (REST GET/PUT/DELETE).</p><ul><li><strong>Characteristics:</strong> Massively scalable (exabytes), highly durable (99.999999999% — 11 nines at AWS S3), low cost per GB, globally accessible via internet, eventual consistency for some operations.</li><li><strong>Best for:</strong> Static website assets, images, videos, backups, data lake storage (Parquet/JSON files for analytics), application artifacts, log archives.</li><li><strong>Cannot do:</strong> Mount as filesystem for OS; poor for frequently modified files (overwrite entire object); high latency for small random I/O.</li><li><strong>Examples:</strong> AWS S3, Azure Blob Storage, Google Cloud Storage, MinIO (self-hosted).</li></ul><p><strong>Block Storage:</strong> Divides storage into fixed-size blocks (512 bytes to 4MB). Exposed as a raw block device that operating systems can format with any filesystem. High performance random I/O.</p><ul><li><strong>Characteristics:</strong> Low latency (sub-millisecond), high IOPS (hundreds of thousands), supports snapshots and replication, requires attachment to a compute instance.</li><li><strong>Best for:</strong> OS boot volumes, databases (MySQL, PostgreSQL, Oracle), transactional workloads requiring consistent low latency.</li><li><strong>Examples:</strong> AWS EBS (Elastic Block Store), Azure Managed Disks, Google Persistent Disk.</li></ul><p><strong>File Storage:</strong> Shared filesystem accessed via NFS/SMB protocols. Multiple instances can mount simultaneously. AWS EFS, Azure Files, Google Filestore.</p>`},
  {q:"What is a load balancer? Name two types.",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>A <strong>load balancer</strong> is a device (hardware or software) that distributes incoming network traffic across multiple backend servers to ensure no single server is overwhelmed — improving availability, reliability, and scalability of applications.</p><p><strong>Core functions:</strong></p><ul><li>Distribute requests across a pool of servers using a selected algorithm.</li><li>Health checking — continuously probe backend servers; remove unhealthy servers from rotation.</li><li>Session persistence (sticky sessions) — route a user's requests to the same backend server (important for stateful applications).</li><li>SSL/TLS termination — decrypt HTTPS at the load balancer; forward plain HTTP to backends.</li><li>Content-based routing — route /api requests to API servers; /images to image servers.</li></ul><p><strong>Load balancing algorithms:</strong> Round Robin (sequential), Least Connections (least loaded), IP Hash (same client to same server), Weighted Round Robin (more traffic to powerful servers), Random.</p><p><strong>Two types of load balancers:</strong></p><ul><li><strong>Layer 4 (Network/Transport Load Balancer):</strong> Makes routing decisions based on IP addresses and TCP/UDP ports — without inspecting packet content. Extremely fast (operates at network layer). Cannot make content-based decisions. Example: AWS Network Load Balancer (NLB) — handles millions of requests per second with ultra-low latency. Used for TCP workloads (gaming servers, IoT, real-time streaming).</li><li><strong>Layer 7 (Application Load Balancer):</strong> Makes routing decisions based on HTTP content — URL path, hostname, HTTP headers, cookies, query strings. Can route /api/* to API backend and /* to web servers. Supports content-based routing, A/B testing, canary deployments, WebSocket. Example: AWS Application Load Balancer (ALB), Nginx, HAProxy in HTTP mode, Azure Application Gateway. Used for HTTP/HTTPS web applications and microservices.</li></ul><p>Global Server Load Balancing (GSLB) distributes traffic across data centres in different geographic regions using DNS-based routing.</p>`},
  {q:"What is a VPC (Virtual Private Cloud)?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p>A <strong>VPC (Virtual Private Cloud)</strong> is an isolated, private virtual network within a public cloud provider's infrastructure where you can launch cloud resources in a logically separated, customisable network environment. Think of it as your own private data centre network running on AWS/Azure/GCP infrastructure.</p><p><strong>VPC components (AWS VPC as reference):</strong></p><ul><li><strong>CIDR block:</strong> Define your VPC's private IP address range (e.g., 10.0.0.0/16 = 65,536 IP addresses).</li><li><strong>Subnets:</strong> Subdivide the VPC into subnets — Public subnets (resources accessible from internet) and Private subnets (resources accessible only internally).</li><li><strong>Internet Gateway (IGW):</strong> Allows resources in public subnets to communicate with the internet.</li><li><strong>NAT Gateway:</strong> Allows private subnet resources to initiate outbound internet connections (software updates) without being reachable from the internet.</li><li><strong>Route Tables:</strong> Define where traffic is directed — 0.0.0.0/0 → IGW for public subnets; 0.0.0.0/0 → NAT Gateway for private subnets.</li><li><strong>Security Groups:</strong> Stateful virtual firewalls at the instance level (allow inbound HTTPS 443, SSH 22 from specific IPs).</li><li><strong>Network ACLs:</strong> Stateless subnet-level firewall — additional layer of security.</li><li><strong>VPC Peering:</strong> Connect two VPCs (same or different accounts) directly.</li><li><strong>VPN/Direct Connect:</strong> Securely connect on-premises data centre to VPC via VPN or dedicated private connection.</li></ul><p><strong>Typical architecture:</strong> Public subnet contains load balancers; private subnet contains web/app servers; isolated subnet contains databases — layered network segmentation following principle of least exposure.</p><p>Azure equivalent: Virtual Network (VNet). GCP equivalent: VPC Network (global, unlike AWS which is regional).</p>`},
  {q:"What is cloud bursting?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>Cloud bursting</strong> is a hybrid cloud deployment model where an application typically runs in a private cloud (or on-premises data centre), but automatically "bursts" into a public cloud to handle demand spikes that exceed private cloud capacity — leveraging the public cloud's elastic scaling for temporary peak loads.</p><p><strong>How cloud bursting works:</strong></p><ol><li>Normal operations: Application runs entirely on private cloud/on-premises at baseline capacity.</li><li>Demand spike: Traffic or processing demand exceeds private cloud capacity thresholds (e.g., CPU &gt;80% sustained for 5 minutes).</li><li>Burst trigger: Orchestration layer (Kubernetes, VMware, CloudBolt) automatically provisions additional resources in the public cloud (AWS, Azure, GCP).</li><li>Traffic distribution: Load balancer routes overflow traffic to public cloud instances.</li><li>Demand returns to normal: Public cloud resources are terminated; all traffic returns to private infrastructure. Billing stops for burst resources.</li></ol><p><strong>Benefits:</strong></p><ul><li>No over-provisioning private cloud for occasional peaks — avoid paying for 500 servers 24/7 when you need them only 5 days/year.</li><li>Public cloud handles unpredictable traffic spikes without performance degradation.</li><li>Sensitive/regulated data stays on-premises during normal operations.</li></ul><p><strong>Technical requirements for cloud bursting:</strong></p><ul><li>Consistent application architecture across private and public cloud (containers help achieve this — same Docker image runs anywhere).</li><li>Network connectivity — low-latency VPN or dedicated link (AWS Direct Connect, Azure ExpressRoute) between private and public cloud.</li><li>Data synchronisation — application state/database accessible from both environments.</li></ul><p><strong>Use cases:</strong> Diwali/holiday season e-commerce, tax season financial processing, genomics research batch jobs, media rendering farms. Netflix, retail banks, and government portals use cloud bursting patterns.</p>`},
  {q:"What is multi-tenancy in cloud?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Multi-tenancy</strong> is a software architecture where a single instance of an application (and its underlying infrastructure) serves multiple customers (tenants) simultaneously. Each tenant's data is logically isolated and invisible to other tenants — but all share the same physical hardware, operating system, database server, and application instance.</p><p><strong>Why multi-tenancy is fundamental to cloud economics:</strong> Cloud providers can serve thousands of customers on the same physical server. A cloud provider's cost per customer drops dramatically with scale — savings are passed to customers as low pricing. Without multi-tenancy, each customer would need dedicated hardware — eliminating the cloud's cost advantage.</p><p><strong>Multi-tenancy implementation levels:</strong></p><ul><li><strong>Infrastructure level:</strong> Multiple VMs from different customers run on the same physical server (hypervisor provides isolation). This is how IaaS (EC2, Azure VMs) works — strongest isolation guarantee.</li><li><strong>Application level (SaaS multi-tenancy):</strong> Single application codebase and database serve all tenants. Tenant isolation via:</li></ul><div class="code">// Tenant isolation pattern — every query filtered by tenant ID
SELECT * FROM Orders WHERE tenant_id = 'company_abc' AND user_id = 42;</div><ul><li><strong>Separate database per tenant:</strong> Strongest data isolation, highest cost.</li><li><strong>Shared database, separate schema:</strong> Each tenant has their own schema (set of tables).</li><li><strong>Shared database, shared schema:</strong> Most efficient; tenant_id column in every table. Requires careful query design to prevent data leakage.</li></ul><p><strong>Security implications:</strong> Data isolation between tenants must be enforced at the application layer — a bug in row-level security can expose one tenant's data to another (tenant data leakage). Cloud providers guarantee hypervisor-level isolation; SaaS providers are responsible for application-level isolation.</p><p><strong>SaaS examples:</strong> Salesforce, Slack, Jira — single application serving millions of organisations with complete data isolation between them.</p>`},
  {q:"What is RTO and RPO in cloud disaster recovery?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p><strong>RTO (Recovery Time Objective)</strong> and <strong>RPO (Recovery Point Objective)</strong> are the two critical metrics that define an organisation's disaster recovery strategy requirements. They directly determine the cost and complexity of the DR solution.</p><p><strong>RTO (Recovery Time Objective):</strong> The maximum acceptable time to restore a system to normal operation after a disaster or outage. "How long can we afford to be down?"</p><ul><li>RTO = 0: Active-active setup — no downtime, traffic fails over instantly (zero interruption).</li><li>RTO = 15 minutes: Standby system with automated failover.</li><li>RTO = 4 hours: Restore from backup to warm standby.</li><li>RTO = 24 hours: Restore from backup tapes or cold storage (acceptable only for non-critical systems).</li></ul><p><strong>RPO (Recovery Point Objective):</strong> The maximum acceptable amount of data loss measured in time. "How much data can we afford to lose?" — i.e., how old can the most recent backup be?</p><ul><li>RPO = 0: Synchronous replication — zero data loss (write confirmed only after written to both primary and DR site).</li><li>RPO = 15 minutes: Async replication — up to 15 minutes of transactions may be lost.</li><li>RPO = 24 hours: Daily backups — up to one day of data may be lost.</li></ul><p><strong>DR strategies (from fastest/most expensive to slowest/cheapest):</strong></p><ul><li><strong>Multi-site active-active:</strong> RTO ≈ 0, RPO ≈ 0. Full production in multiple regions. Highest cost.</li><li><strong>Warm standby:</strong> Scaled-down replica running in DR region. RTO minutes, RPO minutes. Moderate cost.</li><li><strong>Pilot light:</strong> Core infrastructure (database) always running; compute provisioned on disaster. RTO hours, RPO minutes.</li><li><strong>Backup &amp; Restore:</strong> Backup data to S3. Restore on disaster. RTO hours-days, RPO hours. Cheapest.</li></ul><p>RTO and RPO requirements should drive DR architecture decisions, not the other way around.</p>`},
  {q:"What is DevOps? What is CI/CD?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p><strong>DevOps</strong> is a culture, set of practices, and toolchain that integrates software Development (Dev) and IT Operations (Ops) teams — breaking down traditional silos to deliver software faster, more reliably, and with better quality. DevOps emphasises automation, collaboration, continuous feedback, and shared responsibility for both development and operational concerns.</p><p><strong>DevOps principles:</strong></p><ul><li>Automate everything — build, test, deploy, infrastructure provisioning.</li><li>Shift security left — test security in development, not after deployment.</li><li>Treat infrastructure as code — manage servers and networks with the same discipline as application code.</li><li>Monitor everything — real-time visibility into application and infrastructure performance.</li><li>Fail fast and recover faster — deploy frequently in small increments; automated rollback on failure.</li></ul><p><strong>CI/CD (Continuous Integration / Continuous Delivery/Deployment):</strong></p><p><strong>Continuous Integration (CI):</strong> Developers frequently merge code to a shared repository (multiple times daily). Each merge triggers an automated pipeline:</p><ol><li>Code checkout from Git.</li><li>Build application (compile, bundle).</li><li>Run unit tests and integration tests.</li><li>Static code analysis (SonarQube).</li><li>Security scanning (SAST).</li><li>Build and push Docker image to registry.</li></ol><p><strong>Continuous Delivery (CD):</strong> After CI succeeds, automatically deploy to staging environment. A human approves promotion to production.</p><p><strong>Continuous Deployment:</strong> Fully automated — every passing commit is automatically deployed to production without human approval. Requires very high test coverage and monitoring.</p><p><strong>CI/CD tools:</strong> GitHub Actions, GitLab CI/CD, Jenkins, Azure DevOps, CircleCI, ArgoCD (Kubernetes GitOps). Netflix, Amazon, Google deploy thousands of times per day using CI/CD pipelines.</p>`},
  {q:"What is Infrastructure as Code (IaC)?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p><strong>Infrastructure as Code (IaC)</strong> is the practice of managing and provisioning computing infrastructure (servers, networks, databases, load balancers, DNS) through machine-readable configuration files rather than through manual processes, clicking through UIs, or running ad-hoc scripts. Infrastructure is treated with the same rigor as application code — version controlled, peer-reviewed, tested, and automated.</p><p><strong>Why IaC is transformative:</strong></p><ul><li><strong>Reproducibility:</strong> Same code deploys identical infrastructure in dev, staging, and production — eliminating "it works in staging but not prod" inconsistencies caused by manual configuration drift.</li><li><strong>Speed:</strong> Provision a complete multi-tier AWS infrastructure (VPC, subnets, EC2, RDS, Load Balancer) in minutes via a single command rather than hours of manual console clicking.</li><li><strong>Version control:</strong> Infrastructure changes tracked in Git — who changed what, when, and why. Roll back a bad infrastructure change with git revert.</li><li><strong>Collaboration:</strong> Infrastructure changes go through code review (Pull Requests) — peer review catches mistakes before deployment.</li><li><strong>Documentation:</strong> The code IS the documentation — no separate outdated wiki pages describing infrastructure.</li></ul><p><strong>IaC approaches:</strong></p><ul><li><strong>Declarative:</strong> Describe the desired end state — tool figures out how to achieve it. Example: Terraform, AWS CloudFormation, Azure Resource Manager (ARM), Pulumi.</li><li><strong>Imperative:</strong> Describe the specific steps to execute. Example: Ansible, Chef, Puppet (configuration management).</li></ul><p><strong>Terraform example:</strong></p><div class="code">resource "aws_instance" "web" {
  ami           = "ami-0c55b159cbfafe1f0"
  instance_type = "t3.micro"
  tags = { Name = "WebServer" }
}
// terraform plan → preview changes
// terraform apply → provision AWS EC2 instance</div><p>IaC is foundational to DevOps and cloud-native operations, enabling infrastructure to scale and change at software velocity.</p>`},
 ]
},

 long:[
  {q:"Write a C# program demonstrating OOP concepts: class, constructor, inheritance, polymorphism, and interfaces.",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>This comprehensive program demonstrates all core OOP concepts in C# — encapsulation, inheritance, polymorphism, abstraction (via abstract class and interface), and method overriding. The example models a university system with students and staff.</p><div class="code">using System;
using System.Collections.Generic;

// ===== INTERFACES =====
public interface IDisplayable {
    void Display();
}

public interface IComparable&lt;T&gt; {
    int CompareTo(T other);
}

// ===== ABSTRACT BASE CLASS =====
public abstract class Person : IDisplayable {
    // Encapsulation -- private fields with public properties
    private string _name;
    private int _age;

    public string Name {
        get => _name;
        set {
            if (string.IsNullOrWhiteSpace(value))
                throw new ArgumentException("Name cannot be empty");
            _name = value.Trim();
        }
    }

    public int Age {
        get => _age;
        set {
            if (value < 0 || value > 150)
                throw new ArgumentOutOfRangeException("Invalid age");
            _age = value;
        }
    }

    public string Email { get; set; }

    // Constructor
    protected Person(string name, int age, string email) {
        Name = name; Age = age; Email = email;
    }

    // Abstract method -- MUST be overridden by subclasses
    public abstract string GetRole();

    // Virtual method -- CAN be overridden
    public virtual void Display() {
        Console.WriteLine($"Name: {Name} | Age: {Age} | Role: {GetRole()}");
    }

    // Regular method -- cannot be overridden
    public void SendEmail(string message) {
        Console.WriteLine($"Sending to {Email}: {message}");
    }

    public override string ToString() => $"{GetRole()}: {Name} (Age: {Age})";
}

// ===== INHERITANCE: Student extends Person =====
public class Student : Person, IComparable&lt;Student&gt; {
    public int StudentId { get; private set; }
    public double GPA { get; set; }
    public string Department { get; set; }
    private List&lt;string&gt; _enrolledCourses = new List&lt;string&gt;();

    // Constructor -- calls base class constructor with : base(...)
    public Student(int id, string name, int age, string email,
                   string dept, double gpa)
        : base(name, age, email) {
        StudentId = id;
        Department = dept;
        GPA = gpa;
    }

    // OVERRIDE abstract method
    public override string GetRole() => "Student";

    // OVERRIDE virtual method -- add student-specific info
    public override void Display() {
        base.Display();    // call parent's Display()
        Console.WriteLine($"  StudentID: {StudentId} | Department: {Department} | GPA: {GPA:F2}");
        if (_enrolledCourses.Count > 0)
            Console.WriteLine($"  Courses: {string.Join(", ", _enrolledCourses)}");
    }

    public void EnrollCourse(string course) {
        _enrolledCourses.Add(course);
        Console.WriteLine($"{Name} enrolled in {course}");
    }

    // IComparable implementation -- sort by GPA
    public int CompareTo(Student other) => other.GPA.CompareTo(this.GPA); // desc
}

// ===== INHERITANCE: FacultyMember extends Person =====
public class FacultyMember : Person {
    public string EmployeeId { get; private set; }
    public string Designation { get; set; }
    public int YearsExperience { get; set; }

    public FacultyMember(string empId, string name, int age, string email,
                         string designation, int exp)
        : base(name, age, email) {
        EmployeeId = empId;
        Designation = designation;
        YearsExperience = exp;
    }

    public override string GetRole() => "Faculty";

    public override void Display() {
        base.Display();
        Console.WriteLine($"  EmpID: {EmployeeId} | {Designation} | {YearsExperience} years exp");
    }
}

// ===== FURTHER INHERITANCE: PhDStudent extends Student =====
public class PhDStudent : Student {
    public string ResearchTopic { get; set; }
    public FacultyMember Supervisor { get; set; }

    public PhDStudent(int id, string name, int age, string email,
                      string dept, string topic, FacultyMember supervisor)
        : base(id, name, age, email, dept, 0.0) {
        ResearchTopic = topic;
        Supervisor = supervisor;
    }

    public override string GetRole() => "PhD Student";

    public override void Display() {
        base.Display();
        Console.WriteLine($"  Research: {ResearchTopic}");
        Console.WriteLine($"  Supervisor: {Supervisor.Name}");
    }
}

// ===== MAIN PROGRAM =====
class Program {
    static void Main() {
        Console.WriteLine("===== University OOP System =====\n");

        // Create objects
        var prof = new FacultyMember("FAC001", "Dr. Mehta", 45, "mehta@uni.edu",
                                     "Professor", 20);
        var s1 = new Student(101, "Alice", 21, "alice@uni.edu", "CS", 3.8);
        var s2 = new Student(102, "Bob",   20, "bob@uni.edu",   "IT", 3.2);
        var phd = new PhDStudent(201, "Carol", 26, "carol@uni.edu",
                                  "CS", "ML in Healthcare", prof);

        s1.EnrollCourse("Algorithms");
        s1.EnrollCourse("Cloud Computing");
        s2.EnrollCourse("Computer Networks");

        // Polymorphism -- Person[] holds different types
        Person[] people = { prof, s1, s2, phd };
        Console.WriteLine("\n----- All People (Polymorphic Display) -----");
        foreach (Person p in people) {
            p.Display();     // calls the ACTUAL object's overridden Display()
            Console.WriteLine();
        }

        // IDisplayable interface
        List&lt;IDisplayable&gt; displayables = new List&lt;IDisplayable&gt; { s1, phd, prof };
        Console.WriteLine("----- Via IDisplayable interface -----");
        foreach (IDisplayable d in displayables) d.Display();

        // Pattern matching
        Console.WriteLine("\n----- Pattern Matching -----");
        foreach (Person p in people) {
            string desc = p switch {
                PhDStudent phd2 => $"PhD student researching {phd2.ResearchTopic}",
                Student st => $"Undergrad in {st.Department} (GPA {st.GPA:F1})",
                FacultyMember f => $"Faculty: {f.Designation}",
                _ => "Unknown role"
            };
            Console.WriteLine($"{p.Name}: {desc}");
        }

        Console.WriteLine("\n----- Type checks -----");
        Console.WriteLine($"phd is Student: {phd is Student}");   // true -- inheritance
        Console.WriteLine($"phd is Person: {phd is Person}");     // true
        Console.WriteLine($"prof is Student: {prof is Student}"); // false
    }
}</div><p><strong>Key concepts demonstrated:</strong> Encapsulation (private fields + properties with validation), Inheritance (Student extends Person, PhDStudent extends Student — multi-level), Abstract class and method (Person.GetRole()), Virtual method and override (Display()), Interface implementation (IDisplayable, IComparable), Polymorphism (Person[] holds Faculty, Student, PhD — calling overridden methods), Pattern matching (switch expression on type), Base constructor chaining (: base(...)), Method hiding prevention (virtual/override vs new). This structure models real-world domain relationships and demonstrates clean OOP design.</p>`},
  {q:"Implement CRUD operations using ADO.NET with SQL Server. Include parameterised queries and transactions.",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>This program demonstrates complete CRUD (Create, Read, Update, Delete) operations using ADO.NET's connected model with parameterised queries to prevent SQL injection, and transaction management for multi-statement atomicity.</p><div class="code">using System;
using System.Collections.Generic;
using System.Data;
using System.Data.SqlClient;

public class Student {
    public int Id { get; set; }
    public string Name { get; set; }
    public string Department { get; set; }
    public double GPA { get; set; }
    public DateTime EnrollmentDate { get; set; }
}

public class StudentRepository {
    private readonly string _connectionString;

    public StudentRepository(string connectionString) {
        _connectionString = connectionString;
    }

    // ===== CREATE =====
    public int AddStudent(Student student) {
        using (SqlConnection conn = new SqlConnection(_connectionString))
        using (SqlCommand cmd = new SqlCommand(
            @"INSERT INTO Students (Name, Department, GPA, EnrollmentDate)
              VALUES (@Name, @Department, @GPA, @EnrollmentDate);
              SELECT SCOPE_IDENTITY();", conn)) {
            // PARAMETERISED QUERY -- prevents SQL injection
            cmd.Parameters.AddWithValue("@Name", student.Name);
            cmd.Parameters.AddWithValue("@Department", student.Department);
            cmd.Parameters.Add("@GPA", SqlDbType.Decimal).Value = student.GPA;
            cmd.Parameters.AddWithValue("@EnrollmentDate", student.EnrollmentDate);
            conn.Open();
            // ExecuteScalar -- returns first column of first row (new ID)
            int newId = Convert.ToInt32(cmd.ExecuteScalar());
            Console.WriteLine($"Inserted student with ID: {newId}");
            return newId;
        }
    }

    // ===== READ ALL =====
    public List&lt;Student&gt; GetAllStudents() {
        var students = new List&lt;Student&gt;();
        using (SqlConnection conn = new SqlConnection(_connectionString))
        using (SqlCommand cmd = new SqlCommand(
            "SELECT Id, Name, Department, GPA, EnrollmentDate FROM Students ORDER BY GPA DESC", conn)) {
            conn.Open();
            using (SqlDataReader reader = cmd.ExecuteReader()) {
                while (reader.Read()) {
                    students.Add(new Student {
                        Id = reader.GetInt32(0),
                        Name = reader.GetString(1),
                        Department = reader.GetString(2),
                        GPA = (double)reader.GetDecimal(3),
                        EnrollmentDate = reader.GetDateTime(4)
                    });
                }
            }
        }
        return students;
    }

    // ===== READ BY ID =====
    public Student GetStudentById(int id) {
        using (SqlConnection conn = new SqlConnection(_connectionString))
        using (SqlCommand cmd = new SqlCommand(
            "SELECT Id, Name, Department, GPA, EnrollmentDate FROM Students WHERE Id = @Id", conn)) {
            cmd.Parameters.AddWithValue("@Id", id);
            conn.Open();
            using (SqlDataReader reader = cmd.ExecuteReader()) {
                if (reader.Read()) {
                    return new Student {
                        Id = reader.GetInt32(0), Name = reader.GetString(1),
                        Department = reader.GetString(2), GPA = (double)reader.GetDecimal(3),
                        EnrollmentDate = reader.GetDateTime(4)
                    };
                }
            }
        }
        return null;
    }

    // ===== UPDATE =====
    public bool UpdateStudent(Student student) {
        using (SqlConnection conn = new SqlConnection(_connectionString))
        using (SqlCommand cmd = new SqlCommand(
            @"UPDATE Students SET Name=@Name, Department=@Department, GPA=@GPA
              WHERE Id=@Id", conn)) {
            cmd.Parameters.AddWithValue("@Name", student.Name);
            cmd.Parameters.AddWithValue("@Department", student.Department);
            cmd.Parameters.Add("@GPA", SqlDbType.Decimal).Value = student.GPA;
            cmd.Parameters.AddWithValue("@Id", student.Id);
            conn.Open();
            int rowsAffected = cmd.ExecuteNonQuery();
            Console.WriteLine($"Update: {rowsAffected} row(s) affected");
            return rowsAffected > 0;
        }
    }

    // ===== DELETE =====
    public bool DeleteStudent(int id) {
        using (SqlConnection conn = new SqlConnection(_connectionString))
        using (SqlCommand cmd = new SqlCommand(
            "DELETE FROM Students WHERE Id = @Id", conn)) {
            cmd.Parameters.AddWithValue("@Id", id);
            conn.Open();
            int rowsAffected = cmd.ExecuteNonQuery();
            return rowsAffected > 0;
        }
    }

    // ===== TRANSACTION -- Transfer GPA (atomic: both update or neither) =====
    public void TransferGPA(int fromId, int toId, double gpaAmount) {
        using (SqlConnection conn = new SqlConnection(_connectionString)) {
            conn.Open();
            SqlTransaction transaction = conn.BeginTransaction();
            try {
                SqlCommand deduct = new SqlCommand(
                    "UPDATE Students SET GPA = GPA - @Amount WHERE Id = @Id", conn, transaction);
                deduct.Parameters.AddWithValue("@Amount", gpaAmount);
                deduct.Parameters.AddWithValue("@Id", fromId);
                int rowsDeducted = deduct.ExecuteNonQuery();
                if (rowsDeducted == 0) throw new Exception($"Student {fromId} not found");

                SqlCommand add = new SqlCommand(
                    "UPDATE Students SET GPA = GPA + @Amount WHERE Id = @Id", conn, transaction);
                add.Parameters.AddWithValue("@Amount", gpaAmount);
                add.Parameters.AddWithValue("@Id", toId);
                int rowsAdded = add.ExecuteNonQuery();
                if (rowsAdded == 0) throw new Exception($"Student {toId} not found");

                transaction.Commit();  // both succeed: commit
                Console.WriteLine("Transaction committed successfully");
            } catch (Exception ex) {
                transaction.Rollback();  // either fails: rollback both
                Console.WriteLine($"Transaction rolled back: {ex.Message}");
                throw;
            }
        }
    }
}

// ===== MAIN PROGRAM =====
class Program {
    static void Main() {
        string cs = @"Server=localhost\SQLEXPRESS;Database=UniversityDB;Integrated Security=true;";
        var repo = new StudentRepository(cs);

        // CREATE
        int id = repo.AddStudent(new Student {
            Name = "Alice", Department = "CS", GPA = 3.8,
            EnrollmentDate = DateTime.Now
        });

        // READ
        var students = repo.GetAllStudents();
        foreach (var s in students)
            Console.WriteLine($"{s.Id}: {s.Name} | {s.Department} | GPA: {s.GPA}");

        // UPDATE
        var student = repo.GetStudentById(id);
        if (student != null) { student.GPA = 3.9; repo.UpdateStudent(student); }

        // DELETE
        repo.DeleteStudent(id);
        Console.WriteLine("Student deleted");
    }
}</div><p><strong>Security notes:</strong> Always use <strong>parameterised queries</strong> — never concatenate user input into SQL strings (SQL injection risk). Use <code>using</code> statements on all SqlConnection/Command/DataReader objects to ensure disposal. Transactions guarantee atomicity — all-or-nothing for multi-statement operations. Store connection strings in configuration (appsettings.json) with environment-specific values, not hardcoded. ExecuteNonQuery returns rows affected — check to verify the operation actually succeeded. SqlDbType.Decimal with explicit type prevents data type mismatch for decimal columns.</p>`},

using System.Windows.Forms;
