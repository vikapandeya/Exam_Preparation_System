 long:[
  {q:"Trace the evolution and history of cloud computing. What major milestones made modern cloud possible?",u:"Units 01–02",
   a:`<span class="utag">Units 01–02</span><p>Cloud computing evolved over decades through a series of technological advances. In the 1960s, J.C.R. Licklider envisioned the 'Intergalactic Computer Network'; John McCarthy proposed computing as a public utility. The 1970s–80s brought time-sharing mainframes and the client-server model.</p><p>The 1990s internet commercialization was transformative — Salesforce launched the first true SaaS in 1999. Amazon launched AWS in 2002, followed by S3 and EC2 in 2006 (birth of IaaS). Google launched Google Apps in 2006. Microsoft Azure launched in 2010. NIST formally defined cloud computing in 2011.</p><p>Key enabling technologies: Virtualisation (efficient resource sharing), Broadband internet (practical remote computing), SOA (modular services), Containerisation (Docker 2013), Kubernetes (2014), Serverless/FaaS (AWS Lambda 2014).</p>`},
  {q:"Compare IaaS, PaaS, and SaaS. Give examples and use cases for each cloud service model.",u:"Units 02–03",
   a:`<span class="utag">Units 02–03</span><p><strong>IaaS (Infrastructure as a Service):</strong> Provides virtualised compute, storage, networking. User manages OS upward. Examples: AWS EC2, Azure VMs, Google Compute Engine. Use case: Lift-and-shift migrations, custom server environments.</p><p><strong>PaaS (Platform as a Service):</strong> Provider manages everything up to runtime. User manages only code and data. Examples: Google App Engine, Heroku, Azure App Service. Use case: Developers wanting to focus on code without managing infrastructure.</p><p><strong>SaaS (Software as a Service):</strong> Fully managed application accessed via browser. Examples: Gmail, Salesforce, Microsoft 365, Zoom. Use case: Businesses needing software functionality without IT management.</p><p>Control decreases IaaS→PaaS→SaaS. Ease of use increases IaaS→PaaS→SaaS. All three can be used simultaneously in an enterprise.</p>`},
  {q:"Discuss the four cloud deployment models. What factors influence the choice?",u:"Unit 03",
   a:`<span class="utag">Unit 03</span><p><strong>Public Cloud:</strong> Shared infrastructure from third-party provider over internet. Low cost, high scale, no maintenance. Examples: AWS, Azure, GCP. Best for: variable workloads, startups.</p><p><strong>Private Cloud:</strong> Dedicated to one organisation. Full control, better security, regulatory compliance. Higher cost. Best for: banks, healthcare, government.</p><p><strong>Hybrid Cloud:</strong> Mix of public and private, interconnected. Flexibility — keep sensitive data private, burst to public cloud for peak demand. Complex management. Best for: regulated industries needing scalability.</p><p><strong>Community Cloud:</strong> Shared among organisations with common concerns (government agencies). Cost sharing with privacy. Governance challenges.</p><p>Choice factors: security/compliance requirements, budget, scalability needs, existing infrastructure, data sovereignty laws.</p>`},
  {q:"Explain cloud computing architecture in detail. What is the role of SLAs?",u:"Unit 04",
   a:`<span class="utag">Unit 04</span><p>Cloud architecture: Frontend (client browsers/apps) ↔ Network (internet) ↔ Backend (servers, storage, VMs). Middleware enables application-to-infrastructure communication.</p><p>Key architectural concepts: SOA — services as independent modules via APIs. Cloud Abstraction — physical complexity hidden behind simple interfaces. Cloud Federation — integrating multiple cloud providers. Cloud Mashup — combining services from multiple sources. Cloud Lifecycle — provision → deploy → monitor → optimise → deprovision.</p><p><strong>SLA (Service Level Agreement):</strong> Contract defining guaranteed service level. Elements: Uptime % (99.9% = 8.76h downtime/year), performance metrics, security commitments, support response times, remedies for violations (service credits). Critical for accountability and customer confidence.</p>`},
  {q:"Explain virtualisation in cloud computing. Describe implementation levels and hypervisor architecture.",u:"Unit 05",
   a:`<span class="utag">Unit 05</span><p>Virtualisation creates software-based versions of physical resources, enabling multiple VMs on one server. It is the core technology enabling cloud multi-tenancy.</p><p>Implementation levels: Hardware/Full (VMware ESXi, Hyper-V — complete hardware emulation), OS-level Containers (Docker — share host kernel), Application (JVM), Desktop VDI (Citrix), Network (SDN, VLANs).</p><p>Hypervisor (VMM): Type 1 bare-metal (runs on hardware — ESXi, Xen, Hyper-V — better performance). Type 2 hosted (runs on OS — VirtualBox, VMware Workstation — easier setup). CPU virtualisation: intercept privileged instructions (binary translation or hypercalls). Memory virtualisation: ballooning, page sharing. Virtual clustering: group VMs as single system for HA/load balancing.</p>`},
  {q:"Explain cloud security: IAM, encryption, VPNs, and cloud firewalls.",u:"Unit 09",
   a:`<span class="utag">Unit 09</span><p><strong>IAM:</strong> Controls who accesses what. Authentication (MFA, SSO, certificates), Authorization (RBAC, least privilege), Auditing (access logs). AWS IAM, Azure AD.</p><p><strong>Encryption:</strong> At rest: AES-256 (S3 SSE, Azure Storage Encryption). In transit: TLS 1.3. Key Management Services (KMS) manage encryption keys. Customer-managed keys give full control even from provider.</p><p><strong>VPN:</strong> Encrypted tunnel from on-premises to cloud. Site-to-site (permanent, IPsec) for office-to-cloud. Client-to-site for remote users. AWS VPN, Azure VPN Gateway.</p><p><strong>Cloud Firewalls:</strong> Network ACLs (stateless, subnet level), Security Groups (stateful, instance level), WAF (application layer — blocks SQLi, XSS). Software-defined, auto-scaling. Defence-in-depth: each layer compensates for others' weaknesses.</p>`},
  {q:"Explain cloud native architecture: microservices, containers, Kubernetes, service mesh, serverless.",u:"Unit 11",
   a:`<span class="utag">Unit 11</span><p><strong>Microservices:</strong> Application as small independent services, each with single responsibility, communicating via APIs. Independent deployment/scaling. Netflix: 500+ microservices.</p><p><strong>Containerisation:</strong> Package app + dependencies in Docker image. Lighter than VMs (shared kernel), starts in seconds. Docker Hub stores images. Solves "works on my machine" problem.</p><p><strong>Kubernetes (K8s):</strong> Orchestrates containers at scale. Auto-scheduling, self-healing, horizontal auto-scaling, rolling updates, service discovery. Managed: EKS, AKS, GKE.</p><p><strong>Service Mesh:</strong> Manages service-to-service communication. mTLS encryption, traffic management, circuit breaking, distributed tracing. Examples: Istio, Linkerd.</p><p><strong>Serverless (FaaS):</strong> AWS Lambda, Azure Functions. Event-triggered, no server management, scales to zero, billed per execution. Best for event-driven workloads.</p>`},
  {q:"Explain cloud compliance: data sovereignty, privacy laws, auditing, and compliance automation.",u:"Unit 10",
   a:`<span class="utag">Unit 10</span><p><strong>Cloud Compliance:</strong> Meeting legal/regulatory requirements. Key certifications: ISO 27001, SOC 2, GDPR, HIPAA, PCI DSS.</p><p><strong>Data Sovereignty:</strong> Data subject to laws of country where stored. GDPR: EU data stays in EU. Russia/China have data localisation laws. Providers offer regional data residency guarantees.</p><p><strong>Data Privacy:</strong> GDPR principles: purpose limitation, data minimisation, consent, right to erasure. Privacy by design. DPAs between customers and cloud providers.</p><p><strong>Auditing:</strong> AWS CloudTrail, Azure Activity Log record all API calls. SIEM systems aggregate and alert on suspicious patterns. Third-party audits verify controls.</p><p><strong>Compliance Automation:</strong> AWS Config, Azure Policy continuously check resources against rules. IaC templates include compliance policies. Real-time dashboards show compliance status.</p>`},
  {q:"Explain strategic cloud adoption and business transformation. How is Cloud ROI calculated?",u:"Unit 12",
   a:`<span class="utag">Unit 12</span><p>Strategic cloud adoption means deliberately planning cloud use to achieve business goals, not just 'lifting and shifting' workloads.</p><p>Migration strategies (6 Rs): Rehost (lift-and-shift), Replatform (minor optimisations), Refactor/Re-architect (cloud-native redesign), Repurchase (switch to SaaS), Retire (decommission), Retain (keep on-premises).</p><p><strong>Business transformation benefits:</strong> Faster time to market, elastic scaling, global reach, AI/ML service access, reduced operational burden, pay-per-use model.</p><p><strong>Cloud ROI = (Benefits - Costs) / Costs × 100%</strong></p><p>Benefits: hardware capex savings, reduced power/cooling costs, lower IT staff, faster innovation. Costs: migration, monthly service fees, training, data egress charges. AWS TCO Calculator and Azure Pricing Calculator help estimate before migration.</p>`},
  {q:"Explain cloud development lifecycle. How do AWS, Google App Engine, and IBM Blue Cloud differ?",u:"Units 07–08",
   a:`<span class="utag">Units 07–08</span><p>Cloud development lifecycle: Plan (requirements, provider choice, cost estimate) → Design (architecture, APIs, scalability) → Develop (cloud SDKs, cloud-native patterns) → Test (load testing, chaos engineering, security testing) → Deploy (CI/CD, blue-green, canary) → Monitor (metrics, cost, auto-scale).</p><p><strong>AWS (Amazon EC2):</strong> IaaS — full control over virtual machines. Developer provisions EC2 instances, configures OS, installs software. Uses S3, RDS, ELB, Lambda. Maximum flexibility but more operational responsibility.</p><p><strong>Google App Engine:</strong> PaaS — developer uploads code, Google manages everything. Auto-scales including to zero. Supports Python, Java, Node.js, Go. Faster development, less control.</p><p><strong>IBM Blue Cloud:</strong> Enterprise-focused platform with Watson AI integration, strong compliance certifications, and hybrid cloud support via IBM Cloud Pak. Targets large enterprises with existing IBM infrastructure.</p>`}
 ],
 short:[
  {q:"What is cloud computing? What are the 5 NIST characteristics?",u:"Unit 01",a:"Cloud computing: on-demand delivery of computing services over the internet. Five NIST characteristics: (1) On-demand self-service, (2) Broad network access, (3) Resource pooling (multi-tenancy), (4) Rapid elasticity (scales up/down instantly), (5) Measured service (metered, pay-per-use)."},
  {q:"What is IaaS? Give two examples.",u:"Unit 02",a:"IaaS provides virtualised infrastructure (VMs, storage, networking) over the internet. User manages OS and above. Provider manages hardware and hypervisor. Examples: AWS EC2 (virtual servers), Azure Blob Storage (object storage), Google Compute Engine (VMs)."},
  {q:"What is PaaS? When would you choose it?",u:"Unit 03",a:"PaaS provides a managed development/deployment platform. Provider manages OS, middleware, and runtime. User manages only code and data. Choose PaaS when: you want to focus purely on application development, don't want infrastructure management overhead. Examples: Google App Engine, Heroku, Azure App Service."},
  {q:"What is SaaS? Give two examples.",u:"Unit 02",a:"SaaS delivers complete managed software applications over the internet. Provider manages everything. Examples: Gmail (email), Salesforce (CRM), Microsoft 365 (productivity), Zoom (video calls), Dropbox (storage). User just logs in — no installation, no server management, subscription pricing."},
  {q:"What is Public vs Private cloud?",u:"Unit 03",a:"Public cloud: shared infrastructure from third-party provider (AWS, Azure, GCP) — low cost, high scale, no maintenance. Private cloud: dedicated to one organisation — full control, better security, higher cost, harder to scale. Used by banks, hospitals, governments with strict compliance needs."},
  {q:"What is a hybrid cloud? Give a use case.",u:"Unit 03",a:"Hybrid cloud combines private and public clouds, allowing data and apps to move between them. Use case: A bank keeps customer financial records on private cloud for regulatory compliance while using public cloud AWS for their customer-facing website and peak-season traffic bursting."},
  {q:"What is an SLA in cloud computing?",u:"Unit 04",a:"SLA (Service Level Agreement) is a contract specifying guaranteed service levels. Key elements: uptime % (99.9% = 8.76 hours downtime/year), performance metrics, security commitments, support response times, remedies (service credits) for violations. Critical for business continuity planning."},
  {q:"What is virtualisation? What is a hypervisor?",u:"Unit 05",a:"Virtualisation creates software-based (virtual) versions of hardware, enabling multiple VMs on one physical server. A hypervisor (VMM) manages VMs and allocates hardware resources. Type 1: runs on bare metal (VMware ESXi, Hyper-V — production). Type 2: runs on host OS (VirtualBox — development/testing)."},
  {q:"What is IAM in cloud computing?",u:"Unit 09",a:"IAM (Identity and Access Management) controls who can access cloud resources. Components: Authentication (MFA, SSO — verify identity), Authorization (RBAC, least privilege — define permissions), Auditing (log all access events). AWS IAM lets you create granular policies defining exactly what each user/service can do."},
  {q:"What is data sovereignty in cloud?",u:"Unit 10",a:"Data sovereignty means data is subject to laws of the country where it's stored. GDPR requires EU citizen data stay within EU. Russia requires local storage of Russian citizens' data. Cloud providers offer data residency options — choosing specific regions (e.g., AWS eu-central-1 Frankfurt) to keep data within jurisdiction."},
  {q:"What is containerisation? How does Docker work?",u:"Unit 11",a:"Containerisation packages an app and all its dependencies into a portable container image that runs consistently anywhere. Docker: write Dockerfile → build image → push to registry (Docker Hub) → run as container. Containers share host OS kernel (no guest OS), start in seconds, use less memory than VMs."},
  {q:"What is Kubernetes (K8s)?",u:"Unit 11",a:"Kubernetes is an open-source container orchestration platform automating deployment, scaling, and management of containers. Features: auto-scheduling, self-healing (restarts failed containers), horizontal scaling, rolling updates (zero downtime), service discovery. Managed options: AWS EKS, Azure AKS, Google GKE."},
  {q:"What is serverless computing?",u:"Unit 11",a:"Serverless (FaaS) runs code in response to events without managing servers. AWS Lambda, Azure Functions, Google Cloud Functions. Billed per execution (pay only when code runs). Auto-scales from zero to thousands. Limitations: max execution time (~15 min), cold start latency. Best for: APIs, event processing, scheduled tasks."},
  {q:"What is cloud compliance? Name 3 standards.",u:"Unit 10",a:"Cloud compliance ensures cloud services meet legal and regulatory requirements. Standards: ISO 27001 (information security management), SOC 2 Type II (security, availability, confidentiality), GDPR (EU data protection), HIPAA (US healthcare data), PCI DSS (payment card data). Cloud providers maintain certifications and share audit reports."},
  {q:"What is a microservices architecture?",u:"Unit 11",a:"Microservices breaks an application into small, independent services each handling one business function, communicating via APIs. Benefits: independent deployment, independent scaling, fault isolation, technology flexibility. Challenges: distributed system complexity, inter-service communication, data consistency. Netflix, Amazon, Uber use microservices."},
  {q:"What is cloud federation?",u:"Unit 04",a:"Cloud federation integrates services from multiple cloud providers, enabling cross-provider resource sharing. Benefits: avoids vendor lock-in, enables best-of-breed service selection (AWS for ML, GCP for analytics), improves disaster recovery (fail over to different provider). Standards like OpenStack and tools like Terraform support federation."},
  {q:"What is a service mesh?",u:"Unit 11",a:"A service mesh manages service-to-service communication in microservices. Implements sidecar proxies alongside each service. Provides: mTLS encryption, load balancing, circuit breaking, distributed tracing, traffic management. Examples: Istio, Linkerd. Removes communication cross-cutting concerns from application code."},
  {q:"What is cloud ROI?",u:"Unit 12",a:"Cloud ROI = (Benefits - Costs) / Costs × 100%. Benefits: hardware savings, reduced power/cooling/staff, faster deployment, scalability. Costs: migration, monthly service fees, training, egress charges. AWS TCO Calculator, Azure Pricing Calculator estimate savings before migration."},
  {q:"What is Cloud Mashup?",u:"Unit 04",a:"Cloud mashup combines data or services from multiple cloud sources to create a new application. Example: combining Google Maps API + weather API + a custom database to create a location-aware weather app. Enabled by RESTful APIs that make cloud services composable. Core to modern app development."},
  {q:"What is VM live migration?",u:"Unit 06",a:"Live migration moves a running VM from one physical host to another with near-zero downtime. Process: copy memory pages to destination while VM runs → brief pause → copy remaining pages → VM resumes on new host. Used for zero-downtime maintenance, load balancing, disaster recovery. VMware vMotion is the industry standard."},
 ]

 long:[
  {q:"Write a C# program demonstrating OOP concepts: class, constructor, inheritance, method overriding, and interface.",u:".Net Lab",
   a:`<span class="utag">.Net Lab — Exercise</span><div class="code">// Interface
interface IAnimal {
    void MakeSound();
}

// Base class
class Animal : IAnimal {
    public string Name { get; set; }
    public Animal(string name) { Name = name; }

    public virtual void MakeSound() {
        Console.WriteLine($"{Name} makes a sound.");
    }
    public virtual void Display() {
        Console.WriteLine($"Animal: {Name}");
    }
}

// Derived class — inherits Animal, overrides methods
class Dog : Animal {
    public string Breed { get; set; }

    public Dog(string name, string breed) : base(name) {
        Breed = breed;
    }

    public override void MakeSound() {  // Method Overriding
        Console.WriteLine($"{Name} says: Woof!");
    }

    public override void Display() {
        base.Display();  // calling parent method
        Console.WriteLine($"Breed: {Breed}");
    }
}

class Program {
    static void Main() {
        Animal a = new Animal("Generic Animal");
        a.MakeSound();   // Animal makes a sound.

        Dog d = new Dog("Buddy", "Labrador");
        d.MakeSound();   // Buddy says: Woof!
        d.Display();     // Animal: Buddy, Breed: Labrador

        // Polymorphism
        IAnimal animal = new Dog("Rex", "German Shepherd");
        animal.MakeSound();  // Rex says: Woof!

        // Array of base class type
        Animal[] animals = { new Animal("Cat"), new Dog("Max","Poodle") };
        foreach(var ani in animals) ani.MakeSound();
    }
}</div>`},
  {q:"Write a C# program using ADO.NET to connect to SQL Server and perform CRUD operations.",u:".Net Lab",
   a:`<span class="utag">.Net Lab — Exercise</span><div class="code">using System.Data.SqlClient;

class AdoNetCRUD {
    static string cs = "Server=localhost;Database=TestDB;Integrated Security=True;";

    // CREATE
    static void Insert(string name, int age) {
        using (var conn = new SqlConnection(cs)) {
            conn.Open();
            var cmd = new SqlCommand(
                "INSERT INTO Students(Name,Age) VALUES(@n,@a)", conn);
            cmd.Parameters.AddWithValue("@n", name);
            cmd.Parameters.AddWithValue("@a", age);
            int rows = cmd.ExecuteNonQuery();
            Console.WriteLine($"{rows} row(s) inserted.");
        }
    }

    // READ
    static void ReadAll() {
        using (var conn = new SqlConnection(cs)) {
            conn.Open();
            var cmd = new SqlCommand("SELECT * FROM Students", conn);
            var reader = cmd.ExecuteReader();
            while (reader.Read())
                Console.WriteLine($"{reader["Id"]}: {reader["Name"]}, Age {reader["Age"]}");
        }
    }

    // UPDATE
    static void Update(int id, string newName) {
        using (var conn = new SqlConnection(cs)) {
            conn.Open();
            var cmd = new SqlCommand(
                "UPDATE Students SET Name=@n WHERE Id=@id", conn);
            cmd.Parameters.AddWithValue("@n", newName);
            cmd.Parameters.AddWithValue("@id", id);
            cmd.ExecuteNonQuery();
        }
    }

    // DELETE
    static void Delete(int id) {
        using (var conn = new SqlConnection(cs)) {
            conn.Open();
            var cmd = new SqlCommand("DELETE FROM Students WHERE Id=@id", conn);
            cmd.Parameters.AddWithValue("@id", id);
            cmd.ExecuteNonQuery();
        }
    }

    static void Main() {
        Insert("Alice", 21);
        Insert("Bob", 22);
        ReadAll();
        Update(1, "Alice Smith");
        Delete(2);
        ReadAll();
    }
}</div>`},
  {q:"Write a C# program demonstrating exception handling: try-catch-finally, user-defined exception, and exception filter.",u:".Net Lab",
   a:`<span class="utag">.Net Lab — Exercise</span><div class="code">// User-Defined Exception
class InvalidAgeException : Exception {
    public int Age { get; }
    public InvalidAgeException(int age)
        : base($"Invalid age: {age}. Age must be 0-150.") {
        Age = age;
    }
}

class ExceptionDemo {
    static void ValidateAge(int age) {
        if (age < 0 || age > 150)
            throw new InvalidAgeException(age);
        Console.WriteLine($"Valid age: {age}");
    }

    static void DivideNumbers(int a, int b) {
        if (b == 0) throw new DivideByZeroException("Cannot divide by zero!");
        Console.WriteLine($"{a} / {b} = {a / b}");
    }

    static void Main() {
        // Basic try-catch-finally
        try {
            DivideNumbers(10, 2);   // OK
            DivideNumbers(10, 0);   // throws
        }
        catch (DivideByZeroException ex) {
            Console.WriteLine($"Math Error: {ex.Message}");
        }
        finally {
            Console.WriteLine("finally block always runs.");
        }

        // User-defined exception
        try {
            ValidateAge(25);   // OK
            ValidateAge(-5);   // throws InvalidAgeException
        }
        catch (InvalidAgeException ex) {
            Console.WriteLine($"Age Error: {ex.Message}, Got: {ex.Age}");
        }

        // Exception filter (C# 6.0+)
        try {
            throw new Exception("Connection timeout occurred");
        }
        catch (Exception ex) when (ex.Message.Contains("timeout")) {
            Console.WriteLine($"Timeout caught: {ex.Message}");
        }
        catch (Exception ex) {
            Console.WriteLine($"Other error: {ex.Message}");
        }
    }
}</div>`},
  {q:"Write a C# program demonstrating multithreading: Thread class, lock synchronization, and async/await.",u:".Net Lab",
   a:`<span class="utag">.Net Lab — Exercise</span><div class="code">using System;
using System.Threading;
using System.Threading.Tasks;

class ThreadDemo {
    static int counter = 0;
    static readonly object lockObj = new object();

    // Thread method
    static void CountUp(string threadName) {
        for (int i = 0; i < 5; i++) {
            lock (lockObj) {  // Thread synchronization
                counter++;
                Console.WriteLine($"{threadName}: counter = {counter}");
            }
            Thread.Sleep(100);
        }
    }

    // Async method
    static async Task&lt;string&gt; FetchDataAsync(string url) {
        Console.WriteLine($"Fetching {url}...");
        await Task.Delay(1000);  // Simulates async I/O
        return $"Data from {url}";
    }

    static async Task Main() {
        // Thread class usage
        Thread t1 = new Thread(() => CountUp("Thread-1"));
        Thread t2 = new Thread(() => CountUp("Thread-2"));
        t1.Start();
        t2.Start();
        t1.Join();
        t2.Join();
        Console.WriteLine($"Final counter: {counter}");

        // Task Parallel Library
        await Task.Run(() => Console.WriteLine("TPL Task running"));

        // Async/Await
        string result = await FetchDataAsync("https://api.example.com");
        Console.WriteLine(result);

        // Multiple concurrent tasks
        var tasks = new[] {
            FetchDataAsync("site1.com"),
            FetchDataAsync("site2.com"),
            FetchDataAsync("site3.com")
        };
        string[] results = await Task.WhenAll(tasks);
        foreach (var r in results) Console.WriteLine(r);
    }
}</div>`},

  {q:"Write a Python program implementing a TCP client-server chat application.",u:"CN Lab — Set II",
   a:`<span class="utag">CN Lab — Set II</span><p>TCP provides reliable, ordered, connection-oriented communication.</p><p><strong>Server (server.py):</strong></p><div class="code">import socket
import threading

def handle_client(conn, addr):
    print(f"Connected: {addr}")
    while True:
        data = conn.recv(1024)
        if not data or data.decode() == 'quit':
            print(f"Client {addr} disconnected.")
            break
        print(f"[{addr}] {data.decode()}")
        reply = input("Server reply: ")
        conn.send(reply.encode())
    conn.close()

server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
server.bind(('localhost', 9999))
server.listen(5)
print("Server listening on port 9999...")

while True:
    conn, addr = server.accept()
    thread = threading.Thread(target=handle_client, args=(conn, addr))
    thread.start()</div><p><strong>Client (client.py):</strong></p><div class="code">import socket

client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
client.connect(('localhost', 9999))
print("Connected to server. Type 'quit' to exit.")

while True:
    msg = input("You: ")
    client.send(msg.encode())
    if msg == 'quit':
        break
    reply = client.recv(1024)
    print(f"Server: {reply.decode()}")

client.close()</div>`},
  {q:"Write a Python program implementing UDP client-server communication.",u:"CN Lab — Set III",
   a:`<span class="utag">CN Lab — Set III</span><p>UDP is connectionless — no handshake, faster but unreliable. Uses sendto()/recvfrom().</p><p><strong>Server (udp_server.py):</strong></p><div class="code">import socket

server = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
server.bind(('localhost', 9998))
print("UDP Server listening on port 9998...")

while True:
    data, addr = server.recvfrom(1024)
    print(f"Received from {addr}: {data.decode()}")

    response = f"Echo: {data.decode().upper()}"
    server.sendto(response.encode(), addr)

    if data.decode() == 'quit':
        print("Server shutting down.")
        break

server.close()</div><p><strong>Client (udp_client.py):</strong></p><div class="code">import socket

client = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
server_addr = ('localhost', 9998)
client.settimeout(5)  # 5 second timeout

print("UDP Client ready. Type 'quit' to exit.")
while True:
    msg = input("Message: ")
    client.sendto(msg.encode(), server_addr)

    try:
        data, _ = client.recvfrom(1024)
        print(f"Server: {data.decode()}")
    except socket.timeout:
        print("No response (timeout).")

    if msg == 'quit':
        break

client.close()</div>`},
  {q:"Write a Python socket program to create a directory and text file on the server from the client.",u:"CN Lab — Set I",
   a:`<span class="utag">CN Lab — Set I</span><p>This program sends a command from client to server; server creates a directory and file, then moves the file to another location.</p><p><strong>Server (file_server.py):</strong></p><div class="code">import socket, os, shutil

def handle_command(cmd):
    parts = cmd.split('|')
    action = parts[0]

    if action == 'MKDIR':
        dir_name = parts[1]
        os.makedirs(dir_name, exist_ok=True)
        return f"Directory '{dir_name}' created."

    elif action == 'CREATEFILE':
        dir_name, file_name, content = parts[1], parts[2], parts[3]
        file_path = os.path.join(dir_name, file_name)
        with open(file_path, 'w') as f:
            f.write(content)
        return f"File '{file_path}' created."

    elif action == 'MOVEFILE':
        src, dst_dir = parts[1], parts[2]
        os.makedirs(dst_dir, exist_ok=True)
        dst = os.path.join(dst_dir, os.path.basename(src))
        shutil.move(src, dst)
        return f"File moved to '{dst}'."

// ── Build UI ──────────────────────────────────────────────
function toggle(btn){
  const item=btn.closest('.qi'),ans=item.querySelector('.qa'),open=item.classList.contains('open');
  item.classList.toggle('open',!open);
  ans.style.maxHeight=!open?ans.scrollHeight+'px':'0';
}

function switchType(tab,btn,pid){
  btn.closest('.type-tabs').querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`#${pid} .type-panel`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`${pid}-${tab}`).classList.add('active');
}

function switchSubj(sid,btn){
  document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.subj-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('sp-'+sid).classList.add('active');
}

function buildQList(qs,prefix){
  return qs.map((q,i)=>`
  <div class="qi">
    <button class="qq" onclick="toggle(this)">
      <span class="qn">${prefix}${i+1}</span>
      <span class="qt">${q.q}</span>
      <span class="qtg">+</span>
    </button>
    <div class="qa"><div class="qai">${typeof q.a==='string'&&!q.a.includes('<')
      ?`<span class="utag">${q.u||''}</span><p>${q.a}</p>`
      :q.a}</div></div>
  </div>`).join('');
}

function buildSubject(sid,data){
  const pid='sp-'+sid;
  const longCount=data.long?data.long.length:0;
  const shortCount=data.short?data.short.length:0;
  return `<div class="subj-panel" id="${pid}">
    <div class="type-tabs">
      <button class="type-btn active" onclick="switchType('long',this,'${pid}')">Long Answer (${longCount})</button>
      <button class="type-btn" onclick="switchType('short',this,'${pid}')">Short Answer (${shortCount})</button>
    </div>
    <div class="type-panel active" id="${pid}-long">
      <p class="intro">Detailed answers for 8–10 mark questions.</p>
      <div>${data.long?buildQList(data.long,'L'):'<p style="color:var(--mu);font-family:system-ui,sans-serif;padding:20px">Content loading…</p>'}</div>
    </div>
    <div class="type-panel" id="${pid}-short">
      <p class="intro">Concise answers for 2–4 mark questions.</p>
      <div>${data.short?buildQList(data.short,'S'):'<p style="color:var(--mu);font-family:system-ui,sans-serif;padding:20px">Content loading…</p>'}</div>
    </div>
  </div>`;
}

// Build subject tabs
const tabsEl=document.getElementById('sbjTabs');
SUBJECTS.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='subj-btn'+(i===0?' active':'');

});

// Build panels for available subjects
const panelsEl=document.getElementById('panels');
SUBJECTS.forEach(s=>{

  panelsEl.innerHTML+=buildSubject(s.id,d);
