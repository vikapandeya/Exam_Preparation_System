  type: LoadBalancer            # creates cloud load balancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: {type: Utilization, averageUtilization: 70}</div><p><strong>Cloud-Native Development:</strong> An approach to building and running applications that fully exploits cloud computing advantages — scalability, elasticity, resilience, and speed. The Cloud Native Computing Foundation (CNCF) defines cloud-native as: containers, microservices, declarative APIs, and immutable infrastructure.</p><p><strong>Key Cloud-Native Principles:</strong></p><ul><li><strong>Microservices:</strong> Application decomposed into small, independent services — each owning its own data, deployable independently. Enables team autonomy, independent scaling, technology heterogeneity.</li><li><strong>12-Factor App:</strong> Heroku's methodology for cloud-native apps — codebase in version control, dependencies explicitly declared, config in environment variables, stateless processes, port binding, concurrency, disposability (fast start/graceful shutdown), dev/prod parity, logs as streams, admin as one-off processes.</li><li><strong>Immutable Infrastructure:</strong> Never modify running servers — replace them. Container images are immutable; new deployment = new container. Eliminates configuration drift.</li><li><strong>GitOps/DevOps:</strong> Everything as code (infrastructure, config, pipelines) in Git. CI/CD pipelines automatically build, test, and deploy on each commit. ArgoCD, Flux for GitOps on Kubernetes.</li><li><strong>Observability:</strong> Metrics (Prometheus/Grafana), distributed tracing (Jaeger, Zipkin), structured logging (ELK/Loki) — understanding complex distributed systems.</li></ul>`},
  {q:"What is serverless computing? Explain FaaS, BaaS with AWS Lambda example.",u:"Unit 07",a:`<span class="utag">Unit 07</span><p><strong>Serverless computing</strong> is a cloud execution model where the cloud provider dynamically allocates machine resources to run code — handling all server provisioning, scaling, patching, and capacity management. Developers only write and deploy function code; infrastructure is completely abstracted. "Serverless" doesn't mean no servers — it means you don't manage them.</p><p><strong>FaaS — Function as a Service:</strong> The core of serverless. Code is organised as individual functions triggered by events (HTTP requests, file uploads, database changes, scheduled timers, message queue events). Functions are stateless, ephemeral — they start, execute, and terminate. You pay only for execution time (billed per 100ms) and number of invocations — not for idle time.</p><ul><li><strong>AWS Lambda:</strong> Supports Node.js, Python, Java, Go, C#, Ruby, and custom runtimes. Max execution time: 15 minutes. Memory: 128 MB to 10 GB. Free tier: 1 million requests/month + 400,000 GB-seconds compute/month.</li><li><strong>Competitors:</strong> Google Cloud Functions, Azure Functions, Cloudflare Workers (edge serverless).</li></ul><div class="code"># AWS Lambda function example (Python)
import json
import boto3
from datetime import datetime

def lambda_handler(event, context):
    # event = trigger data (HTTP request body, S3 event, etc.)
    # context = Lambda runtime metadata

    # Example: REST API triggered by API Gateway
    if event.get('httpMethod') == 'POST':
        body = json.loads(event.get('body', '{}'))
        student_name = body.get('name')
        gpa = body.get('gpa')

        # Write to DynamoDB (serverless NoSQL database)
        dynamodb = boto3.resource('dynamodb')
        table = dynamodb.Table('Students')
        table.put_item(Item={
            'student_id': context.aws_request_id,
            'name': student_name,
            'gpa': gpa,
            'enrolled_at': datetime.utcnow().isoformat()
        })

        # Send notification via SNS
        sns = boto3.client('sns')
        sns.publish(
            TopicArn='arn:aws:sns:us-east-1:123456789:StudentAlerts',
            Message=f'New student enrolled: {student_name}'
        )

        return {
            'statusCode': 201,
            'headers': {'Content-Type': 'application/json'},
            'body': json.dumps({'message': 'Student enrolled', 'id': context.aws_request_id})
        }

    return {'statusCode': 400, 'body': json.dumps({'error': 'Method not supported'})}

# Deployment: sam deploy (AWS SAM) or Serverless Framework
# Trigger: AWS API Gateway, S3 events, DynamoDB streams, CloudWatch Events (scheduled)
# Lambda is stateless -- state stored in DynamoDB, S3, ElastiCache</div><p><strong>Serverless Event Patterns:</strong></p><ul><li>HTTP API: API Gateway → Lambda → DynamoDB (REST API without any EC2 or containers).</li><li>File processing: S3 upload event → Lambda → image resize → store in S3.</li><li>Real-time data pipeline: Kinesis stream → Lambda → process/transform → load to Redshift.</li><li>Scheduled tasks: CloudWatch Events (cron) → Lambda (replace cron jobs on servers).</li><li>Database triggers: DynamoDB Streams → Lambda → sync to search index (Elasticsearch).</li></ul><p><strong>BaaS — Backend as a Service:</strong> Pre-built backend functions exposed as APIs — authentication, databases, file storage, push notifications, analytics — so frontend developers can build without any backend code. Examples: Firebase (Google) — realtime database, authentication, hosting, Cloud Firestore, Cloud Messaging. AWS Amplify — authentication (Cognito), GraphQL API (AppSync), storage (S3), analytics. Supabase — open-source Firebase alternative (PostgreSQL + realtime + auth).</p><p><strong>Serverless advantages:</strong> Zero server management. Automatic scaling to any load (from 0 to millions of requests). Pay per invocation — no cost at zero usage. Built-in high availability across multiple AZs. Faster time-to-market. Focus on business logic, not infrastructure.</p><p><strong>Serverless limitations:</strong> Cold start latency — first invocation after idle period takes 100ms-2s extra (can mitigate with provisioned concurrency). 15-minute max execution time — not for long-running jobs. Stateless — no local state between invocations. Vendor lock-in (Lambda code with AWS SDK). Limited CPU/memory per function. Debugging and distributed tracing more complex than traditional servers. Not cost-effective for consistently high traffic (containers/EC2 cheaper at scale).</p>`},
  {q:"What is cloud storage? Compare object, block, and file storage. Explain S3, EBS, EFS.",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>Cloud storage abstracts physical storage hardware into scalable, accessible services. Three distinct storage paradigms serve different use cases: object storage, block storage, and file storage. Understanding their differences is essential for architecting cost-effective, performant cloud applications.</p><p><strong>1. Object Storage — Amazon S3 (Simple Storage Service):</strong> Stores data as discrete objects in a flat namespace (no directory hierarchy — but key names can simulate folders: "photos/2024/january/IMG001.jpg"). Each object consists of: data (any format, any size), metadata (custom key-value pairs, content-type, size, checksum), and a unique key (URL-addressable). Accessed via HTTP/HTTPS REST API (GET, PUT, DELETE objects). No file system — no random write/update of bytes within a file (must replace entire object). Practically unlimited capacity — automatically distributed across multiple AZs. 99.999999999% (11 nines) durability.</p><div class="code">import boto3

s3 = boto3.client('s3')

# Upload object (up to 5 TB per object; multipart for > 100 MB)
s3.put_object(
    Bucket='my-university-bucket',
    Key='students/2024/assignments/alice_project.pdf',
    Body=open('project.pdf', 'rb'),
    ContentType='application/pdf',
    ServerSideEncryption='AES256',
    Metadata={'student-id': '12345', 'course': 'CN'}
)

# Presigned URL -- give temporary, secure access without credentials
url = s3.generate_presigned_url('get_object',
    Params={'Bucket': 'my-university-bucket', 'Key': 'alice_project.pdf'},
    ExpiresIn=3600)  # URL valid for 1 hour

# S3 Storage Classes (cost optimisation):
# S3 Standard: 0.023$/GB/month -- frequently accessed
# S3 Standard-IA (Infrequent Access): 0.0125$/GB -- monthly access
# S3 Glacier Instant Retrieval: 0.004$/GB -- quarterly access, ms retrieval
# S3 Glacier Deep Archive: 0.00099$/GB -- yearly access, 12h retrieval</div><p><strong>S3 Use cases:</strong> Static website hosting. Data lake (store raw data for analytics — AWS Athena queries S3 directly with SQL). Backup and disaster recovery. Media storage and distribution (video files, images). Application assets (JS/CSS bundles, user-uploaded files). Big data (Spark, EMR process data directly from S3).</p><p><strong>2. Block Storage — Amazon EBS (Elastic Block Store):</strong> Network-attached storage volumes (like virtual hard drives). Attach to EC2 instances — appears as raw block device (HDD/SSD). Formatted with a filesystem (ext4, NTFS, XFS) and mounted like a local disk. Low latency (single-digit ms), high IOPS. A single EBS volume can only be attached to ONE EC2 instance at a time (except EBS Multi-Attach for io2 volumes). Persists independently of the EC2 instance — data survives when instance is stopped/restarted. Billed by allocated size (even if unused). Types: gp3 (general purpose SSD, default), io2 (provisioned IOPS for databases — up to 64,000 IOPS), st1 (throughput-optimised HDD for big data), sc1 (cold HDD for infrequent access).</p><p><strong>EBS Use cases:</strong> OS root volume for EC2 instances. Relational databases (MySQL, PostgreSQL — need low latency block access). Databases that require consistent IOPS (provisioned io2). Applications that require a file system with read/write access to individual bytes (unlike object storage).</p><p><strong>3. File Storage — Amazon EFS (Elastic File System) / Azure Files / Google Filestore:</strong> Network File System (NFS v4) — shared filesystem accessible from multiple instances simultaneously. POSIX-compliant (works like a local filesystem). Scales automatically (no pre-provisioning). Multiple EC2 instances can mount and access the SAME EFS filesystem concurrently. Serverless — no capacity management needed. Higher latency than EBS (network filesystem), higher cost per GB than S3.</p><p><strong>EFS Use cases:</strong> Shared content repositories (web servers sharing the same static assets). Home directories for developers. Machine learning training data (accessed by multiple training instances simultaneously). CMS platforms (WordPress across multiple web servers). Container persistent storage (EFS with EKS). Legacy application lift-and-shift requiring shared NFS.</p><p><strong>Decision guide:</strong> Multiple instances share read/write → EFS. Low-latency database/OS disk → EBS. Static files, backups, large data, web assets, data lake → S3. Cost (cheapest first): S3 Glacier Deep Archive &lt; S3 Glacier &lt; EBS st1/sc1 &lt; S3 Standard &lt; EBS gp3 &lt; EBS io2 &lt; EFS.</p>`},
  {q:"Explain cloud migration strategies. What are the 6 Rs (Rehost, Replatform, etc.)?",u:"Unit 09",a:`<span class="utag">Unit 09</span><p><strong>Cloud migration</strong> is the process of moving an organisation's digital assets — applications, data, infrastructure, and workloads — from on-premises data centres to cloud environments. AWS popularised the "6 Rs" migration strategy framework (originally 5 Rs from Gartner, extended to 6 by AWS), providing a decision tree for how each application should be migrated.</p><p><strong>R1: Rehost ("Lift and Shift"):</strong> Move application to cloud with no code changes — migrate as-is from physical/virtual machines to cloud VMs (IaaS). Use AWS VM Import, Azure Migrate, or Google Migrate to convert VMware VMs to cloud instances. Fastest migration path — minimal risk, no development effort. Applications run on EC2 instances instead of on-premises servers.</p><ul><li><strong>When to use:</strong> Legacy applications where you lack source code. Large migrations with tight timelines ("get to cloud first, optimise later"). Applications with compliance requirements where you need cloud benefits (scalability, DR) without refactoring. First step in a phased migration.</li><li><strong>Tradeoffs:</strong> Doesn't leverage cloud-native features (auto-scaling, managed services). Pay for over-provisioned VMs. Operational overhead remains (OS patching). Often leads to "cloud sprawl" — same complexity, higher cost.</li></ul><p><strong>R2: Replatform ("Lift, Tinker, and Shift"):</strong> Make minor optimisations to leverage some cloud capabilities without changing core architecture. Example: Move MySQL on-premises to Amazon RDS MySQL (managed database — no more DBA work for patching, backups, failover). Move Tomcat app to AWS Elastic Beanstalk (PaaS). Limited code changes — mostly configuration and connection string updates.</p><ul><li><strong>When to use:</strong> Reduce operational overhead for specific tiers (database, middleware) while keeping application logic unchanged. Good balance of benefit vs effort.</li></ul><p><strong>R3: Repurchase ("Drop and Shop"):</strong> Move from a custom or on-premises application to a cloud-native SaaS product. Replace on-premises CRM (Microsoft Dynamics on-prem) with Salesforce. Replace self-hosted email with Google Workspace or Microsoft 365. Replace on-premises HR system with Workday SaaS.</p><ul><li><strong>When to use:</strong> Commodity applications where competitive differentiation from custom software is low. Moving from perpetual licence to subscription model. Eliminate maintenance of non-core systems.</li><li><strong>Tradeoffs:</strong> Lose customisations. Data migration complexity. User retraining.</li></ul><p><strong>R4: Refactor / Re-architect:</strong> Redesign the application using cloud-native patterns and services. Break monolith into microservices. Move from EC2 instances to containers (EKS/ECS) or serverless (Lambda). Move from relational to DynamoDB for specific use cases. Adopt event-driven architecture (SQS, Kafka, SNS). Most expensive and time-consuming but delivers maximum cloud benefits.</p><ul><li><strong>When to use:</strong> Applications under active development. Applications requiring elasticity, agility, or significant cost reduction that rehosting cannot deliver. When there is a strong business case for cloud-native architecture (variable load, global distribution, developer productivity).</li></ul><p><strong>R5: Retire:</strong> Discover (through portfolio analysis) applications that are no longer needed. Shut them down. Typically 10-20% of application portfolios are found to be unused or superseded when assessed. Reduces migration scope, licensing costs, and technical debt.</p><p><strong>R6: Retain (Revisit):</strong> Keep certain applications on-premises for now — they are not ready for migration (recently upgraded, regulatory restrictions, latency requirements, mainframe applications). Revisit in 12-24 months. Not every application belongs in the cloud at every point in time.</p><p><strong>Migration Process:</strong></p><ol><li>Discovery and assessment — application portfolio inventory, dependencies, TCO analysis (AWS Migration Evaluator, Azure Migrate assessments).</li><li>Migration planning — choose R-strategy per application, define migration waves.</li><li>Proof of concept — migrate 1-2 pilot applications to validate approach.</li><li>Migration execution — migrate in waves, test each wave.</li><li>Optimise — right-size instances (Reserved Instances, Savings Plans), implement auto-scaling, eliminate rehosted waste.</li></ol>`},
  {q:"What is cloud auto-scaling and load balancing? How do they ensure high availability?",u:"Unit 10",a:`<span class="utag">Unit 10</span><p><strong>Auto-scaling</strong> and <strong>load balancing</strong> are foundational cloud mechanisms that together provide elasticity, high availability, and resilience — ensuring applications remain responsive under variable loads and continue operating despite infrastructure failures.</p><p><strong>Load Balancing:</strong> A load balancer distributes incoming traffic across multiple backend servers (instances, containers, Lambda functions) so that no single server is overwhelmed. It acts as the single entry point for traffic, while the backend pool can grow and shrink dynamically.</p><p><strong>Types of Load Balancers (AWS ELB):</strong></p><ul><li><strong>ALB (Application Load Balancer) — Layer 7:</strong> HTTP/HTTPS aware. Routes based on URL path (/api/* → API servers, /static/* → S3), hostname (api.example.com vs web.example.com), HTTP headers, or query string. Supports WebSockets, gRPC. Terminates TLS. Enables A/B testing, blue-green deployments. Health checks at HTTP level.</li><li><strong>NLB (Network Load Balancer) — Layer 4:</strong> TCP/UDP load balancing. Millions of connections per second with ultra-low latency. Preserves client IP. Used for real-time gaming, IoT, financial applications. Static IP (can be whitelisted in firewalls).</li><li><strong>CLB (Classic Load Balancer):</strong> Legacy — being deprecated. Use ALB or NLB for new deployments.</li></ul><div class="code"># ALB routing rules (Terraform example):
resource "aws_lb_listener_rule" "api_routing" {
  listener_arn = aws_lb_listener.https.arn
  priority     = 100

  action {
    type             = "forward"
    target_group_arn = aws_lb_target_group.api_servers.arn
  }

  condition {
    path_pattern {
      values = ["/api/*"]   # Route /api/* to API servers
    }
  }
}
resource "aws_lb_listener_rule" "web_routing" {
  listener_arn = aws_lb_listener.https.arn
  priority     = 200
  action {
    type             = "forward"
    target_group_arn = aws_lb_target_group.web_servers.arn
  }
  condition {
    path_pattern { values = ["/*"] }    # all other traffic to web servers
  }
}</div><p><strong>Health Checks:</strong> Load balancers continuously probe backend instances (HTTP GET /health every 30 seconds). If an instance fails health checks (3 consecutive failures), traffic is diverted away — the failed instance receives no new requests. When the instance recovers, it rejoins the pool. This provides automatic failure isolation without human intervention.</p><p><strong>Auto-Scaling (AWS Auto Scaling Group — ASG):</strong> Automatically adds (scales out) or removes (scales in) EC2 instances based on defined metrics, maintaining desired capacity and responding to demand.</p><div class="code"># Auto Scaling Group configuration (AWS CloudFormation YAML)
WebServerASG:
  Type: AWS::AutoScaling::AutoScalingGroup
  Properties:
    VPCZoneIdentifier: [!Ref SubnetAZ1, !Ref SubnetAZ2, !Ref SubnetAZ3]
    LaunchTemplate:
      LaunchTemplateId: !Ref WebServerLaunchTemplate
      Version: !GetAtt WebServerLaunchTemplate.LatestVersionNumber
    MinSize: 2          # always at least 2 instances (high availability)
    DesiredCapacity: 4  # normal load
    MaxSize: 20         # can scale to 20 at peak
    TargetTrackingScaling:
      - PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 65     # add instances if avg CPU > 65%, remove if < 65%
      - PredefinedMetricType: ALBRequestCountPerTarget
        TargetValue: 500    # 500 requests per instance target
    HealthCheckType: ELB    # use load balancer health checks
    HealthCheckGracePeriod: 300  # wait 300s after launch before health checks</div><p><strong>Scaling Policies:</strong></p><ul><li><strong>Target Tracking Scaling (recommended):</strong> AWS maintains a metric (e.g., average CPU 65%) automatically. Simple — just set the target.</li><li><strong>Step Scaling:</strong> Define scaling actions based on metric thresholds and alarm states. More granular control.</li><li><strong>Scheduled Scaling:</strong> Pre-emptively scale for known load patterns (e.g., add 10 servers every Friday at 4 PM, scale down Sunday night). Complements reactive scaling.</li><li><strong>Predictive Scaling:</strong> ML-based forecasting of future load — proactively scales before demand increases.</li></ul><p><strong>High Availability Architecture:</strong> Deploy instances across minimum 2 (preferably 3) Availability Zones (physically separate data centres in the same region). ASG ensures minimum instances per AZ. ALB distributes traffic across all healthy instances in all AZs. If one AZ suffers an outage (power, network), traffic automatically routes to healthy AZs. This architecture withstands AZ-level failures with no manual intervention — zero-downtime failover.</p>`},
  {q:"What is DevOps and CI/CD in the cloud? Explain the pipeline with code.",u:"Unit 11",a:`<span class="utag">Unit 11</span><p><strong>DevOps</strong> is a cultural and technical movement that breaks down the silos between software Development (Dev) and Operations (Ops) teams — enabling organisations to deliver software changes faster, more reliably, and with higher quality. Cloud platforms are the natural habitat for DevOps practices, providing on-demand infrastructure, managed services, and automation APIs.</p><p><strong>Core DevOps Principles:</strong></p><ul><li><strong>Culture:</strong> Shared responsibility for software delivery and operations. Developers own their code in production (you build it, you run it). Blameless post-mortems.</li><li><strong>Automation:</strong> Automate everything — builds, tests, deployments, infrastructure provisioning, monitoring. Manual steps are slow, error-prone, and unscalable.</li><li><strong>Measurement:</strong> Four DORA (DevOps Research and Assessment) metrics: Deployment Frequency (how often), Lead Time for Changes (commit to production), Change Failure Rate (% failing deployments), Mean Time to Recovery (how fast to restore).</li><li><strong>Continuous Everything:</strong> CI (Continuous Integration), CD (Continuous Delivery/Deployment), Continuous Monitoring, Continuous Feedback.</li></ul><p><strong>CI/CD Pipeline:</strong></p><p><strong>CI — Continuous Integration:</strong> Developers commit code to a shared repository multiple times a day. Each commit triggers an automated build and test run. Fast feedback — developers know within minutes if their change broke anything. Prevents "integration hell" (merging long-lived branches that conflict massively).</p><p><strong>CD — Continuous Delivery:</strong> Every passing build is automatically deployed to staging (pre-production) environment. Production deployment requires a manual approval gate. Ensures software is always in a deployable state.</p><p><strong>CD — Continuous Deployment:</strong> Every passing build is automatically deployed to production without manual approval. Requires high confidence in automated test coverage. Netflix, Amazon, Google deploy to production thousands of times per day.</p><div class="code"># GitHub Actions CI/CD pipeline (.github/workflows/deploy.yml)
name: CI/CD Pipeline

on:
  push:
    branches: [main]          # trigger on push to main
  pull_request:
    branches: [main]          # also on pull requests (CI only)

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4           # checkout code

    - name: Set up Python
      uses: actions/setup-python@v4
      with: {python-version: '3.11'}

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run unit tests
      run: pytest tests/ --cov=src --cov-report=xml
      # Fails pipeline if tests fail (exit code != 0)

    - name: Run security scan
      uses: pypa/gh-action-pip-audit@v1.0.8
      # Checks dependencies for known CVEs

    - name: Static code analysis
      run: |
        flake8 src/ --max-line-length 120
        bandit -r src/ -l                 # security linting

    - name: Build Docker image
      run: |
        docker build -t myapp:${{ github.sha }} .
        docker tag myapp:${{ github.sha }} myrepo/myapp:latest

    - name: Push to ECR (if main branch)
      if: github.ref == 'refs/heads/main'
      run: |
        aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REGISTRY
        docker push $ECR_REGISTRY/myapp:${{ github.sha }}
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging          # waits for environment protection rules
    steps:
    - name: Deploy to EKS staging
      run: |
        kubectl set image deployment/web-app web-app=$ECR_REGISTRY/myapp:${{ github.sha }} \
          -n staging
        kubectl rollout status deployment/web-app -n staging --timeout=5m

    - name: Run integration tests
      run: pytest tests/integration/ --base-url=$STAGING_URL

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production        # requires manual approval from security team
    steps:
    - name: Deploy to EKS production (blue-green)
      run: |
        kubectl set image deployment/web-app web-app=$ECR_REGISTRY/myapp:${{ github.sha }} \
          -n production
        kubectl rollout status deployment/web-app -n production --timeout=10m
        # If rollout fails, Kubernetes auto-rolls back</div><p><strong>Infrastructure as Code (IaC):</strong> Define infrastructure in code (Terraform, AWS CloudFormation, Pulumi) — checked into version control, reviewed, tested, and applied automatically. Same pipeline discipline for infrastructure as for application code. Enables reproducible, auditable, and drift-free environments. Terraform manages resources across AWS, GCP, Azure, Kubernetes, and 3000+ providers with a single tool.</p>`},
  {q:"What is SLA in cloud computing? Explain RTO, RPO, and disaster recovery strategies.",u:"Unit 12",a:`<span class="utag">Unit 12</span><p><strong>SLA (Service Level Agreement)</strong> is a formal contract between a cloud service provider and customer that defines the agreed level of service — availability, performance, support response times, and remedies (service credits) when commitments are not met.</p><p><strong>Key SLA Metrics:</strong></p><ul><li><strong>Availability:</strong> Expressed as a percentage of uptime per month/year. AWS EC2: 99.99% (4.38 minutes/month downtime). AWS S3: 99.99% (4.38 minutes/month). AWS RDS Multi-AZ: 99.95% (21.9 minutes/month). Azure VM: 99.9% (43.8 minutes/month — single VM). 99.99% = four nines = 52.6 minutes/year downtime. 99.999% = five nines = 5.26 minutes/year.</li><li><strong>Latency:</strong> API response time commitments. AWS S3 GET: 200ms p99.</li><li><strong>Support Response Time:</strong> Critical (production down): 15 minutes for Enterprise support. SLA breach triggers service credits (typically 10-30% of monthly bill) — not full refunds.</li></ul><p><strong>RTO and RPO — Disaster Recovery Metrics:</strong></p><ul><li><strong>RTO (Recovery Time Objective):</strong> Maximum acceptable time to restore service after a disaster — "how fast must we recover?" If RTO = 4 hours, the business can tolerate 4 hours of downtime before severe impact. Lower RTO = more expensive DR architecture.</li><li><strong>RPO (Recovery Point Objective):</strong> Maximum acceptable amount of data loss measured in time — "how much data can we afford to lose?" If RPO = 1 hour, the recovery point must be no older than 1 hour before the disaster. Lower RPO = more frequent backups/replication = higher cost.</li></ul><p><strong>Cloud Disaster Recovery Strategies (AWS Well-Architected Framework):</strong></p><ul><li><strong>Backup and Restore (RTO: hours-days, RPO: hours):</strong> Lowest cost DR strategy. Regular backups of data to S3/Glacier. In disaster, restore from backup to new infrastructure. No standby infrastructure running. Cost: minimal (storage only). Suitable for non-critical systems where several hours of downtime is acceptable. AWS Backup automates backup policies across EC2, RDS, EFS, DynamoDB, EBS.</li><li><strong>Pilot Light (RTO: minutes-hours, RPO: minutes):</strong> Minimal core infrastructure always running in DR region (databases replicating, AMIs available). Main compute infrastructure (EC2 fleet) is shut down. During disaster, "ignite" the pilot light: start EC2 instances, scale up. Database is already replicating (RDS Read Replica promoted to primary). Moderate cost — running only the critical stateful components 24/7.</li><li><strong>Warm Standby (RTO: minutes, RPO: seconds):</strong> Scaled-down but fully functional replica of production environment running in DR region continuously. Handles a fraction of production load (say, 20%). During disaster, scale up the warm standby to full production capacity. RDS Multi-Region with read replica. DNS failover via Route 53 health checks. Higher cost than pilot light but faster recovery.</li><li><strong>Multi-Site Active-Active (RTO: near-zero, RPO: near-zero):</strong> Full production capacity running in multiple regions simultaneously, each serving live traffic. Traffic distributed via Route 53 latency-based routing or global load balancing. During regional failure, traffic automatically routes to remaining regions. Highest cost (double infrastructure). Required for mission-critical applications (banking systems, healthcare, global e-commerce). No downtime — users may not notice a regional failure.</li></ul><p><strong>Implementation example (Route 53 failover):</strong> Route 53 health checks monitor primary region endpoint. If primary fails health check 3 consecutive times, Route 53 automatically updates DNS to failover endpoint (warm standby or active-active). DNS TTL set low (30-60 seconds) to minimise propagation delay. Combined with Auto Scaling in standby region, this provides automated DR with RTO of 1-5 minutes.</p>`},
  {q:"Explain microservices architecture. Compare with monolith. What are service mesh and API gateway?",u:"Unit 13",a:`<span class="utag">Unit 13</span><p><strong>Microservices architecture</strong> decomposes an application into a collection of small, independently deployable, loosely coupled services — each owning a specific business capability, its own data store, and communicating over well-defined APIs (typically HTTP/REST or gRPC). This is in contrast to the traditional monolithic architecture where all functionality is in a single deployable unit.</p><p><strong>Monolithic Architecture:</strong> All modules (UI, business logic, data access) compiled and deployed as a single executable/WAR/DLL. All code shares the same process, memory, and database.</p><ul><li><strong>Advantages:</strong> Simple to develop initially. Easy to debug and trace (one process). No network overhead for internal calls. Simple deployment (one artifact).</li><li><strong>Disadvantages at scale:</strong> Scaling requires scaling the entire application — even if only one module is CPU-intensive. A bug in one module can bring down the entire application. Long build/test/deploy cycles (the entire app must be rebuilt). Technology lock-in — all modules must use the same language/framework. Large teams working on the same codebase = merge conflicts, coordination overhead.</li></ul><p><strong>Microservices Architecture:</strong></p><div class="code">// E-commerce monolith split into microservices:

// MONOLITH (one deployable):
// ShopApplication.jar
// ├── UserModule
// ├── ProductModule
// ├── OrderModule
// ├── PaymentModule
// ├── NotificationModule
// └── InventoryModule -- all share one DB

// MICROSERVICES (independent services):
// user-service        → own DB (PostgreSQL users)
// product-service     → own DB (MongoDB products)
// order-service       → own DB (PostgreSQL orders)
// payment-service     → own DB (PostgreSQL transactions) + PCI DSS scope
// notification-service → stateless (sends emails/SMS via SNS)
// inventory-service   → own DB (Redis + PostgreSQL stock)

// Each service:
// - Has its own Git repo and CI/CD pipeline
// - Deployed independently (different release cycles)
// - Scales independently (payment service may need more replicas than notifications)
// - Can be written in different languages (Rust for high-perf, Python for ML)
// - Communicates via REST/gRPC (sync) or message queues (async: Kafka, SQS)</div><p><strong>Communication patterns:</strong></p><ul><li><strong>Synchronous (REST/gRPC):</strong> Request-response between services. Simple but creates coupling — if payment service is down, orders fail. gRPC: typed interface, HTTP/2 multiplexing, 10x faster than REST for internal services.</li><li><strong>Asynchronous (Message Queue):</strong> Service publishes event to queue (Kafka, RabbitMQ, SQS). Consumer services process independently. Decoupled — order-service doesn't care if notification-service is temporarily down. Event-driven architecture enables CQRS and event sourcing patterns.</li></ul><p><strong>API Gateway:</strong> Single entry point for all client requests — provides: routing (to correct microservice), authentication/authorisation (verify JWT tokens before forwarding), rate limiting, TLS termination, request/response transformation, logging, and caching. Examples: Kong, AWS API Gateway, Nginx, Traefik. Without an API gateway, clients would need to know the addresses of all microservices — impractical and insecure.</p><p><strong>Service Mesh:</strong> Infrastructure layer that handles service-to-service communication concerns: traffic routing, load balancing, circuit breaking (stop calling a failing service), retries, mutual TLS (mTLS — encrypt and authenticate all inter-service calls), distributed tracing, and observability metrics. Implemented as sidecar proxies (Envoy) injected alongside each service container. Examples: Istio, Linkerd, Consul Connect. The service mesh removes cross-cutting concerns from application code — developers focus on business logic, the mesh handles resilience patterns. Visualise real-time service topology and latency distribution in Kiali (Istio UI).</p>`},
  {q:"Explain Infrastructure as Code (IaC). Compare Terraform vs CloudFormation with examples.",u:"Unit 14",a:`<span class="utag">Unit 14</span><p><strong>Infrastructure as Code (IaC)</strong> is the practice of managing and provisioning computing infrastructure through machine-readable configuration files — rather than manual configuration through GUIs or ad-hoc scripts. IaC applies software engineering practices (version control, code review, automated testing, CI/CD) to infrastructure, enabling teams to provision reliable, reproducible environments rapidly.</p><p><strong>Why IaC?</strong></p><ul><li><strong>Reproducibility:</strong> Spin up identical environments (dev, staging, prod) from the same code. Eliminates "works on my machine" infrastructure problems and configuration drift.</li><li><strong>Version history:</strong> Full audit trail of infrastructure changes in Git. Who changed what, when, and why (commit messages). Roll back to a previous state by reverting a Git commit and reapplying.</li><li><strong>Automation:</strong> Infrastructure provisioning is part of the CI/CD pipeline — new environments created in minutes. No manual clicking through AWS console (error-prone, slow, undocumented).</li><li><strong>Documentation:</strong> The code IS the documentation — always up-to-date (unlike wiki pages).</li><li><strong>Collaboration:</strong> Infrastructure changes go through PR review — same discipline as application code changes.</li></ul><p><strong>Terraform (HashiCorp, 2014) — Multi-cloud IaC:</strong></p><div class="code"># Terraform example: deploy a 3-tier web application on AWS
terraform {
  required_providers {
    aws = {
      source  = "hashicorp/aws"
      version = "~> 5.0"
    }
  }
  backend "s3" {            # store state remotely (team collaboration)
    bucket = "my-terraform-state"
    key    = "production/main.tfstate"
    region = "us-east-1"
  }
}

provider "aws" {
  region = var.region
}

variable "region" { default = "ap-south-1" }
variable "instance_type" { default = "t3.medium" }

# VPC
resource "aws_vpc" "main" {
  cidr_block           = "10.0.0.0/16"
  enable_dns_hostnames = true
  tags = { Name = "production-vpc", Environment = "production" }
}

# Public subnets in 2 AZs
resource "aws_subnet" "public" {
  count             = 2
  vpc_id            = aws_vpc.main.id
  cidr_block        = "10.0.${count.index}.0/24"
  availability_zone = data.aws_availability_zones.available.names[count.index]
  map_public_ip_on_launch = true
}

# RDS MySQL database
resource "aws_db_instance" "mysql" {
  identifier        = "production-mysql"
  engine            = "mysql"
  engine_version    = "8.0"
  instance_class    = "db.t3.medium"
  allocated_storage = 100
  storage_encrypted = true
  multi_az          = true          # multi-AZ for high availability
  username          = var.db_user
  password          = var.db_password  # use AWS Secrets Manager in production
  db_subnet_group_name = aws_db_subnet_group.main.name
  skip_final_snapshot = false
}

# Auto Scaling Group + Launch Template
resource "aws_autoscaling_group" "web" {
  vpc_zone_identifier = aws_subnet.public[*].id
  min_size            = 2
  max_size            = 10
  desired_capacity    = 4
  target_group_arns   = [aws_lb_target_group.web.arn]

  launch_template {
    id      = aws_launch_template.web.id
    version = "$Latest"
  }
}

output "alb_dns_name" {
  value = aws_lb.main.dns_name    # output the load balancer URL
}

# terraform init      -- download providers
# terraform plan      -- preview changes (dry run)
# terraform apply     -- provision infrastructure
# terraform destroy   -- teardown all resources</div><p><strong>AWS CloudFormation — AWS-native IaC:</strong></p><div class="code"># CloudFormation template (YAML) -- equivalent to above
AWSTemplateFormatVersion: '2010-09-09'
Description: Production Web Application Infrastructure

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.medium, t3.large, c5.large]

Resources:
  WebServerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Split [",", !ImportValue VPCPublicSubnets]
      MinSize: 2
      MaxSize: 10
      DesiredCapacity: 4
      TargetGroupARNs: [!Ref ALBTargetGroup]
      LaunchTemplate:
        LaunchTemplateId: !Ref WebLaunchTemplate
        Version: !GetAtt WebLaunchTemplate.LatestVersionNumber

  ProductionDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.medium
      Engine: mysql
      MasterUsername: admin
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      MultiAZ: true
      StorageEncrypted: true

Outputs:
  LoadBalancerDNS:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: ProductionLoadBalancerDNS</div><p><strong>Terraform vs CloudFormation:</strong> Terraform: multi-cloud (AWS + GCP + Azure + 3000+ providers), HCL language, plan before apply, rich ecosystem. CloudFormation: AWS-only, YAML/JSON, tightly integrated with AWS services, free (Terraform Enterprise costs), native drift detection. Most enterprises use Terraform for multi-cloud and CloudFormation for AWS-only workloads with deep integration needs. Both enable GitOps: IaC in Git, automatically applied via CI/CD pipelines (Terraform Cloud/GitHub Actions/Jenkins).</p>`},
  {q:"Explain cloud cost optimisation. What are Reserved Instances, Spot Instances, and savings strategies?",u:"Unit 15",a:`<span class="utag">Unit 15</span><p>Cloud cost management (FinOps — Financial Operations) has become a critical discipline as cloud bills easily run into millions of dollars for enterprises. Without active cost optimisation, cloud spending can grow 30-40% annually from waste alone. The goal is to maximise business value per dollar of cloud spend.</p><p><strong>AWS EC2 Pricing Models:</strong></p><ul><li><strong>On-Demand:</strong> Pay for compute by the second with no commitment. Highest price (e.g., m5.xlarge: ~$0.192/hour). Maximum flexibility — start/stop anytime. Use for: unpredictable workloads, short-term spikes, new applications being tested. Never use for baseline always-on workloads — very expensive long-term.</li><li><strong>Reserved Instances (RI):</strong> Commit to a specific instance type (or family with Convertible RIs) in a region for 1 or 3 years. Discount: 30-60% off On-Demand (1-year No Upfront), up to 72% (3-year All Upfront). Standard RI: specific instance type/size — highest discount. Convertible RI: can change instance family, OS — more flexible, lower discount. Use for: steady-state, predictable baseline workloads (production databases, always-on web servers).</li><li><strong>Savings Plans (newer alternative to RIs):</strong> Commit to a minimum spend per hour ($/hour) for 1 or 3 years — more flexible than RIs. Compute Savings Plans: up to 66% off, applies to any EC2 instance family, region, OS, or tenancy, and also to AWS Lambda and Fargate. EC2 Instance Savings Plans: up to 72% off, locked to specific instance family in one region. Automatically applies to eligible compute usage without instance type selection.</li><li><strong>Spot Instances:</strong> Use AWS's unused EC2 capacity at 70-90% discount vs On-Demand. AWS can reclaim Spot Instances with 2-minute warning when capacity is needed. Cheapest pricing but no SLA. Use for: stateless workloads, batch jobs (genomics, ML training, video rendering), fault-tolerant distributed systems, CI/CD build workers. Never for databases, stateful applications, or anything requiring guaranteed availability. Spot Fleet / EC2 Auto Scaling with multiple instance types and Spot pools improves availability.</li><li><strong>Dedicated Hosts:</strong> Entire physical server reserved for you. Required for: BYOL (Bring Your Own Licence — SQL Server, Oracle), strict compliance requirements (need to prove no hardware sharing). Most expensive option.</li></ul><p><strong>Cost Optimisation Strategies:</strong></p><ul><li><strong>Right-sizing:</strong> Match instance type to actual utilisation. AWS Cost Explorer → "Right Sizing Recommendations" identifies instances running at 5-10% CPU (oversized). Downsizing an m5.2xlarge to m5.xlarge cuts compute costs 50% if utilisation warrants it. Use CloudWatch CPU/memory metrics over 2 weeks to inform right-sizing.</li><li><strong>Turn off idle resources:</strong> Development/test environments run 24/7 but are only used 8-10 hours/day. Auto-stop EC2 instances outside business hours using Lambda scheduled events or AWS Instance Scheduler. Can save 65% (stopping 16 hours/day).</li><li><strong>Delete unattached EBS volumes:</strong> EBS volumes persist after EC2 instances are terminated. Organisations often have hundreds of orphaned volumes costing money. AWS Trusted Advisor and Cost Explorer identify unattached volumes.</li><li><strong>S3 lifecycle policies:</strong> Automatically transition objects to cheaper storage classes (Standard → Standard-IA after 30 days → Glacier after 90 days → Deep Archive after 180 days → Delete after 7 years). Can cut S3 costs 60-90% for data with decreasing access frequency.</li><li><strong>NAT Gateway usage:</strong> One of the most overlooked costs — AWS charges $0.045/GB for traffic through NAT Gateway. Use VPC endpoints (free) for S3 and DynamoDB to bypass NAT Gateway for those services.</li><li><strong>Database optimisation:</strong> Aurora Serverless for variable database workloads (scales to zero when idle). DynamoDB on-demand mode vs provisioned. RDS storage auto-scaling.</li><li><strong>Reserved Capacity for steady state, Spot for burst:</strong> Combine pricing models — 70% On-Demand + RI baseline, 30% Spot for burst capacity in Auto Scaling Groups. Best price/flexibility balance.</li></ul><p><strong>FinOps tools:</strong> AWS Cost Explorer (native — allocation, forecasting, anomaly detection). AWS Budgets (set alerts when spend exceeds threshold). AWS Trusted Advisor (cost, security, performance, fault tolerance recommendations). Third-party: CloudHealth by VMware, Spot by NetApp, Apptio Cloudability. FinOps Foundation's open-source framework provides governance model for cloud financial management across engineering, finance, and leadership teams.</p>`},
