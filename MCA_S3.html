    // Load / Refresh grid
    private void LoadStudents(string searchTerm = "", string dept = "All") {
        try {
            // LINQ query with filtering
            IQueryable&lt;Student&gt; query = _db.Students;

            // Filter by search term
            if (!string.IsNullOrWhiteSpace(searchTerm))
                query = query.Where(s =>
                    s.Name.Contains(searchTerm) ||
                    s.Department.Contains(searchTerm));

            // Filter by department
            if (dept != "All")
                query = query.Where(s => s.Department == dept);

            var students = query.OrderBy(s => s.Name).ToList();

            dgvStudents.DataSource = students;

            // Update stats label
            double avg = students.Any() ? students.Average(s => s.GPA) : 0;
            lblStats.Text = $"Total: {students.Count} | Avg GPA: {avg:F2}";
        } catch (Exception ex) {
            MessageBox.Show($"Error loading students: {ex.Message}",
                "Database Error", MessageBoxButtons.OK, MessageBoxIcon.Error);
        }
    }

    // Add / Update student
    private void btnSave_Click(object sender, EventArgs e) {
        // Validation
        if (string.IsNullOrWhiteSpace(txtName.Text)) {
            MessageBox.Show("Name is required.", "Validation",
                MessageBoxButtons.OK, MessageBoxIcon.Warning);
            txtName.Focus();
            return;
        }

        if (!double.TryParse(txtGPA.Text, out double gpa) || gpa < 0 || gpa > 4.0) {
            MessageBox.Show("GPA must be between 0.0 and 4.0", "Validation",
                MessageBoxButtons.OK, MessageBoxIcon.Warning);
            return;
        }

        try {
            if (_selectedStudent == null) {
                // INSERT
                var newStudent = new Student {
                    Name = txtName.Text.Trim(),
                    Department = cmbDepartment.SelectedItem?.ToString() ?? "General",
                    GPA = gpa,
                    EnrollDate = dtpEnroll.Value
                };
                _db.Students.Add(newStudent);
                _db.SaveChanges();
                MessageBox.Show("Student added successfully!", "Success");
            } else {
                // UPDATE
                _selectedStudent.Name = txtName.Text.Trim();
                _selectedStudent.Department = cmbDepartment.SelectedItem?.ToString();
                _selectedStudent.GPA = gpa;
                _db.SaveChanges();
                MessageBox.Show("Student updated successfully!", "Success");
            }

            ClearForm();
            LoadStudents();
        } catch (System.Data.Entity.Validation.DbEntityValidationException dbEx) {
            // Specific EF validation errors
            var errors = dbEx.EntityValidationErrors
                .SelectMany(e => e.ValidationErrors)
                .Select(e => e.ErrorMessage);
            MessageBox.Show("Validation errors:\n" + string.Join("\n", errors));
        } catch (Exception ex) {
            MessageBox.Show($"Error saving student: {ex.Message}", "Error",
                MessageBoxButtons.OK, MessageBoxIcon.Error);
        }
    }

    // Delete selected student
    private void btnDelete_Click(object sender, EventArgs e) {
        if (_selectedStudent == null) {
            MessageBox.Show("Please select a student to delete."); return;
        }

        var confirm = MessageBox.Show(
            $"Delete {_selectedStudent.Name}?", "Confirm Delete",
            MessageBoxButtons.YesNo, MessageBoxIcon.Question);

        if (confirm == DialogResult.Yes) {
            try {
                _db.Students.Remove(_selectedStudent);
                _db.SaveChanges();
                ClearForm();
                LoadStudents();
                MessageBox.Show("Student deleted.");
            } catch (Exception ex) {
                MessageBox.Show($"Error deleting: {ex.Message}");
            }
        }
    }

    // Grid row selected -- populate form fields
    private void dgvStudents_SelectionChanged(object sender, EventArgs e) {
        if (dgvStudents.CurrentRow?.DataBoundItem is Student s) {
            _selectedStudent = s;
            txtName.Text = s.Name;
            cmbDepartment.SelectedItem = s.Department;
            txtGPA.Text = s.GPA.ToString("F2");
            dtpEnroll.Value = s.EnrollDate;
            btnDelete.Enabled = true;
        }
    }

    // Search / filter
    private void txtSearch_TextChanged(object sender, EventArgs e) =>
        LoadStudents(txtSearch.Text, cmbFilter.SelectedItem?.ToString() ?? "All");

    // Advanced LINQ statistics
    private void btnStats_Click(object sender, EventArgs e) {
        try {
            var stats = _db.Students
                .GroupBy(s => s.Department)
                .Select(g => new {
                    Department = g.Key,
                    Count = g.Count(),
                    AvgGPA = g.Average(s => s.GPA),
                    TopStudent = g.OrderByDescending(s => s.GPA).First().Name
                })
                .OrderByDescending(g => g.AvgGPA)
                .ToList();

            string report = string.Join("\n", stats.Select(s =>
                $"{s.Department}: {s.Count} students | Avg GPA: {s.AvgGPA:F2} | Top: {s.TopStudent}"));

            MessageBox.Show(report, "Department Statistics");
        } catch (Exception ex) {
            MessageBox.Show($"Stats error: {ex.Message}");

    private void ClearForm() {
        _selectedStudent = null;
        txtName.Clear(); txtGPA.Clear(); txtSearch.Clear();

    protected override void OnFormClosed(FormClosedEventArgs e) {
        _db?.Dispose();  // always dispose DbContext
        base.OnFormClosed(e);
    }

using System.ComponentModel.DataAnnotations;

public class Student {
    public int Id { get; set; }

    [Required(ErrorMessage = "Name is required")]
    [StringLength(100, MinimumLength = 2)]
    public string Name { get; set; }

    [Required]
    [RegularExpression(@"^(CS|IT|ECE|MECH|CIVIL)$",
        ErrorMessage = "Department must be CS, IT, ECE, MECH, or CIVIL")]
    public string Department { get; set; }

    [Range(0.0, 4.0, ErrorMessage = "GPA must be between 0 and 4")]

    public string Email { get; set; }

    public DateTime EnrolledAt { get; set; } = DateTime.UtcNow;

public class CreateStudentRequest {
    [Required] public string Name { get; set; }
    [Required] public string Department { get; set; }
    [Range(0, 4)] public double GPA { get; set; }
    [EmailAddress] public string Email { get; set; }
}

public class StudentResponse {
    public int Id { get; set; }
    public string Name { get; set; }
    public string Department { get; set; }
    public double GPA { get; set; }
    public string Email { get; set; }
    public string EnrolledAt { get; set; }

// ===== Controller =====
using Microsoft.AspNetCore.Mvc;
using System.Collections.Concurrent;

[ApiController]
[Route("api/[controller]")]          // Route: /api/students
[Produces("application/json")]
public class StudentsController : ControllerBase {
    // In-memory store (replace with DbContext in production)
    private static ConcurrentDictionary&lt;int, Student&gt; _students =
        new ConcurrentDictionary&lt;int, Student&gt;();
    private static int _nextId = 1;
    private readonly ILogger&lt;StudentsController&gt; _logger;

    public StudentsController(ILogger&lt;StudentsController&gt; logger) {
        _logger = logger;
        // Seed data
        if (_students.IsEmpty) {
            var s = new Student { Id = _nextId++, Name = "Alice", Department = "CS", GPA = 3.8, Email = "alice@uni.edu" };
            _students[s.Id] = s;
        }
    }

    // GET /api/students?dept=CS&minGpa=3.5&page=1&pageSize=10
    [HttpGet]
    [ProducesResponseType(typeof(IEnumerable&lt;StudentResponse&gt;), 200)]
    public async Task&lt;IActionResult&gt; GetAll(
        [FromQuery] string dept = null,
        [FromQuery] double minGpa = 0,
        [FromQuery] int page = 1,
        [FromQuery] int pageSize = 10) {
        await Task.Yield();  // simulate async work
        var query = _students.Values.AsEnumerable();

        if (!string.IsNullOrEmpty(dept))
            query = query.Where(s => s.Department.Equals(dept, StringComparison.OrdinalIgnoreCase));
        if (minGpa > 0)
            query = query.Where(s => s.GPA >= minGpa);

        var total = query.Count();
        var paged = query.OrderBy(s => s.Name)
                         .Skip((page - 1) * pageSize)
                         .Take(pageSize)
                         .Select(MapToResponse);

        // Pagination headers
        Response.Headers.Add("X-Total-Count", total.ToString());
        Response.Headers.Add("X-Page", page.ToString());
        return Ok(paged);  // 200
    }

    // GET /api/students/5
    [HttpGet("{id:int}")]
    [ProducesResponseType(typeof(StudentResponse), 200)]
    [ProducesResponseType(404)]
    public IActionResult GetById(int id) {
        if (!_students.TryGetValue(id, out var student))
            return NotFound(new { error = $"Student with id {id} not found" }); // 404

        return Ok(MapToResponse(student));  // 200
    }

    // POST /api/students
    [HttpPost]
    [ProducesResponseType(typeof(StudentResponse), 201)]
    [ProducesResponseType(typeof(ValidationProblemDetails), 400)]
    public async Task&lt;IActionResult&gt; Create([FromBody] CreateStudentRequest request) {
        // ModelState validation is automatic with [ApiController] and [Required] attributes
        // Returns 400 automatically if invalid
        if (!ModelState.IsValid) return BadRequest(ModelState);

        await Task.Yield();

        var student = new Student {
            Id = _nextId++, Name = request.Name,
            Department = request.Department, GPA = request.GPA, Email = request.Email
        };
        _students[student.Id] = student;
        _logger.LogInformation("Student created: {Name} (ID: {Id})", student.Name, student.Id);

        return CreatedAtAction(nameof(GetById), new { id = student.Id },
            MapToResponse(student));  // 201 + Location header
    }

    // PUT /api/students/5
    [HttpPut("{id:int}")]
    [ProducesResponseType(204)]
    [ProducesResponseType(404)]
    [ProducesResponseType(400)]
    public async Task&lt;IActionResult&gt; Update(int id, [FromBody] CreateStudentRequest request) {
        if (!_students.TryGetValue(id, out var student))
            return NotFound();

        await Task.Yield();
        student.Name = request.Name;
        student.Department = request.Department;
        student.GPA = request.GPA;
        student.Email = request.Email;

        return NoContent();  // 204 -- updated, no body returned
    }

    // DELETE /api/students/5
    [HttpDelete("{id:int}")]
    [ProducesResponseType(204)]
    [ProducesResponseType(404)]
    public IActionResult Delete(int id) {
        if (!_students.TryRemove(id, out _))
            return NotFound();

        return NoContent();  // 204
    }

    // GET /api/students/stats
    [HttpGet("stats")]
    public IActionResult GetStats() {
        if (!_students.Any())
            return Ok(new { message = "No students" });

        var stats = _students.Values
            .GroupBy(s => s.Department)
            .Select(g => new {
                department = g.Key,
                count = g.Count(),
                avgGpa = g.Average(s => s.GPA).ToString("F2"),
                topStudent = g.MaxBy(s => s.GPA)?.Name
            });

        return Ok(new { departments = stats, total = _students.Count });
    }

    private static StudentResponse MapToResponse(Student s) => new StudentResponse {
        Id = s.Id, Name = s.Name, Department = s.Department,
        GPA = s.GPA, Email = s.Email,
        EnrolledAt = s.EnrolledAt.ToString("yyyy-MM-dd")
    };
}

  {q:"Implement file I/O operations in C#: read/write text files, binary files, and JSON serialisation.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p>File I/O in C# provides multiple approaches for different data types: text files, binary files, and structured data (JSON/XML). All use the <code>using</code> statement to ensure streams are closed even if exceptions occur.</p><div class="code">using System;
using System.Collections.Generic;
using System.IO;
using System.Text;
using System.Text.Json;
using System.Text.Json.Serialization;

// ===== TEXT FILE OPERATIONS =====
public class TextFileDemo {
    static string textPath = "students.txt";

    // Write text file
    public static void WriteTextFile() {
        // File.WriteAllText -- simplest, overwrites file
        File.WriteAllText(textPath, "Student Records\n===================\n");

        // StreamWriter -- line by line, with append
        using StreamWriter sw = new StreamWriter(textPath, append: true, Encoding.UTF8);
        sw.WriteLine("Alice|CS|3.8");
        sw.WriteLine("Bob|IT|3.2");
        sw.WriteLine("Carol|ECE|3.9");
        Console.WriteLine($"Written to {textPath}");
    }

    // Read text file
    public static void ReadTextFile() {
        // File.ReadAllLines -- read into string array
        string[] lines = File.ReadAllLines(textPath, Encoding.UTF8);
        Console.WriteLine($"Total lines: {lines.Length}");

        // StreamReader -- line by line (memory efficient for large files)
        using StreamReader sr = new StreamReader(textPath, Encoding.UTF8);
        string line;
        while ((line = sr.ReadLine()) != null) {
            if (line.Contains('|')) {
                var parts = line.Split('|');
                Console.WriteLine($"  Name: {parts[0]}, Dept: {parts[1]}, GPA: {parts[2]}");
            }
        }
    }
}

// ===== BINARY FILE OPERATIONS =====
public class BinaryFileDemo {
    static string binPath = "students.bin";

    public static void WriteBinary() {
        using BinaryWriter bw = new BinaryWriter(File.Open(binPath, FileMode.Create));
        // Write structured binary data
        bw.Write(3);           // write count
        bw.Write("Alice"); bw.Write("CS"); bw.Write(3.8d); bw.Write(21);
        bw.Write("Bob");   bw.Write("IT"); bw.Write(3.2d); bw.Write(20);
        bw.Write("Carol"); bw.Write("ECE");bw.Write(3.9d); bw.Write(22);
        Console.WriteLine($"Binary written: {new FileInfo(binPath).Length} bytes");
    }

    public static void ReadBinary() {
        using BinaryReader br = new BinaryReader(File.Open(binPath, FileMode.Open));
        int count = br.ReadInt32();
        for (int i = 0; i < count; i++) {
            string name = br.ReadString();
            string dept = br.ReadString();
            double gpa  = br.ReadDouble();
            int age     = br.ReadInt32();
            Console.WriteLine($"  {name} | {dept} | GPA:{gpa} | Age:{age}");
        }
    }
}

public class Student {
    public int Id { get; set; }
    public string Name { get; set; }
    public string Department { get; set; }
    public double GPA { get; set; }
    [JsonIgnore]            // exclude from JSON output
    public string InternalCode { get; set; }
    [JsonPropertyName("enrolled_on")]  // custom JSON property name
    public DateTime EnrollmentDate { get; set; }
    public List&lt;string&gt; Courses { get; set; } = new();
}

public class JsonFileDemo {
    static string jsonPath = "students.json";

    public static void WriteJson() {
        var students = new List&lt;Student&gt; {
            new Student { Id=1, Name="Alice", Department="CS", GPA=3.8,
                EnrollmentDate=new DateTime(2022,7,15),
                Courses = new List&lt;string&gt; { "Algorithms", "Cloud", "AI" } },
            new Student { Id=2, Name="Bob", Department="IT", GPA=3.2,
                EnrollmentDate=new DateTime(2023,1,10),
                Courses = new List&lt;string&gt; { "Networks", "Security" } }
        };

        var options = new JsonSerializerOptions {
            WriteIndented = true,                     // pretty-print
            PropertyNamingPolicy = JsonNamingPolicy.CamelCase  // camelCase in JSON
        };

        string json = JsonSerializer.Serialize(students, options);
        File.WriteAllText(jsonPath, json, Encoding.UTF8);
        Console.WriteLine($"JSON written:\n{json}");
    }

    public static List&lt;Student&gt; ReadJson() {
        if (!File.Exists(jsonPath)) throw new FileNotFoundException(jsonPath);
        string json = File.ReadAllText(jsonPath, Encoding.UTF8);
        var options = new JsonSerializerOptions { PropertyNameCaseInsensitive = true };
        var students = JsonSerializer.Deserialize&lt;List&lt;Student&gt;&gt;(json, options);
        return students;
    }

    // Streaming JSON (memory-efficient for large files)
    public static async Task WriteJsonStreamAsync(IEnumerable&lt;Student&gt; students) {
        var options = new JsonSerializerOptions { WriteIndented = true };
        await using var stream = File.Create("large_students.json");
        await JsonSerializer.SerializeAsync(stream, students, options);
    }
}

// ===== DIRECTORY AND FILE MANAGEMENT =====
public class FileManagementDemo {
    public static void FileAndDirectoryOps() {
        // Create directory hierarchy
        string baseDir = Path.Combine("Reports", "2024", "Q1");
        Directory.CreateDirectory(baseDir);   // creates all missing directories

        // Write multiple files
        string[] depts = { "CS", "IT", "ECE" };
        foreach (string dept in depts) {
            string filePath = Path.Combine(baseDir, $"{dept}_report.txt");
            File.WriteAllText(filePath, $"{dept} Department Report\nGenerated: {DateTime.Now}");
        }

        // Find files matching pattern
        var reportFiles = Directory.GetFiles(baseDir, "*.txt", SearchOption.AllDirectories);
        Console.WriteLine($"Found {reportFiles.Length} report files");

        // File metadata
        foreach (string file in reportFiles) {
            var info = new FileInfo(file);
            Console.WriteLine($"  {info.Name}: {info.Length} bytes, Modified: {info.LastWriteTime:dd-MM-yyyy HH:mm}");
        }

        // Append to file
        using (StreamWriter sw = File.AppendText(Path.Combine(baseDir, "CS_report.txt")))
            sw.WriteLine("\nSection added at " + DateTime.Now);

        // Check, copy, move, delete
        string src = Path.Combine(baseDir, "CS_report.txt");
        string dst = Path.Combine(baseDir, "CS_report_backup.txt");
        if (File.Exists(src)) {
            File.Copy(src, dst, overwrite: true);     // copy
            // File.Move(src, dst);                   // move
            // File.Delete(src);                      // delete
        }

        // Get temp path for working files
        string tempFile = Path.GetTempFileName();
        Console.WriteLine($"Temp file: {tempFile}");
        File.Delete(tempFile);
    }
}

class Program {

}</div><p><strong>Best practices:</strong> Always use <code>using</code> statements or <code>await using</code> on stream objects. Specify encoding explicitly (UTF-8 prevents encoding-related bugs). Use <code>Path.Combine()</code> instead of string concatenation for file paths (handles OS-specific separators). Use <code>File.ReadAllText</code> for small files, StreamReader for large files (memory efficient). System.Text.Json (built-in .NET Core 3+) is preferred over Newtonsoft.Json for new code. Use FileMode and FileAccess flags for precise control over file open behaviour. Check <code>File.Exists</code> before reading to avoid FileNotFoundException.</p>`},
  {q:"Implement multithreading in C#: Thread, ThreadPool, Task, and synchronisation mechanisms.",u:"Unit 06",a:`<span class="utag">Unit 06</span><p>Multithreading enables concurrent execution — improving performance on multi-core CPUs for CPU-bound work and improving responsiveness for I/O-bound operations. C# provides multiple abstractions: Thread (low-level), ThreadPool, Task (TPL), and async/await (for I/O).</p><div class="code">using System;
using System.Collections.Concurrent;
using System.Collections.Generic;
using System.Threading;
using System.Threading.Tasks;

// ===== 1. Thread Class (low-level) =====
public class ThreadDemo {
    public static void BasicThread() {
        // Create and start a thread
        Thread t1 = new Thread(() => {
            Console.WriteLine($"Thread {Thread.CurrentThread.ManagedThreadId} started");
            Thread.Sleep(1000);
            Console.WriteLine($"Thread {Thread.CurrentThread.ManagedThreadId} done");
        });
        t1.Name = "WorkerThread-1";
        t1.IsBackground = true;   // background threads don't prevent app exit
        t1.Priority = ThreadPriority.Normal;
        t1.Start();

        // Thread with parameter
        Thread t2 = new Thread(param => {
            string message = (string)param;
            Console.WriteLine($"Received: {message}");
        });
        t2.Start("Hello from main thread");

        t1.Join();   // wait for t1 to finish
        t2.Join();
    }
}

// ===== 2. Thread Synchronisation =====
public class SyncDemo {
    private static int _sharedCounter = 0;
    private static readonly object _lock = new object();
    private static SemaphoreSlim _semaphore = new SemaphoreSlim(3, 3); // max 3 concurrent

    // RACE CONDITION (wrong):
    public static void BadIncrement() { _sharedCounter++; }  // NOT atomic!

    // Lock (mutual exclusion):
    public static void SafeIncrement() {
        lock (_lock) { _sharedCounter++; }  // only one thread at a time
    }

    // Interlocked (faster for simple atomic ops):
    public static void AtomicIncrement() {
        Interlocked.Increment(ref _sharedCounter);  // atomic, lock-free
    }

    // Monitor (explicit lock -- allows timeout):
    public static bool MonitorIncrement() {
        bool acquired = false;
        Monitor.TryEnter(_lock, 500, ref acquired);  // 500ms timeout
        if (acquired) {
            try { _sharedCounter++; }
            finally { Monitor.Exit(_lock); }
            return true;
        }
        return false;  // couldn't acquire lock in time
    }

    // SemaphoreSlim -- limit concurrent access (e.g., max 3 DB connections):
    public static async Task LimitedAccessAsync(int taskId) {
        await _semaphore.WaitAsync();           // acquire slot
        try {
            Console.WriteLine($"Task {taskId} accessing resource");
            await Task.Delay(500);              // simulate work
        } finally {
            _semaphore.Release();               // always release
        }
    }

    // ReaderWriterLockSlim -- multiple readers OR one writer:
    private static ReaderWriterLockSlim _rwLock = new ReaderWriterLockSlim();
    private static Dictionary&lt;int, string&gt; _cache = new Dictionary&lt;int, string&gt;();

    public static string ReadFromCache(int key) {
        _rwLock.EnterReadLock();    // multiple readers allowed simultaneously
        try { return _cache.TryGetValue(key, out var val) ? val : null; }
        finally { _rwLock.ExitReadLock(); }
    }
    public static void WriteToCache(int key, string value) {
        _rwLock.EnterWriteLock();   // exclusive -- no other readers or writers
        try { _cache[key] = value; }
        finally { _rwLock.ExitWriteLock(); }
    }
}

// ===== 3. Task Parallel Library (TPL) =====
public class TPLDemo {
    // Task.Run -- offload CPU work to thread pool
    public static async Task TaskBasics() {
        Task&lt;int&gt; t1 = Task.Run(() => ExpensiveCalculation(1));
        Task&lt;int&gt; t2 = Task.Run(() => ExpensiveCalculation(2));

        // Task.WhenAll -- await both concurrently (wall-clock = slower task)
        int[] results = await Task.WhenAll(t1, t2);
        Console.WriteLine($"Results: {results[0]} + {results[1]} = {results.Sum()}");

        // Task.WhenAny -- first one wins (for timeout pattern)
        Task&lt;string&gt; data = FetchDataAsync();
        Task timeout = Task.Delay(3000);
        Task first = await Task.WhenAny(data, timeout);
        string result = first == data ? await data : "TIMEOUT";

        // Parallel.For -- parallel loop for CPU-bound arrays
        int[] numbers = Enumerable.Range(1, 10000).ToArray();
        double[] squares = new double[numbers.Length];
        Parallel.For(0, numbers.Length, i => {
            squares[i] = Math.Sqrt(numbers[i]);
        });

        // Parallel.ForEach with ParallelOptions
        var items = Enumerable.Range(1, 100).ToList();
        Parallel.ForEach(items, new ParallelOptions { MaxDegreeOfParallelism = 4 }, item => {
            ProcessItem(item);
        });
    }

    // CancellationToken -- cooperative cancellation
    public static async Task CancellationDemo() {
        using CancellationTokenSource cts = new CancellationTokenSource();
        cts.CancelAfter(TimeSpan.FromSeconds(5));  // auto-cancel after 5s

        try {
            await LongRunningTask(cts.Token);
        } catch (OperationCanceledException) {
            Console.WriteLine("Task was cancelled");
        }
    }

    private static async Task LongRunningTask(CancellationToken token) {
        for (int i = 0; i < 100; i++) {
            token.ThrowIfCancellationRequested();  // check periodically
            await Task.Delay(100, token);          // pass token to Delay
            Console.WriteLine($"Step {i}");
        }
    }

    // ConcurrentBag -- thread-safe collection (no locking needed)
    public static async Task ConcurrentCollections() {
        var results = new ConcurrentBag&lt;int&gt;();
        await Parallel.ForEachAsync(Enumerable.Range(1, 20), async (i, ct) => {
            int result = await ProcessAsync(i, ct);
            results.Add(result);   // thread-safe
        });
        Console.WriteLine($"Processed {results.Count} items");
    }

    static int ExpensiveCalculation(int n) { Thread.Sleep(1000); return n * n; }
    static async Task&lt;string&gt; FetchDataAsync() { await Task.Delay(1000); return "data"; }
    static void ProcessItem(int n) { /* CPU work */ }
    static async Task&lt;int&gt; ProcessAsync(int n, CancellationToken ct) {
        await Task.Delay(50, ct); return n * 2;
    }
}

class Program {
    static async Task Main() {
        ThreadDemo.BasicThread();
        // Run 1000 concurrent increments -- test lock
        var tasks = Enumerable.Range(0, 1000).Select(_ => Task.Run(SyncDemo.SafeIncrement));
        await Task.WhenAll(tasks);
        Console.WriteLine($"Counter (should be 1000): {SyncDemo._sharedCounter}");
        await TPLDemo.TaskBasics();
        await TPLDemo.CancellationDemo();
        await TPLDemo.ConcurrentCollections();
    }
}</div><p><strong>Key concepts:</strong> Thread vs Task: Use Task/async-await for new code (higher-level, TPL-managed). Thread for low-level control. lock() for simple mutual exclusion. Interlocked for atomic integer/long operations (faster than lock). SemaphoreSlim for limiting concurrent access (connection pools, API rate limits). ReaderWriterLockSlim for read-heavy workloads. CancellationToken for cooperative cancellation. ConcurrentBag/ConcurrentDictionary/ConcurrentQueue for thread-safe collections without explicit locking.</p>`},
  {q:"Implement design patterns in C#: Singleton, Factory, Repository, and Observer.",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>Design patterns are proven, reusable solutions to commonly recurring software design problems. This program demonstrates four essential patterns — Singleton (single instance), Factory (object creation abstraction), Repository (data access abstraction), and Observer (event notification) — all in a university management context.</p><div class="code">using System;
using System.Collections.Generic;

// ===== 1. SINGLETON PATTERN =====
// Guarantees exactly one instance throughout the application lifecycle
// Use case: Configuration, logging, database connection pool

public class DatabaseConfig {
    // Thread-safe lazy initialisation (C# 4.0+)
    private static readonly Lazy&lt;DatabaseConfig&gt; _instance =
        new Lazy&lt;DatabaseConfig&gt;(() => new DatabaseConfig());

    public static DatabaseConfig Instance => _instance.Value;

    public string ConnectionString { get; private set; }
    public string DatabaseName { get; private set; }
    public int MaxConnections { get; private set; }

    private DatabaseConfig() {  // private constructor -- prevents external new
        ConnectionString = "Server=localhost;Database=UniversityDB;Trusted_Connection=true;";
        DatabaseName = "UniversityDB";
        MaxConnections = 100;
        Console.WriteLine("DatabaseConfig initialised (once)");
    }

    public void PrintConfig() =>
        Console.WriteLine($"DB: {DatabaseName}, MaxConn: {MaxConnections}");
}

// Usage:
// DatabaseConfig.Instance.PrintConfig();
// DatabaseConfig.Instance.PrintConfig();  // same instance -- no double init

// ===== 2. FACTORY PATTERN =====
// Abstracts object creation -- client code depends on abstraction, not concrete types
// Use case: Creating different notification types (email, SMS, push)

public interface INotification {
    void Send(string recipient, string message);
}

public class EmailNotification : INotification {
    public void Send(string recipient, string message) =>
        Console.WriteLine($"EMAIL to {recipient}: {message}");
}

public class SmsNotification : INotification {
    public void Send(string recipient, string message) =>
        Console.WriteLine($"SMS to {recipient}: {message}");
}

public class PushNotification : INotification {
    public void Send(string recipient, string message) =>
        Console.WriteLine($"PUSH to {recipient}: {message}");
}

// Factory -- centralises creation logic
public static class NotificationFactory {
    public static INotification Create(string type) => type.ToLower() switch {
        "email" => new EmailNotification(),
        "sms"   => new SmsNotification(),
        "push"  => new PushNotification(),
        _ => throw new ArgumentException($"Unknown notification type: {type}")
    };
}

// ===== 3. REPOSITORY PATTERN =====
// Abstracts data access -- business logic doesn't know if data is in SQL, file, or API
// Makes code testable (can swap real repo with mock in unit tests)

public class Student {
    public int Id { get; set; }
    public string Name { get; set; }
    public string Department { get; set; }
    public double GPA { get; set; }
}

// Repository interface -- defines data operations
public interface IStudentRepository {
    Student GetById(int id);
    IEnumerable&lt;Student&gt; GetAll();
    IEnumerable&lt;Student&gt; GetByDepartment(string dept);
    void Add(Student student);
    void Update(Student student);
    void Delete(int id);
}

// In-memory implementation (for testing / demo)
public class InMemoryStudentRepository : IStudentRepository {
    private readonly Dictionary&lt;int, Student&gt; _store = new();
    private int _nextId = 1;

    public void Add(Student s) { s.Id = _nextId++; _store[s.Id] = s; }
    public Student GetById(int id) => _store.TryGetValue(id, out var s) ? s : null;
    public IEnumerable&lt;Student&gt; GetAll() => _store.Values;
    public IEnumerable&lt;Student&gt; GetByDepartment(string dept) =>
        _store.Values.Where(s => s.Department.Equals(dept, StringComparison.OrdinalIgnoreCase));
    public void Update(Student s) { if (_store.ContainsKey(s.Id)) _store[s.Id] = s; }
    public void Delete(int id) => _store.Remove(id);
}

// Service uses repository via interface -- not concrete class
public class StudentService {
    private readonly IStudentRepository _repo;
    private readonly INotification _notifier;

    public StudentService(IStudentRepository repo, INotification notifier) {
        _repo = repo; _notifier = notifier;
    }

    public Student Enroll(string name, string dept, double gpa) {
        var student = new Student { Name = name, Department = dept, GPA = gpa };
        _repo.Add(student);
        _notifier.Send(name, $"Welcome to {dept}! Your student ID is {student.Id}");
        return student;
    }

    public IEnumerable&lt;Student&gt; GetTopStudents(int count = 5) =>
        _repo.GetAll().OrderByDescending(s => s.GPA).Take(count);
}

// ===== 4. OBSERVER PATTERN =====
// Subject notifies multiple observers when state changes
// C# events natively implement this pattern

public class GradeChangedEventArgs : EventArgs {
    public string StudentName { get; set; }
    public double OldGPA { get; set; }
    public double NewGPA { get; set; }
}

public class GradeTracker {  // Subject/Publisher
    private Dictionary&lt;string, double&gt; _grades = new();
    public event EventHandler&lt;GradeChangedEventArgs&gt; GradeUpdated;
    public event EventHandler&lt;string&gt; StudentAdded;

    protected virtual void OnGradeUpdated(GradeChangedEventArgs e)
        => GradeUpdated?.Invoke(this, e);

    public void UpdateGrade(string student, double newGPA) {
        double oldGPA = _grades.TryGetValue(student, out var g) ? g : 0;
        _grades[student] = newGPA;
        if (oldGPA != newGPA)
            OnGradeUpdated(new GradeChangedEventArgs {
                StudentName = student, OldGPA = oldGPA, NewGPA = newGPA });
    }
}

// Observers
public class EmailAlertObserver {
    public void Subscribe(GradeTracker tracker) {
        tracker.GradeUpdated += (sender, e) => {
            if (e.NewGPA &lt; 2.0)
                Console.WriteLine($"EMAIL ALERT: {e.StudentName} GPA dropped to {e.NewGPA:F2}!");
        };
    }
}

public class AuditLogObserver {
    public void Subscribe(GradeTracker tracker) {
        tracker.GradeUpdated += (sender, e) =>
            Console.WriteLine($"AUDIT: {e.StudentName} grade: {e.OldGPA:F2} → {e.NewGPA:F2}");
    }
}

// ===== MAIN =====
class Program {
    static void Main() {
        // Singleton
        Console.WriteLine("=== Singleton ===");
        DatabaseConfig.Instance.PrintConfig();
        DatabaseConfig.Instance.PrintConfig();  // same object

        // Factory
        Console.WriteLine("\n=== Factory ===");
        foreach (string type in new[] { "email", "sms", "push" }) {
            INotification n = NotificationFactory.Create(type);
            n.Send("Alice", "Grade posted");
        }

        // Repository + Service (with DI)
        Console.WriteLine("\n=== Repository ===");
        IStudentRepository repo = new InMemoryStudentRepository();
        INotification emailNotifier = NotificationFactory.Create("email");
        var service = new StudentService(repo, emailNotifier);

        service.Enroll("Alice", "CS", 3.8);
        service.Enroll("Bob", "IT", 3.2);
        service.Enroll("Carol", "CS", 3.9);

        Console.WriteLine("Top 2 students:");
        foreach (var s in service.GetTopStudents(2))
            Console.WriteLine($"  {s.Name}: {s.GPA}");

        // Observer
        Console.WriteLine("\n=== Observer ===");
        var tracker = new GradeTracker();
        new EmailAlertObserver().Subscribe(tracker);
        new AuditLogObserver().Subscribe(tracker);

        tracker.UpdateGrade("Alice", 3.9);
        tracker.UpdateGrade("Bob", 1.8);    // triggers email alert
        tracker.UpdateGrade("Carol", 3.5);
    }
}</div><p><strong>Pattern summary:</strong> Singleton — one instance, global access point. Factory — abstract creation, decouple from concrete types (open/closed principle). Repository — abstract data access (swap SQL with InMemory for unit tests). Observer — notify multiple subscribers of state changes without tight coupling. All patterns follow SOLID principles — especially Open/Closed (extend without modifying) and Dependency Inversion (depend on abstractions, not concretions). The Repository + Dependency Injection combination is the foundation of testable ASP.NET Core applications.</p>`},
  {q:"Write a C# program for LINQ operations: filtering, sorting, grouping, joining, and aggregation.",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>This comprehensive LINQ program demonstrates all major operators across in-memory collections — filtering, projection, sorting, grouping, joining, aggregation, set operations, partitioning, and conversion — using a university domain model.</p><div class="code">using System;
using System.Collections.Generic;
using System.Linq;

// ===== Domain Models =====
public class Student {
    public int Id { get; set; }
    public string Name { get; set; }
    public string Department { get; set; }
    public double GPA { get; set; }
    public int Age { get; set; }
    public DateTime EnrollDate { get; set; }
    public List&lt;string&gt; Courses { get; set; } = new();
}

public class Course {
    public string Code { get; set; }
    public string Title { get; set; }
    public string Department { get; set; }
    public int Credits { get; set; }
    public string InstructorName { get; set; }
}

public class Enrollment {
    public int StudentId { get; set; }
    public string CourseCode { get; set; }
    public double Marks { get; set; }
}

class Program {
    static void Main() {
        // ===== DATA SETUP =====
        var students = new List&lt;Student&gt; {
            new Student { Id=1, Name="Alice", Department="CS", GPA=3.8, Age=21,
                EnrollDate=new DateTime(2022,7,1),
                Courses=new List&lt;string&gt;{"CN","DBMS","OS"} },
            new Student { Id=2, Name="Bob",   Department="IT", GPA=3.2, Age=20,
                EnrollDate=new DateTime(2022,7,1),
                Courses=new List&lt;string&gt;{"CN","AI"} },
            new Student { Id=3, Name="Carol", Department="CS", GPA=3.9, Age=22,
                EnrollDate=new DateTime(2021,7,1),
                Courses=new List&lt;string&gt;{"DBMS","AI","Cloud"} },
            new Student { Id=4, Name="Dave",  Department="ECE",GPA=2.8, Age=21,
                EnrollDate=new DateTime(2023,7,1),
                Courses=new List&lt;string&gt;{"CN"} },
            new Student { Id=5, Name="Eve",   Department="IT", GPA=3.5, Age=20,
                EnrollDate=new DateTime(2022,7,1),
                Courses=new List&lt;string&gt;{"AI","Cloud","Security"} }
        };

        var courses = new List&lt;Course&gt; {
            new Course { Code="CN",  Title="Computer Networks",  Department="CS", Credits=4, InstructorName="Dr.Smith" },
            new Course { Code="DBMS",Title="Database Systems",   Department="CS", Credits=4, InstructorName="Dr.Gupta" },
            new Course { Code="AI",  Title="Artificial Intell.", Department="CS", Credits=3, InstructorName="Dr.Lee"   },
            new Course { Code="Cloud",Title="Cloud Computing",   Department="IT", Credits=3, InstructorName="Dr.Patel" },
            new Course { Code="OS",  Title="Operating Systems",  Department="CS", Credits=4, InstructorName="Dr.Mehta" }
        };

        var enrollments = new List&lt;Enrollment&gt; {
            new Enrollment { StudentId=1, CourseCode="CN",   Marks=85 },
            new Enrollment { StudentId=1, CourseCode="DBMS", Marks=90 },
            new Enrollment { StudentId=2, CourseCode="CN",   Marks=72 },
            new Enrollment { StudentId=3, CourseCode="AI",   Marks=95 },
            new Enrollment { StudentId=5, CourseCode="AI",   Marks=88 }
        };

        Console.WriteLine("===== 1. FILTERING (Where) =====");
        var highGPA = students.Where(s => s.GPA >= 3.5);
        Console.WriteLine("GPA >= 3.5: " + string.Join(", ", highGPA.Select(s => s.Name)));

        var youngCS = students.Where(s => s.Department == "CS" && s.Age <= 21);
        Console.WriteLine("Young CS students: " + string.Join(", ", youngCS.Select(s => s.Name)));

        Console.WriteLine("\n===== 2. PROJECTION (Select, SelectMany) =====");
        // Projection to anonymous type
        var nameGPA = students.Select(s => new { s.Name, s.GPA, Grade = s.GPA >= 3.7 ? "A" : "B" });
        foreach (var item in nameGPA)
            Console.WriteLine($"  {item.Name}: {item.GPA:F1} ({item.Grade})");

        // SelectMany -- flatten nested collections
        var allCourses = students.SelectMany(s => s.Courses).Distinct().OrderBy(c => c);
        Console.WriteLine("All unique courses: " + string.Join(", ", allCourses));

        Console.WriteLine("\n===== 3. SORTING (OrderBy, ThenBy) =====");
        var sorted = students.OrderByDescending(s => s.GPA).ThenBy(s => s.Name);
        foreach (var s in sorted)
            Console.WriteLine($"  {s.Name}: GPA {s.GPA:F1} ({s.Department})");

        Console.WriteLine("\n===== 4. GROUPING =====");
        var byDept = students.GroupBy(s => s.Department)
            .Select(g => new {
                Department = g.Key,
                Count = g.Count(),
                AvgGPA = g.Average(s => s.GPA),
                Students = g.Select(s => s.Name).ToList()
            })
            .OrderByDescending(g => g.AvgGPA);

        foreach (var group in byDept) {
            Console.WriteLine($"  {group.Department}: {group.Count} students, Avg GPA: {group.AvgGPA:F2}");
            Console.WriteLine($"    Members: {string.Join(", ", group.Students)}");
        }

        Console.WriteLine("\n===== 5. JOIN =====");
        // Inner join -- students with their enrollment marks
        var enrolled = students.Join(
            enrollments,
            s => s.Id,
            e => e.StudentId,
            (s, e) => new { s.Name, e.CourseCode, e.Marks }
        );
        foreach (var e in enrolled)
            Console.WriteLine($"  {e.Name} in {e.CourseCode}: {e.Marks}");

        // Join + nested join -- student name + course title + marks
        var detailed = from s in students
                       join e in enrollments on s.Id equals e.StudentId
                       join c in courses on e.CourseCode equals c.Code
                       select new {
                           Student = s.Name,
                           Course = c.Title,
                           e.Marks,
                           c.Credits
                       };
        Console.WriteLine("\nDetailed enrollments:");
        foreach (var d in detailed)
            Console.WriteLine($"  {d.Student}: {d.Course} | Marks: {d.Marks} | Credits: {d.Credits}");

        // Left outer join (GroupJoin) -- all students, even unenrolled
        var leftJoin = from s in students
                       join e in enrollments on s.Id equals e.StudentId into studentEnrollments
                       from se in studentEnrollments.DefaultIfEmpty()
                       select new { s.Name, Course = se?.CourseCode ?? "Not enrolled", Marks = se?.Marks ?? 0 };

        Console.WriteLine("\n===== 6. AGGREGATION =====");
        Console.WriteLine($"Total students: {students.Count()}");
        Console.WriteLine($"Average GPA: {students.Average(s => s.GPA):F2}");
        Console.WriteLine($"Highest GPA: {students.Max(s => s.GPA)}");
        Console.WriteLine($"Lowest GPA:  {students.Min(s => s.GPA)}");
        Console.WriteLine($"Sum of all GPAs: {students.Sum(s => s.GPA):F1}");
        Console.WriteLine($"CS count: {students.Count(s => s.Department == "CS")}");

        Console.WriteLine("\n===== 7. SET OPERATIONS =====");
        var csDepts = students.Where(s => s.Department == "CS").Select(s => s.Name);
        var highGPAStudents = students.Where(s => s.GPA >= 3.5).Select(s => s.Name);

        Console.WriteLine("CS students: " + string.Join(", ", csDepts));
        Console.WriteLine("High GPA: " + string.Join(", ", highGPAStudents));
        Console.WriteLine("CS AND High GPA (Intersect): " + string.Join(", ", csDepts.Intersect(highGPAStudents)));
        Console.WriteLine("CS OR High GPA (Union): " + string.Join(", ", csDepts.Union(highGPAStudents)));
        Console.WriteLine("CS NOT High GPA (Except): " + string.Join(", ", csDepts.Except(highGPAStudents)));

        Console.WriteLine("\n===== 8. PARTITIONING =====");
        var page1 = students.OrderBy(s => s.Name).Take(3);
        var page2 = students.OrderBy(s => s.Name).Skip(3).Take(3);
        Console.WriteLine("Page 1: " + string.Join(", ", page1.Select(s => s.Name)));
        Console.WriteLine("Page 2: " + string.Join(", ", page2.Select(s => s.Name)));

        // TakeWhile / SkipWhile -- take/skip while condition is true
        var ordered = students.OrderByDescending(s => s.GPA);
        var topTilDrop = ordered.TakeWhile(s => s.GPA >= 3.5);
        Console.WriteLine("Take while GPA >= 3.5: " + string.Join(", ", topTilDrop.Select(s => s.Name)));

        Console.WriteLine("\n===== 9. ELEMENT OPERATIONS =====");
        Console.WriteLine($"First: {students.First().Name}");
        Console.WriteLine($"Last: {students.Last().Name}");
        Console.WriteLine($"Top GPA student: {students.MaxBy(s => s.GPA)?.Name}");
        Console.WriteLine($"Find Alice: {students.SingleOrDefault(s => s.Name == "Alice")?.Name}");
        Console.WriteLine($"Any GPA > 3.9: {students.Any(s => s.GPA > 3.9)}");
        Console.WriteLine($"All GPA >= 2.5: {students.All(s => s.GPA >= 2.5)}");

        Console.WriteLine("\n===== 10. CONVERSION =====");
        Dictionary&lt;int, string&gt; idNameMap = students.ToDictionary(s => s.Id, s => s.Name);
        ILookup&lt;string, Student&gt; byDeptLookup = students.ToLookup(s => s.Department);
        HashSet&lt;string&gt; uniqueDepts = students.Select(s => s.Department).ToHashSet();

        Console.WriteLine($"Unique departments: {string.Join(", ", uniqueDepts)}");
        Console.WriteLine($"CS students (lookup): {string.Join(", ", byDeptLookup["CS"].Select(s => s.Name))}");
    }
}</div><p><strong>LINQ execution model:</strong> LINQ queries are lazy-evaluated (deferred execution) — they build an expression tree when defined but only execute when iterated (foreach, ToList(), Count(), etc.). This enables query composition (chain multiple Where/Select/OrderBy) without multiple passes over the data. ToList()/ToArray() forces immediate execution. LINQ-to-Objects (IEnumerable) executes in-process. LINQ-to-Entities (IQueryable, EF Core) translates expressions to SQL — only filtered data returned from DB. Understanding this distinction prevents the N+1 query problem (calling ToList() inside a loop on an IQueryable).</p>`},
