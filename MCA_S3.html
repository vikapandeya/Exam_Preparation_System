    print(f"Status: {resp.status}")
    if resp.ok and resp.data:
        for post in resp.data:
            print(f"  [{post['id']}] {post['title'][:60]}")

    # GET single resource
    print("\n=== GET post #1 ===")
    resp = client.get('/posts/1')
    resp.raise_for_status()
    print(json.dumps(resp.data, indent=2))

    # POST -- create resource
    print("\n=== POST new post ===")
    resp = client.post('/posts', body={
        'title': 'Lab Exercise: Socket Programming',
        'body': 'Demonstrates HTTP client using sockets',
        'userId': 1
    })
    resp.raise_for_status()
    print(f"Created post ID: {resp.data.get('id')}")

    # PUT -- update
    print("\n=== PUT update post ===")
    resp = client.put('/posts/1', body={'id': 1, 'title': 'Updated Title', 'userId': 1})
    print(f"Update status: {resp.status}")

    # DELETE
    print("\n=== DELETE post ===")
    resp = client.delete('/posts/1')
    print(f"Delete status: {resp.status} (200 = success on JSONPlaceholder)")

    # Error handling demo
    print("\n=== Error handling ===")
    resp = client.get('/posts/99999')
    try:
        resp.raise_for_status()
    except FileNotFoundError as e:
        print(f"Caught: {e}")

if __name__ == '__main__':
    demo_api()</div><p><strong>Key design decisions:</strong> Exponential backoff on retransmit — waiting 1s, 2s, 4s between retries avoids hammering a recovering server. raise_for_status() maps HTTP status codes to Python exceptions — enables try/except by error type instead of checking status code everywhere. Bearer token is the standard for OAuth2/JWT APIs. Basic Auth encodes credentials in base64 (not encrypted — HTTPS required). 429 Too Many Requests — APIs enforce rate limits; parse Retry-After header. 422 Unprocessable Entity — request was well-formed but semantically invalid (validation errors). Use http.client (stdlib) to avoid external dependencies in constrained environments; use the requests library for production code — it handles redirects, sessions, cookies, streaming, and connection pooling automatically.</p>`},
  {q:"Write a Python program implementing SSL/TLS socket communication with certificate verification.",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>SSL/TLS adds encryption, authentication, and integrity to TCP connections. Python's <code>ssl</code> module wraps raw sockets with TLS. This program demonstrates both client and server with certificate verification, mutual TLS (mTLS), and inspection of the TLS handshake details.</p><div class="code">import socket
import ssl
import threading
import subprocess
import os

# ===== STEP 0: GENERATE SELF-SIGNED CERTIFICATES (run once) =====
def generate_certs():
    # CA key and certificate
    subprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:4096', '-days', '365',
                    '-keyout', 'ca.key', '-out', 'ca.crt', '-nodes',
                    '-subj', '/C=IN/O=LabCA/CN=Lab-CA'], check=True)
    # Server key and CSR
    subprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-keyout', 'server.key',
                    '-out', 'server.csr', '-nodes',
                    '-subj', '/C=IN/O=LabServer/CN=localhost'], check=True)
    # Sign server cert with CA
    subprocess.run(['openssl', 'x509', '-req', '-in', 'server.csr',
                    '-CA', 'ca.crt', '-CAkey', 'ca.key', '-CAcreateserial',
                    '-out', 'server.crt', '-days', '365'], check=True)
    print("Certificates generated: ca.crt, server.crt, server.key")

# ===== TLS SERVER =====
HOST = '127.0.0.1'
PORT = 9443

def tls_server():
    # Server SSL context
    context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
    context.load_cert_chain('server.crt', 'server.key')  # server identity
    context.load_verify_locations('ca.crt')               # CA to verify clients
    context.verify_mode = ssl.CERT_OPTIONAL   # CERT_REQUIRED for mandatory mTLS
    context.minimum_version = ssl.TLSVersion.TLSv1_2     # disallow old versions
    # Prefer forward-secret cipher suites
    context.set_ciphers('ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:!aNULL:!RC4:!3DES')

    with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as raw_sock:
        raw_sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
        raw_sock.bind((HOST, PORT))
        raw_sock.listen(5)
        print(f"[TLS Server] Listening on {HOST}:{PORT}")

        while True:
            conn, addr = raw_sock.accept()
            t = threading.Thread(target=handle_tls_client,
                                 args=(conn, addr, context), daemon=True)
            t.start()

def handle_tls_client(raw_conn, addr, context):
    try:
        with context.wrap_socket(raw_conn, server_side=True) as tls_conn:
            # Inspect TLS handshake details
            cipher_name, tls_version, key_bits = tls_conn.cipher()
            print(f"\n[TLS] Client {addr} connected")
            print(f"  TLS Version: {tls_version}")
            print(f"  Cipher: {cipher_name} ({key_bits}-bit key)")

            # Check client certificate (if provided)
            client_cert = tls_conn.getpeercert()
            if client_cert:
                subject = dict(x[0] for x in client_cert['subject'])
                print(f"  Client CN: {subject.get('commonName', 'N/A')}")
                not_after = client_cert.get('notAfter', '')
                print(f"  Client cert valid until: {not_after}")
            else:
                print("  No client certificate presented")

            while True:
                data = tls_conn.recv(4096)
                if not data:
                    break
                message = data.decode()
                print(f"  [Recv] {message}")
                # Echo back encrypted response
                response = f"[Encrypted Echo] {message}"
                tls_conn.sendall(response.encode())

    except ssl.SSLError as e:
        print(f"[TLS Error] {addr}: {e}")

# ===== TLS CLIENT =====
def tls_client(verify_server=True, use_client_cert=False):
    # Client SSL context
    context = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
    context.minimum_version = ssl.TLSVersion.TLSv1_2

    if verify_server:
        context.load_verify_locations('ca.crt')  # trust our CA
        context.verify_mode = ssl.CERT_REQUIRED
        context.check_hostname = True
    else:
        # INSECURE -- only for testing with self-signed certs
        context.check_hostname = False
        context.verify_mode = ssl.CERT_NONE

    if use_client_cert:
        # Mutual TLS -- client presents its certificate
        context.load_cert_chain('client.crt', 'client.key')

    with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as raw_sock:
        with context.wrap_socket(raw_sock, server_hostname='localhost') as tls_conn:
            tls_conn.connect((HOST, PORT))

            # Inspect TLS handshake
            cipher_name, tls_version, key_bits = tls_conn.cipher()
            print(f"\n[TLS Client] Connected to {HOST}:{PORT}")
            print(f"  TLS Version: {tls_version}")
            print(f"  Cipher Suite: {cipher_name}")

            # Inspect server certificate
            server_cert = tls_conn.getpeercert()
            subject = dict(x[0] for x in server_cert['subject'])
            issuer  = dict(x[0] for x in server_cert['issuer'])
            print(f"  Server CN: {subject.get('commonName')}")
            print(f"  Issued by: {issuer.get('commonName')}")
            print(f"  Valid from: {server_cert['notBefore']} to {server_cert['notAfter']}")

            # SANs -- Subject Alternative Names
            sans = [v for (t, v) in server_cert.get('subjectAltName', []) if t == 'DNS']
            print(f"  SANs: {sans}")

            # Send encrypted messages
            messages = ["Hello TLS!", "Secure message 2", "Goodbye"]
            for msg in messages:
                tls_conn.sendall(msg.encode())
                response = tls_conn.recv(4096)
                print(f"  [Sent] {msg}")
                print(f"  [Recv] {response.decode()}")

# ===== INSPECT REMOTE SERVER CERT =====
def inspect_server_cert(hostname, port=443):
    context = ssl.create_default_context()
    with socket.create_connection((hostname, port), timeout=5) as raw:
        with context.wrap_socket(raw, server_hostname=hostname) as tls:
            cert = tls.getpeercert()
            print(f"\nCertificate for {hostname}:{port}")
            subject = dict(x[0] for x in cert['subject'])
            print(f"  CN: {subject.get('commonName')}")
            issuer = dict(x[0] for x in cert['issuer'])
            print(f"  Issuer: {issuer.get('organizationName')}")
            print(f"  Expires: {cert['notAfter']}")
            sans = [v for (t, v) in cert.get('subjectAltName', []) if t == 'DNS']
            print(f"  SANs: {', '.join(sans[:5])}")
            print(f"  TLS version: {tls.version()}")
            print(f"  Cipher: {tls.cipher()}")

if __name__ == '__main__':
    import sys
    if len(sys.argv) > 1:
        if sys.argv[1] == 'gencerts': generate_certs()
        elif sys.argv[1] == 'server':  tls_server()
        elif sys.argv[1] == 'client':  tls_client(verify_server=True)
        elif sys.argv[1] == 'inspect': inspect_server_cert(sys.argv[2])
    else:
        # Demo: inspect a real site
        inspect_server_cert('google.com')</div><p><strong>TLS handshake overview:</strong> 1) Client Hello — client sends supported TLS versions, cipher suites, random bytes. 2) Server Hello — server selects version and cipher, sends certificate. 3) Certificate verification — client verifies server cert against trusted CA. 4) Key Exchange — ECDHE generates ephemeral shared secret (forward secrecy). 5) Finished — both sides confirm handshake integrity. All subsequent data is encrypted with AES-GCM or ChaCha20-Poly1305. Forward Secrecy (ECDHE): session keys are derived per-connection — compromising the server's private key does not decrypt past sessions. Mutual TLS (mTLS): both client and server present certificates — used in microservice-to-microservice authentication. Never use ssl.CERT_NONE in production — disables all certificate verification and allows MITM attacks.</p>`},
  {q:"Implement a Python network packet analyser using the socket module. Capture and decode IP and TCP headers.",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>A packet analyser (sniffer) captures raw IP packets from the network interface and decodes their headers. This requires a raw socket (requires root/admin). We parse Ethernet frames, IPv4 headers, TCP segments, UDP datagrams, and ICMP messages.</p><div class="code">import socket
import struct
import time
import sys
from collections import defaultdict

# ===== PACKET PARSING UTILITIES =====
def parse_ethernet(raw_data):
    # Ethernet frame: [dest MAC (6B)][src MAC (6B)][EtherType (2B)][payload]
    dest_mac = raw_data[:6]
    src_mac  = raw_data[6:12]
    eth_type = struct.unpack('!H', raw_data[12:14])[0]  # 0x0800=IPv4, 0x0806=ARP
    payload  = raw_data[14:]
    return {
        'dest_mac': ':'.join(f'{b:02X}' for b in dest_mac),
        'src_mac':  ':'.join(f'{b:02X}' for b in src_mac),
        'eth_type': eth_type,
        'payload': payload
    }

def parse_ipv4(raw):
    # IPv4 header: minimum 20 bytes
    # [version+IHL (1B)][DSCP+ECN (1B)][total length (2B)][identification (2B)]
    # [flags+fragment offset (2B)][TTL (1B)][protocol (1B)][checksum (2B)]
    # [source IP (4B)][destination IP (4B)][options (0-40B)]
    ihl = (raw[0] & 0x0F) * 4      # IHL field = header length in 32-bit words
    version = raw[0] >> 4
    dscp = raw[1] >> 2
    total_len = struct.unpack('!H', raw[2:4])[0]
    ttl = raw[8]
    protocol = raw[9]
    src_ip = socket.inet_ntoa(raw[12:16])
    dst_ip = socket.inet_ntoa(raw[16:20])
    payload = raw[ihl:]
    flags_frag = struct.unpack('!H', raw[6:8])[0]
    df_flag = bool(flags_frag & 0x4000)  # Don't Fragment
    mf_flag = bool(flags_frag & 0x2000)  # More Fragments
    frag_offset = (flags_frag & 0x1FFF) * 8

    return {
        'version': version, 'ihl': ihl, 'total_len': total_len,
        'ttl': ttl, 'protocol': protocol, 'src': src_ip, 'dst': dst_ip,
        'df': df_flag, 'mf': mf_flag, 'frag_offset': frag_offset,
        'payload': payload
    }

def parse_tcp(raw):
    # TCP segment: minimum 20 bytes
    # [src port (2B)][dst port (2B)][seq (4B)][ack (4B)]
    # [data offset+reserved (1B)][flags (1B)][window (2B)][checksum (2B)][urgent (2B)]
    src_port, dst_port = struct.unpack('!HH', raw[:4])
    seq_num  = struct.unpack('!I', raw[4:8])[0]
    ack_num  = struct.unpack('!I', raw[8:12])[0]
    offset = (raw[12] >> 4) * 4   # data offset (header length)
    flags_byte = raw[13]
    flags = {
        'URG': bool(flags_byte & 0x20),
        'ACK': bool(flags_byte & 0x10),
        'PSH': bool(flags_byte & 0x08),
        'RST': bool(flags_byte & 0x04),
        'SYN': bool(flags_byte & 0x02),
        'FIN': bool(flags_byte & 0x01)
    }
    window = struct.unpack('!H', raw[14:16])[0]
    payload = raw[offset:]
    return {
        'src_port': src_port, 'dst_port': dst_port,
        'seq': seq_num, 'ack': ack_num,
        'flags': flags, 'window': window, 'payload': payload
    }

def parse_udp(raw):
    src_port, dst_port, length, checksum = struct.unpack('!HHHH', raw[:8])
    return {'src_port': src_port, 'dst_port': dst_port,
            'length': length, 'payload': raw[8:]}

def parse_icmp(raw):
    icmp_type, code = raw[0], raw[1]
    checksum = struct.unpack('!H', raw[2:4])[0]
    TYPES = {0: 'Echo Reply', 3: 'Dest Unreachable',
             8: 'Echo Request', 11: 'Time Exceeded'}
    return {'type': icmp_type, 'type_name': TYPES.get(icmp_type, 'Unknown'),
            'code': code, 'checksum': hex(checksum)}

PROTO_MAP = {1: 'ICMP', 6: 'TCP', 17: 'UDP', 89: 'OSPF'}

# ===== PACKET SNIFFER =====
class PacketSniffer:
    def __init__(self, interface=None, filter_proto=None, count=None):
        self.interface = interface
        self.filter_proto = filter_proto  # 'TCP', 'UDP', 'ICMP', or None (all)
        self.count = count
        self.stats = defaultdict(int)

    def start(self):
        # AF_PACKET = raw socket at Ethernet level (Linux only, requires root)
        # Windows: use AF_INET + IPPROTO_IP with SIO_RCVALL
        if sys.platform == 'win32':
            raw_sock = socket.socket(socket.AF_INET, socket.SOCK_RAW, socket.IPPROTO_IP)
            raw_sock.bind((socket.gethostbyname(socket.gethostname()), 0))
            raw_sock.setsockopt(socket.IPPROTO_IP, socket.IP_HDRINCL, 1)
            import ctypes
            raw_sock.ioctl(socket.SIO_RCVALL, socket.RCVALL_ON)
            use_ethernet = False
        else:
            raw_sock = socket.socket(socket.AF_PACKET, socket.SOCK_RAW,
                                     socket.htons(0x0003))  # capture all protocols
            use_ethernet = True

        print(f"[Sniffer] Capturing packets (filter={self.filter_proto or 'ALL'})...")
        captured = 0
        try:
            while self.count is None or captured < self.count:
                raw_data, _ = raw_sock.recvfrom(65535)
                self.process_packet(raw_data, use_ethernet)
                captured += 1
        except KeyboardInterrupt:
            print("\n[Sniffer] Stopped by user")
        finally:
            if sys.platform == 'win32':
                raw_sock.ioctl(socket.SIO_RCVALL, socket.RCVALL_OFF)
            raw_sock.close()
        self.print_stats()

    def process_packet(self, raw_data, has_ethernet):
        ts = time.strftime('%H:%M:%S')
        if has_ethernet:
            eth = parse_ethernet(raw_data)
            if eth['eth_type'] != 0x0800:  # not IPv4
                return
            ip_raw = eth['payload']
        else:
            ip_raw = raw_data

        ip = parse_ipv4(ip_raw)
        proto_name = PROTO_MAP.get(ip['protocol'], str(ip['protocol']))
        self.stats[proto_name] += 1

        if self.filter_proto and proto_name != self.filter_proto:
            return

        print(f"\n[{ts}] {proto_name}: {ip['src']} -> {ip['dst']} "
              f"TTL={ip['ttl']} LEN={ip['total_len']}")

        if ip['protocol'] == 6:    # TCP
            tcp = parse_tcp(ip['payload'])
            active_flags = [f for f, v in tcp['flags'].items() if v]
            print(f"  TCP  {ip['src']}:{tcp['src_port']} -> {ip['dst']}:{tcp['dst_port']}")
            print(f"  Flags=[{','.join(active_flags)}]  SEQ={tcp['seq']}  ACK={tcp['ack']}  WIN={tcp['window']}")
            if tcp['payload']:
                preview = tcp['payload'][:80].decode(errors='replace').replace('\n',' ')
                print(f"  Data: {preview}")
        elif ip['protocol'] == 17:  # UDP
            udp = parse_udp(ip['payload'])
            print(f"  UDP  {ip['src']}:{udp['src_port']} -> {ip['dst']}:{udp['dst_port']}  LEN={udp['length']}")
        elif ip['protocol'] == 1:   # ICMP
            icmp = parse_icmp(ip['payload'])
            print(f"  ICMP  Type={icmp['type']} ({icmp['type_name']})  Code={icmp['code']}")

    def print_stats(self):
        print("\n[Stats]")
        for proto, count in sorted(self.stats.items(), key=lambda x: -x[1]):
            print(f"  {proto}: {count} packets")

if __name__ == '__main__':
    # Requires root/admin: sudo python sniffer.py TCP 50
    proto_filter = sys.argv[1].upper() if len(sys.argv) > 1 else None
    pkt_count    = int(sys.argv[2]) if len(sys.argv) > 2 else 20
    sniffer = PacketSniffer(filter_proto=proto_filter, count=pkt_count)
    sniffer.start()</div><p><strong>IPv4 header fields:</strong> Version (4 bits) always 4. IHL (4 bits) — header length in 32-bit words (minimum 5 = 20 bytes). TTL — decremented at each router hop; reaches 0 = packet dropped (prevents routing loops). Protocol — identifies the encapsulated protocol (6=TCP, 17=UDP, 1=ICMP). DF flag — Don't Fragment; used in Path MTU Discovery. TCP flags — SYN (connection start), ACK (acknowledgement), FIN (graceful close), RST (abrupt reset), PSH (push to application), URG (urgent data). Wireshark and tcpdump use similar raw socket capture — this program implements a basic version of the same concept. Important: raw socket sniffing requires elevated privileges (root on Linux, Administrator on Windows). Use responsibly — only on networks you own or have permission to monitor.</p>`},

  {q:"What is a socket? What are the two main socket types in Python?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>A <strong>socket</strong> is a software endpoint that enables bidirectional communication between two processes — either on the same machine or across a network. It is the fundamental API for network programming, providing a file-like interface to the network stack. Python's <code>socket</code> module (part of the standard library) wraps the OS Berkeley Sockets API.</p><p><strong>Socket address:</strong> A socket is identified by (IP address, port number, protocol). A connection is a 4-tuple: (source IP, source port, dest IP, dest port).</p><p><strong>Two main socket types in Python:</strong></p><ul><li><strong>SOCK_STREAM (TCP socket):</strong> Connection-oriented, reliable, ordered, byte-stream socket using the Transmission Control Protocol. Data is guaranteed to arrive intact, in order, without duplicates. Requires a connection establishment phase (connect/accept) before data transfer. Used for: web servers (HTTP/HTTPS), file transfer, email, database connections — any application requiring reliability.</li></ul><div class="code">import socket
# Create a TCP socket
tcp_sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
print(tcp_sock.type)  # SocketKind.SOCK_STREAM: 1</div><ul><li><strong>SOCK_DGRAM (UDP socket):</strong> Connectionless, unreliable, message-based socket using the User Datagram Protocol. Each send() call produces one independent datagram. No guarantee of delivery, ordering, or non-duplication. Minimal overhead — no connection setup. Used for: DNS queries, DHCP, real-time streaming, gaming, VoIP — applications favouring speed over reliability.</li></ul><div class="code">udp_sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
print(udp_sock.type)  # SocketKind.SOCK_DGRAM: 2</div><p><strong>Address families:</strong> AF_INET (IPv4), AF_INET6 (IPv6), AF_UNIX (local inter-process communication). Default: AF_INET for internet sockets.</p>`},
  {q:"What is the difference between bind() and connect()?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p><code>bind()</code> and <code>connect()</code> serve opposite purposes — bind is used by the server; connect is used by the client.</p><p><strong>bind(address) — Server side:</strong> Associates the socket with a specific local IP address and port number. The server is telling the OS: "I want to receive incoming connections/data on this IP and port." Once bound, the server can listen for incoming connections (TCP) or receive datagrams (UDP).</p><div class="code">import socket

server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
server.bind(('', 9090))           # '' or '0.0.0.0' = all interfaces
server.listen(5)
print("Server bound and listening on port 9090")</div><p><strong>connect(address) — Client side:</strong> Initiates a TCP connection to a remote server. The OS automatically assigns an ephemeral source port for the client — the client typically does NOT call bind().</p><div class="code">client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
client.connect(('127.0.0.1', 9090))
print("Connected to server")
client.sendall(b"Hello server!")
response = client.recv(1024)
client.close()</div><p><strong>Key difference:</strong> bind() = "I live here" (server declares its address). connect() = "I want to talk to you" (client initiates contact to server's address). A server socket is bound to a well-known port; client sockets get randomly assigned ephemeral ports (49152-65535). In UDP, connect() does not send packets — it just sets the default destination address for subsequent send()/recv() calls. bind() must be called before listen() on a TCP server; connect() triggers the 3-way handshake on a TCP client.</p>`},
  {q:"Write the basic TCP server setup in Python (5 lines).",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>The minimal TCP server skeleton in Python requires 5 core lines. A production server adds error handling, threading, and graceful shutdown.</p><div class="code">import socket

# === Minimal 5-line TCP server ===
server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)  # 1. Create socket
server.bind(('', 9090))                                      # 2. Bind to port
server.listen(5)                                             # 3. Start listening
conn, addr = server.accept()                                 # 4. Accept client
conn.sendall(b"Hello from server!")                          # 5. Communicate</div><div class="code">import socket, threading

# === Production TCP server with threading ===
def handle_client(conn, addr):
    print(f"Connected: {addr[0]}:{addr[1]}")
    try:
        while True:
            data = conn.recv(4096)
            if not data: break
            conn.sendall(f"Echo: {data.decode()}".encode('utf-8'))
    except ConnectionResetError:
        print(f"Client {addr} disconnected abruptly")
    finally:
        conn.close()

def start_server(host='', port=9090):
    server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
    server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
    server.bind((host, port))
    server.listen(10)
    print(f"Server listening on port {port}...")
    try:
        while True:
            conn, addr = server.accept()
            t = threading.Thread(target=handle_client, args=(conn, addr))
            t.daemon = True
            t.start()
    except KeyboardInterrupt:
        print("Shutting down...")
    finally:
        server.close()

if __name__ == '__main__':
    start_server()</div><p><strong>Key parameters:</strong> <code>listen(backlog)</code> — OS queue size for incoming connections not yet accepted. <code>recv(bufsize)</code> — max bytes to receive per call; call in a loop for large data. Empty bytes from recv() means client closed connection. SO_REUSEADDR allows port reuse immediately after server restart without waiting for TIME_WAIT expiry.</p>`},
  {q:"What is SOCK_STREAM vs SOCK_DGRAM?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>These two socket types correspond to TCP and UDP respectively — choosing the right one is a fundamental network programming decision.</p><p><strong>SOCK_STREAM (TCP — Transmission Control Protocol):</strong></p><ul><li><strong>Connection-oriented:</strong> Must call connect()/accept() before data transfer — 3-way handshake (SYN, SYN-ACK, ACK).</li><li><strong>Reliable delivery:</strong> OS guarantees all data arrives, without corruption, and in order — automatic retransmission on loss.</li><li><strong>Byte stream:</strong> No message boundaries — recv() may return partial data; must loop until full message received.</li><li><strong>Flow and congestion control:</strong> Sender adjusts to receiver buffer capacity and network conditions.</li><li><strong>Overhead:</strong> Higher (connection setup, ACKs, state maintenance).</li></ul><div class="code">import socket
tcp = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
tcp.connect(('server', 80))
tcp.sendall(b'GET / HTTP/1.0\r\n\r\n')
data = b''
while True:
    chunk = tcp.recv(4096)
    if not chunk: break
    data += chunk          # must loop — stream has no boundaries</div><p><strong>SOCK_DGRAM (UDP — User Datagram Protocol):</strong></p><ul><li><strong>Connectionless:</strong> No connection setup — send data directly to any address.</li><li><strong>Unreliable:</strong> No delivery guarantee — datagrams may be lost, reordered, or duplicated.</li><li><strong>Message-based:</strong> Each sendto()/recvfrom() is one complete datagram — message boundaries are preserved.</li><li><strong>Low overhead:</strong> Minimal headers, no connection state — very fast.</li></ul><div class="code">udp = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
udp.sendto(b'ping', ('8.8.8.8', 53))     # each sendto = one datagram
data, addr = udp.recvfrom(1024)            # recvfrom returns complete message</div><p><strong>Decision rule:</strong> Need reliability, order, completeness: SOCK_STREAM (TCP). Need speed, multicast, or can tolerate loss: SOCK_DGRAM (UDP). DNS, VoIP, live video = UDP. HTTP, FTP, SSH, databases = TCP.</p>`},
  {q:"How does UDP socket programming differ from TCP in Python?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>The key structural difference: UDP has no connection phase — server and client exchange datagrams directly without calling listen()/accept()/connect().</p><div class="code">import socket

# ===== UDP SERVER =====
def udp_server():
    sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
    sock.bind(('', 9091))
    print("UDP server listening on 9091")
    while True:
        # recvfrom returns data AND sender's address (unlike TCP recv)
        data, client_addr = sock.recvfrom(1024)
        print(f"Received from {client_addr}: {data.decode()}")
        sock.sendto(f"Echo: {data.decode()}".encode(), client_addr)

# ===== UDP CLIENT =====
def udp_client():
    sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
    server_addr = ('127.0.0.1', 9091)
    sock.sendto(b"Hello UDP server!", server_addr)
    sock.settimeout(3.0)
    try:
        data, server = sock.recvfrom(1024)
        print(f"Response: {data.decode()}")
    except socket.timeout:
        print("No response — datagram may have been lost")
    sock.close()</div><p><strong>Key differences from TCP:</strong></p><ul><li>No listen(), accept() on server — UDP server just binds and recvfrom().</li><li>No connect() on client — UDP client just sendto() directly.</li><li>Use sendto(data, address) and recvfrom(bufsize) instead of send()/recv().</li><li>No connection state — server handles multiple clients from a single socket (recvfrom returns sender's address each time).</li><li>Must set timeouts manually — no delivery guarantee means recvfrom could wait forever.</li><li>Must handle packet loss in application code if reliability needed (implement ACK + retry logic).</li></ul><p><strong>UDP use cases:</strong> DNS queries (short request/reply), streaming media (latency over reliability), game state updates, broadcast/multicast (TCP cannot broadcast).</p>`},
  {q:"What does socket.accept() return?",u:"Unit 02",a:`<span class="utag">Unit 02</span><p><code>socket.accept()</code> is a blocking call on a TCP server socket that waits for an incoming client connection. When a client connects, it returns a <strong>2-tuple: (conn, address)</strong>.</p><div class="code">import socket, threading

server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
server.bind(('', 9090))
server.listen(5)
print("Waiting for connections...")

# accept() BLOCKS until a client connects
conn, address = server.accept()

# What accept() returns:
# conn    -- a NEW socket object dedicated to this one client connection
# address -- a tuple: ('client_ip_string', client_port_int)

print(f"Client IP:   {address[0]}")   # e.g., '192.168.1.50'
print(f"Client port: {address[1]}")   # e.g., 49823 (ephemeral port)
print(f"conn type:   {type(conn)}")   # class 'socket.socket'

data = conn.recv(1024)
conn.sendall(b"Welcome!")
conn.close()

# Why two separate sockets?
# server socket: listening on port 9090 -- never used for data, only accept()
# conn socket:   unique per-client -- used for actual data exchange
def handle(c, a):
    c.recv(1024); c.sendall(b"Hi!"); c.close()

while True:
    conn, addr = server.accept()       # returns new conn each time
    threading.Thread(target=handle, args=(conn, addr)).start()</div><p><strong>accept() semantics:</strong> Dequeues the first completed connection from the backlog queue (filled by OS when clients call connect()). Returns immediately if the queue is non-empty. Blocks if no client is waiting. The returned <code>conn</code> socket represents the communication channel for that one specific client. The original <code>server</code> socket remains available to accept more clients. For multi-client servers, each conn should be handled in a separate thread.</p>`},
  {q:"Write a Python line to send and receive data over a TCP socket.",u:"Unit 04",a:`<span class="utag">Unit 04</span><p>Sending and receiving TCP data requires understanding encoding (strings to bytes), that recv() may return partial data, and that sendall() guarantees complete transmission.</p><div class="code">import socket

# Single line to send:
conn.sendall(b"Hello server!")                      # most common

# Single line to receive:
data = conn.recv(1024)

# === FULL BIDIRECTIONAL EXAMPLE ===
# CLIENT:
client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
client.connect(('127.0.0.1', 9090))
client.sendall("Hello, I am the client!".encode('utf-8'))
response = client.recv(4096)
print(f"Server says: {response.decode('utf-8')}")

# SERVER (echo server):
server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
server.bind(('', 9090))
server.listen(1)
conn, addr = server.accept()

while True:
    data = conn.recv(4096)
    if not data: break         # empty bytes = connection closed
    print(f"Received: {data.decode()}")
    conn.sendall(data)         # echo back

conn.close()
server.close()</div><p><strong>Critical send/receive patterns:</strong></p><ul><li><strong>sendall() vs send():</strong> send() may send only part of the data (returns bytes actually sent). sendall() keeps calling send() until everything is transmitted — always use sendall().</li><li><strong>Length-prefixed protocol:</strong> For variable-length messages, prefix each message with its length (4-byte big-endian integer) so the receiver knows when a complete message has arrived — essential for robust socket communication.</li></ul><div class="code">import struct
# Send with length prefix
msg = data.encode()
conn.sendall(struct.pack('!I', len(msg)) + msg)

# Receive with length prefix
length = struct.unpack('!I', conn.recv(4))[0]
msg = b''
while len(msg) < length:
    msg += conn.recv(length - len(msg))</div>`},
  {q:"What is socket.settimeout()? Why is it useful?",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><code>socket.settimeout(seconds)</code> sets the maximum time (in seconds) that blocking socket operations (connect, accept, send, recv) will wait before raising a <code>socket.timeout</code> exception. Without a timeout, these operations can block indefinitely — hanging the program.</p><div class="code">import socket

# Three timeout modes:
# 1. Blocking mode (default) -- operations wait forever
s = socket.socket()

# 2. Timeout mode -- raises socket.timeout after N seconds
s.settimeout(5.0)          # 5 second timeout on ALL operations

# 3. Non-blocking mode -- raises BlockingIOError immediately
# s.setblocking(False)     # equivalent to settimeout(0)

# Connect with timeout (essential for client):
client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
client.settimeout(5.0)
try:
    client.connect(('192.168.1.100', 9090))
    print("Connected!")
except socket.timeout:
    print("Connection timed out -- server unreachable")
except ConnectionRefusedError:
    print("Connection refused -- no server on that port")

# Receive with timeout:
client.settimeout(10.0)
try:
    data = client.recv(4096)
    if data:
        print(f"Data received: {data.decode()}")
except socket.timeout:
    print("No data received within 10 seconds")
finally:
    client.close()

# UDP with timeout (critical -- UDP has no built-in delivery guarantee):
udp = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
udp.settimeout(3.0)
udp.sendto(b"ping", ('8.8.8.8', 53))
try:
    response, addr = udp.recvfrom(1024)
except socket.timeout:
    print("UDP: No response within 3 seconds")
finally:
    udp.close()</div><p><strong>Best practices:</strong> Always set a timeout on client sockets — never let connect() block indefinitely in production. Use try-except socket.timeout to handle gracefully. After catching timeout, decide whether to retry or give up. The timeout applies per-operation, not total connection time. Setting a timeout on a UDP socket is especially critical since UDP has no built-in delivery guarantee — recvfrom() could wait forever without one.</p>`},
  {q:"What is socket.setsockopt(SO_REUSEADDR)? Why is it needed?",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><code>SO_REUSEADDR</code> (Socket Option: Reuse Address) allows a socket to bind to a port that is still in TIME_WAIT state from a previous connection — preventing the "Address already in use" error when restarting a server.</p><p><strong>Why TIME_WAIT exists:</strong> After a TCP connection is closed, the port enters TIME_WAIT state for 2xMSL (Maximum Segment Lifetime, typically 60-120 seconds). This prevents delayed duplicate packets from a previous connection being mistaken for a new connection's data. During TIME_WAIT, the OS blocks that port from being rebound.</p><p><strong>The problem:</strong> When you Ctrl+C a server and immediately restart it, the server cannot bind to the same port — you get: <code>OSError: [Errno 98] Address already in use</code> — forcing you to wait 1-2 minutes.</p><div class="code">import socket

# WITHOUT SO_REUSEADDR -- may fail on restart:
# server.bind(('', 9090))  # OSError: Address already in use

# WITH SO_REUSEADDR -- always works:
server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
server.setsockopt(
    socket.SOL_SOCKET,      # level: socket-level option
    socket.SO_REUSEADDR,    # option: allow address reuse
    1                       # value: 1 = enable
)
server.bind(('', 9090))    # succeeds even if port was recently used
server.listen(5)
print("Server restarted successfully!")

# Other useful socket options:
server.setsockopt(socket.SOL_SOCKET, socket.SO_KEEPALIVE, 1)    # TCP keepalive
server.setsockopt(socket.IPPROTO_TCP, socket.TCP_NODELAY, 1)    # disable Nagle
server.setsockopt(socket.SOL_SOCKET, socket.SO_RCVBUF, 65536)  # receive buffer
server.setsockopt(socket.SOL_SOCKET, socket.SO_SNDBUF, 65536)  # send buffer</div><p><strong>Rule:</strong> Always call setsockopt(SOL_SOCKET, SO_REUSEADDR, 1) BEFORE bind() on every server socket. This is standard practice — virtually every production server does this. Not needed for client sockets (they do not bind to fixed ports). Call it right after socket.socket() creation for maximum safety.</p>`},
  {q:"How do you handle multiple clients in Python server socket?",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>A single-threaded server can handle only one client at a time — all others block. Three approaches handle multiple clients concurrently.</p><div class="code">import socket, threading, select

def make_server():
    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
    s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
    s.bind(('', 9090))
    s.listen(10)
    return s

# Approach 1: Threading (most common)
def handle_client(conn, addr):
    try:
        while True:
            data = conn.recv(1024)
            if not data: break
            conn.sendall(data)
    finally:
        conn.close()

def threaded_server():
    server = make_server()
    while True:
        conn, addr = server.accept()
        t = threading.Thread(target=handle_client, args=(conn, addr))
        t.daemon = True
        t.start()

# Approach 2: select() (I/O multiplexing, single thread)
def select_server():
    server = make_server()
    inputs = [server]
    while inputs:
        readable, _, _ = select.select(inputs, [], [], 1.0)
        for s in readable:
            if s is server:
                conn, addr = s.accept()
                inputs.append(conn)
            else:
                data = s.recv(1024)
                if data:
                    s.sendall(data)
                else:
                    inputs.remove(s)
                    s.close()

# Approach 3: asyncio (modern, coroutines)
import asyncio

async def async_handle(reader, writer):
    while True:
        data = await reader.read(1024)
        if not data: break
        writer.write(data)
        await writer.drain()
    writer.close()

async def async_server():
    server = await asyncio.start_server(async_handle, '', 9090)
    async with server:
        await server.serve_forever()</div><p><strong>Comparison:</strong> Threading: simple, one OS thread per client, overhead grows with connections. select(): single thread, I/O multiplexing, slightly more complex code. asyncio: best for high concurrency (10,000+ connections), no threads, requires async/await throughout. For labs/small projects: threading. For production high-concurrency: asyncio or a framework (FastAPI, aiohttp).</p>`},
  {q:"Write Python code to get your machine's IP address and hostname.",u:"Unit 08",a:`<span class="utag">Unit 08</span><p>Python's socket module provides functions for hostname and IP resolution. Getting the correct local IP (not 127.0.0.1) requires a technique since machines can have multiple network interfaces.</p><div class="code">import socket

# Basic hostname and IP
hostname = socket.gethostname()
print(f"Hostname: {hostname}")       # e.g., DESKTOP-ABC123

# gethostbyname -- may return 127.0.0.1 on some configurations
ip_basic = socket.gethostbyname(hostname)
print(f"IP (basic): {ip_basic}")     # may return 127.0.0.1 -- unreliable

# Reliable method: use a UDP socket
# Connect to an external IP (no data sent) -- forces OS to select right interface
def get_local_ip():
    with socket.socket(socket.AF_INET, socket.SOCK_DGRAM) as s:
        s.connect(('8.8.8.8', 80))
        return s.getsockname()[0]   # getsockname returns (ip, port)

local_ip = get_local_ip()
print(f"Local IP (reliable): {local_ip}")  # e.g., 192.168.1.105

# Get ALL IP addresses for the hostname
all_ips = socket.getaddrinfo(hostname, None)
unique_ips = {info[4][0] for info in all_ips}
print(f"All IPs for host: {unique_ips}")

# Reverse DNS -- IP to hostname
try:
    rev_host = socket.gethostbyaddr('8.8.8.8')
    print(f"8.8.8.8 resolves to: {rev_host[0]}")  # dns.google
except socket.herror:
    print("Reverse DNS lookup failed")

# FQDN (Fully Qualified Domain Name)
fqdn = socket.getfqdn()
print(f"FQDN: {fqdn}")

print("\n=== Network Summary ===")
print(f"Hostname:    {hostname}")
print(f"IP Address:  {local_ip}")
print(f"FQDN:        {fqdn}")</div><p><strong>Key functions:</strong> gethostname() returns local hostname. gethostbyname(host) returns IP string. getaddrinfo() for full address info. gethostbyaddr(ip) for reverse lookup. The UDP connect() technique is the most reliable way to get the primary outbound IP address when a machine has multiple interfaces (Ethernet + Wi-Fi + VPN) — no actual network traffic is sent.</p>`},
  {q:"How do you send and receive a JSON object over a TCP socket in Python?",u:"Unit 09",a:`<span class="utag">Unit 09</span><p>TCP is a byte stream — it has no concept of messages. To send JSON, you must encode it as bytes and handle message framing so the receiver knows where each JSON object ends. The recommended approach: length-prefix framing.</p><div class="code">import socket, json, struct

# Helper: send a dict as JSON with 4-byte length header
def send_json(sock, data):
    payload = json.dumps(data).encode('utf-8')
    # Pack length as 4-byte big-endian unsigned int
    header = struct.pack('!I', len(payload))
    sock.sendall(header + payload)

# Helper: receive exactly n bytes (TCP may fragment)
def recvall(sock, n):
    data = b''
    while len(data) < n:
        chunk = sock.recv(n - len(data))
        if not chunk:
            return None     # connection closed
        data += chunk
    return data

# Helper: receive a full JSON object
def recv_json(sock):
    header = recvall(sock, 4)
    if not header:
        return None
    length = struct.unpack('!I', header)[0]
    payload = recvall(sock, length)
    return json.loads(payload.decode('utf-8'))

# SERVER
def json_server():
    server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
    server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
    server.bind(('', 9090))
    server.listen(1)
    conn, addr = server.accept()
    data = recv_json(conn)
    print(f"Received: {data}")
    send_json(conn, {"status": "ok", "msg": f"Hello {data.get('name')}!"})
    conn.close()

# CLIENT
def json_client():
    client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
    client.connect(('127.0.0.1', 9090))
    student = {"name": "Alice", "age": 21, "courses": ["CN", ".NET", "Cloud"]}
    send_json(client, student)
    reply = recv_json(client)
    print(f"Server replied: {reply}")
    client.close()</div><p><strong>Why length-prefix matters:</strong> Without framing, a 500-byte JSON object might arrive in 2 fragments of 300+200 bytes. Without the header, the receiver does not know when the JSON object is complete. The recvall() helper keeps reading until exactly N bytes are received. Alternative: newline-delimited JSON (each message on one line) and readline() — simpler but limited to single-line JSON with no nested newlines.</p>`},
  {q:"What is socket.shutdown() vs socket.close()?",u:"Unit 10",a:`<span class="utag">Unit 10</span><p><code>shutdown()</code> and <code>close()</code> serve different purposes in graceful TCP connection termination.</p><div class="code">import socket

# socket.close():
# Releases the socket file descriptor and all OS resources.
# If last reference, TCP sends a FIN to peer.
conn = socket.socket()
conn.connect(('server', 9090))
conn.close()     # closes socket -- subsequent calls raise OSError

# socket.shutdown(how):
# Sends a FIN or RST to the peer while keeping the socket object alive.
# Shutdown modes:
# SHUT_RD (0)   -- stop receiving (recv() returns empty bytes immediately)
# SHUT_WR (1)   -- stop sending   (sends FIN to peer; peer gets EOF)
# SHUT_RDWR (2) -- stop both

conn2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
conn2.connect(('server', 9090))

conn2.sendall(b"Final message -- done sending")
conn2.shutdown(socket.SHUT_WR)    # signal done writing -- sends FIN
# conn2 can still recv() replies from server
while True:
    data = conn2.recv(1024)
    if not data: break
    print(data.decode())

conn2.close()                     # release OS resources

# Graceful shutdown pattern:
def graceful_close(sock):
    try:
        sock.shutdown(socket.SHUT_RDWR)
    except OSError:
        pass    # already closed or not connected
    finally:
        sock.close()</div><p><strong>Summary:</strong> shutdown() signals the peer (sends FIN/RST at TCP level) without releasing OS resources — use to signal end-of-data while still reading replies. close() releases all OS resources (file descriptor, memory buffers) — must always be called when done. Best practice: call shutdown(SHUT_RDWR) first for clean TCP teardown, then close() to release resources. Use try-finally to ensure close() is always called even when exceptions occur.</p>`},
  {q:"What is non-blocking socket mode in Python?",u:"Unit 11",a:`<span class="utag">Unit 11</span><p><strong>Non-blocking mode</strong> makes socket operations return immediately — even if they cannot complete — instead of waiting. If an operation would block (no data available for recv()), it raises <code>BlockingIOError</code> immediately.</p><div class="code">import socket, select

# Enable non-blocking mode:
s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
s.setblocking(False)             # equivalent to settimeout(0)

# Non-blocking connect:
try:
    s.connect(('127.0.0.1', 9090))
except BlockingIOError:
    # Expected -- connect() initiates handshake but returns immediately
    pass

# Wait for connect to complete using select:
_, writable, _ = select.select([], [s], [], 5.0)  # 5s timeout
if s in writable:
    err = s.getsockopt(socket.SOL_SOCKET, socket.SO_ERROR)
    if err == 0:
        print("Connected!")

# Non-blocking recv:
try:
    data = s.recv(1024)
    if data:
        print(f"Data: {data.decode()}")
    else:
        print("Connection closed by peer")
except BlockingIOError:
    print("No data available right now -- try again later")

# I/O multiplexing with select() -- monitor multiple sockets in one call:
inputs = [s]
while True:
    readable, writable, exceptional = select.select(inputs, [], inputs, 1.0)
    for sock in readable:
        data = sock.recv(1024)
        if data:
            print(f"Received: {data.decode()}")
        else:
            inputs.remove(sock)
            sock.close()

# selectors module (modern, cross-platform):
import selectors
sel = selectors.DefaultSelector()
sel.register(s, selectors.EVENT_READ, data=None)
while True:
    events = sel.select(timeout=1)
    for key, mask in events:
        if mask & selectors.EVENT_READ:
            data = key.fileobj.recv(1024)
            print(data.decode() if data else "EOF")</div><p><strong>Why use non-blocking:</strong> Allows a single thread to handle thousands of connections simultaneously (event-loop architecture). Foundation of asyncio. Avoids the overhead of creating one thread per connection. Requires explicit I/O readiness checking via select()/selectors/poll(). asyncio.start_server() provides non-blocking networking with clean async/await syntax — preferred over manual non-blocking sockets for new code.</p>`},
  {q:"Write a Python one-liner to check if a TCP port is open.",u:"Unit 12",a:`<span class="utag">Unit 12</span><p>Checking if a port is open is done by attempting a TCP connection. A successful connect() means the port is open; a refused connection or timeout means it is closed or unreachable.</p><div class="code">import socket

# One-liner using connect_ex():
# connect_ex() returns 0 on success, errno code on failure (unlike connect() which raises)
is_open = socket.socket().connect_ex(('127.0.0.1', 9090)) == 0
print(f"Port 9090 open: {is_open}")

# Reusable function with timeout:
def port_open(host, port, timeout=3):
    with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
        s.settimeout(timeout)
        return s.connect_ex((host, port)) == 0

# Usage:
print(port_open('google.com', 443))    # True -- HTTPS open
print(port_open('google.com', 23))     # False -- Telnet closed
print(port_open('localhost', 22))      # depends on SSH service

# Port scanner (check multiple ports):
def scan_ports(host, ports, timeout=1):
    results = {}
    for port in ports:
        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
            s.settimeout(timeout)
            code = s.connect_ex((host, port))
            results[port] = 'OPEN' if code == 0 else 'CLOSED'
    return results

common_ports = [22, 80, 443, 3306, 5432, 6379, 8080, 27017]
scan = scan_ports('127.0.0.1', common_ports)
for port, status in scan.items():
    print(f"  {port:5d}: {status}")

# Threaded scanner for speed:
from concurrent.futures import ThreadPoolExecutor

def check(args):
    host, port = args
    with socket.socket() as s:
        s.settimeout(0.5)
        return port, s.connect_ex((host, port)) == 0

with ThreadPoolExecutor(max_workers=50) as ex:
    results = list(ex.map(check, [('localhost', p) for p in range(1, 1025)]))
open_ports = [p for p, is_open in results if is_open]
print(f"Open ports on localhost: {open_ports}")</div><p><strong>connect_ex() vs connect():</strong> connect() raises an exception on failure; connect_ex() returns the errno error code (0 = success). Error codes: ECONNREFUSED (111) = port closed, ETIMEDOUT (110) = host unreachable/firewall. Note: only scan hosts you own or have explicit permission to scan — unauthorised port scanning may be illegal or violate terms of service.</p>`},
 ]
},
};
