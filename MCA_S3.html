const DATA = {
dotnet:{
 long:[
  {q:"Explain the .NET Framework architecture. Describe the roles of CLR, CTS, CLS, and BCL.",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>The <strong>.NET Framework</strong> is a managed execution platform developed by Microsoft that provides a comprehensive, consistent programming model for building applications. Its architecture is layered: at the top sit application types (Windows Forms, ASP.NET, ADO.NET), in the middle lies the Framework Class Library (BCL), and at the base is the Common Language Runtime (CLR).</p><p><strong>Common Language Runtime (CLR):</strong> The CLR is the heart of .NET — a virtual machine that manages execution of .NET programs. Its responsibilities include:</p><ul><li><strong>JIT Compilation:</strong> Converts platform-neutral Intermediate Language (IL/MSIL/CIL) code — produced by any .NET compiler (C#, VB.NET, F#) — into native machine code at runtime, once per method.</li><li><strong>Memory Management and Garbage Collection:</strong> Automatically allocates heap memory and reclaims it when objects are no longer reachable, using a generational GC with three generations (0, 1, 2). Eliminates manual memory management and prevents memory leaks.</li><li><strong>Type Safety:</strong> Verifies IL code before execution to ensure no type violations occur (e.g., treating an integer as a pointer).</li><li><strong>Exception Handling:</strong> Provides a structured, uniform mechanism (try-catch-finally) across all .NET languages.</li><li><strong>Thread Management:</strong> Manages the thread pool and synchronisation primitives.</li><li><strong>Security:</strong> Enforces Code Access Security (CAS) and role-based security policies.</li></ul><div class="code">// C# code compiles to IL, not native code:
// csc Hello.cs --> Hello.exe (contains IL)
// At runtime, CLR's JIT compiles IL to x86/x64 native code
// ildasm Hello.exe --> shows IL instructions like:
// IL_0000: ldstr "Hello"
// IL_0005: call void [mscorlib]System.Console::WriteLine(string)</div><p><strong>Common Type System (CTS):</strong> Defines how types are declared, used, and managed in the runtime. It establishes a common type hierarchy shared by all .NET languages — ensuring that a C# <code>int</code> and a VB.NET <code>Integer</code> are the same underlying type (System.Int32). CTS defines two broad categories: Value Types (stored on stack — int, double, struct, enum) and Reference Types (stored on heap — class, interface, delegate, array). This enables true cross-language interoperability.</p><p><strong>Common Language Specification (CLS):</strong> A subset of CTS features that all .NET languages must support to ensure cross-language interoperability. If a library targets CLS compliance (marked with [CLSCompliant(true)]), its public API can be used from any CLS-compliant language (C#, VB.NET, F#, etc.). For example, CLS prohibits unsigned integers in public APIs since VB.NET originally didn't support them.</p><p><strong>Base Class Library (BCL):</strong> A massive collection of reusable types in the System.* namespaces, including System.Collections (List, Dictionary), System.IO (FileStream, StreamReader), System.Net (HttpClient), System.Threading, System.Text, System.Linq, System.Reflection, and more. The BCL is available to all .NET languages and abstracts OS-level operations into managed, object-oriented APIs.</p><p><strong>Execution flow:</strong> Source code (C#) → compiler (csc.exe) → Assembly (.exe/.dll containing IL + metadata) → CLR loads assembly → JIT compiles IL to native code → CPU executes native code. The metadata in the assembly describes types, methods, and fields — enabling reflection, serialisation, and dynamic binding at runtime.</p>`},
  {q:"What is the difference between value types and reference types in C#? How does memory management differ?",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>Understanding the distinction between value types and reference types is fundamental to writing correct and efficient C# code. They differ in storage location, copy semantics, default values, and memory management behaviour.</p><p><strong>Value Types:</strong> Stored directly on the <strong>stack</strong> (when local variables) or inline within their containing object (when fields). Built-in numeric types (int, double, float, long, byte, decimal, char, bool), struct, and enum are all value types. When you assign a value type to another variable, a <strong>complete copy</strong> is made — modifying one does not affect the other.</p><div class="code">int a = 10;
int b = a;          // b is an independent copy
b = 20;
Console.WriteLine(a);  // still 10 -- a is unaffected

struct Point { public int X, Y; }
Point p1 = new Point { X = 1, Y = 2 };
Point p2 = p1;      // complete copy
p2.X = 99;
Console.WriteLine(p1.X);  // 1 -- p1 unchanged</div><p><strong>Reference Types:</strong> Stored on the <strong>heap</strong>. A variable holds a <strong>reference (pointer)</strong> to the actual object in heap memory. Classes, interfaces, delegates, arrays, and strings are reference types. When you assign a reference type, you copy the reference — both variables point to the <strong>same object</strong>. Modifying through one variable is visible through the other.</p><div class="code">class Box { public int Value; }
Box box1 = new Box { Value = 10 };
Box box2 = box1;            // copy the reference -- same object
box2.Value = 99;
Console.WriteLine(box1.Value);  // 99 -- same object modified

// string is a special reference type -- IMMUTABLE
string s1 = "hello";
string s2 = s1;             // reference copy
s2 = "world";               // creates a new string object
Console.WriteLine(s1);      // "hello" -- s1 still points to original</div><p><strong>Memory Management differences:</strong></p><ul><li><strong>Stack:</strong> Managed by CPU — push/pop operations, extremely fast allocation and deallocation. Stack memory is automatically reclaimed when a method returns. Stack is typically 1-8 MB.</li><li><strong>Heap:</strong> Managed by CLR's Garbage Collector. Objects persist until the GC determines they are unreachable. GC uses generational collection: Gen0 (short-lived), Gen1 (medium), Gen2 (long-lived). GC scans for root references (stack, static fields, CPU registers) and collects unreachable objects.</li></ul><p><strong>Boxing and Unboxing:</strong> Converting a value type to a reference type (boxing) allocates heap memory and copies the value into it — creating a wrapped object. Unboxing extracts the value back. Both operations are expensive — avoid in performance-critical loops.</p><div class="code">int x = 42;
object obj = x;         // BOXING -- allocates on heap
int y = (int)obj;       // UNBOXING -- copies back to stack

// Avoid boxing in generic collections:
List&lt;int&gt; list = new List&lt;int&gt;();  // no boxing -- generic
ArrayList al = new ArrayList();
al.Add(42);                          // BOXING occurs -- avoid</div><p><strong>Null differences:</strong> Value types cannot be null by default (use Nullable&lt;T&gt; / int? for nullable value types). Reference types can always be null — dereferencing null throws NullReferenceException. C# 8.0 introduced nullable reference types (string?) to enable static analysis of potential null dereferences.</p>`},
  {q:"Explain delegates, events, and the observer pattern in C#. Write an example.",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>Delegates, events, and the observer pattern form the foundation of event-driven programming in C#. They enable loose coupling between components — a publisher broadcasts state changes without knowing anything about its subscribers.</p><p><strong>Delegate:</strong> A type-safe function pointer — a reference to a method (or multiple methods) with a specific signature. Delegates can hold references to static or instance methods, or anonymous methods/lambdas.</p><div class="code">// Delegate type declaration
delegate void Notify(string message);
delegate int Calculate(int x, int y);

// Using delegates
public class Demo {
    public static void Log(string msg) => Console.WriteLine($"LOG: {msg}");
    public static void Email(string msg) => Console.WriteLine($"EMAIL: {msg}");

    static void Main() {
        // Single method
        Notify n1 = Log;
        n1("Server started");   // LOG: Server started

        // Multicast delegate -- combine methods
        Notify multi = Log;
        multi += Email;          // chained
        multi("Order placed");   // calls BOTH Log AND Email

        multi -= Email;          // remove one
        multi("Order cancelled"); // calls only Log

        // Lambda / anonymous method
        Notify lambda = msg => Console.WriteLine($"LAMBDA: {msg}");
        lambda("test");

        // Func and Action -- built-in delegate types
        Func&lt;int, int, int&gt; add = (a, b) => a + b;
        Action&lt;string&gt; print = Console.WriteLine;
        Console.WriteLine(add(3, 4));  // 7
    }
}</div><p><strong>Event:</strong> An event is a restricted delegate — it wraps a delegate field so that external classes can only subscribe (+= ) or unsubscribe (-=) but cannot invoke it or clear all subscriptions. Events enforce the publisher-subscriber pattern encapsulation.</p><div class="code">// Custom EventArgs
public class OrderEventArgs : EventArgs {
    public string OrderId { get; set; }
    public decimal Amount { get; set; }
}

// Publisher
public class OrderService {
    // Event declaration using EventHandler<T>
    public event EventHandler&lt;OrderEventArgs&gt; OrderPlaced;

    // Protected virtual -- allows subclass override
    protected virtual void OnOrderPlaced(OrderEventArgs e) {
        OrderPlaced?.Invoke(this, e);  // null-conditional invoke (thread-safe)
    }

    public void PlaceOrder(string id, decimal amount) {
        Console.WriteLine($"Processing order {id}...");
        // Raise the event
        OnOrderPlaced(new OrderEventArgs { OrderId = id, Amount = amount });
    }
}

// Subscriber
public class EmailNotifier {
    public void Subscribe(OrderService service) {
        service.OrderPlaced += OnOrderPlaced;  // subscribe
    }
    private void OnOrderPlaced(object sender, OrderEventArgs e) {
        Console.WriteLine($"Email sent: Order {e.OrderId} for ${e.Amount}");
    }
}

public class InventoryUpdater {
    public void Subscribe(OrderService service) {
        service.OrderPlaced += (s, e) =>
            Console.WriteLine($"Inventory updated for order {e.OrderId}");
    }
}

// Usage
var service = new OrderService();
var email = new EmailNotifier();
var inventory = new InventoryUpdater();

email.Subscribe(service);
inventory.Subscribe(service);

service.PlaceOrder("ORD-001", 299.99m);
// Output:
// Processing order ORD-001...
// Email sent: Order ORD-001 for $299.99
// Inventory updated for order ORD-001</div><p><strong>Observer Pattern:</strong> A behavioural design pattern where a subject (publisher) maintains a list of observers (subscribers) and notifies them when its state changes. C# events implement this pattern natively. The subject does not reference concrete observer types — coupling is through the delegate signature only. This enables adding/removing observers at runtime without modifying the publisher. Used throughout .NET: UI controls (Button.Click), async operations, property change notification (INotifyPropertyChanged in WPF/MVVM), file system watchers, and reactive programming (Rx.NET via IObservable&lt;T&gt;).</p>`},
  {q:"Explain LINQ (Language Integrated Query) in C#. How does it work with different data sources?",u:"Unit 04",a:`<span class="utag">Unit 04</span><p><strong>LINQ (Language Integrated Query)</strong> is a set of features in C# (and .NET) that integrates query syntax directly into the language, allowing developers to query diverse data sources — in-memory collections, databases, XML, and JSON — using a uniform, strongly-typed, IntelliSense-aware syntax.</p><p><strong>How LINQ works:</strong> LINQ queries are compiled by the C# compiler into chains of method calls on IEnumerable&lt;T&gt; or IQueryable&lt;T&gt;. These methods (Where, Select, OrderBy, GroupBy, Join, etc.) accept lambda expressions as predicates. The query is lazy-evaluated — it executes only when iterated (foreach, ToList(), Count(), etc.), not when defined.</p><div class="code">// LINQ syntax forms -- both are equivalent:

// 1. Query syntax (SQL-like)
var result1 = from s in students
              where s.GPA > 3.5
              orderby s.Name
              select new { s.Name, s.GPA };

// 2. Method syntax (fluent)
var result2 = students
    .Where(s => s.GPA > 3.5)
    .OrderBy(s => s.Name)
    .Select(s => new { s.Name, s.GPA });</div><div class="code">// Common LINQ operators:
var students = new List&lt;Student&gt; {
    new Student { Name = "Alice", GPA = 3.8, Department = "CS" },
    new Student { Name = "Bob",   GPA = 3.2, Department = "IT" },
    new Student { Name = "Carol", GPA = 3.9, Department = "CS" },
    new Student { Name = "Dave",  GPA = 2.9, Department = "IT" }
};

// Filtering + Projection
var topCS = students
    .Where(s => s.Department == "CS" && s.GPA > 3.5)
    .Select(s => s.Name);
// ["Alice", "Carol"]

// Aggregation
double avgGPA = students.Average(s => s.GPA);          // 3.45
double maxGPA = students.Max(s => s.GPA);               // 3.9
int csCount = students.Count(s => s.Department == "CS"); // 2

// Grouping
var byDept = students
    .GroupBy(s => s.Department)
    .Select(g => new {
        Dept = g.Key,
        Count = g.Count(),
        Avg = g.Average(s => s.GPA)
    });
// { Dept="CS", Count=2, Avg=3.85 }
// { Dept="IT", Count=2, Avg=3.05 }

// Join
var courses = new[] {
    new { StudentName = "Alice", Course = "Algorithms" },
    new { StudentName = "Bob",   Course = "Networking" }
};
var enrolled = students.Join(courses,
    s => s.Name, c => c.StudentName,
    (s, c) => $"{s.Name} takes {c.Course}");

// Set operations
var cs = students.Where(s => s.Department == "CS");
var it = students.Where(s => s.Department == "IT");
var all = cs.Union(it);
var common = cs.Intersect(it);    // empty
var diff = cs.Except(it);         // CS only

// Partitioning
var page2 = students.Skip(2).Take(2);   // pagination

// First / Single
var top = students.OrderByDescending(s => s.GPA).First();
var alice = students.SingleOrDefault(s => s.Name == "Alice");</div><p><strong>LINQ to SQL / Entity Framework (IQueryable):</strong> When the data source is a database (via EF Core), LINQ queries operate on IQueryable&lt;T&gt; instead of IEnumerable&lt;T&gt;. IQueryable builds an expression tree at compile time; at execution time, the EF provider translates it to SQL — only the filtered data is fetched from the database, not all rows. LINQ to XML (XDocument) enables querying XML documents. LINQ to Objects queries any in-memory IEnumerable. This uniform API across data sources is LINQ's greatest strength.</p>`},
  {q:"Describe the ADO.NET architecture. Explain connected and disconnected data access models with code.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>ADO.NET</strong> (ActiveX Data Objects .NET) is the primary data access technology in the .NET Framework for interacting with relational databases. It provides two distinct programming models: Connected (live database connection) and Disconnected (in-memory dataset).</p><p><strong>ADO.NET Architecture components:</strong></p><ul><li><strong>Connection:</strong> SqlConnection, OleDbConnection, OracleConnection — opens a session to a specific database.</li><li><strong>Command:</strong> SqlCommand — executes SQL statements (SELECT, INSERT, UPDATE, DELETE) or stored procedures against the connection.</li><li><strong>DataReader:</strong> SqlDataReader — forward-only, read-only stream of rows from the database (connected model).</li><li><strong>DataAdapter:</strong> SqlDataAdapter — bridge between a database and a DataSet; uses Fill() to populate and Update() to push changes back.</li><li><strong>DataSet:</strong> In-memory relational database — holds DataTables, relationships, and constraints. Completely disconnected from the database.</li><li><strong>DataTable / DataRow / DataColumn:</strong> Represent table structure and data within a DataSet.</li></ul><p><strong>Connected Model (SqlDataReader):</strong> Maintains an open connection while reading data. Fastest for read-only, forward-only scenarios. Must be closed promptly to return the connection to the pool.</p><div class="code">string connStr = "Server=localhost;Database=Students;Integrated Security=true;";
using (SqlConnection conn = new SqlConnection(connStr))
{
    conn.Open();
    string sql = "SELECT StudentID, Name, GPA FROM Students WHERE GPA > @minGPA";
    using (SqlCommand cmd = new SqlCommand(sql, conn))
    {
        cmd.Parameters.AddWithValue("@minGPA", 3.5);  // parameterised query
        using (SqlDataReader reader = cmd.ExecuteReader())
        {
            while (reader.Read())
            {
                int id   = reader.GetInt32(0);
                string name = reader.GetString(1);
                double gpa  = reader.GetDouble(2);
                Console.WriteLine($"{id}: {name} - GPA: {gpa}");
            }
        }
    }
}  // connection auto-closed by using block

// Non-query (INSERT/UPDATE/DELETE)
using (SqlConnection conn = new SqlConnection(connStr))
{
    conn.Open();
    using (SqlCommand cmd = new SqlCommand(
        "INSERT INTO Students(Name, GPA) VALUES(@name, @gpa)", conn))
    {
        cmd.Parameters.AddWithValue("@name", "Alice");
        cmd.Parameters.AddWithValue("@gpa", 3.9);
        int rows = cmd.ExecuteNonQuery();   // returns rows affected
        Console.WriteLine($"{rows} row(s) inserted");
    }
}</div><p><strong>Disconnected Model (DataAdapter + DataSet):</strong> Fetches data into an in-memory DataSet, closes the connection, allows modifications, then reconnects to push changes back via DataAdapter.Update(). Suitable for batch updates, offline scenarios, and data binding in Windows Forms.</p><div class="code">using (SqlConnection conn = new SqlConnection(connStr))
{
    SqlDataAdapter adapter = new SqlDataAdapter(
        "SELECT * FROM Students", conn);
    SqlCommandBuilder builder = new SqlCommandBuilder(adapter);
    // Auto-generates INSERT/UPDATE/DELETE commands

    DataSet ds = new DataSet();
    adapter.Fill(ds, "Students");   // fills DataSet -- connection closed after

    DataTable dt = ds.Tables["Students"];

    // Modify in-memory data
    DataRow newRow = dt.NewRow();
    newRow["Name"] = "Bob"; newRow["GPA"] = 3.7;
    dt.Rows.Add(newRow);            // adds to in-memory table

    dt.Rows[0]["GPA"] = 4.0;        // update first row

    // Push changes back to database
    adapter.Update(ds, "Students"); // re-connects, executes SQL
    Console.WriteLine("Changes saved");
}</div><p><strong>Best practice:</strong> Prefer parameterised queries over string concatenation — prevents SQL injection. Use <code>using</code> statements on all SqlConnection/SqlCommand/SqlDataReader objects to ensure they are disposed. Connection pooling is automatic in ADO.NET — connections are not truly closed but returned to the pool for reuse. For modern applications, Entity Framework Core built on top of ADO.NET is preferred for its ORM capabilities and LINQ support.</p>`},
  {q:"Explain the ASP.NET MVC pattern. How does request processing work? Write a basic MVC controller.",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>ASP.NET MVC</strong> is a web application framework that implements the Model-View-Controller architectural pattern, separating application concerns into three distinct components: Model (data and business logic), View (presentation/UI), and Controller (request handling and orchestration).</p><p><strong>MVC Components:</strong></p><ul><li><strong>Model:</strong> Represents the application's data structures and business logic. Typically maps to database entities. May include validation attributes (DataAnnotations). Examples: Student, Product, Order classes.</li><li><strong>View:</strong> Razor templates (.cshtml) that render HTML responses. Strongly typed against a ViewModel passed from the controller. Contains only display logic — no business logic.</li><li><strong>Controller:</strong> C# class that handles HTTP requests. Contains Action methods that map to URLs. Coordinates Model operations and returns appropriate Views or JSON responses.</li></ul><p><strong>Request Processing Pipeline:</strong></p><ol><li>Browser sends HTTP GET /Students/Details/5</li><li>IIS/Kestrel receives request and passes to ASP.NET pipeline</li><li>Routing engine matches URL pattern {controller}/{action}/{id} → StudentsController, Details action, id=5</li><li>Controller factory instantiates StudentsController</li><li>Model Binding populates action parameters (id = 5)</li><li>Action Filters execute (AuthorizationFilter, ActionFilter — logging, validation)</li><li>Action method executes (Details(5) fetches Student from DB)</li><li>Controller returns ViewResult(student) or JsonResult</li><li>View Engine (Razor) renders the .cshtml template with the model</li><li>HTML response returned to browser</li></ol><div class="code">// Model
public class Student
{
    public int Id { get; set; }
    [Required, StringLength(100)]
    public string Name { get; set; }
    [Range(0.0, 4.0)]
    public double GPA { get; set; }
    public string Department { get; set; }
}

// Controller
public class StudentsController : Controller
{
    private readonly ApplicationDbContext _db;
    public StudentsController(ApplicationDbContext db) { _db = db; }  // DI

    // GET /Students
    public async Task&lt;IActionResult&gt; Index()
    {
        var students = await _db.Students.OrderBy(s => s.Name).ToListAsync();
        return View(students);                    // passes List&lt;Student&gt; to Index.cshtml
    }

    // GET /Students/Details/5
    public async Task&lt;IActionResult&gt; Details(int id)
    {
        var student = await _db.Students.FindAsync(id);
        if (student == null) return NotFound();   // 404 response
        return View(student);
    }

    // GET /Students/Create
    public IActionResult Create() => View();

    // POST /Students/Create
    [HttpPost]
    [ValidateAntiForgeryToken]
    public async Task&lt;IActionResult&gt; Create([Bind("Name,GPA,Department")] Student student)
    {
        if (!ModelState.IsValid) return View(student);  // re-display with errors
        _db.Students.Add(student);
        await _db.SaveChangesAsync();
        return RedirectToAction(nameof(Index));          // PRG pattern
    }

    // DELETE /api/Students/5 (Web API style)
    [HttpDelete]
    public async Task&lt;IActionResult&gt; Delete(int id)
    {
        var student = await _db.Students.FindAsync(id);
        if (student == null) return NotFound();
        _db.Students.Remove(student);
        await _db.SaveChangesAsync();
        return NoContent();   // 204
    }
}</div><div class="code">@* View: Views/Students/Index.cshtml *@
@model IEnumerable&lt;Student&gt;
&lt;table&gt;
&lt;tr&gt;&lt;th&gt;Name&lt;/th&gt;&lt;th&gt;GPA&lt;/th&gt;&lt;/tr&gt;
@foreach (var s in Model) {
    &lt;tr&gt;&lt;td&gt;@s.Name&lt;/td&gt;&lt;td&gt;@s.GPA&lt;/td&gt;&lt;/tr&gt;
}
&lt;/table&gt;</div><p><strong>Advantages over Web Forms:</strong> Full control over HTML output, URL routing, testable controllers, separation of concerns, REST-friendly. ASP.NET Core MVC extends this with dependency injection built-in, cross-platform support, middleware pipeline, and Razor Pages for simpler page-centric scenarios.</p>`},
  {q:"Explain async/await and the Task Parallel Library (TPL) in C# with practical examples.",u:"Unit 07",a:`<span class="utag">Unit 07</span><p>Asynchronous programming prevents threads from blocking while waiting for I/O operations (disk, network, database). The <strong>async/await</strong> pattern (C# 5.0+) and the <strong>Task Parallel Library (TPL)</strong> enable responsive, scalable applications without callback hell.</p><p><strong>The problem with synchronous I/O:</strong> A synchronous database query or HTTP request blocks the thread for its entire duration. In a web server, this wastes thread pool threads waiting for I/O — limiting scalability to the thread count. With async/await, threads return to the pool while awaiting I/O, allowing thousands of concurrent requests on far fewer threads.</p><div class="code">// Synchronous -- BLOCKS thread while downloading
string content = new HttpClient().GetStringAsync(url).Result;  // DEADLOCK risk

// Async/await -- thread returns to pool while awaiting
public async Task&lt;string&gt; GetPageAsync(string url)
{
    using var client = new HttpClient();
    // await suspends the method, releases the thread
    // When download completes, method resumes on a thread pool thread
    string content = await client.GetStringAsync(url);
    return content.ToUpper();   // runs after download completes
}

// Async chain -- each await is non-blocking
public async Task ProcessOrderAsync(int orderId)
{
    var order = await _db.Orders.FindAsync(orderId);    // async DB read
    var inventory = await _inventory.CheckAsync(order); // async HTTP call
    await _email.SendAsync(order.CustomerEmail);         // async SMTP
    await _db.SaveChangesAsync();                        // async DB write
}</div><div class="code">// Task Parallel Library -- CPU-bound parallelism
using System.Threading.Tasks;

// Parallel.For -- parallel loop
Parallel.For(0, 1000000, i => {
    results[i] = ExpensiveCalculation(i);  // runs on multiple threads
});

// Task.Run -- offload CPU work to thread pool
Task&lt;int&gt; task = Task.Run(() => {
    return Enumerable.Range(1, 10000000).Sum();  // long CPU computation
});
int sum = await task;  // await the result

// Parallel.ForEach
var orders = GetOrders();
Parallel.ForEach(orders, order => {
    ProcessOrder(order);   // concurrent processing
});

// Task.WhenAll -- await multiple tasks concurrently (not sequentially)
async Task LoadDashboardAsync()
{
    // Sequential -- total time = sum of all times
    // var users = await GetUsersAsync();
    // var orders = await GetOrdersAsync();

    // Concurrent -- total time = slowest single task
    var usersTask = GetUsersAsync();
    var ordersTask = GetOrdersAsync();
    var statsTask = GetStatsAsync();

    await Task.WhenAll(usersTask, ordersTask, statsTask);

    var users  = usersTask.Result;
    var orders = ordersTask.Result;
    var stats  = statsTask.Result;
}

// Task.WhenAny -- first completed wins (e.g., timeout pattern)
var timeoutTask = Task.Delay(5000);
var dataTask = FetchDataAsync();
var completed = await Task.WhenAny(dataTask, timeoutTask);
if (completed == timeoutTask)
    throw new TimeoutException("Data fetch timed out");
var data = await dataTask;</div><p><strong>CancellationToken:</strong> Pass a CancellationToken to allow cooperative cancellation of long-running async operations. Check <code>token.ThrowIfCancellationRequested()</code> or pass to async APIs. Use <code>CancellationTokenSource</code> with a timeout: <code>new CancellationTokenSource(TimeSpan.FromSeconds(30))</code>. Async void should be avoided except for event handlers — use async Task instead to allow exception propagation and awaiting. ConfigureAwait(false) avoids capturing the synchronisation context in library code, preventing deadlocks.</p>`},
  {q:"What is Entity Framework Code First? Explain migrations, DbContext, and relationships.",u:"Unit 08",a:`<span class="utag">Unit 08</span><p><strong>Entity Framework (EF) Core</strong> is an ORM (Object-Relational Mapper) for .NET that allows developers to work with a database using .NET objects instead of raw SQL. <strong>Code First</strong> is a workflow where you define your domain model in C# classes first, then EF generates the database schema from those classes via Migrations.</p><p><strong>DbContext:</strong> The central class in EF — represents a session with the database. It holds DbSet&lt;T&gt; properties (one per entity table) and configures the model via OnModelCreating().</p><div class="code">// Domain model (POCO classes)
public class Author {
    public int Id { get; set; }
    public string Name { get; set; }
    public string Email { get; set; }
    // Navigation property -- one Author has many Books
    public ICollection&lt;Book&gt; Books { get; set; } = new List&lt;Book&gt;();
}

public class Book {
    public int Id { get; set; }
    public string Title { get; set; }
    public decimal Price { get; set; }
    public DateTime PublishedDate { get; set; }
    // Foreign key
    public int AuthorId { get; set; }
    // Navigation property -- each Book belongs to one Author
    public Author Author { get; set; }
    // Many-to-many navigation
    public ICollection&lt;Category&gt; Categories { get; set; }
}

public class Category {
    public int Id { get; set; }
    public string Name { get; set; }
    public ICollection&lt;Book&gt; Books { get; set; }
}

// DbContext
public class BookstoreContext : DbContext {
    public DbSet&lt;Author&gt; Authors { get; set; }
    public DbSet&lt;Book&gt; Books { get; set; }
    public DbSet&lt;Category&gt; Categories { get; set; }

    protected override void OnConfiguring(DbContextOptionsBuilder options) {
        options.UseSqlServer("Server=localhost;Database=Bookstore;Trusted_Connection=true;");
    }

    protected override void OnModelCreating(ModelBuilder modelBuilder) {
        // Fluent API configuration
        modelBuilder.Entity&lt;Book&gt;()
            .Property(b => b.Price)
            .HasColumnType("decimal(10,2)");

        modelBuilder.Entity&lt;Author&gt;()
            .HasIndex(a => a.Email).IsUnique();

        modelBuilder.Entity&lt;Book&gt;()
            .HasMany(b => b.Categories)
            .WithMany(c => c.Books)  // many-to-many (EF Core 5+)
            .UsingEntity("BookCategory");
    }
}</div><div class="code">// Migrations -- track schema changes over time
// In Package Manager Console:
// Add-Migration InitialCreate  -- creates migration class
// Update-Database              -- applies pending migrations to database
// Add-Migration AddBookISBN    -- add new column
// Update-Database              -- apply new migration
// Script-Migration             -- generate SQL script

// Generated migration (example):
public partial class InitialCreate : Migration {
    protected override void Up(MigrationBuilder mb) {
        mb.CreateTable("Authors", t => new {
            Id = t.Column&lt;int&gt;(nullable: false).Annotation("SqlServer:Identity", "1, 1"),
            Name = t.Column&lt;string&gt;(maxLength: 200),
            Email = t.Column&lt;string&gt;(nullable: true)
        });
        mb.AddPrimaryKey("PK_Authors", "Authors", "Id");
    }
    protected override void Down(MigrationBuilder mb) {
        mb.DropTable("Authors");  // rollback
    }
}</div><div class="code">// CRUD operations using DbContext
using var db = new BookstoreContext();

// Create
var author = new Author { Name = "Martin Fowler", Email = "mf@example.com" };
db.Authors.Add(author);
await db.SaveChangesAsync();  // generates INSERT; author.Id populated after

// Read with Include (eager loading)
var authors = await db.Authors
    .Include(a => a.Books)    // JOIN to load books
    .Where(a => a.Books.Any())
    .OrderBy(a => a.Name)
    .ToListAsync();

// Update
var book = await db.Books.FindAsync(1);
book.Price = 39.99m;
await db.SaveChangesAsync();  // generates UPDATE for changed properties only

// Delete
db.Books.Remove(book);
await db.SaveChangesAsync();  // generates DELETE</div><p><strong>Relationships:</strong> EF supports one-to-many (Author → Books), one-to-one (User → Profile), and many-to-many (Books ↔ Categories). Configured by convention (navigation property + FK naming) or Fluent API. Lazy loading (requires proxies), eager loading (Include/ThenInclude), and explicit loading (db.Entry().Collection().Load()) control when related data is fetched.</p>`},
  {q:"What is exception handling in C#? Explain try-catch-finally, custom exceptions, and exception filters.",u:"Unit 09",a:`<span class="utag">Unit 09</span><p>Exception handling in C# provides a structured mechanism for detecting and responding to runtime errors — ensuring the program can degrade gracefully, log errors, release resources, and communicate failures clearly.</p><p><strong>try-catch-finally structure:</strong></p><div class="code">try {
    // Code that might throw an exception
    int result = Divide(10, 0);
    File.ReadAllText("missing.txt");
}
catch (DivideByZeroException ex) {
    // Most specific exception first
    Console.WriteLine($"Math error: {ex.Message}");
}
catch (FileNotFoundException ex) {
    Console.WriteLine($"File not found: {ex.FileName}");
    // Re-throw preserving stack trace:
    // throw;           -- correct: preserves original stack trace
    // throw ex;        -- WRONG: resets stack trace to this line
}
catch (IOException ex) when (ex.Message.Contains("access")) {
    // Exception filter -- C# 6.0+: catch only if condition is true
    Console.WriteLine("Access denied error");
}
catch (Exception ex) {
    // Catch-all for unexpected exceptions
    Console.Error.WriteLine($"Unexpected: {ex}");
    throw;   // re-throw -- don't swallow unexpected exceptions
}
finally {
    // ALWAYS executes -- whether exception occurred or not
    // Use for resource cleanup (connection.Close(), etc.)
    Console.WriteLine("Cleanup complete");
    // Note: using statements are preferred over finally for IDisposable
}</div><p><strong>Custom Exceptions:</strong> Create domain-specific exception types for better error categorisation and handling.</p><div class="code">// Custom exception hierarchy
public class AppException : Exception {
    public string ErrorCode { get; }
    public AppException(string message, string errorCode) : base(message) {
        ErrorCode = errorCode;
    }
    public AppException(string message, string errorCode, Exception inner)
        : base(message, inner) {
        ErrorCode = errorCode;
    }
}

public class ValidationException : AppException {
    public Dictionary&lt;string, string[]&gt; Errors { get; }
    public ValidationException(Dictionary&lt;string, string[]&gt; errors)
        : base("Validation failed", "VALIDATION_ERROR") {
        Errors = errors;
    }
}

public class NotFoundException : AppException {
    public NotFoundException(string entity, int id)
        : base($"{entity} with id {id} not found", "NOT_FOUND") { }
}

// Usage
public Student GetStudent(int id) {
    var student = _db.Find(id) ?? throw new NotFoundException("Student", id);
    return student;
}

// Caller handles by type
try { var s = GetStudent(999); }
catch (NotFoundException ex) {
    Response.StatusCode = 404;
    return Json(new { error = ex.Message, code = ex.ErrorCode });
}
catch (ValidationException ex) {
    return Json(new { errors = ex.Errors });
}</div><p><strong>Exception Filters (C# 6.0+):</strong> The <code>when</code> keyword adds a boolean condition to a catch clause — the catch block only executes if the condition is true. This is superior to catching and re-throwing because the filter runs while the original call stack is intact (enabling better debugging and logging). Example: <code>catch (SqlException ex) when (ex.Number == 1205)</code> catches only SQL deadlock exceptions, letting other SqlExceptions propagate to an outer handler.</p><p><strong>Best practices:</strong> Catch specific exception types, not bare Exception (except at global handlers). Never swallow exceptions without logging. Use using statements instead of try-finally for IDisposable cleanup. Prefer nullable patterns or TryParse over exceptions for expected failure cases. Add global exception middleware in ASP.NET Core (app.UseExceptionHandler()) to catch all unhandled exceptions.</p>`},
  {q:"Explain generics in C#. How do type constraints, covariance, and contravariance work?",u:"Unit 10",a:`<span class="utag">Unit 10</span><p><strong>Generics</strong> allow types and methods to be parameterised by other types — writing code once that works correctly and efficiently for any data type, without casting or boxing. Introduced in C# 2.0, generics are fundamental to the .NET collections library (List&lt;T&gt;, Dictionary&lt;TKey,TValue&gt;, etc.).</p><p><strong>Why generics over non-generic alternatives:</strong></p><ul><li><strong>Type safety:</strong> Errors caught at compile time, not runtime (no ClassCastException).</li><li><strong>Performance:</strong> No boxing/unboxing for value types — List&lt;int&gt; stores actual ints on heap without boxing overhead.</li><li><strong>Code reuse:</strong> Write the algorithm once; it works for all compatible types.</li></ul><div class="code">// Generic class
public class Stack&lt;T&gt; {
    private readonly List&lt;T&gt; _items = new List&lt;T&gt;();
    public void Push(T item) => _items.Add(item);
    public T Pop() {
        if (_items.Count == 0) throw new InvalidOperationException("Empty stack");
        var item = _items[^1];
        _items.RemoveAt(_items.Count - 1);
        return item;
    }
    public bool IsEmpty => _items.Count == 0;
}

// Generic method
public static T Max&lt;T&gt;(T a, T b) where T : IComparable&lt;T&gt;
    => a.CompareTo(b) &gt;= 0 ? a : b;

Console.WriteLine(Max(3, 7));          // 7
Console.WriteLine(Max("apple", "mango")); // mango</div><p><strong>Type Constraints:</strong> Restrict what types can be substituted for T, enabling use of specific members.</p><div class="code">// where T : class      -- T must be a reference type
// where T : struct     -- T must be a value type (enables default(T) = 0/false/null)
// where T : new()      -- T must have a public parameterless constructor
// where T : IComparable&lt;T&gt; -- T must implement IComparable&lt;T&gt;
// where T : BaseClass  -- T must derive from BaseClass
// Multiple constraints:

public class Repository&lt;T&gt; where T : class, IEntity, new() {
    public T Create() => new T();   // new() allows instantiation
    public void Save(T entity) { /* entity.Id is accessible via IEntity */ }
}

public static T[] Sort&lt;T&gt;(T[] array) where T : IComparable&lt;T&gt; {
    Array.Sort(array, (a, b) => a.CompareTo(b));
    return array;
}</div><p><strong>Covariance (out keyword):</strong> Allows a generic type to be used with a more derived type parameter. IEnumerable&lt;string&gt; can be treated as IEnumerable&lt;object&gt; because string derives from object. Safe for output (read) positions only — you can only "produce" T values from a covariant interface.</p><p><strong>Contravariance (in keyword):</strong> Allows a generic type to be used with a less derived type. Action&lt;object&gt; can be used as Action&lt;string&gt; — if you can act on any object, you can act on a string. Safe for input (write) positions only.</p><div class="code">// Covariance: IEnumerable&lt;out T&gt;
IEnumerable&lt;string&gt; strings = new List&lt;string&gt; { "a", "b" };
IEnumerable&lt;object&gt; objects = strings;  // covariant -- OK
// objects.Add("c");  // not allowed -- IEnumerable is read-only

// Contravariance: IComparer&lt;in T&gt;, Action&lt;in T&gt;
Action&lt;object&gt; printObj = obj => Console.WriteLine(obj);
Action&lt;string&gt; printStr = printObj;  // contravariant -- OK
printStr("hello");  // works: string IS-A object

// Custom covariant interface
public interface IProducer&lt;out T&gt; { T Produce(); }
// Custom contravariant interface
public interface IConsumer&lt;in T&gt; { void Consume(T item); }</div><p>Covariance and contravariance apply to generic interfaces and delegates only — not generic classes. They enable more flexible API design, especially for LINQ operators and functional-style programming patterns.</p>`},
  {q:"Explain the .NET garbage collector. How do generations work? What are weak references and finalizers?",u:"Unit 11",a:`<span class="utag">Unit 11</span><p>The <strong>.NET Garbage Collector (GC)</strong> is a component of the CLR that automatically manages heap memory — allocating objects and reclaiming memory from objects that are no longer reachable. It eliminates manual memory management (malloc/free) and prevents dangling pointers and memory leaks.</p><p><strong>How GC works — Mark and Sweep:</strong></p><ol><li><strong>Mark phase:</strong> Starting from roots (stack variables, static fields, CPU registers, GC handles), the GC traces the object graph and marks all reachable objects.</li><li><strong>Relocate phase:</strong> Updates references to objects that will be moved.</li><li><strong>Compact phase:</strong> Moves all live objects to contiguous memory at one end of the heap, eliminating fragmentation. Fragmentation-free allocation is extremely fast (pointer bump allocation).</li></ol><p><strong>Generational Garbage Collection:</strong> The GC divides the managed heap into three generations based on the observation that most objects die young (Short Lifespan Hypothesis).</p><ul><li><strong>Generation 0 (Gen0):</strong> Newly allocated, short-lived objects (local variables, temporaries). Gen0 is collected very frequently (most often). Small (a few MB). If an object survives a Gen0 collection, it is promoted to Gen1.</li><li><strong>Generation 1 (Gen1):</strong> Medium-lived objects. Buffer between Gen0 and Gen2. Collected less frequently. Survivors promoted to Gen2.</li><li><strong>Generation 2 (Gen2):</strong> Long-lived objects (static data, large caches, application-scope singletons). Collected infrequently (full GC). Large Object Heap (LOH — objects &gt;= 85,000 bytes) is also part of Gen2 but not compacted by default (high compaction cost).</li></ul><div class="code">// Force collection (rarely needed -- let GC decide):
GC.Collect(0);                        // collect Gen0 only
GC.Collect(2, GCCollectionMode.Forced); // full GC
GC.WaitForPendingFinalizers();        // ensure finalizers run

// Check generation of an object:
var obj = new object();
Console.WriteLine(GC.GetGeneration(obj)); // 0 (just created)
GC.Collect();
Console.WriteLine(GC.GetGeneration(obj)); // 1 (survived once)

// Memory info
Console.WriteLine($"Gen0 collections: {GC.CollectionCount(0)}");
Console.WriteLine($"Total memory: {GC.GetTotalMemory(false) / 1024}KB");</div><p><strong>Finalizers (~Destructor):</strong> A finalizer (<code>~ClassName()</code>) is called by the GC before reclaiming an object — intended for releasing unmanaged resources (native handles, OS resources). Objects with finalizers require TWO GC cycles to collect: first to queue for finalization, then to actually free. Finalizers should only be used when wrapping unmanaged resources, and always paired with IDisposable.</p><div class="code">public class UnmanagedWrapper : IDisposable {
    private IntPtr _handle;
    private bool _disposed = false;

    public UnmanagedWrapper() { _handle = NativeLib.OpenHandle(); }

    public void Dispose() {         // called by user (using statement)
        Dispose(true);
        GC.SuppressFinalize(this);  // suppress finalizer -- already cleaned up
    }

    protected virtual void Dispose(bool disposing) {
        if (!_disposed) {
            if (disposing) { /* free managed resources */ }
            NativeLib.CloseHandle(_handle);  // free unmanaged
            _disposed = true;
        }
    }

    ~UnmanagedWrapper() { Dispose(false); }  // fallback if user forgets Dispose
}</div><p><strong>Weak References:</strong> Allow holding a reference to an object without preventing GC collection. Useful for caches. <code>WeakReference&lt;T&gt; wr = new WeakReference&lt;T&gt;(obj)</code>. Access via <code>wr.TryGetTarget(out var target)</code> — returns false if the object was collected. ConditionalWeakTable binds data to object lifetime without preventing collection.</p>`},
  {q:"Explain inheritance, polymorphism, and method overriding vs overloading in C# with examples.",u:"Unit 12",a:`<span class="utag">Unit 12</span><p><strong>Inheritance, polymorphism, overriding, and overloading</strong> are the four pillars of object-oriented design in C#. Together they enable code reuse, extensibility, and flexible runtime behaviour.</p><p><strong>Inheritance:</strong> A class derives from another class, inheriting its members (fields, properties, methods). C# supports single inheritance for classes but multiple interface inheritance. Base class members can be accessed via <code>base</code>. Constructor chaining uses <code>: base(...)</code>.</p><div class="code">public class Animal {
    public string Name { get; set; }
    public Animal(string name) { Name = name; }
    public virtual void Speak() => Console.WriteLine($"{Name} makes a sound");
    public void Breathe() => Console.WriteLine($"{Name} breathes");  // not virtual
}

public class Dog : Animal {
    public string Breed { get; set; }
    public Dog(string name, string breed) : base(name) { Breed = breed; }

    // Override -- replaces base implementation
    public override void Speak() => Console.WriteLine($"{Name} barks! Woof!");

    // New (hiding) -- different from override -- hides, not replaces
    public new void Breathe() => Console.WriteLine($"{Name} pants");
}

public class GoldenRetriever : Dog {
    public GoldenRetriever(string name) : base(name, "Golden Retriever") { }
    public override void Speak() {
        base.Speak();   // call parent Speak
        Console.WriteLine($"...and wags tail");
    }
}</div><p><strong>Polymorphism:</strong> The ability to treat objects of derived types as their base type, with the appropriate method called at runtime based on the actual type (runtime polymorphism).</p><div class="code">Animal[] animals = {
    new Animal("Generic"),
    new Dog("Rex", "Rottweiler"),
    new GoldenRetriever("Buddy")
};

foreach (Animal a in animals) {
    a.Speak();   // virtual dispatch -- calls actual type's method
    a.Breathe(); // non-virtual -- always calls Animal.Breathe()
}
// Output:
// Generic makes a sound
// Rex barks! Woof!
// Buddy barks! Woof! (Dog) then ...and wags tail

// Pattern matching (modern polymorphism)
foreach (Animal a in animals) {
    string description = a switch {
        GoldenRetriever gr => $"{gr.Name} is a friendly golden",
        Dog d              => $"{d.Name} is a {d.Breed}",
        _                  => $"{a.Name} is an animal"
    };
    Console.WriteLine(description);
}</div><p><strong>Method Overriding vs Overloading:</strong></p><ul><li><strong>Overriding (runtime polymorphism):</strong> Subclass provides a new implementation for a <code>virtual</code> or <code>abstract</code> method of the base class, using the <code>override</code> keyword. The method signature (name, parameters, return type) must match exactly. Which implementation runs is determined at runtime by the object's actual type.</li><li><strong>Overloading (compile-time polymorphism):</strong> Multiple methods in the same class share the same name but differ in parameter types, count, or order. Resolved by the compiler at compile time based on argument types.</li></ul><div class="code">// Method overloading -- same name, different parameters
public class MathHelper {
    public int Add(int a, int b) => a + b;
    public double Add(double a, double b) => a + b;
    public int Add(int a, int b, int c) => a + b + c;
    public string Add(string a, string b) => a + b;  // concatenation
}

// abstract -- forces subclass to override (no default implementation)
public abstract class Shape {
    public abstract double Area();     // must override
    public abstract double Perimeter();
    public virtual string Describe() => $"Shape with area {Area():F2}";
}

public class Circle : Shape {
    public double Radius { get; set; }
    public override double Area() => Math.PI * Radius * Radius;
    public override double Perimeter() => 2 * Math.PI * Radius;
}

public class Rectangle : Shape {
    public double W, H;
    public override double Area() => W * H;
    public override double Perimeter() => 2 * (W + H);
    public override string Describe() => $"Rectangle {W}x{H}, area {Area():F2}";
}</div><p><strong>sealed:</strong> Prevents further derivation from a class or further overriding of a method. <code>sealed class</code> cannot be inherited; <code>sealed override</code> stops virtual chain at that class. Sealing enables JIT inlining optimizations and communicates intent to API consumers.</p>`},
  {q:"Explain interfaces and abstract classes in C#. When should you use each?",u:"Unit 13",a:`<span class="utag">Unit 13</span><p>Both interfaces and abstract classes define contracts and enable polymorphism, but they serve different purposes and have different constraints. Choosing between them is a fundamental OOP design decision.</p><p><strong>Interface:</strong> A contract — defines members (methods, properties, events, indexers) that implementing types MUST provide. C# 8.0 introduced default interface implementations. Interfaces contain no instance fields or constructors. A class can implement multiple interfaces (solving C#'s single inheritance limitation).</p><div class="code">// Interface -- defines WHAT, not HOW
public interface IAnimal {
    string Name { get; }
    void Speak();
    string GetDescription();
}

public interface ISwimmable {
    void Swim();
    double SwimSpeed { get; }
}

public interface IFlyable {
    void Fly();
}

// Multiple interface implementation
public class Duck : IAnimal, ISwimmable, IFlyable {
    public string Name { get; }
    public double SwimSpeed => 2.5;

    public Duck(string name) { Name = name; }
    public void Speak() => Console.WriteLine($"{Name}: Quack!");
    public void Swim() => Console.WriteLine($"{Name} is swimming");
    public void Fly() => Console.WriteLine($"{Name} is flying");
    public string GetDescription() => $"Duck named {Name}";
}

// Interface as type -- polymorphism across unrelated types
ISwimmable[] swimmers = { new Duck("Donald"), new Fish("Nemo") };
foreach (var s in swimmers) s.Swim();

// Interface with default implementation (C# 8.0+)
public interface ILogger {
    void Log(string message);
    void LogError(string msg) => Log($"[ERROR] {msg}");  // default
}</div><p><strong>Abstract Class:</strong> A partially implemented class — can contain abstract members (no implementation, must override) and concrete members (with implementation). Has constructors, instance fields, state. Can enforce common behaviour across a class hierarchy. Supports single inheritance only.</p><div class="code">public abstract class Vehicle {
    // Instance field -- shared state
    protected int _fuelLevel = 100;
    public string Make { get; set; }
    public string Model { get; set; }

    // Constructor -- abstract classes CAN have constructors
    protected Vehicle(string make, string model) {
        Make = make; Model = model;
    }

    // Abstract -- subclass MUST implement
    public abstract double MaxSpeed { get; }
    public abstract void Accelerate(double amount);

    // Concrete -- shared behaviour (no need to override)
    public virtual void Refuel(int litres) {
        _fuelLevel = Math.Min(100, _fuelLevel + litres);
        Console.WriteLine($"{Make} {Model} refuelled to {_fuelLevel}%");
    }

    // Template method pattern
    public void StartJourney() {
        Console.WriteLine($"Starting {Make} {Model}");
        Accelerate(50);   // polymorphic call to subclass implementation
        Console.WriteLine($"Cruising at up to {MaxSpeed} km/h");
    }
}

public class ElectricCar : Vehicle {
    public ElectricCar(string make, string model) : base(make, model) { }
    public override double MaxSpeed => 250;
    public override void Accelerate(double amount) =>
        Console.WriteLine($"{Make} accelerates silently to {amount} km/h");
}

public class Truck : Vehicle {
    public double Payload { get; set; }
    public Truck(string make, double payload) : base(make, "Truck") {
        Payload = payload;
    }
    public override double MaxSpeed => 120;
    public override void Accelerate(double amount) =>
        Console.WriteLine($"Truck rumbles up to {amount} km/h (payload: {Payload}t)");
}</div><p><strong>Decision guide:</strong></p><ul><li>Use an <strong>interface</strong> when: defining a contract for unrelated types; multiple inheritance is needed; defining capability (IDisposable, IComparable, IEnumerable); building extensible APIs where you want to decouple callers from implementations (dependency injection targets).</li><li>Use an <strong>abstract class</strong> when: sharing common implementation among closely related types; needing instance fields or constructor logic; implementing the Template Method pattern; when subclasses share state or a common base initialisation step.</li></ul><p>Modern .NET design (SOLID principles) favours interfaces for abstraction and dependency injection, while abstract classes are reserved for base class hierarchies with shared implementation.</p>`},
  {q:"Explain the using statement, IDisposable pattern, and resource management in C#.",u:"Unit 14",a:`<span class="utag">Unit 14</span><p>Proper resource management in C# requires explicitly releasing unmanaged resources (file handles, database connections, network sockets, COM objects) because the GC only manages managed (heap) memory — not OS-level handles. The <strong>IDisposable</strong> interface and the <strong>using statement</strong> provide a deterministic mechanism for resource cleanup.</p><p><strong>IDisposable interface:</strong> Contains a single method <code>void Dispose()</code>. Any class that holds unmanaged resources (or other IDisposable objects) should implement IDisposable to enable deterministic cleanup.</p><div class="code">// Simple IDisposable implementation
public class DatabaseConnection : IDisposable {
    private SqlConnection _conn;
    private bool _disposed = false;

    public DatabaseConnection(string connectionString) {
        _conn = new SqlConnection(connectionString);
        _conn.Open();
    }

    public DataTable Query(string sql) {
        if (_disposed) throw new ObjectDisposedException(nameof(DatabaseConnection));
        // use _conn...
        return new DataTable();
    }

    public void Dispose() {
        if (!_disposed) {
            _conn?.Close();
            _conn?.Dispose();
            _disposed = true;
        }
    }
}

// using statement -- compiler generates try-finally, calls Dispose()
using (var db = new DatabaseConnection(connStr)) {
    var data = db.Query("SELECT * FROM Students");
}  // Dispose() called here -- even if exception thrown

// C# 8.0+ using declaration (no braces -- disposes at end of scope)
using var db2 = new DatabaseConnection(connStr);
var result = db2.Query("SELECT * FROM Products");
// Dispose called when db2 goes out of scope</div><p><strong>Full Dispose pattern (for classes with unmanaged resources):</strong></p><div class="code">public class ResourceManager : IDisposable {
    private IntPtr _unmanagedHandle;     // OS handle
    private Stream _managedStream;       // managed IDisposable
    private bool _disposed = false;

    public ResourceManager() {
        _unmanagedHandle = NativeLib.Alloc();
        _managedStream = File.OpenRead("data.bin");
    }

    // Called by user code (using statement)
    public void Dispose() {
        Dispose(disposing: true);
        GC.SuppressFinalize(this);  // no need for finalizer -- already cleaned
    }

    // Called by finalizer or Dispose
    protected virtual void Dispose(bool disposing) {
        if (!_disposed) {
            if (disposing) {
                // Dispose managed resources (safe -- GC not running)
                _managedStream?.Dispose();
            }
            // Always free unmanaged resources
            if (_unmanagedHandle != IntPtr.Zero) {
                NativeLib.Free(_unmanagedHandle);
                _unmanagedHandle = IntPtr.Zero;
            }
            _disposed = true;
        }
    }

    // Finalizer -- safety net if user forgets Dispose()
    ~ResourceManager() {
        Dispose(disposing: false);
    }
}

// Inheritance: override Dispose in subclass
public class ExtendedManager : ResourceManager {
    private Socket _socket;
    protected override void Dispose(bool disposing) {
        if (disposing) { _socket?.Dispose(); }
        base.Dispose(disposing);  // must call base
    }
}</div><p><strong>Multiple resources in a single using block:</strong></p><div class="code">// C# 8.0+ -- cleaner multiple using declarations
async Task ProcessFileAsync(string path) {
    using var file = File.OpenRead(path);
    using var reader = new StreamReader(file);
    using var conn = new SqlConnection(connStr);
    await conn.OpenAsync();
    using var cmd = new SqlCommand("INSERT INTO Logs...", conn);
    string line;
    while ((line = await reader.ReadLineAsync()) != null) {
        cmd.Parameters.Clear();
        cmd.Parameters.AddWithValue("@line", line);
        await cmd.ExecuteNonQueryAsync();
    }
}   // all resources disposed in reverse declaration order</div><p><strong>Connection pooling:</strong> Calling Dispose() on a SqlConnection does NOT close the physical TCP connection — it returns it to the connection pool for reuse. Always use <code>using</code> on SqlConnection to ensure timely pool return. Missing Dispose() exhausts the pool (max 100 connections by default), causing new requests to block or timeout. The using pattern is therefore critical for scalable database access.</p>`},
