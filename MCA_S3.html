 long:[
  {q:"Explain the IT Act 2000 (India). What are its major provisions, offences, and penalties?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>The <strong>Information Technology Act, 2000 (IT Act 2000)</strong> is India's primary legislation governing electronic commerce, digital signatures, cybercrime, and data protection. It was enacted on 17 October 2000 and significantly amended in 2008 (effective 2009) to address emerging cyberthreats and align with international standards. It is based on the UNCITRAL Model Law on Electronic Commerce (1996).</p><p><strong>Objectives:</strong> (1) Legal recognition of electronic records and digital signatures. (2) Facilitate electronic governance and e-filing. (3) Define cybercrimes and prescribe penalties. (4) Establish regulatory bodies (Certifying Authorities, Cyber Appellate Tribunal, Adjudicating Officers). (5) Provide an accountability framework for intermediaries.</p><p><strong>Key Provisions:</strong></p><ul><li><strong>Sections 3-5 — Digital Signatures / Electronic Signatures:</strong> Legal recognition for electronic records and electronic signatures. Digital signatures must use asymmetric cryptography (public-private key pairs) certified by a licensed Certifying Authority (CA). The 2008 amendment widened "digital signature" to "electronic signature," including biometrics, OTP, and other authentication methods.</li><li><strong>Sections 6-10 — Electronic Governance:</strong> Government may accept applications, issue licences, and create/maintain records in electronic form. E-filing and e-payment have legal validity.</li><li><strong>Section 43 — Damage to Computer Systems (Civil):</strong> Any person who without permission accesses, downloads, introduces viruses, damages, disrupts, or denies access to a computer/network is liable to pay compensation to the affected party (up to Rs. 1 crore). This is civil liability — compensation to victims.</li><li><strong>Section 66 — Computer-Related Offences (Criminal):</strong> Acts under Section 43 committed dishonestly or fraudulently are punishable with imprisonment up to 3 years or fine up to Rs. 5 lakh or both.</li><li><strong>Section 66A (Struck down 2015):</strong> Sending offensive messages electronically — declared unconstitutional by Supreme Court in Shreya Singhal v. UOI (2015) as violating Article 19(1)(a) freedom of speech.</li><li><strong>Section 66B — Receiving stolen computer resources:</strong> Imprisonment up to 3 years, fine up to Rs. 1 lakh.</li><li><strong>Section 66C — Identity Theft:</strong> Fraudulently using another person's electronic signature, password, or unique identification feature. Imprisonment up to 3 years, fine up to Rs. 1 lakh.</li><li><strong>Section 66D — Cheating by Impersonation:</strong> Using computer resources to impersonate. Imprisonment up to 3 years, fine up to Rs. 1 lakh.</li><li><strong>Section 66E — Privacy Violation:</strong> Intentionally capturing, transmitting, or publishing private images without consent. Imprisonment up to 3 years, fine up to Rs. 2 lakh.</li><li><strong>Section 66F — Cyber Terrorism:</strong> Acts using computer networks to threaten national security, disrupt critical infrastructure, or create terror. Imprisonment up to life.</li><li><strong>Section 67 — Publishing obscene material electronically:</strong> First conviction: imprisonment up to 3 years, fine up to Rs. 5 lakh. Second: 5 years, Rs. 10 lakh.</li><li><strong>Section 67A — Publishing sexually explicit material:</strong> 5 years imprisonment, Rs. 10 lakh fine.</li><li><strong>Section 67B — Child pornography:</strong> 5-7 years imprisonment, up to Rs. 10 lakh fine. Browsing alone is also an offence.</li><li><strong>Section 69 — Government interception powers:</strong> Central/State Government can direct interception, monitoring, or decryption of information in the interest of national security, sovereignty, public order, or prevention of incitement.</li><li><strong>Section 72 — Breach of Confidentiality:</strong> Disclosure of information obtained during official capacity without consent. Imprisonment up to 2 years or fine up to Rs. 1 lakh.</li><li><strong>Section 79 — Intermediary Liability:</strong> Intermediaries (ISPs, social media platforms) are not liable for third-party content if they act as a mere conduit, do not initiate transmission, and expeditiously remove content on government/court direction (safe harbour provision).</li></ul><p><strong>Regulatory Framework:</strong> Controller of Certifying Authorities (CCA) — oversees digital signature infrastructure. Certifying Authorities (CAs) — issue Digital Signature Certificates. Adjudicating Officers — hear civil disputes under the Act. Cyber Appellate Tribunal — appellate authority. Cyber cells in state police forces investigate cybercrimes.</p>`},
  {q:"What is intellectual property? Explain copyright, patent, trademark, and trade secrets.",u:"Unit 02",a:`<span class="utag">Unit 02</span><p><strong>Intellectual Property (IP)</strong> refers to creations of the mind — inventions, artistic works, designs, names, symbols, and trade secrets — to which creators are granted exclusive legal rights for a defined period. IP law incentivises innovation and creativity by allowing creators to benefit economically from their work.</p><p><strong>1. Copyright:</strong> Automatically protects original literary, artistic, musical, dramatic, and software works from the moment of creation — no registration required (though registration strengthens enforcement). Duration: Author's lifetime + 60 years (India); 70 years in EU/US. Grants exclusive rights to: reproduce, adapt, distribute, perform/display publicly, and communicate to the public. Infringement: copying without permission (piracy, plagiarism). Exceptions: fair use/fair dealing (education, research, criticism, news reporting), compulsory licensing. The WIPO Copyright Treaty (1996) extends copyright to digital works and software.</p><p><strong>Copyright in Software:</strong> Computer programs are protected as literary works under the Copyright Act (India: Copyright Act 1957, amended 1994/2012). Both object code and source code are protected. APIs may also be protected (Oracle v. Google, US Supreme Court, 2021 — fair use for APIs). A software licence is a permission — not a transfer of copyright.</p><p><strong>2. Patent:</strong> A time-limited exclusive right granted for a novel, non-obvious, and industrially applicable invention. Duration: 20 years from filing date (non-renewable). Rights: exclude others from making, using, selling, importing the invention. In exchange, the inventor publicly discloses the invention (quid pro quo). Types: utility patent (function), design patent (appearance), plant patent (new plant variety). India: Patents Act 1970 (amended 2005 to comply with TRIPS). Section 3(k) excludes computer programs per se and business methods from patentability — but software with a technical effect may be patentable. Process: File application → Examination → Publication → Grant → Maintenance fees.</p><p><strong>3. Trademark:</strong> A distinctive sign (word, logo, slogan, colour, shape, sound) that identifies and distinguishes the goods/services of one enterprise from others. Duration: Initially 10 years, renewable indefinitely. Rights: exclusive use in registered class of goods/services; prevent others from using confusingly similar marks. Registration provides constructive notice and stronger enforcement. India: Trade Marks Act 1999. Examples: Apple logo, Coca-Cola script, McDonald's golden arches. Famous marks get broader protection (well-known marks status). Infringement: passing off (representing goods as another's). Dilution: weakening of famous mark's distinctiveness.</p><p><strong>4. Trade Secret:</strong> Confidential business information that provides a competitive advantage — not publicly disclosed. Examples: Coca-Cola formula, Google search algorithm, customer lists, manufacturing processes. Duration: Perpetual, as long as kept secret. No formal registration — protection achieved through Non-Disclosure Agreements (NDAs), access controls, employment contracts. If disclosed (even accidentally), trade secret protection is lost. India: No specific trade secret law — protected through contract law (NDAs), confidentiality agreements, and equity (breach of confidence). US: Defend Trade Secrets Act (2016).</p><p><strong>TRIPS Agreement (1994):</strong> WTO Agreement on Trade-Related Aspects of Intellectual Property Rights — sets minimum IP standards for all WTO member countries (including India), covering copyright, patents, trademarks, geographical indications, and trade secrets. Enabled India's participation in global IP framework while allowing transition periods for developing countries.</p>`},
  {q:"Explain cybercrime. Classify types of cybercrime and the laws addressing them in India.",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Cybercrime</strong> refers to criminal activities committed using computers, networks, or the Internet — either targeting computer systems themselves or using computers as tools to commit traditional crimes. Cybercrime is borderless, anonymous, scalable, and increasingly sophisticated, making it a major challenge for law enforcement worldwide.</p><p><strong>Classification of Cybercrime:</strong></p><p><strong>Category 1: Crimes against computers and networks (the computer is the TARGET):</strong></p><ul><li><strong>Hacking / Unauthorised Access:</strong> Gaining access to a computer system without permission. Covered under IT Act Sec 66 (criminal), Sec 43 (civil).</li><li><strong>Cracking:</strong> Hacking with malicious intent — breaking security, damaging systems.</li><li><strong>Malware:</strong> Viruses, worms, Trojans, ransomware, spyware, keyloggers. Covered under IT Act Sec 43(c) — introducing viruses; Sec 66 — if fraudulent/dishonest.</li><li><strong>Ransomware:</strong> Encrypts victim's files, demands payment for decryption key. WannaCry (2017) affected 200,000 systems in 150 countries.</li><li><strong>DDoS (Distributed Denial of Service):</strong> Overwhelms target with traffic using botnet. Covered under IT Act Sec 43(f) — denial of access; Sec 66F — if national security threat.</li><li><strong>Data Theft / Data Breach:</strong> Stealing personal or financial data. Covered under IT Act Sec 43(b), Sec 72, PDPB 2023.</li></ul><p><strong>Category 2: Crimes using computers as a tool:</strong></p><ul><li><strong>Cyberstalking / Harassment:</strong> Repeated, unwanted contact or monitoring online. IT Act Sec 66A (struck down) — now pursued under IPC Sec 354D (stalking) and Sec 509 (harassment).</li><li><strong>Online Fraud / Phishing:</strong> Deceptive emails/websites that steal credentials or money. IT Act Sec 66D (cheating by impersonation); IPC Sec 420 (cheating).</li><li><strong>Identity Theft:</strong> Using another person's identity online for financial gain. IT Act Sec 66C — imprisonment up to 3 years.</li><li><strong>Cyberbullying:</strong> Harassment, threats, or humiliation through online platforms. Especially prevalent among minors. IT Act Sec 67 (obscene material); IPC provisions.</li><li><strong>Online Child Exploitation / CSAM:</strong> Child Sexual Abuse Material. IT Act Sec 67B — 5-7 years imprisonment; POCSO Act (Protection of Children from Sexual Offences, 2012).</li><li><strong>Cyber Terrorism:</strong> Using cyberspace to threaten or disrupt national security, critical infrastructure. IT Act Sec 66F — life imprisonment.</li><li><strong>Intellectual Property Crimes:</strong> Online piracy, software cracking, digital counterfeiting. IT Act Sec 66 + Copyright Act, Trademarks Act.</li><li><strong>Deepfakes:</strong> AI-generated fake videos/images — may constitute defamation (IPC 499), harassment, or obscenity (IT Act 67).</li><li><strong>Cryptojacking:</strong> Secretly using victim's CPU to mine cryptocurrency. IT Act Sec 43/66.</li></ul><p><strong>Indian Legal Framework for Cybercrime:</strong> IT Act 2000 (amended 2008) — primary cybercrime legislation. Indian Penal Code (IPC) 1860 — applicable for cheating (420), fraud, defamation (499), forgery (463-467), extortion (383). National Cyber Crime Reporting Portal (cybercrime.gov.in). Computer Emergency Response Team India (CERT-In) — investigates and coordinates cyber incident response. Cyber police cells in all states. National Cybercrime Reporting Portal launched 2018. Personal Data Protection Bill 2023 (Digital Personal Data Protection Act, DPDP Act) — addresses data breach reporting and privacy protection.</p>`},
  {q:"What is digital signature? Explain the technology behind it and its legal validity in India.",u:"Unit 04",a:`<span class="utag">Unit 04</span><p>A <strong>digital signature</strong> is a cryptographic mechanism that provides authentication (proof that the signer is who they claim to be), integrity (guarantee that the document hasn't been altered), and non-repudiation (signer cannot deny having signed) for electronic documents and transactions. It is the electronic equivalent of a handwritten signature — but mathematically far more secure.</p><p><strong>Technology behind digital signatures — Public Key Cryptography (PKI):</strong></p><p>Digital signatures use asymmetric cryptography — a pair of mathematically related keys: a <strong>private key</strong> (kept secret by the signer) and a <strong>public key</strong> (freely distributed). The key property: what is encrypted with one key can only be decrypted with the other.</p><p><strong>Signing process:</strong></p><ol><li>The signer creates a message digest (hash) of the document using a hash function (SHA-256, SHA-3).</li><li>The signer encrypts the hash using their <strong>private key</strong> — this encrypted hash IS the digital signature.</li><li>The signed document (original document + digital signature + signer's public key certificate) is sent to the recipient.</li></ol><p><strong>Verification process:</strong></p><ol><li>Recipient decrypts the signature using the signer's <strong>public key</strong> — recovers the original hash.</li><li>Recipient independently computes the hash of the received document.</li><li>If the two hashes match: document is authentic and unaltered. If they don't match: document was tampered with or the signature is forged.</li></ol><div class="code">// Conceptual (Python-like pseudocode):
import hashlib, rsa

# Signing
doc = b"Contract: Pay Rs. 5,00,000 to XYZ Corp"
hash_val = hashlib.sha256(doc).digest()       # Step 1: hash
signature = rsa.sign(hash_val, private_key)   # Step 2: encrypt hash

# Verification
hash_recv = hashlib.sha256(doc_received).digest()
hash_from_sig = rsa.decrypt(signature, public_key)
valid = (hash_recv == hash_from_sig)  # True = authentic, unaltered</div><p><strong>Digital Certificate:</strong> A digital document issued by a trusted Certifying Authority (CA) that binds a person's identity to their public key. Contains: owner name, public key, expiry date, CA's name and digital signature on the certificate. X.509 is the standard format. Certificate chain: End-Entity Certificate → Intermediate CA → Root CA. Browser/OS trusts a set of Root CAs (Mozilla, Microsoft, Apple trust stores).</p><p><strong>Legal Validity in India:</strong> IT Act 2000, Section 3-5: Digital signatures have the same legal validity as handwritten signatures. Section 3A (added 2008): Extends validity to "electronic signatures" including OTP, biometric, and other authentication methods specified by the Central Government. The Controller of Certifying Authorities (CCA, under Ministry of IT) licenses and regulates Certifying Authorities. Licensed CAs in India include eMudhra, NIC-CA, IDRBT, Safescrypt. Digital signatures are mandatory for e-filing of income tax returns (for companies), ROC filings (Companies Act), MCA21 portal. The Evidence Act (Section 65B) and IT Act work together to admit electronic records and digital signatures as evidence in court. A secure digital signature is presumed to have been affixed by the subscriber and represents approval (Section 85B, Indian Evidence Act).</p>`},
  {q:"What is data privacy? Explain GDPR principles and India's DPDP Act 2023.",u:"Unit 05",a:`<span class="utag">Unit 05</span><p><strong>Data Privacy</strong> (also called Information Privacy) is the right of individuals to control how their personal information is collected, used, stored, and shared by organisations. As digital transactions generate vast amounts of personal data, privacy legislation has become critical to protecting citizens' fundamental rights.</p><p><strong>GDPR (General Data Protection Regulation) — EU, effective May 2018:</strong> The world's most comprehensive data protection framework, applying to any organisation that processes personal data of EU residents — regardless of where the organisation is based (extra-territorial scope). Key principles:</p><ul><li><strong>Lawfulness, Fairness, Transparency:</strong> Data must be processed with a valid legal basis (consent, contract, legal obligation, legitimate interest, vital interests, public task). Processing must be transparent — privacy notices required.</li><li><strong>Purpose Limitation:</strong> Data collected for specified, explicit, legitimate purposes — not reused for incompatible purposes without new consent.</li><li><strong>Data Minimisation:</strong> Collect only what is necessary — "minimum necessary" principle.</li><li><strong>Accuracy:</strong> Personal data must be accurate and kept up-to-date. Right to rectification.</li><li><strong>Storage Limitation:</strong> Retain data only as long as necessary for its purpose. Data should be deleted or anonymised when no longer needed.</li><li><strong>Integrity and Confidentiality:</strong> Appropriate technical and organisational security measures (encryption, access controls, pseudonymisation).</li><li><strong>Accountability:</strong> Data Controllers must demonstrate compliance (privacy by design, DPO appointment, Records of Processing Activities).</li></ul><p><strong>GDPR Individual Rights:</strong> Right to be informed (privacy notices). Right of access (Subject Access Request — get a copy of your data within 30 days). Right to rectification (correct inaccurate data). Right to erasure ("right to be forgotten" — delete data when no longer needed). Right to restrict processing. Right to data portability (receive data in structured, machine-readable format). Right to object (to direct marketing, profiling). Rights related to automated decision-making and profiling (Article 22). Penalties: up to 4% of global annual turnover or €20 million, whichever is greater.</p><p><strong>India's DPDP Act 2023 (Digital Personal Data Protection Act):</strong> India's first comprehensive data protection legislation, passed August 2023. Replaces the inadequate IT Act provisions. Key features:</p><ul><li><strong>Scope:</strong> Applies to digital personal data processed in India, and processing outside India if offering goods/services to Indian residents.</li><li><strong>Consent:</strong> Processing requires free, specific, informed, and unambiguous consent. Consent must be requested in plain language. "Deemed consent" for certain purposes: performance of state functions, medical emergencies, public order.</li><li><strong>Data Principal Rights:</strong> Right to information about processing. Right to correction and erasure. Right to grievance redressal. Right to nominate a person to exercise rights after death.</li><li><strong>Data Fiduciary Obligations:</strong> Purpose limitation. Data minimisation. Accuracy. Security safeguards. Data breach notification to Data Protection Board within prescribed time.</li><li><strong>Significant Data Fiduciaries (SDF):</strong> High-volume or high-risk processors subject to additional obligations (DPO appointment, DPIA).</li><li><strong>Cross-Border Transfers:</strong> Permitted to countries notified by Central Government (positive list approach, unlike GDPR's adequacy decisions).</li><li><strong>Children's Data:</strong> Verifiable parental consent required for children under 18. Prohibition on targeting children with advertisements.</li><li><strong>Data Protection Board:</strong> Independent body to adjudicate complaints and impose penalties (up to Rs. 250 crore per instance).</li></ul><p>Unlike GDPR, the DPDP Act 2023 has no "right to be forgotten" in explicit terms and does not cover non-digital/offline personal data. Rules under the Act are yet to be finalised as of 2024.</p>`},
  {q:"Explain cyber ethics, netiquette, and responsible use of the internet.",u:"Unit 06",a:`<span class="utag">Unit 06</span><p><strong>Cyber Ethics</strong> refers to the moral principles that govern behaviour in cyberspace — the standards of right and wrong conduct when using computers, networks, and the Internet. As digital technology permeates every aspect of life, ethical behaviour online is as important as ethical behaviour in physical society.</p><p><strong>Ten Commandments of Computer Ethics (Computer Ethics Institute):</strong></p><ol><li>Thou shalt not use a computer to harm other people.</li><li>Thou shalt not interfere with other people's computer work.</li><li>Thou shalt not snoop around in other people's computer files.</li><li>Thou shalt not use a computer to steal.</li><li>Thou shalt not use a computer to bear false witness.</li><li>Thou shalt not copy or use proprietary software for which you have not paid.</li><li>Thou shalt not use other people's computer resources without authorisation or proper compensation.</li><li>Thou shalt not appropriate other people's intellectual output.</li><li>Thou shalt think about the social consequences of the program you are writing or system you are designing.</li><li>Thou shalt always use a computer in ways that ensure consideration and respect for other humans.</li></ol><p><strong>Key Cyber Ethics Principles:</strong></p><ul><li><strong>Privacy:</strong> Respect others' personal information and communications — do not access, share, or use without consent. Applies to personal messages, health data, financial information. Erosion of privacy through surveillance, data brokers, and corporate data collection raises ethical concerns.</li><li><strong>Intellectual Property Respect:</strong> Software piracy, illegal downloading, plagiarism, and AI-generated content trained on copyrighted material are ethical violations, not just legal ones.</li><li><strong>Digital Divide and Access Equity:</strong> Responsibility to ensure technology benefits are broadly accessible — not just the privileged. Creating accessible content for persons with disabilities.</li><li><strong>Truthfulness and Accuracy:</strong> Ethical obligation to share accurate information — avoiding misinformation, fake news, deepfakes, and manipulative content.</li><li><strong>Environmental Responsibility:</strong> E-waste disposal, energy consumption of data centres (carbon footprint of digital services), responsible hardware disposal.</li><li><strong>AI Ethics:</strong> Fairness, transparency, accountability in AI systems — avoiding algorithmic bias, explainability of automated decisions affecting individuals.</li></ul><p><strong>Netiquette (Network Etiquette):</strong> Informal standards of polite online behaviour — "the rules of the road" for cyberspace.</p><ul><li><strong>Email:</strong> Use clear subject lines. Be concise. Don't use ALL CAPS (implies shouting). Reply within reasonable time. Don't reply-all unnecessarily. Attach files only when needed; compress large files. Don't forward chain letters or unverified information.</li><li><strong>Social Media:</strong> Think before posting — content is permanent. Don't post others' photos without permission. Respect others' opinions even when disagreeing. Avoid trolling, hate speech, personal attacks. Credit original creators.</li><li><strong>Online Forums/Discussion Boards:</strong> Read FAQs and rules before posting. Stay on topic. Don't spam. Acknowledge contributions. Don't plagiarise responses.</li><li><strong>Video Conferencing:</strong> Mute when not speaking. Test equipment before meeting. Appropriate background. Be punctual. Don't multitask visibly.</li><li><strong>Gaming:</strong> Fair play — no cheating, hacking. Respectful communication. Protect younger players from inappropriate content.</li></ul><p><strong>Responsible Internet Use for Students:</strong> Cite internet sources properly. Verify information before sharing. Protect personal information (never share passwords, home address). Report cyberbullying. Use institutional accounts and resources for legitimate purposes only. Understand that online actions have real-world consequences — legally and socially. The concept of "digital citizenship" — being a responsible, ethical, and safe participant in the digital world — is increasingly important in education systems globally.</p>`},
  {q:"What is information security? Explain the CIA triad, threats, vulnerabilities, and risk management.",u:"Unit 07",a:`<span class="utag">Unit 07</span><p><strong>Information Security (InfoSec)</strong> is the practice of protecting information systems and data from unauthorised access, use, disclosure, disruption, modification, and destruction — ensuring the continuous, reliable, and secure operation of critical systems. InfoSec spans people, processes, and technology.</p><p><strong>CIA Triad — The three core properties of information security:</strong></p><ul><li><strong>Confidentiality:</strong> Ensuring information is accessible only to authorised individuals, entities, or processes. Violated by: eavesdropping, data breaches, privilege escalation, social engineering, sniffing. Controls: encryption (at-rest and in-transit), access control lists, authentication, data classification, NDA agreements, DLP (Data Loss Prevention) systems.</li><li><strong>Integrity:</strong> Ensuring information is accurate, complete, and unmodified by unauthorised parties. Violated by: man-in-the-middle attacks, SQL injection, malware that alters files, insider tampering. Controls: hashing (SHA-256, MD5 for file verification), digital signatures, version control, audit logs, write-protect mechanisms, input validation.</li><li><strong>Availability:</strong> Ensuring information and systems are accessible to authorised users when needed. Violated by: DoS/DDoS attacks, ransomware, hardware failures, natural disasters, accidental deletion, software bugs. Controls: redundancy, RAID, load balancing, DR (Disaster Recovery) plans, BCP (Business Continuity Planning), UPS, CDN, regular backups.</li></ul><p><strong>Additional properties (extended CIA):</strong> Authentication (verifying identity), Non-repudiation (preventing denial of actions — digital signatures), Authorisation (access rights), Accountability (audit trails).</p><p><strong>Threats, Vulnerabilities, and Risk:</strong></p><ul><li><strong>Threat:</strong> A potential cause of an unwanted incident that could result in harm to a system or organisation. Examples: hackers, malware, disgruntled employees, natural disasters, hardware failures.</li><li><strong>Vulnerability:</strong> A weakness in a system, application, or process that could be exploited by a threat. Examples: unpatched software (CVE — Common Vulnerabilities and Exposures database), weak passwords, SQL injection susceptibility, misconfigured servers, open USB ports.</li><li><strong>Risk = Threat × Vulnerability × Impact:</strong> The likelihood that a threat will exploit a vulnerability and the resulting harm. Risk assessment identifies: what assets exist, what threats face them, what vulnerabilities exist, and the potential impact.</li><li><strong>Exploit:</strong> The mechanism by which a threat actor takes advantage of a vulnerability.</li><li><strong>Attack Vector:</strong> The path or means by which an attacker delivers an exploit (network, physical, email, USB, web application).</li></ul><p><strong>Risk Management Process:</strong></p><ol><li><strong>Asset Identification:</strong> Catalogue all information assets (data, systems, hardware, intellectual property) and their value.</li><li><strong>Threat Identification:</strong> Identify threats relevant to each asset (internal/external, intentional/accidental).</li><li><strong>Vulnerability Assessment:</strong> Identify weaknesses — vulnerability scanning (Nessus, OpenVAS), penetration testing, code review.</li><li><strong>Risk Assessment:</strong> Estimate likelihood and impact for each risk scenario. Qualitative (High/Medium/Low) or quantitative (ALE = Annual Loss Expectancy = SLE × ARO).</li><li><strong>Risk Treatment:</strong> Avoid (eliminate the asset/process), Mitigate (implement controls to reduce likelihood/impact), Transfer (insurance, outsourcing), Accept (document and monitor tolerable risks).</li><li><strong>Controls Implementation:</strong> Administrative (policies, training, ISMS), Technical (firewalls, IDS, encryption, MFA), Physical (locks, cameras, access cards).</li><li><strong>Monitor and Review:</strong> Continuous monitoring — security events, new vulnerabilities (CVEs), threat intelligence feeds.</li></ol><p><strong>Frameworks:</strong> ISO/IEC 27001 (ISMS — Information Security Management System), NIST Cybersecurity Framework (Identify, Protect, Detect, Respond, Recover), COBIT, PCI DSS (for payment card data). Risk management is iterative — the threat landscape constantly evolves (new attack techniques, new business processes, new regulations).</p>`},
  {q:"Explain different types of malware. How do they work and how are they detected/prevented?",u:"Unit 08",a:`<span class="utag">Unit 08</span><p><strong>Malware (Malicious Software)</strong> is software intentionally designed to disrupt, damage, gain unauthorised access to, or spy on computer systems. Malware is the primary tool of cybercriminals, nation-state actors, and hacktivists. Understanding malware types is essential for both defence and incident response.</p><p><strong>Types of Malware:</strong></p><ul><li><strong>Virus:</strong> Self-replicating code that attaches itself to legitimate programs or files and spreads when those files are executed or copied. Requires a host file (unlike a worm). Types: file infector (attaches to .exe), macro virus (embeds in Office documents — VBA macros), boot sector virus. Action: corrupts files, damages data, spreads via file sharing/email attachments. Prevention: antivirus scanning, disabling macros by default.</li><li><strong>Worm:</strong> Self-replicating malware that spreads without a host file — exploits network vulnerabilities or email to propagate independently. Famous examples: ILOVEYOU (2000), Conficker (2008), WannaCry (2017 — exploited EternalBlue SMB vulnerability). Worms consume bandwidth and can carry payloads (viruses, backdoors). Prevention: patches, network segmentation, firewall.</li><li><strong>Trojan Horse:</strong> Disguises itself as legitimate software. Does not self-replicate. User is tricked into executing it (fake antivirus, game crack, free software). Can install backdoors, steal data, spy on users. Types: Remote Access Trojan (RAT), banker Trojan (steals banking credentials — Zeus, Emotet), dropper (installs other malware). Prevention: download only from trusted sources, antivirus, email filtering.</li><li><strong>Ransomware:</strong> Encrypts victim's files using strong cryptography (AES-256 + RSA-2048) and demands ransom (typically cryptocurrency) for the decryption key. Variants: locker ransomware (locks the screen), crypto ransomware (encrypts files), double extortion (encrypts + exfiltrates for blackmail). Notable: WannaCry, NotPetya, REvil, LockBit. Prevention: regular offline backups, patching, email filtering, user training, endpoint detection.</li><li><strong>Spyware/Adware:</strong> Monitors user activity (keystrokes, browsing, screenshots, microphone) and transmits to attacker. Adware injects unwanted advertisements. Stalkerware — used in domestic abuse contexts. Pegasus — nation-state-level mobile spyware (zero-click, exploits iOS/Android). Prevention: antispyware, reviewing app permissions.</li><li><strong>Keylogger:</strong> Records all keystrokes — captures passwords, PINs, credit card numbers, messages. Hardware keyloggers (USB devices) or software. Prevention: 2FA, virtual keyboards, antimalware.</li><li><strong>Rootkit:</strong> Hides itself and other malware at the OS or firmware level — extremely difficult to detect. Modifies OS kernel to conceal processes, files, network connections. UEFI rootkits persist across OS reinstalls. Detection: offline scanning (boot from clean media), integrity verification. Prevention: Secure Boot, UEFI password.</li><li><strong>Botnet:</strong> Network of compromised machines (bots/zombies) controlled by a Command and Control (C2) server. Used for DDoS, spam, cryptocurrency mining, click fraud. Communication: IRC, HTTP, P2P protocols. Examples: Mirai (IoT botnet), Emotet. Prevention: patch management, intrusion detection, network monitoring.</li><li><strong>Fileless Malware:</strong> Operates entirely in memory — no file written to disk. Evades traditional file-based antivirus. Uses legitimate system tools (PowerShell, WMI, certutil). Detection requires memory forensics, EDR (Endpoint Detection and Response) tools. Prevention: limit PowerShell execution policy, application whitelisting.</li></ul><p><strong>Detection and Prevention strategies:</strong> Antivirus/EDR (signature-based + heuristic + behavioural analysis). Email filtering (sandbox analysis of attachments). Network segmentation and monitoring (SIEM, IDS). Regular patching (close exploited CVEs). User training (phishing awareness). Principle of least privilege. Regular offline backups (last line of defence against ransomware). Zero Trust Architecture — verify every access, never assume trust.</p>`},
  {q:"What is e-commerce? Explain its legal framework, digital payments, and security challenges.",u:"Unit 09",a:`<span class="utag">Unit 09</span><p><strong>E-commerce (Electronic Commerce)</strong> refers to the buying and selling of goods and services, and the transmission of funds and data, over electronic networks — primarily the Internet. It has transformed global trade, creating multi-trillion dollar markets (Amazon, Alibaba, Flipkart, etc.).</p><p><strong>E-commerce Models:</strong></p><ul><li><strong>B2C (Business to Consumer):</strong> Retailers selling directly to consumers (Amazon, Flipkart, Zomato, Swiggy). Largest segment by volume.</li><li><strong>B2B (Business to Business):</strong> Businesses selling to other businesses (Alibaba.com, IndiaMart, raw material suppliers). Largest by value.</li><li><strong>C2C (Consumer to Consumer):</strong> Consumers trading with each other through a platform (eBay, OLX, Quikr). Platform provides the marketplace.</li><li><strong>B2G (Business to Government):</strong> Government procurement (e-tendering portals, GeM — Government e-Marketplace, India). Government is the buyer.</li><li><strong>D2C (Direct to Consumer):</strong> Manufacturers bypassing retailers (boAt, Mamaearth on their own websites). Growing trend.</li></ul><p><strong>Legal Framework for E-Commerce in India:</strong></p><ul><li><strong>IT Act 2000:</strong> Legal recognition of electronic contracts (Section 10A), e-signatures, electronic records. Intermediary liability (Section 79). Foundation of all digital transactions.</li><li><strong>Indian Contract Act 1872:</strong> Electronic contracts must meet contract elements — offer, acceptance, consideration, free consent, capacity, lawful object. Clicking "I agree" is valid acceptance.</li><li><strong>Consumer Protection Act 2019 + E-Commerce Rules 2020:</strong> E-commerce entities must display seller information, grievance officer contact, return/refund policies, country of origin. No unfair trade practices, fake reviews, or drip pricing. Mandatory grievance redressal within 48 hours. Rules amended 2022 for stricter compliance (flash sales, fall-back liability).</li><li><strong>Payment and Settlement Systems Act 2007 (PSS Act):</strong> Regulates payment systems. RBI is the regulator for all digital payment systems (UPI, NEFT, RTGS, IMPS, card payments). Payment Aggregators and Payment Gateways regulated by RBI since 2021.</li><li><strong>PDPB / DPDP Act 2023:</strong> E-commerce platforms must obtain consent for processing personal data, maintain security, report breaches.</li><li><strong>GST (Goods and Services Tax):</strong> E-commerce operators (Amazon, Flipkart) must collect TCS (Tax Collected at Source) — 1% of net sales. Mandatory GST registration for e-commerce sellers regardless of turnover threshold.</li></ul><p><strong>Digital Payment Methods in India:</strong> UPI (Unified Payments Interface) — India's real-time P2P and P2M payment system (PhonePe, Google Pay, BHIM). Net Banking — NEFT, RTGS, IMPS. Cards — credit/debit (Visa, Mastercard, RuPay — India's domestic scheme). Mobile Wallets — Paytm, Amazon Pay. BNPL (Buy Now Pay Later) — credit-based deferred payments. CBDC (Central Bank Digital Currency) — RBI's digital rupee (e-Rupee, pilot 2022).</p><p><strong>Security Challenges in E-Commerce:</strong></p><ul><li>Payment fraud — card-not-present fraud, phishing for OTPs, SIM swap attacks.</li><li>Account takeover — credential stuffing (using leaked passwords), weak authentication.</li><li>Fake product listings, counterfeit goods, seller fraud on marketplace platforms.</li><li>Supply chain attacks — compromising third-party plugins or logistics partners.</li><li>Privacy breaches — customer data (name, address, payment info) is a prime target.</li></ul><p>Security measures: PCI DSS compliance for card payments. SSL/TLS encryption for all transactions. 3D Secure (OTP authentication for card transactions — mandated by RBI in India). MFA for customer accounts. Fraud detection ML models (anomaly detection on transactions). Tokenisation — replace actual card numbers with tokens (RBI mandated card-on-file tokenisation from 2022).</p>`},
  {q:"Explain social engineering attacks. How do phishing, vishing, and smishing work?",u:"Unit 10",a:`<span class="utag">Unit 10</span><p><strong>Social Engineering</strong> is the art of manipulating people into divulging confidential information or performing actions that compromise security — exploiting human psychology rather than technical vulnerabilities. It is the most effective attack vector because humans are often the weakest link in security. Even the most secure technical systems can be bypassed if an employee is deceived into revealing credentials or clicking a malicious link.</p><p><strong>Psychological Principles Exploited:</strong></p><ul><li><strong>Authority:</strong> Impersonating a boss, IT department, bank, or government agency. People comply with authority figures.</li><li><strong>Urgency/Scarcity:</strong> "Your account will be closed in 2 hours unless you verify now." Creates panic, bypasses rational thinking.</li><li><strong>Fear:</strong> "Your computer has a virus — call this number." Tech support scams.</li><li><strong>Reciprocity:</strong> Offer a small gift/information first, then ask for something in return.</li><li><strong>Social Proof:</strong> "All your colleagues have already updated their details."</li><li><strong>Liking/Familiarity:</strong> Impersonating a known colleague, friend, or trusted brand (spoofing).</li></ul><p><strong>Phishing (Email-based):</strong> Mass deceptive emails sent to millions of recipients, impersonating trusted entities (banks, IRCTC, Amazon, PayPal, IT department) to steal credentials, financial information, or deploy malware.</p><ul><li><strong>Spear Phishing:</strong> Targeted phishing — crafted for a specific individual using personalised information (gathered from LinkedIn, social media, company website). Highly convincing. Used in APT (Advanced Persistent Threat) attacks.</li><li><strong>Whaling:</strong> Spear phishing targeting senior executives (CEOs, CFOs). Example: "CEO Fraud" — attacker impersonates CEO and emails CFO requesting urgent wire transfer.</li><li><strong>Clone Phishing:</strong> Legitimate email is copied with malicious links/attachments substituted. "Updated version of the document you requested."</li><li><strong>Pharming:</strong> DNS poisoning redirects users from legitimate website to a fake one — even if correct URL is typed.</li></ul><div class="code">// Phishing email example:
From: alerts@sbi-in.secure-banking.com   // spoofed - NOT SBI
Subject: URGENT: Verify your account or it will be SUSPENDED

Dear Customer,
We detected suspicious activity. Verify your account within 24 hours:
[Click here to verify] -- link goes to sbi-in.secure-banking.com/login
// Tells you to enter card number, CVV, OTP</div><p><strong>Vishing (Voice Phishing):</strong> Phone calls from attackers impersonating bank fraud departments, IT support, government agencies (Income Tax, TRAI). Increasingly using AI-generated voice cloning to impersonate known individuals. "Your number will be disconnected in 2 hours unless you provide OTP to unblock." People are more trusting of voice calls.</p><p><strong>Smishing (SMS Phishing):</strong> Fraudulent SMS messages with malicious links or fake notifications. "Your parcel is pending, pay Rs.50 customs fee to release: [link]." Links lead to credential harvesting sites or install malware. Particularly effective because many people trust SMS more than email.</p><p><strong>Other Social Engineering Techniques:</strong></p><ul><li><strong>Pretexting:</strong> Creating a fabricated scenario to extract information (impersonating an auditor, HR, technical support).</li><li><strong>Baiting:</strong> Leaving infected USB drives in car parks or public spaces — curiosity drives people to plug them in.</li><li><strong>Tailgating/Piggybacking:</strong> Physically following an authorised person through a secure door.</li><li><strong>Quid Pro Quo:</strong> Offering IT help in exchange for credentials ("Just give me your password and I'll fix your issue").</li></ul><p><strong>Prevention:</strong> Security awareness training — simulate phishing attacks. Multi-factor authentication (MFA) — even if credentials stolen, attacker can't login. Email authentication (SPF, DKIM, DMARC) to verify sender domain. Verify caller identity through official channels (call back on published number). Never provide OTP/PIN to anyone — banks/government never ask. URL inspection — check actual domain, not just display text. Zero trust: verify, don't assume.</p>`},
  {q:"Explain encryption. Compare symmetric and asymmetric encryption with algorithms and use cases.",u:"Unit 11",a:`<span class="utag">Unit 11</span><p><strong>Encryption</strong> is the process of transforming readable data (plaintext) into an unreadable form (ciphertext) using a cryptographic algorithm and a key, so that only authorised parties with the correct key can decrypt and read the original data. It is the fundamental technique for achieving confidentiality in information security.</p><p><strong>Symmetric Encryption (Secret Key Cryptography):</strong> Both sender and receiver use the <strong>same key</strong> for encryption and decryption. Extremely fast — suitable for encrypting large amounts of data. The key distribution problem: how do two parties securely share the symmetric key without it being intercepted?</p><ul><li><strong>AES (Advanced Encryption Standard):</strong> The global standard since 2001. Block cipher — processes 128-bit blocks. Key sizes: 128, 192, or 256 bits. Used in: Wi-Fi (WPA2/WPA3), TLS session encryption, disk encryption (BitLocker, FileVault), file archiving (7-Zip). AES-256 is considered quantum-resistant for the near future.</li><li><strong>DES (Data Encryption Standard):</strong> 56-bit key — obsolete. Cracked in 22 hours (1999). Triple-DES (3DES) — applies DES three times (112-168 effective bits) — slow, being deprecated.</li><li><strong>ChaCha20:</strong> Stream cipher used in TLS 1.3 for mobile devices (faster than AES on CPUs without hardware AES acceleration). Combined with Poly1305 MAC for authenticated encryption.</li><li><strong>RC4:</strong> Stream cipher — broken and banned in TLS since 2015. Never use.</li></ul><div class="code">// Symmetric encryption (Python - cryptography library):
from cryptography.fernet import Fernet

key = Fernet.generate_key()    # 256-bit AES key
cipher = Fernet(key)

ciphertext = cipher.encrypt(b"Secret message: Transfer Rs. 50,000")
plaintext = cipher.decrypt(ciphertext)
print(plaintext)  # b'Secret message: Transfer Rs. 50,000'</div><p><strong>Asymmetric Encryption (Public Key Cryptography):</strong> Uses a mathematically related key pair: <strong>public key</strong> (freely distributed) for encryption, <strong>private key</strong> (kept secret) for decryption. Solves the key distribution problem. Much slower than symmetric — typically used to encrypt a session key, then switch to symmetric encryption for the bulk data. This hybrid approach is used in TLS/HTTPS.</p><ul><li><strong>RSA (Rivest-Shamir-Adleman):</strong> Based on the difficulty of factoring large integers (semiprime). Key sizes: 2048 or 4096 bits for security. Used for: key exchange in TLS (legacy), digital signatures, certificate encryption. Being phased out for key exchange in favour of ECDH (faster, shorter keys).</li><li><strong>ECC (Elliptic Curve Cryptography):</strong> Based on algebraic properties of elliptic curves over finite fields. Much shorter keys than RSA for equivalent security (256-bit ECC ≈ 3072-bit RSA). ECDSA (signing), ECDH (key exchange). Used in modern TLS, Bitcoin (secp256k1 curve), mobile certificates.</li><li><strong>Diffie-Hellman (DH) / ECDH:</strong> Key exchange algorithm — allows two parties to establish a shared secret over an insecure channel without transmitting the key. Foundation of TLS forward secrecy (ephemeral DH — EDH/ECDHE).</li></ul><div class="code">// Asymmetric encryption conceptual flow:
// 1. Bob publishes his public key on a key server
// 2. Alice encrypts message with Bob's public key
//    ciphertext = RSA_encrypt(message, Bob_public_key)
// 3. Only Bob can decrypt (with his private key)
//    plaintext = RSA_decrypt(ciphertext, Bob_private_key)

// Digital signature is the REVERSE:
// 4. Alice signs with her private key
//    signature = RSA_sign(hash(message), Alice_private_key)
// 5. Anyone verifies with Alice's public key
//    valid = RSA_verify(signature, hash(message), Alice_public_key)</div><p><strong>Hash Functions (one-way, not encryption):</strong> SHA-256, SHA-3, MD5 (broken). Produce a fixed-length digest. Used for password storage (with salt: bcrypt, Argon2, scrypt), data integrity verification, digital signatures. One-way: cannot reverse a hash to get the original input.</p><p><strong>Hybrid Encryption (TLS):</strong> RSA/ECDH used in handshake to exchange a symmetric session key. AES-GCM used for bulk data encryption with the session key. This combines asymmetric's key distribution advantage with symmetric's speed advantage.</p>`},
  {q:"Explain network forensics and cyber forensics investigation process.",u:"Unit 12",a:`<span class="utag">Unit 12</span><p><strong>Cyber Forensics (Digital Forensics)</strong> is the application of scientific methods to identify, collect, examine, preserve, and present digital evidence from computer systems, networks, and digital devices in a manner that is legally admissible in court. It bridges information technology and law.</p><p><strong>Network Forensics</strong> specifically focuses on monitoring and analysis of network traffic to detect security incidents, reconstruct events, and gather evidence about network-based attacks.</p><p><strong>Cyber Forensics Investigation Process (DFRWS Framework):</strong></p><ol><li><strong>Identification:</strong> Recognise that an incident has occurred. Sources: IDS/IPS alerts, SIEM notifications, user complaints, antivirus alerts, unusual system behaviour. Define the scope: which systems, networks, time periods are involved?</li><li><strong>Preservation (Evidence Preservation):</strong> The most critical step — prevent alteration or destruction of evidence. Create forensic images (bit-for-bit copies) of storage media using write blockers (prevent any writes to the original). Calculate hash (MD5/SHA-256) of original and image — must match to prove no tampering (chain of custody). Document everything: who accessed what, when, and for what purpose. Collect volatile data first (RAM, running processes, network connections, logged-in users) — this is lost on shutdown.</li><li><strong>Collection (Evidence Collection):</strong> Order of volatility (most volatile first): CPU registers/cache → Network state, ARP cache → Running processes, memory → Disk contents → Log files → Off-site backups/archived data. Tools: FTK Imager (disk imaging), Wireshark (network capture), Volatility (memory analysis), tcpdump.</li><li><strong>Examination:</strong> Processing collected data to find relevant items. File system analysis: recover deleted files (file carving — searching for file headers in raw data), examine timestamps (MACE: Modified, Accessed, Changed, Entry timestamp). Browser history, cookies, search terms. Email headers and attachments. Log file analysis: Windows Event Logs, Syslog, web server access logs, firewall logs. Network traffic analysis: reconstruct TCP streams, identify attacker IPs, exfiltrated data.</li><li><strong>Analysis:</strong> Interpret examined data to answer: What happened? When? How? Who did it? What was compromised? Timeline reconstruction — correlating events across multiple sources (endpoint logs, network captures, authentication logs). Malware analysis — static (strings, imports, hashes) and dynamic (run in sandbox). Attribution: IP geolocation, ASN lookup, IOC (Indicators of Compromise) correlation with threat intelligence feeds.</li><li><strong>Presentation (Reporting):</strong> Document findings in a clear, comprehensive report suitable for non-technical decision-makers and legal proceedings. Must include: executive summary, detailed technical findings, methodology, tools used, chain of custody documentation, conclusions, and supporting evidence (screenshots, log excerpts). Expert witness testimony in court if required.</li></ol><p><strong>Key Tools:</strong> EnCase (commercial, industry standard for court cases), Autopsy (open source, FTK), Volatility (memory forensics), Wireshark (network forensics), Sleuth Kit, SIFT Workstation (SANS), Magnet AXIOM (mobile forensics). Mobile forensics tools: Cellebrite UFED (used by law enforcement worldwide). OSINT (Open Source Intelligence) tools: Maltego, Shodan, theHarvester.</p><p><strong>Legal requirements in India:</strong> Section 65B, Indian Evidence Act — electronic records must meet admissibility requirements (certificate of authenticity, unaltered). IT Act 2000 Section 79A designates "Examiner of Electronic Evidence." Cyber forensic labs accredited by Ministry of Electronics and IT (MeitY). CFSL (Central Forensic Science Laboratory) and state FSLs. Chain of custody documentation is essential — any gap can render evidence inadmissible.</p>`},
  {q:"What is net neutrality? Explain its principles and the debate around it.",u:"Unit 13",a:`<span class="utag">Unit 13</span><p><strong>Net Neutrality</strong> is the principle that Internet Service Providers (ISPs) and governments must treat all Internet traffic equally — without discriminating based on user, website, platform, application, type of content, or method of communication. It means ISPs must deliver all data packets at the same speed and quality, regardless of the source or destination.</p><p><strong>Core Principles of Net Neutrality:</strong></p><ul><li><strong>No Blocking:</strong> ISPs cannot block access to any legal website, service, or application — even if it competes with their own services. Example: Airtel cannot block WhatsApp calls (which compete with Airtel's voice calls).</li><li><strong>No Throttling:</strong> ISPs cannot deliberately slow down specific services. Example: Comcast deliberately throttled Netflix speeds to coerce Netflix into paying for faster delivery (until stopped by FCC).</li><li><strong>No Paid Prioritisation / Fast Lanes:</strong> ISPs cannot charge content providers extra fees to reach users faster ("internet fast lanes"). This would create a two-tier Internet — rich companies get faster delivery, startups get slow lanes.</li><li><strong>No Discrimination:</strong> All packets treated equally regardless of source, destination, protocol, or content type.</li></ul><p><strong>Arguments FOR Net Neutrality:</strong></p><ul><li><strong>Level playing field for innovation:</strong> Startups (Google, YouTube, Airbnb, Zomato were all once startups) can compete with established companies without paying ISPs for preferential treatment. Removes gatekeeping by ISPs over Internet success.</li><li><strong>Freedom of expression and access to information:</strong> ISPs shouldn't have the power to silence voices by blocking or slowing competing viewpoints, media organisations, or political content.</li><li><strong>Consumer choice:</strong> Users should determine which services they use, not ISPs.</li><li><strong>Prevents monopoly abuse:</strong> ISPs often have monopoly or duopoly positions (limited competition). Without neutrality regulation, they can extract rent from both consumers and content providers.</li><li><strong>Enables democracy and civic participation:</strong> Ensures all citizens can access government services, news, and civic resources at the same quality.</li></ul><p><strong>Arguments AGAINST Net Neutrality:</strong></p><ul><li>ISPs argue they need to manage network congestion — prioritising time-sensitive traffic (VoIP, video) over bulk downloads is technically rational.</li><li>Revenue from paid prioritisation funds infrastructure investment.</li><li>Regulation may slow ISP investment and innovation in network infrastructure.</li></ul><p><strong>Global Status:</strong></p><ul><li><strong>India (TRAI, 2018):</strong> India adopted one of the world's strongest net neutrality regulations. TRAI's revised regulations (2018) prohibit discriminatory treatment of content (blocking, throttling, preferential speeds). Zero-rating (offering certain services for free without counting against data caps — Facebook Free Basics was rejected by TRAI in 2016) largely prohibited as it discriminates by economic means.</li><li><strong>European Union:</strong> Open Internet Regulation (2015) enshrines net neutrality in EU law. Allows traffic management only for technical reasons, not commercial discrimination.</li><li><strong>United States:</strong> FCC enacted strong neutrality rules in 2015 (Title II, common carrier classification). Reversed under the Trump administration (2017). Biden FCC (2024) attempted to restore — ongoing legal battles. No federal law — patchwork state laws (California's SB822 is strongest).</li></ul><p>The net neutrality debate ultimately centres on whether the Internet is a commodity (ISPs as private businesses with pricing freedom) or a utility/infrastructure (like water/electricity, requiring regulation for public benefit). The increasing centralisation of the Internet (a few large platforms dominating traffic) adds complexity — should neutrality principles also apply to platforms, not just ISPs?</p>`},
  {q:"Explain access control models: DAC, MAC, RBAC. What is the principle of least privilege?",u:"Unit 14",a:`<span class="utag">Unit 14</span><p><strong>Access Control</strong> is the mechanism that determines which subjects (users, processes, systems) are permitted to access which objects (files, databases, services) and what operations they may perform. It is the enforcement mechanism for authorisation — the "what can you do" question after authentication ("who are you").</p><p><strong>1. DAC (Discretionary Access Control):</strong> The owner of a resource has the discretion to grant or revoke access to other subjects. The owner sets permissions based on their own judgement. Most flexible but least secure — a compromised owner account can grant all permissions.</p><ul><li><strong>Implementation:</strong> Unix/Linux file permissions (rwxrwxrwx — owner/group/others with read/write/execute bits). Windows NTFS ACLs (Access Control Lists). Each file has an owner who can modify its permissions.</li><li><strong>Example:</strong> Alice creates a file. She can grant Bob read permission, Carol read+write permission, and deny Dave all access — at her sole discretion.</li><li><strong>Weakness:</strong> Users can accidentally grant broad permissions. Malware running as the user inherits all user permissions. Permissions proliferate over time ("permission creep").</li></ul><p><strong>2. MAC (Mandatory Access Control):</strong> Access decisions are made by the system based on security labels assigned to subjects (clearance levels) and objects (classification levels) — not by the owner's discretion. The operating system enforces policy that even the owner cannot override.</p><ul><li><strong>Labels:</strong> Objects classified (Top Secret, Secret, Confidential, Unclassified). Subjects assigned clearance (Top Secret, etc.). Bell-LaPadula model: "no read up, no write down" — user can read objects at or below their clearance, write only to objects at or above their level (prevents information leaking down).</li><li><strong>Implementation:</strong> SELinux (Security-Enhanced Linux) — enforces MAC on Linux, used in Android. AppArmor (Ubuntu). Military and government systems. Mandatory policy = system admin defines rules, users cannot change them.</li><li><strong>Strength:</strong> Even if an attacker compromises a user account, they cannot access objects above the user's clearance level. Resistant to Trojan horse attacks (malware running as low-clearance process cannot write to high-security files).</li></ul><p><strong>3. RBAC (Role-Based Access Control):</strong> Permissions are assigned to roles (job functions), and users are assigned to roles — not given permissions directly. Simplifies administration in organisations where hundreds of users share the same job functions.</p><ul><li><strong>Roles:</strong> Examples: Admin, Manager, Developer, Read-Only, Auditor. Roles map to business functions, not individuals.</li><li><strong>Role Hierarchy:</strong> Junior_Developer inherits permissions of Developer; Senior_Developer inherits Developer + Review_Code.</li><li><strong>Implementation:</strong> Active Directory groups (Windows), database roles (SQL Server DBA role), AWS IAM roles, Kubernetes RBAC. Most enterprise systems today use RBAC.</li><li><strong>Benefits:</strong> Easy administration (add user to role, remove from role). Aligns with organisational structure. Supports separation of duties (no single role has conflicting permissions). Audit trails by role.</li><li><strong>ABAC (Attribute-Based Access Control):</strong> Extension of RBAC — permissions based on attributes of user, resource, and environment (time, location, device type). More granular: "Doctors in the Cardiology department can access cardiac patient records during business hours from hospital network."</li></ul><p><strong>Principle of Least Privilege (PoLP):</strong> Every subject (user, process, service) should have the minimum permissions necessary to perform its intended function — nothing more. If a web server only needs to read files from /var/www, it should have no permission to write there, access /etc/passwd, or execute arbitrary commands. Violated if a web server runs as root. Applied to: user accounts (no unnecessary admin rights), database accounts (web app DB user has SELECT/INSERT only, not DROP), APIs (OAuth scopes), microservices (each service has access only to its own DB). PoLP limits blast radius — if a process or account is compromised, the attacker's access is limited to only what that process legitimately needed.</p>`},
  {q:"What is cybersecurity frameworks? Explain ISO 27001 and NIST Cybersecurity Framework.",u:"Unit 15",a:`<span class="utag">Unit 15</span><p><strong>Cybersecurity Frameworks</strong> are structured sets of guidelines, best practices, and standards that organisations use to manage and reduce cybersecurity risk. They provide a common language and systematic approach for assessing security posture, identifying gaps, and implementing controls — applicable across industries and organisation sizes.</p><p><strong>ISO/IEC 27001 — Information Security Management System (ISMS):</strong> The international standard for managing information security, published by ISO (International Organisation for Standardisation) and IEC. ISO 27001 specifies requirements for establishing, implementing, maintaining, and continually improving an ISMS — a systematic, organisation-wide approach to managing sensitive information.</p><p><strong>ISO 27001 Key Components:</strong></p><ul><li><strong>Scope definition:</strong> Define boundaries of the ISMS (which departments, systems, processes are in scope).</li><li><strong>Risk Assessment and Treatment:</strong> Identify information assets, threats, vulnerabilities, and risks. Select controls from Annex A (114 controls across 14 domains in ISO 27001:2013; updated to 93 controls in 4 themes in ISO 27001:2022).</li><li><strong>Statement of Applicability (SoA):</strong> Documents which Annex A controls are applicable and why.</li><li><strong>PDCA Cycle:</strong> Plan (establish ISMS, risk assessment) → Do (implement controls) → Check (monitor, audit, measure) → Act (correct, improve).</li><li><strong>Annex A Control Domains (ISO 27001:2022):</strong> Organisational controls (policies, roles, supplier relationships, incident management). People controls (background checks, training, disciplinary process). Physical controls (physical security perimeter, clean desk). Technological controls (access control, cryptography, logging, vulnerability management, network security).</li><li><strong>Certification:</strong> Third-party audit by accredited certification body. Certificate valid for 3 years with annual surveillance audits. Demonstrates commitment to security to customers, partners, regulators.</li></ul><p><strong>ISO 27001 benefits:</strong> Systematic risk management. Compliance with regulations (GDPR, IT Act). Competitive advantage (trusted by enterprise customers). Reduced security incident frequency and cost. Foundation for other standards (ISO 27701 for privacy, ISO 27017 for cloud).</p><p><strong>NIST Cybersecurity Framework (CSF):</strong> Developed by the US National Institute of Standards and Technology (2014, updated CSF 2.0 in 2024). Originally for US critical infrastructure operators, now widely adopted globally across all sectors. Voluntary, flexible, risk-based framework that can be customised to any organisation's needs.</p><p><strong>NIST CSF Core — 6 Functions (CSF 2.0):</strong></p><ul><li><strong>GOVERN (new in CSF 2.0):</strong> Establish, communicate, and monitor cybersecurity risk management strategy, expectations, and policy. Leadership accountability and governance structure.</li><li><strong>IDENTIFY (ID):</strong> Understand the organisational context to manage cybersecurity risk. Asset inventory, risk assessment, supply chain risk management, data classification.</li><li><strong>PROTECT (PR):</strong> Implement safeguards to ensure delivery of critical services. Access control, security awareness training, data security, maintenance, protective technology.</li><li><strong>DETECT (DE):</strong> Define activities to identify cybersecurity incidents. Continuous monitoring, anomaly/event detection, SIEM, IDS/IPS.</li><li><strong>RESPOND (RS):</strong> Take action regarding a detected cybersecurity incident. Incident response planning, communications, analysis, mitigation, improvements.</li><li><strong>RECOVER (RC):</strong> Maintain resilience and restore capabilities impaired by incidents. Recovery planning, improvements, communications with stakeholders.</li></ul><p><strong>NIST CSF Tiers:</strong> Tier 1 (Partial) → Tier 2 (Risk Informed) → Tier 3 (Repeatable) → Tier 4 (Adaptive). Organisations self-assess their current tier and target tier, creating a roadmap. Profiles: Customise the framework to specific organisational requirements (industry, size, risk tolerance, regulatory requirements).</p><p><strong>Comparison ISO 27001 vs NIST CSF:</strong> ISO 27001 is certifiable (third-party audit, certificate) — used to demonstrate compliance externally. NIST CSF is a self-assessment tool — guides internal security posture improvement without certification. ISO 27001 is prescriptive (requirements must be met). NIST CSF is descriptive (outcomes to achieve, methods flexible). Many organisations use both: NIST CSF for strategic risk management and gap analysis; ISO 27001 controls as the implementation standard.</p>`},

  {q:"What is information security? Define the CIA triad.",u:"Unit 01",a:`<span class="utag">Unit 01</span><p><strong>Information security (InfoSec)</strong> is the practice of protecting information and information systems from unauthorised access, disclosure, modification, disruption, or destruction. It encompasses people, processes, and technology.</p><p>The <strong>CIA Triad</strong> is the foundational model of information security — three core properties every secure system must guarantee:</p><ul><li><strong>Confidentiality:</strong> Ensuring information is accessible only to those authorised to access it. Prevents unauthorised disclosure. Achieved through: access controls (usernames/passwords, RBAC), encryption (AES, TLS), data classification, and need-to-know policies. Violated by: eavesdropping, data theft, shoulder surfing, social engineering.</li><li><strong>Integrity:</strong> Ensuring information is accurate and has not been tampered with or altered without authorisation. Achieved through: hash functions (SHA-256, MD5), digital signatures, version control, checksums, write-protection. Violated by: man-in-the-middle attacks, malware modifying files, unauthorised data modification, corruption.</li><li><strong>Availability:</strong> Ensuring authorised users can access information and systems when needed. Achieved through: redundancy (RAID, backup servers), DDoS mitigation, disaster recovery plans, UPS, failover systems. Violated by: DDoS attacks, ransomware, hardware failures, natural disasters.</li></ul><p>Additional security properties: <strong>Authenticity</strong> (verifying identity — digital signatures, certificates), <strong>Non-repudiation</strong> (entity cannot deny actions — audit logs, digital signatures), <strong>Accountability</strong> (actions traceable to individuals).</p><p>The CIA triad guides security policy: every control should protect at least one of these three properties.</p>`},
  {q:"What is the IT Act 2000? Name three key provisions.",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>The <strong>Information Technology Act, 2000 (IT Act 2000)</strong> is India's primary legislation governing electronic commerce, cybercrime, and digital activities. It was enacted on 17 October 2000 and later significantly amended by the IT (Amendment) Act, 2008. India was the 12th nation globally to adopt a cyber law.</p><p><strong>Objectives:</strong> Provide legal recognition to electronic records and digital signatures, enable e-governance, facilitate electronic commerce, and create a legal framework to address cybercrimes and breaches of digital security.</p><p><strong>Three key provisions:</strong></p><ul><li><strong>Section 43 — Penalty for damage to computer systems:</strong> Whoever accesses, downloads, introduces viruses, denies service, or tampers with any computer or network without authorisation is liable to pay damages (compensation) to the owner. Civil remedy — no criminal liability unless section 66 applies.</li><li><strong>Section 66 — Computer-related offences (Criminal):</strong> If acts mentioned in Section 43 are done dishonestly or fraudulently, the offender faces up to 3 years imprisonment, a fine up to ₹5 lakh, or both. This covers hacking, spreading viruses, and unauthorised system access.</li><li><strong>Section 72 — Breach of confidentiality and privacy:</strong> Any person who has secured access to any electronic record, book, register, correspondence, information, or document without the consent of the person concerned and discloses it to others is punishable with up to 2 years imprisonment or fine up to ₹1 lakh or both.</li></ul><p><strong>Other important sections:</strong> S.65 (tampering with computer source code), S.67 (obscene material online), S.69 (government interception powers), S.79 (intermediary liability safe harbour). Adjudicating Officers and the Cyber Appellate Tribunal resolve IT Act disputes.</p>`},
  {q:"What is a cybercrime? Give three examples.",u:"Unit 02",a:`<span class="utag">Unit 02</span><p>A <strong>cybercrime</strong> is any criminal activity that involves a computer, network, or digital device — either as the target, tool, or medium of the crime. Cybercrimes are broadly categorised as crimes against individuals, property, organisations, or society.</p><p><strong>Categories of cybercrime:</strong></p><ul><li><strong>Crimes against individuals:</strong> Cyberstalking, online harassment, identity theft, cyber defamation.</li><li><strong>Crimes against property:</strong> Hacking, phishing for financial fraud, online theft, intellectual property piracy.</li><li><strong>Crimes against organisations:</strong> Corporate espionage, data breaches, ransomware attacks, insider threats.</li><li><strong>Crimes against society:</strong> Cyber terrorism, spreading hate speech, child exploitation material.</li></ul><p><strong>Three specific examples:</strong></p><ul><li><strong>1. Phishing:</strong> Attacker sends fraudulent emails impersonating a bank, e-commerce site, or government agency, tricking victims into entering credentials on a fake website. Variant: spear phishing targets specific individuals with personalised messages. Example: "Your SBI account has been suspended — click here to verify." Covered under IT Act S.66C (identity theft) and S.66D (cheating by impersonation).</li><li><strong>2. Ransomware:</strong> Malware that encrypts victim's files and demands a cryptocurrency ransom for the decryption key. Example: WannaCry (2017) infected 200,000+ computers in 150 countries including NHS UK, exploiting a Windows SMB vulnerability. Covered under IT Act S.66 (computer offences) and IPC S.384 (extortion).</li><li><strong>3. Distributed Denial of Service (DDoS):</strong> Attacker coordinates a botnet of thousands of compromised machines to flood a target server with traffic, making it unavailable to legitimate users. Example: Mirai botnet (2016) took down Dyn DNS server, making Twitter, Netflix, Amazon unreachable. Covered under IT Act S.66.</li></ul>`},
  {q:"What is intellectual property? Name its four types.",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Intellectual Property (IP)</strong> refers to creations of the mind — inventions, literary and artistic works, designs, symbols, names, and images used in commerce. IP rights give creators exclusive rights to use and profit from their creations for a defined period, providing economic incentives for innovation.</p><p>IP is protected by law through patents, copyrights, trademarks, and trade secrets — collectively known as Intellectual Property Rights (IPR).</p><p><strong>Four main types of IP:</strong></p><ul><li><strong>1. Copyright:</strong> Protects original creative works — books, music, films, software, databases, artistic works. Automatically arises upon creation — no registration required (though registration helps in litigation). Author gets exclusive rights: reproduce, distribute, adapt, perform, display. Duration in India: creator's lifetime + 60 years. Software is protected as a literary work under copyright.</li><li><strong>2. Patent:</strong> Protects inventions — new, useful, non-obvious technical innovations. Requires registration with the Patent Office. Grants inventor exclusive right to make, use, sell for 20 years. In exchange, full disclosure is required (public domain after 20 years). Examples: pharmaceutical drug compounds, mechanical devices, software algorithms (in some countries).</li><li><strong>3. Trademark:</strong> Protects brand identifiers — names, logos, slogans, colours distinguishing goods/services. Examples: ® symbols (registered trademark), ™ (unregistered). Renewable indefinitely as long as in commercial use. Prevents consumer confusion about product origin.</li><li><strong>4. Trade Secret:</strong> Confidential business information providing competitive advantage — formulas (Coca-Cola recipe), algorithms (Google PageRank), customer lists, manufacturing processes. Protected by confidentiality (NDAs) not registration — lasts indefinitely as long as secret maintained. No expiry, but can be lost by disclosure.</li></ul>`},
  {q:"What is a copyright? How long does it last in India?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p><strong>Copyright</strong> is an intellectual property right that automatically protects original creative works from the moment of creation — without any registration requirement. It grants the creator (author, artist, composer, programmer) a bundle of exclusive rights over their work.</p><p><strong>Works protected by copyright:</strong></p><ul><li>Literary works: books, novels, poems, articles, computer programs, databases.</li><li>Artistic works: paintings, drawings, photographs, sculptures, architectural plans.</li><li>Musical works: compositions (separately from the sound recording).</li><li>Cinematographic films (movies, documentaries).</li><li>Sound recordings (separately from the musical composition).</li><li>Broadcasts (TV/radio transmissions).</li></ul><p><strong>Rights granted to copyright holder:</strong></p><ul><li><strong>Economic rights:</strong> Reproduce (copy), distribute (sell), adapt (translate, make derivative works), perform publicly, broadcast, make available online. Copyright holder can license these rights to others for royalties.</li><li><strong>Moral rights:</strong> Right of attribution (to be named as author) and right of integrity (object to distortion or mutilation of the work).</li></ul><p><strong>Duration in India (Copyright Act, 1957):</strong></p><ul><li><strong>Literary, artistic, musical works, and films:</strong> Creator's lifetime + 60 years after death.</li><li><strong>Posthumous works:</strong> 60 years from the year of publication.</li><li><strong>Anonymous/pseudonymous works:</strong> 60 years from publication.</li><li><strong>Government works:</strong> 60 years from publication.</li><li><strong>Sound recordings and broadcasts:</strong> 60 years from publication/broadcast.</li></ul><p>After copyright expires, the work enters the <em>public domain</em> — anyone can use it freely. India follows Berne Convention — Indian works are automatically protected in 180+ member countries.</p>`},
  {q:"What is a patent? How does it differ from copyright?",u:"Unit 03",a:`<span class="utag">Unit 03</span><p>A <strong>patent</strong> is an exclusive right granted by the government to an inventor for a new, useful, and non-obvious invention — in exchange for publicly disclosing the invention. The patent holder has the right to prevent others from making, using, selling, or importing the patented invention without permission for a limited period.</p><p><strong>Patent requirements (patentability criteria):</strong></p><ul><li><strong>Novelty:</strong> The invention must be new — not previously known, used, or published anywhere in the world.</li><li><strong>Inventive step (Non-obviousness):</strong> Must not be obvious to a person skilled in the relevant field.</li><li><strong>Industrial applicability:</strong> Must be capable of being made or used in an industry.</li></ul><p><strong>Duration:</strong> 20 years from the filing date (non-renewable). After expiry, invention enters the public domain — others may freely manufacture and sell it. This is why many generic drugs become available 20 years after the original drug patent.</p><p><strong>Patent vs Copyright — Key differences:</strong></p><ul><li><strong>What is protected:</strong> Patent = inventions, technical solutions. Copyright = creative expression (books, art, music, software code).</li><li><strong>Registration:</strong> Patent requires formal application to Patent Office with detailed technical description. Copyright is automatic from creation.</li><li><strong>Duration:</strong> Patent = 20 years. Copyright = lifetime + 60 years (in India).</li><li><strong>Nature of protection:</strong> Patent prevents independent development of the same invention (even if invented independently). Copyright only protects the specific expression — someone can independently create the same poem or song without infringing.</li><li><strong>Cost:</strong> Patent applications cost thousands of rupees/dollars with maintenance fees. Copyright is free.</li><li><strong>Scope:</strong> Patent gives monopoly on the idea/invention itself. Copyright protects the expression, not the underlying idea.</li></ul>`},
  {q:"What is a threat vs a vulnerability in information security?",u:"Unit 01",a:`<span class="utag">Unit 01</span><p>Understanding threats versus vulnerabilities is fundamental to risk management and security architecture.</p><p><strong>Vulnerability:</strong> A weakness or flaw in a system, application, process, or control that could be exploited to compromise security. Vulnerabilities exist regardless of whether anyone intends to exploit them.</p><ul><li><strong>Examples:</strong> Unpatched software (CVE — Common Vulnerabilities and Exposures), weak passwords, misconfigured firewall rules, lack of input validation allowing SQL injection, default credentials on routers, physical access to server rooms, untrained employees susceptible to phishing.</li><li><strong>Types:</strong> Software vulnerabilities, configuration vulnerabilities, physical vulnerabilities, human/procedural vulnerabilities.</li></ul><p><strong>Threat:</strong> Any potential event, actor, or circumstance that could exploit a vulnerability to cause harm. A threat requires both a vulnerability to exploit AND the capability and intent to do so.</p><ul><li><strong>Examples:</strong> Malicious hackers, nation-state actors, disgruntled employees (insider threats), malware, natural disasters (flood destroying server room), hardware failure.</li><li><strong>Threat agent/actor:</strong> The individual, group, or force that carries out the threat (hacker group, ransomware gang, careless employee).</li></ul><p><strong>Risk = Threat × Vulnerability × Impact:</strong> Risk is the probability that a threat will exploit a vulnerability and cause harm, multiplied by the impact of that harm. Security controls aim to reduce either the probability (patching removes the vulnerability) or the impact (backups reduce ransomware impact).</p><p><strong>Exploit:</strong> The specific technique or code that leverages a vulnerability. A zero-day exploit targets a vulnerability that has not yet been publicly disclosed or patched — extremely dangerous because defenders have no advance warning.</p>`},
